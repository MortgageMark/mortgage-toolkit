                  <div style={{ padding: 12, background: inputBg, borderRadius: 8, fontSize: 11, color: darkMode ? "#6B7C8A" : "#888", fontFamily: font }}>
                    💡 Scenarios save all current calculator values. Loading a scenario will restore those values and refresh the page.
                  </div>
                </div>
              )}

              {settingsTab === "sharing" && (
                <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, fontFamily: font }}>Choose which tabs to show when sharing</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={() => setShareMode("all")} style={{ ...tabStyle(shareMode === "all"), border: `1px solid ${shareMode === "all" ? COLORS.blue : border}` }}>All Tabs</button>
                    <button onClick={() => setShareMode("custom")} style={{ ...tabStyle(shareMode === "custom"), border: `1px solid ${shareMode === "custom" ? COLORS.blue : border}` }}>Custom Selection</button>
                  </div>
                  {shareMode === "custom" && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                      {allModules.map(m => (
                        <label key={m.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", background: sharedTabs.includes(m.id) ? (darkMode ? "#1A3040" : "#E8F4FD") : inputBg, borderRadius: 8, cursor: "pointer", border: `1px solid ${sharedTabs.includes(m.id) ? COLORS.blue : border}`, transition: "all 0.2s" }}>
                          <input type="checkbox" checked={sharedTabs.includes(m.id)} onChange={() => toggleSharedTab(m.id)} style={{ width: 16, height: 16, cursor: "pointer" }} />
                          <span style={{ fontSize: 16 }}>{m.icon}</span>
                          <span style={{ fontSize: 13, fontWeight: 600, fontFamily: font }}>{m.label}</span>
                        </label>
                      ))}
                    </div>
                  )}
                  <div style={{ padding: 14, background: inputBg, borderRadius: 8, border: `1px solid ${border}` }}>
                    <div style={{ fontSize: 11, fontWeight: 600, marginBottom: 6, fontFamily: font }}>SHAREABLE LINK</div>
                    <div style={{ fontSize: 11, color: darkMode ? "#6B7C8A" : "#888", wordBreak: "break-all", marginBottom: 8, fontFamily: font }}>{generateShareLink()}</div>
                    <button onClick={copyShareLink} style={{ padding: "6px 14px", borderRadius: 6, border: "none", background: COLORS.blue, color: "#fff", fontSize: 11, fontWeight: 600, fontFamily: font, cursor: "pointer" }}>📋 Copy Link</button>
                  </div>
                  <div style={{ padding: 12, background: inputBg, borderRadius: 8, fontSize: 11, color: darkMode ? "#6B7C8A" : "#888", fontFamily: font }}>
                    💡 Share a link that only shows selected tabs. Recipients can view calculators without seeing internal tools.
                  </div>
                </div>
              )}

              {settingsTab === "portal" && (
                <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, fontFamily: font }}>Generate pre-filled calculator links for clients</div>
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 600, display: "block", marginBottom: 4, fontFamily: font }}>SELECT CALCULATOR</label>
                    <select value={portalModule} onChange={e => setPortalModule(e.target.value)} style={inputStyle}>
                      {allModules.map(m => <option key={m.id} value={m.id}>{m.icon} {m.label}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 600, display: "block", marginBottom: 4, fontFamily: font }}>CLIENT NAME (optional, for your reference)</label>
                    <input value={portalClient} onChange={e => setPortalClient(e.target.value)} style={inputStyle} placeholder="e.g. Smith Family" />
                  </div>
                  <div style={{ padding: 14, background: inputBg, borderRadius: 8, border: `1px solid ${border}` }}>
                    <div style={{ fontSize: 11, fontWeight: 600, marginBottom: 6, fontFamily: font }}>CLIENT PORTAL LINK</div>
                    <div style={{ fontSize: 11, color: darkMode ? "#6B7C8A" : "#888", wordBreak: "break-all", marginBottom: 8, fontFamily: font }}>{portalLink}</div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <button onClick={() => { navigator.clipboard?.writeText(portalLink); }} style={{ padding: "6px 14px", borderRadius: 6, border: "none", background: COLORS.blue, color: "#fff", fontSize: 11, fontWeight: 600, fontFamily: font, cursor: "pointer" }}>📋 Copy Link</button>
                      <button onClick={() => window.open(portalLink, "_blank")} style={{ padding: "6px 14px", borderRadius: 6, border: `1px solid ${COLORS.blue}`, background: "none", color: COLORS.blue, fontSize: 11, fontWeight: 600, fontFamily: font, cursor: "pointer" }}>🔗 Preview</button>
                    </div>
                  </div>
                  <div style={{ padding: 12, background: inputBg, borderRadius: 8, fontSize: 11, color: darkMode ? "#6B7C8A" : "#888", fontFamily: font }}>
                    💡 Send clients a direct link to a specific calculator with your branding. They'll see a clean, focused view perfect for their needs.
                  </div>
                </div>
              )}
            </div>
          </div>
        </>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════
    // MAIN APP
    // ═══════════════════════════════════════════════════════════════════════
    const MODULES = [
      { id: "payment", label: "Payment Calculator", icon: "💰", component: PaymentCalculator },
      { id: "refi", label: "Refi Analyzer", icon: "🔄", component: RefinanceAnalyzer },
      { id: "fees", label: "Fee Sheet", icon: "📋", component: FeeSheetGenerator },
      { id: "compare", label: "Compare Loans", icon: "⚖️", component: MortgageComparison },
      { id: "breakeven", label: "Break-Even", icon: "📊", component: BreakEvenCalculator },
      { id: "prequal", label: "Pre-Qual Letter", icon: "✉️", component: PreQualLetter },
      { id: "locks", label: "Rate Locks", icon: "🔒", component: ForwardCommitment },
      { id: "afford", label: "Affordability", icon: "🏠", component: AffordabilityCalculator },
      { id: "amort", label: "Amortization", icon: "📅", component: AmortizationSchedule },
      { id: "dti", label: "DTI Calculator", icon: "📐", component: DTICalculator },
      { id: "rentvsbuy", label: "Rent vs Buy", icon: "🏘️", component: RentVsBuyCalculator },
      { id: "sellernet", label: "Seller Net Sheet", icon: "💵", component: SellerNetSheet },
      { id: "biweekly", label: "Bi-Weekly", icon: "⚡", component: BiWeeklyCalculator },
      { id: "closing", label: "Closing Costs", icon: "🏦", component: ClosingCostEstimator },
      { id: "heloc", label: "HELOC", icon: "🏡", component: HELOCCalculator },
      { id: "programs", label: "Loan Programs", icon: "🎯", component: LoanProgramComparison },
      { id: "budget", label: "Budget Planner", icon: "📒", component: BudgetPlanner },
      { id: "openhouse", label: "Open House", icon: "🏘️", component: OpenHouseLeadCapture },
      { id: "flyer", label: "Flyer Generator", icon: "📰", component: FlyerGenerator },
      { id: "ratewatch", label: "Rate Watch", icon: "📈", component: RateWatchDashboard },
    ];


// ═══════════════════════════════════════════════════════════════════════
// SCENARIO DASHBOARD — Internal User Scenario Management
// ═══════════════════════════════════════════════════════════════════════
function ScenarioDashboard({ user, onSelectScenario, onLogout }) {
  const c = useThemeColors();
  const [scenarios, setScenarios] = useLocalStorage("scenarios", []);
  const [searchTerm, setSearchTerm] = useState("");
  const [showNewForm, setShowNewForm] = useState(false);
  const [newClientName, setNewClientName] = useState("");
  const [newNotes, setNewNotes] = useState("");
  const [sortBy, setSortBy] = useState("updatedAt");
  const [cloudLoading, setCloudLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [cloudError, setCloudError] = useState(null);
  const [auditLogOpen, setAuditLogOpen] = useState(null);   // scenario id or null
  const [auditLogData, setAuditLogData] = useState([]);
  const [auditLogLoading, setAuditLogLoading] = useState(false);

  // Cloud mode: Supabase user with a live client connection
  const isCloudUser = !!(user && user.supabaseUser && supabase);

  const roster = JSON.parse(localStorage.getItem("mtk_roster") || "[]");
  const currentMember = roster.find(m => m.id === user.id);
  const displayName = currentMember ? currentMember.name : (user.name || "Team Member");

  // ── Map a Supabase row → the local scenario shape the UI expects ──
  function mapFromCloud(row) {
    const ownerName = row._owner_name || displayName;
    return {
      id: row.id,
      clientName: row.name || "Untitled",
      notes: row.notes || "",
      createdBy: row.user_id,
      createdByName: ownerName,
      createdAt: row.created_at,
      updatedAt: row.updated_at,
      status: row.status || "active",
      lockLevel: row.lock_level || "none",
      lockedBy: row.locked_by || null,
      lockedAt: row.locked_at || null,
      calculatorData: row.calculation_data || {},
      _cloud: true
    };
  }

  // ── On mount: fetch scenarios from Supabase for cloud users ──
  useEffect(function() {
    if (!isCloudUser) return;
    let cancelled = false;
    setCloudLoading(true);
    fetchScenariosFromSupabase()
      .then(function(result) {
        if (cancelled) return;
        if (result.error) {
          console.warn("Cloud scenario fetch error:", result.error);
          setCloudError("Could not load scenarios from cloud. Showing cached data.");
        } else {
          setScenarios(result.data.map(mapFromCloud));
          setCloudError(null);
        }
      })
      .catch(function(err) {
        if (cancelled) return;
        console.warn("Cloud scenario fetch exception:", err);
        setCloudError("Could not load scenarios from cloud. Showing cached data.");
      })
      .finally(function() {
        if (!cancelled) setCloudLoading(false);
      });
    return function() { cancelled = true; };
  }, []);

  async function createScenario() {
    if (!newClientName.trim() || saving) return;

    if (isCloudUser) {
      setSaving(true);
      try {
        const { data, error } = await saveScenarioToSupabase({
          name: newClientName.trim(),
          notes: newNotes.trim(),
          calculationData: {}
        });
        if (error) { alert("Could not save scenario: " + error.message); return; }
        setScenarios(prev => [mapFromCloud(data), ...prev]);
        writeAuditLog(data.id, "created", {}, newClientName.trim());
      } catch (err) {
        alert("Could not save scenario: " + err.message);
        return;
      } finally { setSaving(false); }
    } else {
      const now = new Date().toISOString();
      const scenario = {
        id: "s" + Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
        clientName: newClientName.trim(),
        notes: newNotes.trim(),
        createdBy: user.id,
        createdByName: displayName,
        createdAt: now,
        updatedAt: now,
        status: "active",
        calculatorData: {}
      };
      setScenarios(prev => [scenario, ...prev]);
    }
    setNewClientName("");
    setNewNotes("");
    setShowNewForm(false);
  }

  async function toggleAuditLog(scenarioId) {
    if (auditLogOpen === scenarioId) {
      setAuditLogOpen(null);
      setAuditLogData([]);
      return;
    }
    setAuditLogOpen(scenarioId);
    setAuditLogLoading(true);
    try {
      const { data } = await fetchAuditLog(scenarioId);
      // Enrich with user names
      const userIds = [...new Set(data.map(e => e.user_id))];
      const { data: profiles } = await supabase
        .from("profiles")
        .select("id, display_name")
        .in("id", userIds);
      const nameMap = {};
      if (profiles) profiles.forEach(p => { nameMap[p.id] = p.display_name; });
      setAuditLogData(data.map(e => ({ ...e, _user_name: nameMap[e.user_id] || "Unknown" })));
    } catch (err) {
      console.warn("Audit log fetch error:", err);
      setAuditLogData([]);
    } finally { setAuditLogLoading(false); }
  }

  async function deleteScenario(id) {
    if (!confirm("Delete this scenario? This cannot be undone.")) return;
    const scenarioName = scenarios.find(s => s.id === id)?.clientName || "";
    if (isCloudUser) {
      writeAuditLog(id, "deleted", {}, scenarioName);
      const { error } = await deleteScenarioFromSupabase(id);
      if (error) { alert("Could not delete scenario: " + error.message); return; }
    }
    setScenarios(prev => prev.filter(s => s.id !== id));
  }

  async function duplicateScenario(scenario) {
    if (isCloudUser) {
      setSaving(true);
      try {
        const { data, error } = await saveScenarioToSupabase({
          name: (scenario.clientName || "Untitled") + " (Copy)",
          notes: scenario.notes || "",
          calculationData: scenario.calculatorData || scenario.calculation_data || {}
        });
        if (error) { alert("Could not duplicate scenario: " + error.message); return; }
        setScenarios(prev => [mapFromCloud(data), ...prev]);
        writeAuditLog(data.id, "duplicated", { source: { old: null, new: scenario.id } }, scenario.clientName + " → Copy");
      } catch (err) {
        alert("Could not duplicate scenario: " + err.message);
        return;
      } finally { setSaving(false); }
    } else {
      const now = new Date().toISOString();
      const copy = {
        ...scenario,
        id: "s" + Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
        clientName: scenario.clientName + " (Copy)",
        createdBy: user.id,
        createdByName: displayName,
        createdAt: now,
        updatedAt: now,
        calculatorData: { ...scenario.calculatorData }
      };
      setScenarios(prev => [copy, ...prev]);
    }
  }

  const filtered = scenarios
    .filter(s => {
      if (!searchTerm) return true;
      const term = searchTerm.toLowerCase();
      return s.clientName.toLowerCase().includes(term) ||
             (s.notes && s.notes.toLowerCase().includes(term)) ||
             (s.createdByName && s.createdByName.toLowerCase().includes(term));
    })
    .sort((a, b) => {
      if (sortBy === "updatedAt") return new Date(b.updatedAt) - new Date(a.updatedAt);
      if (sortBy === "createdAt") return new Date(b.createdAt) - new Date(a.createdAt);
      if (sortBy === "clientName") return a.clientName.localeCompare(b.clientName);
      return 0;
    });

  function formatDate(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  }

  function formatTime(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    return d.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
  }

  const cardStyle = {
    background: c.cardBg,
    border: "1px solid " + c.border,
    borderRadius: "12px",
    padding: "20px",
    cursor: "pointer",
    transition: "all 0.2s ease",
    position: "relative"
  };

  return (
    <div style={{ minHeight: "100vh", background: c.bg, color: c.text }}>
      {/* Header */}
      <div style={{
        background: "linear-gradient(135deg, #1e3a5f 0%, #2d5a8e 100%)",
        padding: "20px 32px",
        display: "flex",
        alignItems: "center",
        justifyContent: "space-between",
        color: "#fff"
      }}>
        <div>
          <h1 style={{ margin: 0, fontSize: "24px", fontWeight: 700 }}>
            Loan Officer Dashboard
          </h1>
          <p style={{ margin: "4px 0 0", opacity: 0.8, fontSize: "14px" }}>
            Welcome back, {displayName}
          </p>
        </div>
        <div style={{ display: "flex", gap: "12px", alignItems: "center" }}>
          <button
            onClick={onLogout}
            style={{
              background: "rgba(255,255,255,0.15)",
              color: "#fff",
              border: "1px solid rgba(255,255,255,0.3)",
              borderRadius: "8px",
              padding: "8px 16px",
              cursor: "pointer",
              fontSize: "14px"
            }}
          >
            Logout
          </button>
        </div>
      </div>

      {/* Main Content */}
      <div style={{ maxWidth: "1000px", margin: "0 auto", padding: "24px" }}>
        {/* Action Bar */}
        <div style={{
          display: "flex",
          flexWrap: "wrap",
          gap: "12px",
          alignItems: "center",
          marginBottom: "24px"
        }}>
          <button
            onClick={() => setShowNewForm(true)}
            style={{
              background: "#2563eb",
              color: "#fff",
              border: "none",
              borderRadius: "8px",
              padding: "10px 20px",
              fontSize: "15px",
              fontWeight: 600,
              cursor: "pointer",
              display: "flex",
              alignItems: "center",
              gap: "8px"
            }}
          >
            + New Scenario
          </button>
          <input
            type="text"
            placeholder="Search scenarios..."
            value={searchTerm}
            onChange={e => setSearchTerm(e.target.value)}
            style={{
              flex: 1,
              minWidth: "200px",
              padding: "10px 14px",
              borderRadius: "8px",
              border: "1px solid " + c.border,
              background: c.cardBg,
              color: c.text,
              fontSize: "14px",
              outline: "none"
            }}
          />
          <select
            value={sortBy}
            onChange={e => setSortBy(e.target.value)}
            style={{
              padding: "10px 14px",
              borderRadius: "8px",
              border: "1px solid " + c.border,
              background: c.cardBg,
              color: c.text,
              fontSize: "14px",
              cursor: "pointer"
            }}
          >
            <option value="updatedAt">Last Updated</option>
            <option value="createdAt">Date Created</option>
            <option value="clientName">Client Name</option>
          </select>
        </div>

        {/* New Scenario Form */}
        {showNewForm && (
          <div style={{
            ...cardStyle,
            marginBottom: "24px",
            cursor: "default",
            borderColor: "#2563eb",
            borderWidth: "2px"
          }}>
            <h3 style={{ margin: "0 0 16px", fontSize: "18px" }}>Create New Scenario</h3>
            <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
              <div>
                <label style={{ display: "block", fontSize: "13px", fontWeight: 600, marginBottom: "4px" }}>
                  Client Name *
                </label>
                <input
                  type="text"
                  placeholder="e.g. John & Jane Smith"
                  value={newClientName}
                  onChange={e => setNewClientName(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && !saving && createScenario()}
                  autoFocus
                  style={{
                    width: "100%",
                    padding: "10px 12px",
                    borderRadius: "8px",
                    border: "1px solid " + c.border,
                    background: c.bg,
                    color: c.text,
                    fontSize: "15px",
                    outline: "none",
                    boxSizing: "border-box"
                  }}
                />
              </div>
              <div>
                <label style={{ display: "block", fontSize: "13px", fontWeight: 600, marginBottom: "4px" }}>
                  Notes (optional)
                </label>
                <textarea
                  placeholder="e.g. First-time buyer, looking at $400k range, FHA..."
                  value={newNotes}
                  onChange={e => setNewNotes(e.target.value)}
                  rows={2}
                  style={{
                    width: "100%",
                    padding: "10px 12px",
                    borderRadius: "8px",
                    border: "1px solid " + c.border,
                    background: c.bg,
                    color: c.text,
                    fontSize: "14px",
                    outline: "none",
                    resize: "vertical",
                    fontFamily: "inherit",
                    boxSizing: "border-box"
                  }}
                />
              </div>
              <div style={{ display: "flex", gap: "10px" }}>
                <button
                  onClick={createScenario}
                  disabled={saving}
                  style={{
                    background: saving ? "#93b4f5" : "#2563eb",
                    color: "#fff",
                    border: "none",
                    borderRadius: "8px",
                    padding: "10px 24px",
                    fontSize: "14px",
                    fontWeight: 600,
                    cursor: saving ? "not-allowed" : "pointer",
                    opacity: saving ? 0.7 : 1
                  }}
                >
                  {saving ? "Saving…" : "Create Scenario"}
                </button>
                <button
                  onClick={() => { setShowNewForm(false); setNewClientName(""); setNewNotes(""); }}
                  style={{
                    background: "transparent",
                    color: c.textSecondary || c.text,
                    border: "1px solid " + c.border,
                    borderRadius: "8px",
                    padding: "10px 24px",
                    fontSize: "14px",
                    cursor: "pointer"
                  }}
                >
                  Cancel
                </button>
              </div>
            </div>
          </div>
        )}

        {/* Cloud Loading Indicator */}
        {cloudLoading && (
          <div style={{
            display: "flex",
            alignItems: "center",
            gap: "10px",
            padding: "14px 18px",
            marginBottom: "16px",
            background: "rgba(37,99,235,0.08)",
            border: "1px solid rgba(37,99,235,0.25)",
            borderRadius: "10px",
            fontSize: "14px",
            color: "#2563eb"
          }}>
            <span style={{ display: "inline-block", animation: "spin 1s linear infinite", fontSize: "18px" }}>⟳</span>
            Loading scenarios from cloud…
          </div>
        )}

        {/* Cloud Error Banner */}
        {cloudError && !cloudLoading && (
          <div style={{
            display: "flex",
            alignItems: "center",
            justifyContent: "space-between",
            padding: "12px 18px",
            marginBottom: "16px",
            background: "rgba(239,68,68,0.08)",
            border: "1px solid rgba(239,68,68,0.25)",
            borderRadius: "10px",
            fontSize: "14px",
            color: "#ef4444"
          }}>
            <span>⚠️ {cloudError}</span>
            <button
              onClick={() => setCloudError(null)}
              style={{
                background: "none",
                border: "none",
                color: "#ef4444",
                cursor: "pointer",
                fontSize: "18px",
                padding: "0 4px",
                lineHeight: 1
              }}
            >✕</button>
          </div>
        )}

        {/* Scenario Count */}
        <p style={{ fontSize: "14px", color: c.textSecondary || "#888", marginBottom: "16px" }}>
          {filtered.length} scenario{filtered.length !== 1 ? "s" : ""}
          {searchTerm ? (" matching \"" + searchTerm + "\"") : ""}
          {isCloudUser && !cloudLoading && " · ☁️ Cloud"}
        </p>

        {/* Empty State */}
        {filtered.length === 0 && !showNewForm && (
          <div style={{
            textAlign: "center",
            padding: "60px 24px",
            background: c.cardBg,
            borderRadius: "12px",
            border: "1px solid " + c.border
          }}>
            <div style={{ fontSize: "48px", marginBottom: "16px" }}>📋</div>
            <h3 style={{ margin: "0 0 8px", fontSize: "20px" }}>
              {searchTerm ? "No matching scenarios" : "No scenarios yet"}
            </h3>
            <p style={{ color: c.textSecondary || "#888", margin: "0 0 20px" }}>
              {searchTerm
                ? "Try a different search term"
                : "Create your first client scenario to get started"}
            </p>
            {!searchTerm && (
              <button
                onClick={() => setShowNewForm(true)}
                style={{
                  background: "#2563eb",
                  color: "#fff",
                  border: "none",
                  borderRadius: "8px",
                  padding: "12px 28px",
                  fontSize: "15px",
                  fontWeight: 600,
                  cursor: "pointer"
                }}
              >
                + Create First Scenario
              </button>
            )}
          </div>
        )}

        {/* Scenario Cards */}
        <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
          {filtered.map(scenario => (
            <div
              key={scenario.id}
              onClick={() => onSelectScenario(scenario)}
              style={cardStyle}
              onMouseEnter={e => { e.currentTarget.style.borderColor = "#2563eb"; e.currentTarget.style.boxShadow = "0 2px 12px rgba(37,99,235,0.15)"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = c.border; e.currentTarget.style.boxShadow = "none"; }}
            >
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div style={{ flex: 1 }}>
                  <h3 style={{ margin: "0 0 4px", fontSize: "17px", fontWeight: 600 }}>
                    {scenario.clientName}
                  </h3>
                  {scenario.notes && (
                    <p style={{
                      margin: "0 0 8px",
                      fontSize: "13px",
                      color: c.textSecondary || "#888",
                      lineHeight: 1.4
                    }}>
                      {scenario.notes.length > 120 ? scenario.notes.substring(0, 120) + "..." : scenario.notes}
                    </p>
                  )}
                  <div style={{ display: "flex", gap: "16px", fontSize: "12px", color: c.textSecondary || "#999" }}>
                    <span>Created {formatDate(scenario.createdAt)}</span>
                    <span>Updated {formatDate(scenario.updatedAt)} at {formatTime(scenario.updatedAt)}</span>
                    {scenario.createdByName && scenario.createdBy !== user.id && (
                      <span style={{
                        background: "rgba(139,92,246,0.12)",
                        color: "#7c3aed",
                        padding: "1px 8px",
                        borderRadius: "6px",
                        fontWeight: 600
                      }}>👤 {scenario.createdByName}</span>
                    )}
                    {scenario.createdByName && scenario.createdBy === user.id && (
                      <span>by {scenario.createdByName}</span>
                    )}
                  </div>
                </div>
                {/* Action buttons */}
                <div
                  style={{ display: "flex", gap: "6px", marginLeft: "12px" }}
                  onClick={e => e.stopPropagation()}
                >
                  <button
                    title="Duplicate"
                    onClick={() => duplicateScenario(scenario)}
                    style={{
                      background: "transparent",
                      border: "1px solid " + c.border,
                      borderRadius: "6px",
                      padding: "6px 10px",
                      cursor: "pointer",
                      fontSize: "14px",
                      color: c.text
                    }}
                  >
                    📋
                  </button>
                  {isCloudUser && (
                    <button
                      title="Activity Log"
                      onClick={() => toggleAuditLog(scenario.id)}
                      style={{
                        background: auditLogOpen === scenario.id ? "rgba(37,99,235,0.1)" : "transparent",
                        border: "1px solid " + (auditLogOpen === scenario.id ? "#2563eb" : c.border),
                        borderRadius: "6px",
                        padding: "6px 10px",
                        cursor: "pointer",
                        fontSize: "14px",
                        color: auditLogOpen === scenario.id ? "#2563eb" : c.text
                      }}
                    >
                      📜
                    </button>
                  )}
                  <button
                    title="Delete"
                    onClick={() => deleteScenario(scenario.id)}
                    style={{
                      background: "transparent",
                      border: "1px solid " + c.border,
                      borderRadius: "6px",
                      padding: "6px 10px",
                      cursor: "pointer",
                      fontSize: "14px",
                      color: "#ef4444"
                    }}
                  >
                    🗑️
                  </button>
                </div>
              </div>

              {/* Audit Log Panel */}
              {auditLogOpen === scenario.id && (
                <div style={{
                  borderTop: "1px solid " + c.border,
                  padding: "12px 16px",
                  background: c.cardBg || "#fafafa",
                  fontSize: "13px",
                  maxHeight: "220px",
                  overflowY: "auto"
                }}>
                  <div style={{ fontWeight: 600, marginBottom: "8px", color: c.text }}>
                    📜 Activity Log
                  </div>
                  {auditLogLoading && <div style={{ color: c.textSecondary }}>Loading...</div>}
                  {!auditLogLoading && auditLogData.length === 0 && (
                    <div style={{ color: c.textSecondary, fontStyle: "italic" }}>No activity recorded yet.</div>
                  )}
                  {!auditLogLoading && auditLogData.map((entry, idx) => {
                    const actionLabels = {
                      created: "🆕 Created",
                      updated: "✏️ Updated",
                      deleted: "🗑️ Deleted",
                      locked_fees: "🔒 Locked (Fees)",
                      locked_full: "🔒 Locked (Full)",
                      unlocked: "🔓 Unlocked",
                      duplicated: "📋 Duplicated",
                      status_changed: "📊 Status Changed"
                    };
                    const dt = new Date(entry.created_at);
                    const timeStr = dt.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })
                      + " at " + dt.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
                    return (
                      <div key={entry.id || idx} style={{
                        display: "flex",
                        gap: "8px",
                        padding: "6px 0",
                        borderBottom: idx < auditLogData.length - 1 ? "1px solid " + c.border : "none",
                        alignItems: "baseline"
                      }}>
                        <span style={{ minWidth: "130px", fontWeight: 500 }}>
                          {actionLabels[entry.action] || entry.action}
                        </span>
                        <span style={{ color: "#7c3aed", fontWeight: 500 }}>
                          {entry._user_name}
                        </span>
                        <span style={{ color: c.textSecondary, marginLeft: "auto", whiteSpace: "nowrap" }}>
                          {timeStr}
                        </span>
                        {entry.note && (
                          <span style={{ color: c.textSecondary, fontStyle: "italic" }}>
                            — {entry.note}
                          </span>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          ))}
        </div>

        {/* Quick-start: open calculators without a scenario */}
        <div style={{
          marginTop: "32px",
          padding: "16px 20px",
          background: c.cardBg,
          borderRadius: "12px",
          border: "1px solid " + c.border,
          textAlign: "center"
        }}>
          <p style={{ margin: "0 0 8px", fontSize: "14px", color: c.textSecondary || "#888" }}>
            Need a quick calculation without saving?
          </p>
          <button
            onClick={() => onSelectScenario(null)}
            style={{
              background: "transparent",
              color: "#2563eb",
              border: "1px solid #2563eb",
              borderRadius: "8px",
              padding: "8px 20px",
              fontSize: "14px",
              fontWeight: 600,
              cursor: "pointer"
            }}
          >
            Open Calculators (No Scenario)
          </button>
        </div>
      </div>
    </div>
  );
}

// LOGIN SCREEN — Supabase Auth (Email/Password) + Guest Access
// ═══════════════════════════════════════════════════════════════════════
function LoginScreen({ onLogin }) {
  const c = useThemeColors();
  const font = "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
  const [mode, setMode] = useState("signin"); // "signin", "signup", or "guest"
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [successMsg, setSuccessMsg] = useState("");

  // Sign-in fields
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");

  // Sign-up fields
  const [suName, setSuName] = useState("");
  const [suEmail, setSuEmail] = useState("");
  const [suPassword, setSuPassword] = useState("");
  const [suPassword2, setSuPassword2] = useState("");
  const [suRole, setSuRole] = useState("borrower");

  // Guest fields
  const [gName, setGName] = useState("");
  const [gPhone, setGPhone] = useState("");
  const [gEmail, setGEmail] = useState("");

  // ── Sign In with Supabase ──
  const handleSignIn = async function() {
    setError(""); setSuccessMsg("");
    if (!email.trim()) { setError("Please enter your email."); return; }
    if (!password) { setError("Please enter your password."); return; }
    setLoading(true);
    try {
      const { data, error: signInErr } = await supabase.auth.signInWithPassword({
        email: email.trim(),
        password: password
      });
      if (signInErr) {
        setError(signInErr.message || "Sign-in failed.");
        setLoading(false);
        return;
      }
      // Fetch profile to get role & display name
      const user = data.user;
      const { data: profile } = await supabase
        .from("profiles")
        .select("*")
        .eq("id", user.id)
        .single();

      const role = (profile && profile.role) ? profile.role : "borrower";
      const displayName = (profile && profile.display_name) ? profile.display_name : (user.email || "User");
      const isInternal = (role === "admin" || role === "internal");

      // Also sync profile data into the legacy roster for admin panel compatibility
      syncProfileToRoster(user.id, displayName, role, profile);

      onLogin({
        id: user.id,
        name: displayName,
        role: role,
        email: user.email,
        isInternal: isInternal,
        supabaseUser: true
      });
    } catch (err) {
      setError("An unexpected error occurred.");
    }
    setLoading(false);
  };

  // ── Sign Up with Supabase ──
  const handleSignUp = async function() {
    setError(""); setSuccessMsg("");
    if (!suName.trim()) { setError("Please enter your name."); return; }
    if (!suEmail.trim()) { setError("Please enter your email."); return; }
    if (suPassword.length < 6) { setError("Password must be at least 6 characters."); return; }
    if (suPassword !== suPassword2) { setError("Passwords do not match."); return; }
    setLoading(true);
    try {
      const { data, error: signUpErr } = await supabase.auth.signUp({
        email: suEmail.trim(),
        password: suPassword,
        options: {
          data: {
            display_name: suName.trim(),
            role: suRole
          }
        }
      });
      if (signUpErr) {
        setError(signUpErr.message || "Sign-up failed.");
        setLoading(false);
        return;
      }
      // If email confirmation is required, show a message
      if (data.user && data.user.identities && data.user.identities.length === 0) {
        setError("An account with this email already exists. Try signing in.");
        setLoading(false);
        return;
      }
      if (data.session) {
        // Auto-confirmed — log them in immediately
        const user = data.user;
        const { data: profile } = await supabase
          .from("profiles")
          .select("*")
          .eq("id", user.id)
          .single();

        const role = (profile && profile.role) ? profile.role : suRole;
        const displayName = (profile && profile.display_name) ? profile.display_name : suName.trim();
        const isInternal = (role === "admin" || role === "internal");

        syncProfileToRoster(user.id, displayName, role, profile);

        onLogin({
          id: user.id,
          name: displayName,
          role: role,
          email: user.email,
          isInternal: isInternal,
          supabaseUser: true
        });
      } else {
        // Email confirmation required
        setSuccessMsg("Check your email! Click the confirmation link, then come back and sign in.");
        setMode("signin");
        setEmail(suEmail.trim());
      }
    } catch (err) {
      setError("An unexpected error occurred.");
    }
    setLoading(false);
  };

  // Guest login submit (kept for backward compatibility)
  const handleGuestLogin = function() {
    if (!gName.trim() || !gEmail.trim()) {
      setError("Name and email are required.");
      return;
    }
    const extKey = "mtk_external_users";
    let extUsers = [];
    try { extUsers = JSON.parse(localStorage.getItem(extKey) || "[]"); } catch(e) {}
    const existing = extUsers.findIndex(function(u) { return u.email === gEmail.trim(); });
    const userData = {
      name: gName.trim(),
      phone: gPhone.trim(),
      email: gEmail.trim(),
      lastLogin: new Date().toISOString().slice(0, 10)
    };
    if (existing >= 0) {
      extUsers[existing] = userData;
    } else {
      extUsers.push(userData);
    }
    localStorage.setItem(extKey, JSON.stringify(extUsers));
    onLogin({ name: gName.trim(), phone: gPhone.trim(), email: gEmail.trim(), isInternal: false });
  };

  // Helper: sync Supabase profile into legacy roster so AdminPanel still works
  function syncProfileToRoster(userId, displayName, role, profile) {
    let roster = [];
    try { roster = JSON.parse(localStorage.getItem("mtk_roster") || "[]"); } catch(e) {}
    const idx = roster.findIndex(function(m) { return m.id === userId; });

      company: (profile && profile.company) || "",

      address: (profile && profile.address) || "",
      city: (profile && profile.city) || "",
      state: (profile && profile.state) || "",
      zip: (profile && profile.zip) || "",
      role: role,
      passwordHash: "supabase-managed",
      active: true,
      firstLogin: false
    };
    if (idx >= 0) {
      roster[idx] = memberData;
    } else {
      roster.push(memberData);
    }

// ADMIN PANEL — Team Member Management
// ═══════════════════════════════════════════════════════════════════════
function AdminPanel({ currentUser, onClose }) {
  const c = useThemeColors();
  const font = "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
  const [roster, setRoster] = useLocalStorage("roster", []);
  const [editingMember, setEditingMember] = useState(null);
  const [showAddForm, setShowAddForm] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [resetPwMember, setResetPwMember] = useState(null);
  const [newPw, setNewPw] = useState("");
  const [searchTerm, setSearchTerm] = useState("");

  const isAdmin = currentUser && currentUser.role === "admin";

  // New member form state
  const emptyMember = {
    id: "",
    name: "",
    title: "Loan Officer",
    company: "CMG Home Loans",
    phone: "",
    email: "",
    nmls: "",
    branchNmls: "",
    address: "",
    city: "",
    state: "TX",
    zip: "",
    role: "lo",
    passwordHash: "",
    active: true,
    firstLogin: true
  };

  const [formData, setFormData] = useState(emptyMember);
  const [formError, setFormError] = useState("");

  const updateField = function(field, val) {
    setFormData(function(prev) {
      const next = Object.assign({}, prev);
      next[field] = val;
      return next;
    });
  };

  const handleSave = function() {
    if (!formData.name.trim()) { setFormError("Name is required."); return; }
    const updated = roster.slice();
    if (editingMember) {
      const idx = updated.findIndex(function(m) { return m.id === editingMember.id; });
      if (idx >= 0) {
        // Preserve password hash
        updated[idx] = Object.assign({}, formData, { passwordHash: updated[idx].passwordHash });
        // Prevent removing own admin role
        if (editingMember.id === currentUser.id && formData.role !== "admin") {
          setFormError("You cannot remove your own admin role.");
          return;
        }
      }
    } else {
      // New member
      formData.id = generateId();
      formData.firstLogin = true;
      formData.passwordHash = "";
      updated.push(formData);
    }
    setRoster(updated);
    setEditingMember(null);
    setShowAddForm(false);
    setFormData(emptyMember);
    setFormError("");
  };

  const handleDeactivate = function(memberId) {
    if (memberId === currentUser.id) { return; } // Can't deactivate self
    const updated = roster.map(function(m) {
      if (m.id === memberId) return Object.assign({}, m, { active: false });
      return m;
    });
    setRoster(updated);
    setConfirmDelete(null);
  };

  const handleReactivate = function(memberId) {
    const updated = roster.map(function(m) {
      if (m.id === memberId) return Object.assign({}, m, { active: true });
      return m;
    });
    setRoster(updated);
  };

  const handleResetPassword = async function() {
    if (!resetPwMember) return;
    const updated = roster.map(function(m) {
      if (m.id === resetPwMember.id) return Object.assign({}, m, { passwordHash: "", firstLogin: true });
      return m;
    });
    setRoster(updated);
    setResetPwMember(null);
    setNewPw("");
  };

  const startEdit = function(member) {
    setFormData(Object.assign({}, member));
    setEditingMember(member);
    setShowAddForm(true);
    setFormError("");
  };

  const startAdd = function() {
    setFormData(Object.assign({}, emptyMember));
    setEditingMember(null);
    setShowAddForm(true);
    setFormError("");
  };

  const cancelForm = function() {
    setShowAddForm(false);
    setEditingMember(null);
    setFormData(emptyMember);
    setFormError("");
  };

  const filtered = roster.filter(function(m) {
    if (!searchTerm) return true;
    return m.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
      m.email.toLowerCase().includes(searchTerm.toLowerCase());
  });

  const inputStyle = {
    width: "100%",
    padding: "10px 12px",
    border: "1.5px solid " + c.border,
    borderRadius: 8,
    fontSize: 14,
    fontFamily: font,
    fontWeight: 500,
    color: c.text || c.navy,
    background: c.bg,
    outline: "none",
    boxSizing: "border-box"
  };

  const labelSt = {
    display: "block",
    fontSize: 11,
    fontWeight: 600,
    letterSpacing: "0.08em",
    textTransform: "uppercase",
    color: c.gray,
    marginBottom: 4,
    fontFamily: font
  };

  const btnSm = function(bg, fg) {
    return {
      padding: "6px 14px",
      background: bg || c.navy,
      color: fg || "#fff",
      border: "none",
      borderRadius: 6,
      fontSize: 12,
      fontWeight: 600,
      fontFamily: font,
      cursor: "pointer"
    };
  };

  // ── Add/Edit Form ──
  if (showAddForm) {
    const fieldRow = function(label, field, placeholder, type) {
      return React.createElement("div", { style: { marginBottom: 12 }, key: field },
        React.createElement("label", { style: labelSt }, label),
        React.createElement("input", {
          type: type || "text",
          value: formData[field] || "",
          onChange: function(e) { updateField(field, e.target.value); },
          style: inputStyle,
          placeholder: placeholder || ""
        })
      );
    };

    return React.createElement("div", {
      style: {
        position: "fixed", top: 0, left: 0, right: 0, bottom: 0,

          background: c.white, borderRadius: 16, padding: "28px 24px",

        }
      },
        React.createElement("div", {
          style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }
        },
          React.createElement("h3", {

          }, editingMember ? "Edit Team Member" : "Add Team Member"),

      const [showModuleSelector, setShowModuleSelector] = useState(false);
      const [roster] = useLocalStorage("roster", []);
      const [showAdmin, setShowAdmin] = useState(false);
      const isInternal = (function() {
        if (!user) return false;
        if (user.isInternal === true) return true;
        const r = JSON.parse(localStorage.getItem("mtk_roster") || "[]");
        return r.some(function(m) { return m.id === user.id && m.active; });
      })();
      const currentUserRole = user && user.role ? user.role : "lo";

      const toggleModule = (id) => {
        setEnabledModules(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
      };
      const toggleAll = (on) => { setEnabledModules(on ? allModuleIds : []); };

      // ── Shared Value Propagation ──────────────────────────────────────
      // When Payment Calculator values change, propagate to all other modules.
      // Master keys: pc_hp (home price), pc_la (loan amount), pc_rate (rate)
      const readLS = (k) => { try { const v = localStorage.getItem("mtk_" + k); return v !== null ? JSON.parse(v) : null; } catch { return null; } };
      const writeLS = (k, v) => { try { localStorage.setItem("mtk_" + k, JSON.stringify(v)); } catch {} };

      const propagateSharedValues = useCallback(() => {
        const hp = readLS("pc_hp");
        const la = readLS("pc_la");
        const rt = readLS("pc_rate");

        // Home Price / Purchase Price → multiple modules
        if (hp !== null) {
          writeLS("fs_pp", hp);           // Fee Sheet: purchasePrice
          writeLS("mc_hp", hp);           // Mortgage Comparison: homePrice
          writeLS("rvb_price", hp);       // Rent vs Buy: homePrice
          writeLS("hel_value", hp);       // HELOC: homeValue
          writeLS("sns_price", hp);       // Seller Net Sheet: salePrice
          writeLS("cce_price", parseFloat(hp) || 0); // Closing Cost: purchPrice (number)
          writeLS("pq_pp", hp);           // Pre-Qual: purchasePrice
          writeLS("lpc_price", hp);       // Loan Program Comparison: price
        }
        // Loan Amount → multiple modules
        if (la !== null) {
          writeLS("fs_la", la);           // Fee Sheet: loanAmount
          writeLS("am_la", la);           // Amortization: loanAmount
          writeLS("biw_loan", la);        // Bi-Weekly: loanAmt
          writeLS("be_lb", la);           // Break-Even: loanBalance
          writeLS("cce_loan", parseFloat(la) || 0); // Closing Cost: loanAmt (number)
        }
        // Interest Rate → multiple modules
        if (rt !== null) {
          writeLS("fs_rate", rt);         // Fee Sheet: rate
          writeLS("af_rate", rt);         // Affordability: rate
          writeLS("am_rate", rt);         // Amortization: rate
          writeLS("rvb_rate", rt);        // Rent vs Buy: rate
          writeLS("biw_rate", rt);        // Bi-Weekly: rate
          writeLS("hel_mrate", rt);       // HELOC: mortRate
          writeLS("be_nr", rt);           // Break-Even: newRate
          writeLS("cce_rate", parseFloat(rt) || 0); // Closing Cost: rate (number)
        }
        // Also propagate computed housing costs to DTI calculator
        if (la !== null && rt !== null) {
          const laNum = parseFloat(la) || 0;
          const hpNum = parseFloat(hp) || 0;
          const monthlyR = ((parseFloat(rt) || 0) / 100) / 12;
          const n = 360; // assume 30yr for DTI
          const pi = monthlyR > 0 ? laNum * (monthlyR * Math.pow(1 + monthlyR, n)) / (Math.pow(1 + monthlyR, n) - 1) : laNum / n;
          writeLS("dti_pi", String(Math.round(pi)));

          // Propagate monthly tax to DTI
          const taxM = readLS("pc_taxm");
          const taxR = readLS("pc_taxr");
          const taxD = readLS("pc_tax");
          const hse = readLS("pc_hse");
          const taxBasis = hse ? hpNum * 0.80 : hpNum;
          const monthlyTaxProp = taxM === "rate" ? Math.round(taxBasis * ((parseFloat(taxR) || 0) / 100) / 12) : Math.round(parseFloat(taxD) || 0);
          writeLS("dti_tax", String(monthlyTaxProp));
          writeLS("fs_mt", String(monthlyTaxProp));

          // Propagate monthly insurance to DTI
          const insM = readLS("pc_insm");
          const insR = readLS("pc_insr");
          const insD = readLS("pc_ins");
          const monthlyInsProp = insM === "rate" ? Math.round(hpNum * ((parseFloat(insR) || 0) / 100) / 12) : Math.round(parseFloat(insD) || 0);
          writeLS("dti_ins", String(monthlyInsProp));
          writeLS("fs_mi", String(monthlyInsProp));

          // Propagate PMI to DTI

          const pmiR = parseFloat(readLS("pc_pmi")) || 0;
          const monthlyPMI = dp < 20 ? (laNum * pmiR / 100) / 12 : 0;
          writeLS("dti_pmi", String(Math.round(monthlyPMI)));
        }
        window.dispatchEvent(new Event("mtk_propagated"));

            items.forEach(node => {
              const txt = node.innerText?.trim();
              if (txt && txt.length > 0 && txt.length < 200 && !seen.has(txt)) {
                seen.add(txt);
                if (y > 260) { doc.addPage(); y = 20; }
                const fs = parseFloat(window.getComputedStyle(node).fontSize);
                const isBold = window.getComputedStyle(node).fontWeight >= 600;
                doc.setFont("helvetica", isBold ? "bold" : "normal");
                doc.setFontSize(Math.min(Math.max(fs * 0.7, 8), 12));
                doc.setTextColor(51, 51, 51);
                const lines = doc.splitTextToSize(txt, 170);
                lines.forEach(line => { if (y > 260) { doc.addPage(); y = 20; } doc.text(line, 20, y); y += 5; });
                y += 1;
              }
            });
          }
          doc.setFontSize(7);
          doc.setTextColor(160, 160, 160);
          doc.text("Generated by " + brandName + " · Estimates for educational purposes only.", 20, 272);
          doc.save(activeLabel.replace(/\s+/g, "_") + ".pdf");
        } catch (e) { alert("PDF export failed: " + e.message); }
      };

      // Client Portal Link builder
      const buildPortalLink = useCallback((moduleId, params = {}) => {
        const base = window.location.href.split("?")[0];
        const qs = new URLSearchParams({ tabs: moduleId, ...params });
        return base + "?" + qs.toString();
      }, []);

      return (
        <ThemeContext.Provider value={{ dark: darkMode, colors }}>
        <div style={{ fontFamily: font, background: darkMode ? "linear-gradient(180deg, #1A2530 0%, #152028 100%)" : "linear-gradient(180deg, #F5F8FA 0%, #EDF2F5 100%)", minHeight: "100vh", transition: "background 0.3s" }}>

          {/* ── Print-only branded header ── */}
          <div className="mtk-print-only mtk-print-header">
            {brandLogo && <img src={brandLogo} alt="Logo" style={{ maxHeight: 40 }} />}
            <div>
              <div style={{ fontSize: 18, fontWeight: 800, color: brandColor }}>{brandName}</div>
              <div style={{ fontSize: 10, color: "#666" }}>{brandSub}</div>
            </div>
          </div>

          {/* ── Header ── */}
          <div className="mtk-no-print" style={{ background: headerBg, padding: "20px 24px 16px", color: "#fff" }}>
            <div className="mtk-header-flex" style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                {brandLogo ? (
                  <img src={brandLogo} alt="Logo" style={{ height: 40, borderRadius: 8 }} onError={e => { e.target.style.display = "none"; }} />
                ) : (
                  <div style={{ width: 40, height: 40, borderRadius: 10, background: "rgba(72,160,206,0.25)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, fontWeight: 800, color: COLORS.blue }}>{brandName.charAt(0)}</div>
                )}
                <div>
                  <div style={{ fontSize: 22, fontWeight: 800, letterSpacing: "-0.02em" }}>{brandName}</div>
                  <div style={{ fontSize: 11, opacity: 0.6, letterSpacing: "0.06em" }}>{brandSub}</div>
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <button onClick={() => window.print()} style={btnStyle} title="Print current view">🖨️</button>
                  <button onClick={exportPDF} style={btnStyle} title="Export current view to PDF">📄</button>
                  <button onClick={() => setDarkMode(!darkMode)} style={btnStyle} title={darkMode ? "Switch to light mode" : "Switch to dark mode"}>
                    {darkMode ? "☀️" : "🌙"}
                  </button>
                  {!isSharedView && (
                    <>
                      {onBackToScenarios && <button onClick={onBackToScenarios} style={{ ...btnStyle, background: "rgba(255,255,255,0.18)", fontWeight: 700 }} title="Back to Scenarios">← Scenarios</button>}
                      {isInternal && <button onClick={() => setShowModuleSelector(!showModuleSelector)} style={{ ...btnStyle, background: showModuleSelector ? "rgba(255,255,255,0.25)" : "rgba(255,255,255,0.1)" }} title="Select borrower modules">📋</button>}
              {isInternal && currentUserRole === "admin" && React.createElement("button", {
                onClick: function() { setShowAdmin(true); },
                style: Object.assign({}, btnStyle, { fontSize: 13 }),
                title: "Team Administration"
              }, "\uD83D\uDC65")}

                      <button onClick={() => setSettingsOpen(true)} style={btnStyle} title="Settings">⚙️</button>
                      {isInternal && (
                        <select value={userRole} onChange={(e) => setUserRole(e.target.value)} style={{ padding: "6px 12px", borderRadius: 6, border: "1px solid rgba(255,255,255,0.2)", background: "rgba(255,255,255,0.1)", color: "#fff", fontSize: 11, fontWeight: 600, fontFamily: font, cursor: "pointer" }}>
                          <option value="admin" style={{ color: "#333" }}>Admin View</option>
                          <option value="lo" style={{ color: "#333" }}>Loan Officer</option>
                          <option value="realtor" style={{ color: "#333" }}>Realtor Partner</option>
                          <option value="client" style={{ color: "#333" }}>Client View</option>
                        </select>
                      )}
                      <button onClick={onLogout} style={{ ...btnStyle, fontSize: 11, opacity: 0.7 }} title="Logout">🚪</button>
                    </>
                  )}
                </div>
            </div>
            <div className="mtk-tab-bar" style={{ display: "flex", gap: 4, marginTop: 16, overflowX: "auto", paddingBottom: 4 }}>
              {filteredModules.map((m) => (
                <button key={m.id} onClick={() => setActiveModule(m.id)} style={{
                  padding: "10px 16px", borderRadius: 8, border: "none", cursor: "pointer",
                  fontSize: 12, fontWeight: 600, fontFamily: font, whiteSpace: "nowrap",
                  background: activeModule === m.id ? "rgba(255,255,255,0.2)" : "transparent",
                  color: activeModule === m.id ? "#fff" : "rgba(255,255,255,0.6)",
                  transition: "all 0.2s",
                }}><span style={{ marginRight: 6 }}>{m.icon}</span>{m.label}</button>
              ))}
            </div>
          </div>

          {/* ── Internal Module Selector Panel ── */}
          {isInternal && showModuleSelector && (
            <div className="mtk-no-print" style={{ padding: "16px 24px", background: darkMode ? "#0D1B26" : "#EDF4FA", borderBottom: `1px solid ${darkMode ? "#1E3040" : "#D1E3F0"}` }}>
              <div style={{ maxWidth: 1200, margin: "0 auto" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: colors.navy, fontFamily: font }}>📋 Module Selector</div>
                    <div style={{ fontSize: 11, color: colors.gray, fontFamily: font }}>Choose which tabs the borrower will see when they log in.</div>
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={() => toggleAll(true)} style={{ padding: "4px 10px", borderRadius: 6, border: `1px solid ${colors.border || "#D1D9E0"}`, background: colors.bgAlt || "#F5F8FA", color: colors.navy, fontSize: 11, fontWeight: 600, fontFamily: font, cursor: "pointer" }}>Select All</button>
                    <button onClick={() => toggleAll(false)} style={{ padding: "4px 10px", borderRadius: 6, border: `1px solid ${colors.border || "#D1D9E0"}`, background: colors.bgAlt || "#F5F8FA", color: colors.navy, fontSize: 11, fontWeight: 600, fontFamily: font, cursor: "pointer" }}>Clear All</button>
                  </div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 6 }}>
                  {MODULES.map(m => (
                    <label key={m.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 10px", borderRadius: 6, background: enabledModules.includes(m.id) ? (darkMode ? "#1A3040" : "#fff") : "transparent", border: `1px solid ${enabledModules.includes(m.id) ? (darkMode ? "#2A4050" : "#D1E3F0") : "transparent"}`, cursor: "pointer", fontSize: 12, fontWeight: 500, color: enabledModules.includes(m.id) ? colors.navy : (colors.gray || "#999"), fontFamily: font, transition: "all 0.15s" }}>
                      <input type="checkbox" checked={enabledModules.includes(m.id)} onChange={() => toggleModule(m.id)} style={{ width: 15, height: 15, accentColor: COLORS.navy }} />
                      <span>{m.icon}</span> {m.label}
                    </label>
                  ))}
                </div>
                <div style={{ marginTop: 10, fontSize: 10, color: colors.gray, fontFamily: font }}>
                  👤 Logged in as: <strong>{user?.name}</strong> ({user?.email}) — Internal Team Member
                </div>
              </div>
            </div>
          )}

          {/* ── Content ── */}
          <div style={{ padding: 20, maxWidth: 1200, margin: "0 auto" }}>
            {isSharedView && (
              <div style={{ padding: "8px 14px", background: darkMode ? "#1A3040" : "#E8F4FD", borderRadius: 8, marginBottom: 16, fontSize: 12, color: COLORS.blue, fontWeight: 600, fontFamily: font, border: `1px solid ${COLORS.blue}33` }}>
                📎 Shared View — Showing {filteredModules.length} selected tool{filteredModules.length !== 1 ? "s" : ""}. <a href={window.location.href.split("?")[0]} style={{ color: COLORS.blue, textDecoration: "underline" }}>View full toolkit →</a>
              </div>
            )}
            {!isSharedView && userRole !== "admin" && (
              <div style={{ padding: "8px 14px", background: darkMode ? "#2E2818" : COLORS.goldLight, borderRadius: 8, marginBottom: 16, fontSize: 12, color: COLORS.gold, fontWeight: 600, fontFamily: font, border: darkMode ? "1px solid #4A3C1A" : "1px solid #FFE082" }}>
                {userRole === "client" ? "Client View — You can view payment calculations, compare loans, and analyze break-even scenarios." :
                 userRole === "realtor" ? "Realtor Partner View — Access payment tools, fee sheets, loan comparisons, and pre-qualification letters." :
                 "Loan Officer View — Full access to all tools including rate locks and internal analytics."}
              </div>
            )}
            <div key={activeModule} className="mtk-fade-in"><ActiveComponent isInternal={isInternal} /></div>
          </div>

          {/* ── Footer ── */}
          <div style={{ padding: "20px 24px", textAlign: "center", fontSize: 10, color: darkMode ? "#5A6B78" : COLORS.grayLight, lineHeight: 1.5, fontFamily: font }}>
            Mortgage Mark · CMG Home Loans · A Division of CMG Financial · NMLS #729612 · mortgagemark.com<br />
            This tool provides estimates for educational purposes. Actual rates, terms, and savings may vary.<br />
            Equal Housing Lender. NMLS #1820.
          </div>
        </div>

        {/* ── Settings Panel ── */}
        <SettingsPanel open={settingsOpen} onClose={() => setSettingsOpen(false)} darkMode={darkMode} allModules={MODULES} />

        {showAdmin && React.createElement(AdminPanel, {
          currentUser: user,
          onClose: function() { setShowAdmin(false); }
        })}

        </ThemeContext.Provider>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════
    // APP WRAPPER — Login gate + shared state provider
    // ═══════════════════════════════════════════════════════════════════════
    const SharedValuesContext = React.createContext({});

    function App() {
      const [loggedInUser, setLoggedInUser] = useLocalStorage("app_user", null);
      const [activeScenario, setActiveScenario] = useLocalStorage("active_scenario", null);
      const scenarioSnapshotRef = useRef(null); // before-snapshot for audit diffing
      const [authLoading, setAuthLoading] = React.useState(true);

      // ── Supabase session restoration on mount ──────────────────────────
      // When the page loads or refreshes, check if Supabase has an active
      // session and restore the user automatically. This prevents logout on
      // page refresh for authenticated users.
      useEffect(function() {
        let cancelled = false;

        async function restoreSession() {
          try {
            if (!supabase) {
              // Supabase client unavailable — skip session restore
              if (!cancelled) setAuthLoading(false);
              return;
            }
            const { data: { session } } = await supabase.auth.getSession();

            if (session && session.user && !cancelled) {
              // We have a valid Supabase session — restore user state
              const user = session.user;

              // Fetch profile data
              const { data: profile } = await supabase
                .from("profiles")
                .select("*")
                .eq("id", user.id)
                .single();

              if (profile && !cancelled) {
                const role = profile.role || "borrower";
                const displayName = profile.display_name || user.email;
                const isInternal = role === "admin" || role === "internal";

                setLoggedInUser({
                  id: user.id,
                  name: displayName,
                  role: role,
                  email: user.email,
                  isInternal: isInternal,
                  supabaseUser: true,
                });
              }
            } else if (!cancelled && loggedInUser && loggedInUser.supabaseUser) {
              // Had a Supabase user stored but session expired — log out
              setLoggedInUser(null);
            }
          } catch (err) {
            console.warn("Session restore error:", err);
          }

          if (!cancelled) setAuthLoading(false);
        }

        restoreSession();
        return function() { cancelled = true; };
      }, []);

      // ── Listen for Supabase auth state changes ────────────────────────
      // Handles sign-out from another tab, token refresh, etc.
      useEffect(function() {
        if (!supabase) return;   // guard — client not available
        const { data: { subscription } } = supabase.auth.onAuthStateChange(
          function(event, session) {
            if (event === "SIGNED_OUT") {
              setLoggedInUser(null);
              setActiveScenario(null);
            }
          }
        );
        return function() { subscription.unsubscribe(); };
      }, []);

      // ── Session validation ────────────────────────────────────────────
      // For legacy roster-based users (non-Supabase), validate against
      // the local roster. Supabase users are validated by the session
      // restore logic above.
      useEffect(function() {
        if (!loggedInUser || !loggedInUser.id) return;
        if (loggedInUser.supabaseUser) return; // skip roster check for Supabase users
        var r = [];
        try { r = JSON.parse(localStorage.getItem("mtk_roster") || "[]"); } catch(e) {}
        if (r.length > 0 && !r.some(function(m) { return m.id === loggedInUser.id && m.active; })) {
          if (loggedInUser.isInternal) setLoggedInUser(null);
        }
      }, []);

      // Check if the logged-in user is an internal team member
      const isInternal = React.useMemo(() => {
        if (!loggedInUser) return false;
        if (loggedInUser.isInternal === true) return true;
        if (loggedInUser.supabaseUser) return false; // already set in isInternal field
        try {
          const r = JSON.parse(localStorage.getItem("mtk_roster") || "[]");
          return r.some(m => m.id === loggedInUser.id && m.active);
        } catch { return false; }
      }, [loggedInUser]);

      const handleLogin = (userData) => {
        setLoggedInUser(userData);
      };

      const handleLogout = async () => {
        // Sign out of Supabase if this was a Supabase user
        if (loggedInUser && loggedInUser.supabaseUser && supabase) {
          try {
            await supabase.auth.signOut();
          } catch (err) {
            console.warn("Supabase sign-out error:", err);
          }
        }
        setActiveScenario(null);
        setLoggedInUser(null);
      };

      const handleSelectScenario = (scenario) => {
        if (scenario === null) {
          // "Start Fresh" — clear calculator data, no scenario
          restoreCalculatorData({});
          localStorage.setItem("mtk_active_scenario", JSON.stringify({ none: true }));
          scenarioSnapshotRef.current = null;
          setActiveScenario({ none: true });
        } else {
          // Load this scenario's saved calculator data into localStorage
          restoreCalculatorData(scenario.calculatorData || {});
          localStorage.setItem("mtk_active_scenario", JSON.stringify(scenario));
          // Capture "before" snapshot for audit diffing on exit
          scenarioSnapshotRef.current = scenario.calculatorData || {};
          setActiveScenario(scenario);
        }
      };

      const handleBackToScenarios = () => {
        // Save current calculator state back into the active scenario
        if (activeScenario && activeScenario.id) {
          // Always save to localStorage (fast, works offline)
          saveScenarioData(activeScenario.id);

          // Also save to Supabase for cloud users
          if (loggedInUser && loggedInUser.supabaseUser && supabase) {
            // Diff before vs after for audit log
            var afterSnap = snapshotCalculatorData();
            var diff = diffCalculatorData(scenarioSnapshotRef.current, afterSnap);
            var scenarioIdForAudit = activeScenario.id;

            saveScenarioToSupabase({
              scenarioId: activeScenario.id,
              name: activeScenario.clientName || activeScenario.name || "Untitled",
              notes: activeScenario.notes || "",
              status: activeScenario.status || "active"
              // calculationData omitted → defaults to snapshotCalculatorData()
            }).then(function() {
              if (diff.sections.length > 0) {
                writeAuditLog(
                  scenarioIdForAudit,
                  "updated",
                  diff.details,
                  "Changed: " + diff.sections.join(", ")
                );
              }
            }).catch(function(err) {
              console.warn("Cloud save on exit failed:", err);
            });
          }
        }
        setActiveScenario(null);
      };

      // Route 0: Still checking for an existing Supabase session
      if (authLoading) {
        return (
          <div style={{
            minHeight: "100vh",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            background: "linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%)",
            color: "#fff",
            fontFamily: "'Inter', system-ui, -apple-system, sans-serif",
            fontSize: "1.1rem",
          }}>
            Loading…
          </div>
        );
      }

      // Route 1: Not logged in → Login Screen
      if (!loggedInUser) {
        return <LoginScreen onLogin={handleLogin} />;
      }

      // Route 2: Authenticated user without active scenario → Scenario Dashboard
      // Internal users always get it; borrowers/realtors get it if they're cloud users
      const showDashboard = isInternal || (loggedInUser && loggedInUser.supabaseUser);
      if (showDashboard && activeScenario === null) {
        return (
          <ScenarioDashboard
            user={loggedInUser}
            onSelectScenario={handleSelectScenario}
            onLogout={handleLogout}
          />
        );
      }

      // Route 3: Everyone else (or internal user with scenario selected) → Calculators
      return (
        <MortgageToolkit
          key={activeScenario && activeScenario.id ? activeScenario.id : "default"}
          user={loggedInUser}
          onLogout={handleLogout}
          activeScenario={activeScenario && activeScenario.none ? null : activeScenario}
          onBackToScenarios={showDashboard ? handleBackToScenarios : null}
        />
      );
    }

    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
