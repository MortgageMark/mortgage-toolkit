                  <strong>This is how most people (and many loan officers) calculate break-even.</strong> They take total closing costs and divide by the monthly payment difference. It's simple, intuitive — and misleading.
                </div>
                <div style={{ background: COLORS.bgAlt, borderRadius: 10, padding: 16, border: `1px solid ${COLORS.border}`, marginBottom: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${COLORS.border}` }}>
                    <span style={{ fontSize: 13, color: COLORS.gray, fontFamily: font }}>Current total payment</span>
                    <span style={{ fontSize: 14, fontWeight: 700, color: COLORS.navy, fontFamily: font }}>{fmt2(analysis.curTotalPayment)}/mo</span>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${COLORS.border}` }}>
                    <span style={{ fontSize: 13, color: COLORS.gray, fontFamily: font }}>New total payment</span>
                    <span style={{ fontSize: 14, fontWeight: 700, color: COLORS.blue, fontFamily: font }}>{fmt2(analysis.newTotalPayment)}/mo</span>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${COLORS.border}` }}>
                    <span style={{ fontSize: 13, color: COLORS.gray, fontFamily: font }}>Monthly cash flow savings</span>
                    <span style={{ fontSize: 14, fontWeight: 700, color: cashFlow > 0 ? COLORS.green : COLORS.red, fontFamily: font }}>{fmt2(cashFlow)}/mo</span>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${COLORS.border}` }}>
                    <span style={{ fontSize: 13, color: COLORS.gray, fontFamily: font }}>Closing costs</span>
                    <span style={{ fontSize: 14, fontWeight: 700, color: COLORS.navy, fontFamily: font }}>{fmt(analysis.closingCosts)}</span>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", marginTop: 4 }}>
                    <span style={{ fontSize: 13, fontWeight: 700, color: COLORS.navy, fontFamily: font }}>{fmt(analysis.closingCosts)} ÷ {fmt2(cashFlow)}/mo =</span>
                    <span style={{ fontSize: 16, fontWeight: 800, color: COLORS.red, fontFamily: font }}>{naiveBreakEven ? `${naiveBreakEven} months` : "N/A"}</span>
                  </div>
                </div>
                <div style={{ fontSize: 13, color: COLORS.navy, lineHeight: 1.7, fontFamily: font }}>
                  <strong>Why this is wrong:</strong> This method treats every dollar of your payment equally. But your payment is split between principal (money that builds equity) and interest (money that's gone forever). A lower rate shifts more of each payment toward principal from day one — that's real savings the cash flow method completely ignores.
                </div>
              </SectionCard>
              <SectionCard title="THE RIGHT WAY — TRUE INTEREST COST METHOD" accent={COLORS.green}>
                <div style={{ fontSize: 13, color: COLORS.navy, lineHeight: 1.7, fontFamily: font, marginBottom: 12 }}>
                  <strong>We compare the actual cost of money — interest and PMI — month by month.</strong> The new loan starts "in the hole" by the closing costs. Each month, we track how much interest you burn on each loan, add any PMI, and see when the new loan's cumulative cost drops below what you'd have paid staying put.
                </div>
                <div style={{ background: COLORS.bgAlt, borderRadius: 10, padding: 16, border: `1px solid ${COLORS.border}`, marginBottom: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${COLORS.border}` }}>
                    <span style={{ fontSize: 13, color: COLORS.gray, fontFamily: font }}>Current monthly interest (month 1)</span>
                    <span style={{ fontSize: 14, fontWeight: 700, color: COLORS.navy, fontFamily: font }}>{analysis.curSchedule[0] ? fmt2(analysis.curSchedule[0].interest) : "—"}/mo</span>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${COLORS.border}` }}>
                    <span style={{ fontSize: 13, color: COLORS.gray, fontFamily: font }}>New monthly interest (month 1)</span>
                    <span style={{ fontSize: 14, fontWeight: 700, color: COLORS.blue, fontFamily: font }}>{analysis.newSchedule[0] ? fmt2(analysis.newSchedule[0].interest) : "—"}/mo</span>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${COLORS.border}` }}>
                    <span style={{ fontSize: 13, color: COLORS.gray, fontFamily: font }}>Monthly interest saved</span>
                    <span style={{ fontSize: 14, fontWeight: 700, color: COLORS.green, fontFamily: font }}>{analysis.curSchedule[0] && analysis.newSchedule[0] ? fmt2(analysis.curSchedule[0].interest - analysis.newSchedule[0].interest) : "—"}/mo</span>
                  </div>
                  {analysis.cPmiMonthly > 0 || analysis.nPmiMonthly > 0 ? (
                    <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${COLORS.border}` }}>
                      <span style={{ fontSize: 13, color: COLORS.gray, fontFamily: font }}>PMI difference (current − new)</span>
                      <span style={{ fontSize: 14, fontWeight: 700, color: (analysis.cPmiMonthly - analysis.nPmiMonthly) >= 0 ? COLORS.green : COLORS.red, fontFamily: font }}>{fmt2(analysis.cPmiMonthly - analysis.nPmiMonthly)}/mo</span>
                    </div>
                  ) : null}
                  <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${COLORS.border}` }}>
                    <span style={{ fontSize: 13, color: COLORS.gray, fontFamily: font }}>Closing costs to recoup</span>
                    <span style={{ fontSize: 14, fontWeight: 700, color: COLORS.navy, fontFamily: font }}>{fmt(analysis.closingCosts)}</span>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", marginTop: 4 }}>
                    <span style={{ fontSize: 13, fontWeight: 700, color: COLORS.navy, fontFamily: font }}>True break-even =</span>
                    <span style={{ fontSize: 16, fontWeight: 800, color: COLORS.green, fontFamily: font }}>{analysis.trueBreakEven.breakEvenMonth ? `${analysis.trueBreakEven.breakEvenMonth} months` : "N/A"}</span>
                  </div>
                </div>
                <div style={{ fontSize: 13, color: COLORS.navy, lineHeight: 1.7, fontFamily: font }}>
                  <strong>Why it matters:</strong> Early in a mortgage, most of your payment is interest. A lower rate saves more in those early months than the simple payment difference suggests. The cash flow method said <strong>{naiveBreakEven ? `${naiveBreakEven} months` : "N/A"}</strong> — our method shows <strong>{analysis.trueBreakEven.breakEvenMonth ? `${analysis.trueBreakEven.breakEvenMonth} months` : "N/A"}</strong>. {naiveBreakEven && analysis.trueBreakEven.breakEvenMonth && naiveBreakEven > analysis.trueBreakEven.breakEvenMonth ? "You're actually recovering your costs faster than the simple math suggests." : naiveBreakEven && analysis.trueBreakEven.breakEvenMonth && naiveBreakEven < analysis.trueBreakEven.breakEvenMonth ? "The simple math makes it look faster, but real costs tell a different story." : ""}
                </div>
              </SectionCard>
            </div>
            );
          })()}
          {activeTab === "amort" && (
            <SectionCard title="SIDE-BY-SIDE AMORTIZATION">
              <div style={{ overflowX: "auto", maxHeight: 500 }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, fontFamily: font }}>
                  <thead style={{ position: "sticky", top: 0, background: "#fff" }}>
                    <tr style={{ borderBottom: `2px solid ${COLORS.navy}` }}>
                      <th style={{ padding: "8px 6px", textAlign: "right", fontSize: 10, fontWeight: 700, color: COLORS.gray }}>Year</th>
                      <th style={{ padding: "8px 6px", textAlign: "right", fontSize: 10, fontWeight: 700, color: COLORS.navy }}>Cur Balance</th>
                      <th style={{ padding: "8px 6px", textAlign: "right", fontSize: 10, fontWeight: 700, color: COLORS.navy }}>Cur Interest</th>
                      <th style={{ padding: "8px 6px", textAlign: "right", fontSize: 10, fontWeight: 700, color: COLORS.blue, borderLeft: `1px solid ${COLORS.border}` }}>New Balance</th>
                      <th style={{ padding: "8px 6px", textAlign: "right", fontSize: 10, fontWeight: 700, color: COLORS.blue }}>New Interest</th>
                    </tr>
                  </thead>
                  <tbody>
                    {Array.from({ length: Math.ceil(Math.max(analysis.curSchedule.length, analysis.newSchedule.length) / 12) }, (_, yr) => {
                      const idx = (yr + 1) * 12 - 1;
                      const cur = analysis.curSchedule[idx];
                      const nw = analysis.newSchedule[idx];
                      return (
                        <tr key={yr} style={{ borderBottom: `1px solid ${COLORS.border}`, background: yr % 2 === 0 ? COLORS.bgAlt : COLORS.white }}>
                          <td style={{ padding: "6px", textAlign: "right", fontWeight: 600, color: COLORS.navy }}>{yr + 1}</td>
                          <td style={{ padding: "6px", textAlign: "right", color: COLORS.navy }}>{cur ? fmt(cur.balance) : "—"}</td>
                          <td style={{ padding: "6px", textAlign: "right", color: COLORS.navy }}>{cur ? fmt(cur.totalInterest) : "—"}</td>
                          <td style={{ padding: "6px", textAlign: "right", color: COLORS.blue, borderLeft: `1px solid ${COLORS.border}` }}>{nw ? fmt(nw.balance) : "—"}</td>
                          <td style={{ padding: "6px", textAlign: "right", color: COLORS.blue }}>{nw ? fmt(nw.totalInterest) : "—"}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </SectionCard>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════
    // MODULE 3: FEE SHEET GENERATOR
    // ═══════════════════════════════════════════════════════════════════════
    function FeeSheetGenerator({ isInternal = false }) {
      const [checkedEndorsements, setCheckedEndorsements] = useLocalStorage("mtk_fs_endorsements", {});
      const [selectedState, setSelectedState] = useLocalStorage("fs_state", "TX");
      const [transactionType, setTransactionType] = useLocalStorage("fs_tt", "purchase");
      const [purchasePrice, setPurchasePrice] = useLocalStorage("fs_pp", "425000");
      const [loanAmount, setLoanAmount] = useLocalStorage("fs_la", "340000");
      const [loanType, setLoanType] = useLocalStorage("fs_lt", "conventional");
      const [rate, setRate] = useLocalStorage("fs_rate", "6.75");
      // Full closing date (YYYY-MM-DD) for RESPA escrow calculations
      const today = new Date();
      const defaultCD = `${today.getFullYear()}-${String(today.getMonth() + 2 > 12 ? 1 : today.getMonth() + 2).padStart(2, "0")}-15`;
      const [closingDate, setClosingDate] = useLocalStorage("fs_closing_date", defaultCD);
      const [includeEscrow, setIncludeEscrow] = useLocalStorage("fs_esc", true);
      const [monthlyTaxes, setMonthlyTaxes] = useLocalStorage("fs_mt", "625");
      const [monthlyInsurance, setMonthlyInsurance] = useLocalStorage("fs_mi", "200");
      const [originationPct, setOriginationPct] = useLocalStorage("fs_op", "1.0");
      const [discountPoints, setDiscountPoints] = useLocalStorage("fs_dp", "0");
      const [includeSurvey, setIncludeSurvey] = useLocalStorage("fs_sv", true);
      const [includeHomeWarranty, setIncludeHomeWarranty] = useLocalStorage("fs_hw", false);
      // ── Optional fees & adjustments ────────────────────────────────────
      const [earnestMoney, setEarnestMoney] = useLocalStorage("fs_em", "");
      const [optionMoney, setOptionMoney] = useLocalStorage("fs_om", "");
      const [lenderCredits, setLenderCredits] = useLocalStorage("fs_lc", "");
      const [hoaTransferFee, setHoaTransferFee] = useLocalStorage("fs_hoat", "");
      const [hoaDues, setHoaDues] = useLocalStorage("fs_hoad", "");
      const [sellerPaidTitle, setSellerPaidTitle] = useLocalStorage("fs_spt", true);
      const [sellerCredits, setSellerCredits] = useLocalStorage("fs_sc", "");
      const [shortPay, setShortPay] = useLocalStorage("fs_sp", false);
      const [sellerPaidSurvey, setSellerPaidSurvey] = useLocalStorage("fs_sps", false);
      const [realtorContrib, setRealtorContrib] = useLocalStorage("fs_rc", "");
      const [ovDocPrep, setOvDocPrep] = useLocalStorage("fs_ov_docprep", "");

      // ── Editable fee overrides (internal only) ──────────────────────────
      const [ovUnderwriting, setOvUnderwriting] = useLocalStorage("fs_ov_uw", "");
      const [ovProcessing, setOvProcessing] = useLocalStorage("fs_ov_proc", "");
      const [ovEscrowFee, setOvEscrowFee] = useLocalStorage("fs_ov_escfee", "");
      const [ovTitleSearch, setOvTitleSearch] = useLocalStorage("fs_ov_tsrch", "");
      const [ovAppraisal, setOvAppraisal] = useLocalStorage("fs_ov_appr", "");
      const [ovCreditReport, setOvCreditReport] = useLocalStorage("fs_ov_cr", "");
      const [ovFloodCert, setOvFloodCert] = useLocalStorage("fs_ov_flood", "");
      const [ovTaxService, setOvTaxService] = useLocalStorage("fs_ov_taxsvc", "");
      const [ovSurvey, setOvSurvey] = useLocalStorage("fs_ov_survey", "");
      const [ovHomeWarranty, setOvHomeWarranty] = useLocalStorage("fs_ov_hw", "");

      // ── Fee Defaults (team-configurable baselines) ──
      const [defUnderwriting, setDefUnderwriting] = useLocalStorage("fs_def_uw", "");
      const [defProcessing, setDefProcessing] = useLocalStorage("fs_def_proc", "");
      const [defAppraisal, setDefAppraisal] = useLocalStorage("fs_def_appr", "");
      const [defCreditReport, setDefCreditReport] = useLocalStorage("fs_def_cr", "");
      const [defFloodCert, setDefFloodCert] = useLocalStorage("fs_def_flood", "");
      const [defTaxService, setDefTaxService] = useLocalStorage("fs_def_taxsvc", "");
      const [defSurvey, setDefSurvey] = useLocalStorage("fs_def_survey", "");
      const [defDocPrep, setDefDocPrep] = useLocalStorage("fs_def_docprep", "");
      const [defEscrowFee, setDefEscrowFee] = useLocalStorage("fs_def_escrow", "");
      const [defTitleSearch, setDefTitleSearch] = useLocalStorage("fs_def_title", "");
      const [defHomeWarranty, setDefHomeWarranty] = useLocalStorage("fs_def_hw", "");

      const stFees = getStateFees(selectedState);
      const stateName = stFees.name;
      const stateAbbr = stFees.abbr;

      // Parse closing date into month/day
      const parsedCD = useMemo(() => {
        const parts = (closingDate || defaultCD).split("-");
        const y = parseInt(parts[0]) || today.getFullYear();
        const m = parseInt(parts[1]) || (today.getMonth() + 2);
        const d = parseInt(parts[2]) || 15;
        return { year: y, month: m, day: d };
      }, [closingDate]);


      // ── Survey auto-logic based on state ───────────────────────────────
      React.useEffect(() => {
        const st = getStateFees(selectedState);
        if (st.surveyRequired === "required" || st.surveyRequired === "recommended") {
          setIncludeSurvey(true);
        } else if (st.surveyRequired === "none") {
          setIncludeSurvey(false);
        }
        // "optional" — leave user's current choice alone
      }, [selectedState]);

      const fees = useMemo(() => {
        const st = getStateFees(selectedState);
        const pp = parseFloat(purchasePrice) || 0;
        const la = parseFloat(loanAmount) || 0;
        const r = parseFloat(rate) || 0;
        const mTax = parseFloat(monthlyTaxes) || 0;
        const mIns = parseFloat(monthlyInsurance) || 0;
        const origPct = parseFloat(originationPct) || 0;
        const discPts = parseFloat(discountPoints) || 0;
        const isPurchase = transactionType === "purchase";
        const origination = Math.round(la * origPct / 100);
        const discount = Math.round(la * discPts / 100);

        // Fees with override support (override value takes precedence if non-empty)
        const ov = (val, fallback) => { const n = parseFloat(val); return (val !== "" && !isNaN(n)) ? n : fallback; };
        const def = (custom, hardcoded) => { const n = parseFloat(custom); return (custom !== "" && !isNaN(n)) ? n : hardcoded; };
        const underwriting = ov(ovUnderwriting, def(defUnderwriting, 1000));
        const processingFee = ov(ovProcessing, def(defProcessing, 595));
        const lenderFees = origination + discount + underwriting + processingFee;
        const appraisal = ov(ovAppraisal, def(defAppraisal, 750));
        const creditReport = ov(ovCreditReport, def(defCreditReport, 350));
        const floodCert = ov(ovFloodCert, def(defFloodCert, st.floodCert || 14));
        const taxService = ov(ovTaxService, def(defTaxService, st.taxServiceFee || 85));
        const surveyDefault = def(defSurvey, st.surveyFee || 450);
        const survey = includeSurvey ? ov(ovSurvey, surveyDefault) : 0;
        const docPrep = ov(ovDocPrep, def(defDocPrep, 250));
        const thirdPartyFees = appraisal + creditReport + floodCert + taxService + docPrep + survey;
        const ownerTitlePolicy = isPurchase ? st.basicRate(pp) : 0;
        const lenderTitlePolicy = isPurchase ? st.simultaneous(la, pp) : st.basicRate(la);
        const escrowFeeDefaultCalc = Math.round(Math.max(500, (isPurchase ? pp : la) * 0.001));
        const escrowFeeDefault = def(defEscrowFee, escrowFeeDefaultCalc);
        const escrowFee = ov(ovEscrowFee, escrowFeeDefault);
        const titleSearch = ov(ovTitleSearch, def(defTitleSearch, 250));
        const recordingFees = 150;
        const titleCourier = 50;
        const taxCertERecording = selectedState === "TX" ? 25 : (st.taxCertERecording || 25);
        const transferTax = isPurchase ? Math.round(pp * (st.transferTax || 0) / 1000) : 0;
        const attorneyFee = st.attorneyRequired ? (st.attorneyFee || 0) : 0;
        // Endorsements: compute fee from cost (flat) or costPct (% of loan amount), filter by checked
        const rawEndorsements = (st.endorsements || []).map(e => ({
          ...e,
          fee: e.costPct ? Math.round(la * e.costPct / 100) : (e.cost || 0)
        }));
        const endorsements = rawEndorsements.filter((_, i) => checkedEndorsements[selectedState + "_" + i]);
        const endorsementTotal = endorsements.reduce((sum, e) => sum + (e.fee || 0), 0);
        const allEndorsements = rawEndorsements; // full list for the internal panel
        const titleFees = ownerTitlePolicy + lenderTitlePolicy + escrowFee + titleSearch + recordingFees + titleCourier + taxCertERecording + transferTax + attorneyFee + endorsementTotal;

        // ── RESPA Escrow Calculations ─────────────────────────────────────
        const closingMonth = parsedCD.month;
        const closingDay = parsedCD.day;
        const closingYear = parsedCD.year;
        const daysInMonth = new Date(closingYear, closingMonth, 0).getDate();
        const prepaidDays = Math.max(1, daysInMonth - closingDay + 1);
        const dailyInterest = (la * (r / 100)) / 365;
        const prepaidInterest = Math.round(dailyInterest * prepaidDays);
        const homeownersInsurance = isPurchase ? Math.round(mIns * 12) : 0;
        const prepaidFees = prepaidInterest + homeownersInsurance;

        // Simple 3-month escrow reserves (Revision 6)
        let taxReserves = 0, insReserves = 0, taxMonthly = mTax, insMonthly = mIns;
        if (includeEscrow) {
          taxReserves = Math.round(mTax * 3);
          insReserves = Math.round(mIns * 3);
        }
        const totalReserves = taxReserves + insReserves;
        const totalPrepaids = prepaidFees + totalReserves;

        const hwDefault = def(defHomeWarranty, st.homeWarranty || 550);
        const homeWarranty = includeHomeWarranty ? ov(ovHomeWarranty, hwDefault) : 0;
        // ── Optional Fees ─────────────────────────────────────────────
        const earnest = parseFloat(earnestMoney) || 0;
        const option = parseFloat(optionMoney) || 0;
        const lenderCred = parseFloat(lenderCredits) || 0;
        const hoaTransfer = parseFloat(hoaTransferFee) || 0;
        const hoaDuesAmt = parseFloat(hoaDues) || 0;
        const optionalFees = hoaTransfer + hoaDuesAmt;
        const totalCredits = earnest + option + lenderCred;
        const sellerCred = parseFloat(sellerCredits) || 0;
        const realtor = parseFloat(realtorContrib) || 0;
        const sellerSurveyCredit = (sellerPaidSurvey && includeSurvey) ? survey : 0;

        // ── Short Pay (internal) — closing in first 5 days, skip current month interest ──
        const shortPayAdj = (shortPay && parsedCD.day <= 5) ? Math.round(dailyInterest * parsedCD.day) : 0;
        const adjustedPrepaidInterest = shortPay && parsedCD.day <= 5 ? 0 : prepaidInterest;
        const adjustedPrepaidFees = adjustedPrepaidInterest + homeownersInsurance;
        const adjustedTotalPrepaids = adjustedPrepaidFees + totalReserves;

        // Transfer tax label from state data
        const transferTaxLabel = st.transferTaxLabel || "Transfer Tax";

        const totalClosingCosts = lenderFees + thirdPartyFees + titleFees;
        const grandTotal = totalClosingCosts + adjustedTotalPrepaids + homeWarranty + optionalFees - totalCredits - sellerCred - realtor - sellerSurveyCredit - shortPayAdj;
        return {
          isPurchase, lenderFees, origination, discount, underwriting, processingFee,
          thirdPartyFees, appraisal, creditReport, floodCert, taxService, survey, docPrep,
          titleFees, ownerTitlePolicy, lenderTitlePolicy, escrowFee, titleSearch,
          recordingFees, titleCourier, taxCertERecording, transferTax, transferTaxLabel, attorneyFee, endorsements, endorsementTotal, allEndorsements,
          prepaidFees, prepaidInterest, adjustedPrepaidInterest, homeownersInsurance, prepaidDays,
          taxReserves, insReserves, totalReserves, taxMonthly, insMonthly,
          earnest, option, lenderCred, hoaTransfer, hoaDuesAmt, optionalFees, totalCredits, sellerCred, realtor, sellerSurveyCredit, shortPayAdj,
          homeWarranty, totalClosingCosts, totalPrepaids: adjustedTotalPrepaids, grandTotal,
          regulation: st.regulation, disclaimer: st.disclaimer, attorneyRequired: st.attorneyRequired,
          surveyRequired: st.surveyRequired || "optional",
          // Defaults for showing override hints
          _defaults: { underwriting: def(defUnderwriting, 1000), processingFee: def(defProcessing, 595), escrowFee: escrowFeeDefault, titleSearch: def(defTitleSearch, 250), docPrep: def(defDocPrep, 250),
            appraisal: def(defAppraisal, 750),
            creditReport: def(defCreditReport, 350), floodCert: def(defFloodCert, st.floodCert || 14),
            taxService: def(defTaxService, st.taxServiceFee || 85), survey: surveyDefault, homeWarranty: hwDefault }
        };
      }, [selectedState, transactionType, purchasePrice, loanAmount, loanType, rate, closingDate, monthlyTaxes, monthlyInsurance, originationPct, discountPoints, includeSurvey, includeHomeWarranty, includeEscrow, ovUnderwriting, ovProcessing, ovEscrowFee, ovTitleSearch, ovAppraisal, ovCreditReport, ovFloodCert, ovTaxService, ovSurvey, ovHomeWarranty, parsedCD, earnestMoney, optionMoney, lenderCredits, hoaTransferFee, hoaDues, sellerCredits, shortPay, sellerPaidSurvey, realtorContrib, ovDocPrep, defUnderwriting, defProcessing, defAppraisal, defCreditReport, defFloodCert, defTaxService, defSurvey, defDocPrep, defEscrowFee, defTitleSearch, defHomeWarranty]);

      // ── FeeRow: with optional inline edit for internal users ────────────
      const FeeRow = ({ label, amount, bold, indent, color, editKey, editValue, onEdit, defaultVal }) => (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: `${bold ? 10 : 6}px 0`, borderBottom: bold ? `2px solid ${COLORS.navy}` : `1px solid ${COLORS.border}`, marginLeft: indent ? 20 : 0, gap: 8 }}>
          <span style={{ fontSize: bold ? 14 : 13, fontWeight: bold ? 700 : 400, color: color || COLORS.navy, fontFamily: font, flex: 1 }}>{label}</span>
          {isInternal && editKey ? (
            <input
              type="text" value={editValue} placeholder={fmt(defaultVal)}
              onChange={e => onEdit(e.target.value.replace(/[^0-9.]/g, ""))}
              style={{ width: 90, textAlign: "right", fontSize: 13, fontWeight: 600, fontFamily: font, color: editValue !== "" ? COLORS.blue : COLORS.navy, border: `1px solid ${editValue !== "" ? COLORS.blue : COLORS.border}`, borderRadius: 4, padding: "2px 6px", background: editValue !== "" ? "#EAF4FB" : "transparent", outline: "none" }}
            />
          ) : (
            <span style={{ fontSize: bold ? 14 : 13, fontWeight: bold ? 700 : 500, color: color || COLORS.navy, fontFamily: font }}>{fmt(amount)}</span>
          )}
        </div>
      );

      return (
        <div>
          <div className="mtk-grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1.5fr", gap: 16 }}>
            <div>
              <SectionCard title="TRANSACTION DETAILS" accent={COLORS.navy}>
                <Select label="State" value={selectedState} onChange={setSelectedState} options={STATE_LIST.map(s => ({ value: s.value, label: `${s.label} (${s.value})` }))} />
                <Select label="Transaction Type" value={transactionType} onChange={setTransactionType} options={[{ value: "purchase", label: "Purchase" }, { value: "refinance", label: "Refinance" }]} />
                {transactionType === "purchase" && <LabeledInput label="Purchase Price" prefix="$" value={purchasePrice} onChange={setPurchasePrice} useCommas />}

    // MODULE 4: MORTGAGE COMPARISON
    // ═══════════════════════════════════════════════════════════════════════
    function MortgageComparison() {
      const [homePrice, setHomePrice] = useLocalStorage("mc_hp", "425000");
      const [scenarios, setScenarios] = useLocalStorage("mc_sc", [
        { id: 1, label: "Scenario A", downPct: "20", rate: "6.75", term: "30", points: "0", color: COLORS.navy },
        { id: 2, label: "Scenario B", downPct: "10", rate: "6.50", term: "30", points: "0.5", color: COLORS.blue },
        { id: 3, label: "Scenario C", downPct: "5", rate: "7.00", term: "30", points: "0", color: COLORS.green },
      ]);
      const updateScenario = (id, field, value) => setScenarios(prev => prev.map(s => s.id === id ? { ...s, [field]: value } : s));
      const analyses = useMemo(() => {
        const hp = parseFloat(homePrice) || 0;
        return scenarios.map(s => {
          const dp = (parseFloat(s.downPct) || 0) / 100;
          const la = Math.round(hp * (1 - dp));
          const downPayment = Math.round(hp * dp);
          const r = (parseFloat(s.rate) || 0) / 100 / 12;
          const n = (parseFloat(s.term) || 30) * 12;
          const pts = Math.round(la * (parseFloat(s.points) || 0) / 100);
          const monthlyPI = pmt(r, n, la);
          const pmiMonthly = dp < 0.20 ? Math.round(la * 0.005 / 12) : 0;
          const totalInterest = (monthlyPI * n) - la;
          const ltv = hp > 0 ? (la / hp * 100) : 0;
          return { ...s, la, downPayment, monthlyPI, pmiMonthly, totalInterest, ltv, pts, n };
        });
      }, [homePrice, scenarios]);

      return (
        <div>
          <SectionCard title="HOME PRICE"><LabeledInput label="Purchase Price" prefix="$" value={homePrice} onChange={setHomePrice} useCommas /></SectionCard>
          <div className="mtk-scenarios" style={{ display: "grid", gridTemplateColumns: `repeat(${scenarios.length}, 1fr)`, gap: 16, marginBottom: 16 }}>
            {scenarios.map((s) => (
              <SectionCard key={s.id} title={s.label} accent={s.color}>
                <LabeledInput label="Down Payment" value={s.downPct} onChange={(v) => updateScenario(s.id, "downPct", v)} suffix="%" small />
                <LabeledInput label="Interest Rate" value={s.rate} onChange={(v) => updateScenario(s.id, "rate", v)} suffix="%" step="0.125" small />
                <Select label="Term" value={s.term} onChange={(v) => updateScenario(s.id, "term", v)} options={[{ value: "30", label: "30yr" }, { value: "20", label: "20yr" }, { value: "15", label: "15yr" }]} small />
                <LabeledInput label="Points" value={s.points} onChange={(v) => updateScenario(s.id, "points", v)} suffix="pts" small />
              </SectionCard>
            ))}
          </div>
          <SectionCard title="SIDE-BY-SIDE COMPARISON">
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: font }}>
                <thead><tr style={{ borderBottom: `2px solid ${COLORS.navy}` }}>
                  <th style={{ padding: "10px 12px", textAlign: "left", fontSize: 12, fontWeight: 700, color: COLORS.gray }}></th>
                  {analyses.map(a => <th key={a.id} style={{ padding: "10px 12px", textAlign: "right", fontSize: 12, fontWeight: 700, color: a.color }}>{a.label}</th>)}
                </tr></thead>
                <tbody>
                  {[
                    { label: "Down Payment", fn: (a) => `${fmt(a.downPayment)} (${a.downPct}%)` },
                    { label: "Loan Amount", fn: (a) => fmt(a.la) },
                    { label: "Rate", fn: (a) => `${a.rate}%` },
                    { label: "Monthly P&I", fn: (a) => fmt2(a.monthlyPI), highlight: true },
                    { label: "Monthly PMI", fn: (a) => a.pmiMonthly > 0 ? fmt2(a.pmiMonthly) : "None" },
                    { label: "Total Monthly", fn: (a) => fmt2(a.monthlyPI + a.pmiMonthly), highlight: true },
                    { label: "Points Cost", fn: (a) => a.pts > 0 ? fmt(a.pts) : "—" },
                    { label: "LTV", fn: (a) => `${a.ltv.toFixed(1)}%` },
                    { label: "Total Interest", fn: (a) => fmt(a.totalInterest) },
                    { label: "Cash Needed", fn: (a) => fmt(a.downPayment + a.pts), highlight: true },
                  ].map((row, i) => (
                    <tr key={i} style={{ borderBottom: `1px solid ${COLORS.border}`, background: row.highlight ? COLORS.bg : i % 2 === 0 ? COLORS.bgAlt : COLORS.white }}>
                      <td style={{ padding: "8px 12px", fontSize: 12, fontWeight: row.highlight ? 700 : 500, color: COLORS.navy }}>{row.label}</td>
                      {analyses.map(a => <td key={a.id} style={{ padding: "8px 12px", textAlign: "right", fontSize: 13, fontWeight: row.highlight ? 700 : 500, color: row.highlight ? a.color : COLORS.navy }}>{row.fn(a)}</td>)}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </SectionCard>
          <div className="mtk-metrics" style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            {analyses.map(a => <MetricCard key={a.id} label={a.label} value={fmt2(a.monthlyPI + a.pmiMonthly)} sublabel={`${fmt(a.downPayment)} down · ${a.rate}% · ${a.term}yr`} large />)}
          </div>
          <div className="mtk-no-print" style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 8 }}>
            {(() => {
              const hdr = ["Metric", ...analyses.map(a => a.label)];
              const metrics = [
                { label: "Loan Amount", fn: a => a.la, fmtFn: a => fmt(a.la) },
                { label: "Rate (%)", fn: a => a.rate, fmtFn: a => `${a.rate}%` },
                { label: "Term (yr)", fn: a => a.term, fmtFn: a => `${a.term} yr` },
                { label: "Down Payment", fn: a => a.downPayment, fmtFn: a => `${fmt(a.downPayment)} (${a.downPct}%)` },
                { label: "Monthly P&I", fn: a => Math.round(a.monthlyPI * 100) / 100, fmtFn: a => fmt2(a.monthlyPI) },
                { label: "Monthly PMI", fn: a => Math.round(a.pmiMonthly * 100) / 100, fmtFn: a => a.pmiMonthly > 0 ? fmt2(a.pmiMonthly) : "None" },
                { label: "Total Monthly", fn: a => Math.round((a.monthlyPI + a.pmiMonthly) * 100) / 100, fmtFn: a => fmt2(a.monthlyPI + a.pmiMonthly) },
                { label: "Points Cost", fn: a => a.pts, fmtFn: a => a.pts > 0 ? fmt(a.pts) : "—" },
                { label: "LTV (%)", fn: a => Math.round(a.ltv * 10) / 10, fmtFn: a => `${a.ltv.toFixed(1)}%` },
                { label: "Total Interest", fn: a => Math.round(a.totalInterest), fmtFn: a => fmt(a.totalInterest) },
                { label: "Cash Needed", fn: a => a.downPayment + a.pts, fmtFn: a => fmt(a.downPayment + a.pts) },
              ];
              return (
                <>
                  <button onClick={() => {
                    const rows = metrics.map(m => [m.label, ...analyses.map(a => m.fmtFn(a))]);
                    exportToPDF("Mortgage Comparison", hdr, rows, "MortgageComparison.pdf", { landscape: true, footer: true });
                  }} style={{ padding: "8px 16px", background: COLORS.red, color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 12, fontWeight: 600 }}>
                    📄 Export PDF
                  </button>
                  <button onClick={() => {
                    const rows = metrics.map(m => [m.label, ...analyses.map(a => m.fn(a))]);
                    exportToExcel(hdr, rows, "MortgageComparison.xlsx");
                  }} style={{ padding: "8px 16px", background: COLORS.green, color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 12, fontWeight: 600 }}>
                    📊 Export Excel
                  </button>
                </>
              );
            })()}
          </div>
        </div>
      );
    }

    // MODULE 5: BREAK-EVEN CALCULATOR
    // ═══════════════════════════════════════════════════════════════════════
    function BreakEvenCalculator() {
      const [currentPayment, setCurrentPayment] = useLocalStorage("be_cp", "2450");
      const [newPayment, setNewPayment] = useLocalStorage("be_np", "2150");
      const [closingCosts, setClosingCosts] = useLocalStorage("be_cc", "6500");
      const [currentRate, setCurrentRate] = useLocalStorage("be_cr", "7.25");
      const [newRate, setNewRate] = useLocalStorage("be_nr", "6.25");
      const [loanBalance, setLoanBalance] = useLocalStorage("be_lb", "320000");

      const calc = useMemo(() => {
        const curPmt = parseFloat(currentPayment) || 0;
        const newPmt = parseFloat(newPayment) || 0;
        const cc = parseFloat(closingCosts) || 0;
        const monthlySavings = curPmt - newPmt;
        const simpleBreakEven = monthlySavings > 0 ? Math.ceil(cc / monthlySavings) : null;
        const lb = parseFloat(loanBalance) || 0;
        const cr = (parseFloat(currentRate) || 0) / 100 / 12;
        const nr = (parseFloat(newRate) || 0) / 100 / 12;
        const curSchedule = buildAmortization(lb, cr, 360, pmt(cr, 360, lb));
        const newLb = lb + cc;
        const newSchedule = buildAmortization(newLb, nr, 360, pmt(nr, 360, newLb));
        const trueBreakEven = calcTrueBreakEven(curSchedule, newSchedule, 0, 0, cc, 360);
        const savingsAt1yr = monthlySavings * 12;
        const savingsAt3yr = monthlySavings * 36;
        const savingsAt5yr = monthlySavings * 60 - cc;
        return { monthlySavings, simpleBreakEven, trueBreakEven, savingsAt1yr, savingsAt3yr, savingsAt5yr, cc };
      }, [currentPayment, newPayment, closingCosts, currentRate, newRate, loanBalance]);

      return (
        <div>
          <div className="mtk-grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1.5fr", gap: 16 }}>
            <SectionCard title="INPUTS" accent={COLORS.navy}>
              <LabeledInput label="Current Monthly P&I" prefix="$" value={currentPayment} onChange={setCurrentPayment} useCommas />
              <LabeledInput label="New Monthly P&I" prefix="$" value={newPayment} onChange={setNewPayment} useCommas />
              <LabeledInput label="Total Closing Costs" prefix="$" value={closingCosts} onChange={setClosingCosts} useCommas />
              <div style={{ borderTop: `1px solid ${COLORS.border}`, paddingTop: 14, marginTop: 8 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: COLORS.gray, marginBottom: 8, fontFamily: font }}>FOR TRUE BREAK-EVEN (OPTIONAL)</div>
                <LabeledInput label="Loan Balance" prefix="$" value={loanBalance} onChange={setLoanBalance} useCommas small />
                <LabeledInput label="Current Rate" value={currentRate} onChange={setCurrentRate} suffix="%" small />
                <LabeledInput label="New Rate" value={newRate} onChange={setNewRate} suffix="%" small />
              </div>
            </SectionCard>
            <div>
              <div className="mtk-metrics" style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 16 }}>
                <MetricCard label="Monthly Savings" value={`${fmt(calc.monthlySavings)}/mo`} positive={calc.monthlySavings > 0} large highlight />
                <MetricCard label="Simple Break-Even" value={calc.simpleBreakEven ? `${calc.simpleBreakEven} mo` : "N/A"} sublabel="Closing costs ÷ savings" large />
                <MetricCard label="True Break-Even" value={calc.trueBreakEven.breakEvenMonth ? `${calc.trueBreakEven.breakEvenMonth} mo` : "N/A"} sublabel="Interest-based comparison" positive={calc.trueBreakEven.breakEvenMonth && calc.trueBreakEven.breakEvenMonth <= 36} large />
              </div>
              <SectionCard title="SAVINGS TIMELINE">
                <div className="mtk-grid-3" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
                  {[
                    { label: "1 Year", value: calc.savingsAt1yr, net: calc.savingsAt1yr - calc.cc },
                    { label: "3 Years", value: calc.savingsAt3yr, net: calc.savingsAt3yr - calc.cc },
                    { label: "5 Years", value: calc.savingsAt5yr + calc.cc, net: calc.savingsAt5yr },
                  ].map((t) => (
                    <div key={t.label} style={{ padding: 14, background: COLORS.bg, borderRadius: 8, border: `1px solid ${COLORS.border}`, textAlign: "center" }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: COLORS.gray, fontFamily: font }}>{t.label}</div>
                      <div style={{ fontSize: 11, color: COLORS.grayLight, fontFamily: font }}>Gross: {fmt(t.value)}</div>
                      <div style={{ fontSize: 20, fontWeight: 700, color: t.net >= 0 ? COLORS.green : COLORS.red, fontFamily: font }}>{fmt(t.net)}</div>
                      <div style={{ fontSize: 11, color: COLORS.grayLight, fontFamily: font }}>Net (after costs)</div>
                    </div>
                  ))}
                </div>
              </SectionCard>
            </div>
          </div>
        </div>
      );
    }

    // MODULE 7: FORWARD COMMITMENT / RATE LOCK TOOL
    // ═══════════════════════════════════════════════════════════════════════
    function ForwardCommitment() {
      const [locks, setLocks] = useLocalStorage("fc_locks", [
        { id: 1, borrower: "Sample Borrower", loanAmount: "350000", rate: "6.75", lockDate: "2025-01-15", lockDays: "60", expiration: "2025-03-16", status: "active", loanType: "Conv 30yr", notes: "" },
      ]);
      const [showAdd, setShowAdd] = useState(false);
      const [newLock, setNewLock] = useState({ borrower: "", loanAmount: "", rate: "", lockDays: "60", loanType: "Conv 30yr", notes: "" });

      const addLock = () => {
        const today = new Date();
        const exp = new Date(today.getTime() + parseInt(newLock.lockDays) * 86400000);
        setLocks(prev => [...prev, { id: Date.now(), ...newLock, lockDate: today.toISOString().split("T")[0], expiration: exp.toISOString().split("T")[0], status: "active" }]);
        setNewLock({ borrower: "", loanAmount: "", rate: "", lockDays: "60", loanType: "Conv 30yr", notes: "" });
        setShowAdd(false);
      };

      const getStatusColor = (lock) => {
        const exp = new Date(lock.expiration);
        const today = new Date();
        const daysLeft = Math.ceil((exp - today) / 86400000);
        if (lock.status === "closed") return { bg: COLORS.greenLight, text: COLORS.green, label: "CLOSED" };
        if (lock.status === "expired" || daysLeft < 0) return { bg: COLORS.redLight, text: COLORS.red, label: "EXPIRED" };
        if (daysLeft <= 7) return { bg: COLORS.goldLight, text: COLORS.gold, label: `${daysLeft}d LEFT` };
        return { bg: COLORS.blueLight, text: COLORS.blue, label: `${daysLeft}d LEFT` };
      };

      const totalPipeline = locks.filter(l => l.status === "active").reduce((s, l) => s + (parseFloat(l.loanAmount) || 0), 0);

      return (
        <div>
          <div className="mtk-metrics" style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 16 }}>
            <MetricCard label="Active Locks" value={locks.filter(l => l.status === "active").length} large highlight />
            <MetricCard label="Pipeline Volume" value={fmt(totalPipeline)} />
            <MetricCard label="Avg Rate" value={locks.length > 0 ? (locks.reduce((s, l) => s + (parseFloat(l.rate) || 0), 0) / locks.length).toFixed(3) + "%" : "—"} />
          </div>
          <div className="mtk-header-flex" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: COLORS.navy, fontFamily: font }}>RATE LOCKS</div>
            <Button label="+ Add Lock" onClick={() => setShowAdd(!showAdd)} primary small />
          </div>
          {showAdd && (
            <SectionCard title="NEW RATE LOCK" accent={COLORS.green}>
              <div className="mtk-grid-3" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
                <LabeledInput label="Borrower" value={newLock.borrower} onChange={(v) => setNewLock(p => ({ ...p, borrower: v }))} type="text" small />
                <LabeledInput label="Loan Amount" prefix="$" value={newLock.loanAmount} onChange={(v) => setNewLock(p => ({ ...p, loanAmount: v }))} useCommas small />
                <LabeledInput label="Rate" value={newLock.rate} onChange={(v) => setNewLock(p => ({ ...p, rate: v }))} suffix="%" small />
                <Select label="Lock Period" value={newLock.lockDays} onChange={(v) => setNewLock(p => ({ ...p, lockDays: v }))} options={[{ value: "30", label: "30 Days" }, { value: "45", label: "45 Days" }, { value: "60", label: "60 Days" }, { value: "90", label: "90 Days" }, { value: "120", label: "120 Days" }, { value: "180", label: "180 Days (Extended)" }]} small />
                <LabeledInput label="Loan Type" value={newLock.loanType} onChange={(v) => setNewLock(p => ({ ...p, loanType: v }))} type="text" small />
                <LabeledInput label="Notes" value={newLock.notes} onChange={(v) => setNewLock(p => ({ ...p, notes: v }))} type="text" small />
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                <Button label="Save Lock" onClick={addLock} primary small color={COLORS.green} />
                <Button label="Cancel" onClick={() => setShowAdd(false)} small />
              </div>
            </SectionCard>
          )}
          {locks.map((lock) => {
            const status = getStatusColor(lock);
            return (
              <div key={lock.id} className="mtk-lock-row" style={{ background: COLORS.white, borderRadius: 12, border: `1px solid ${COLORS.border}`, padding: 16, marginBottom: 12, display: "flex", gap: 16, alignItems: "center" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
                    <span style={{ fontSize: 15, fontWeight: 700, color: COLORS.navy, fontFamily: font }}>{lock.borrower}</span>
                    <span style={{ fontSize: 10, fontWeight: 700, padding: "3px 8px", borderRadius: 4, background: status.bg, color: status.text, fontFamily: font }}>{status.label}</span>
                  </div>
                  <div style={{ fontSize: 12, color: COLORS.gray, fontFamily: font }}>{fmt(parseFloat(lock.loanAmount) || 0)} · {lock.rate}% · {lock.loanType} · Locked {lock.lockDate} · Expires {lock.expiration}</div>
                  {lock.notes && <div style={{ fontSize: 11, color: COLORS.grayLight, marginTop: 4, fontFamily: font }}>{lock.notes}</div>}
                </div>
                <div className="mtk-lock-btns" style={{ display: "flex", gap: 6 }}>
                  <button onClick={() => setLocks(prev => prev.map(l => l.id === lock.id ? { ...l, status: "closed" } : l))} style={{ padding: "6px 12px", borderRadius: 6, border: `1px solid ${COLORS.green}`, background: "transparent", color: COLORS.green, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: font }}>Close</button>
                  <button onClick={() => setLocks(prev => prev.filter(l => l.id !== lock.id))} style={{ padding: "6px 12px", borderRadius: 6, border: `1px solid ${COLORS.red}`, background: "transparent", color: COLORS.red, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: font }}>Remove</button>
                </div>
              </div>
            );
          })}
          {locks.length === 0 && <div style={{ padding: 40, textAlign: "center", color: COLORS.grayLight, fontFamily: font }}>No rate locks yet. Click "+ Add Lock" to start tracking.</div>}
        </div>
      );
    }

    // MODULE 8: AFFORDABILITY CALCULATOR
    // ═══════════════════════════════════════════════════════════════════════
    function AffordabilityCalculator() {
      const c = useThemeColors();
      const [annualIncome, setAnnualIncome] = useLocalStorage("af_inc", "100000");
      const [coIncome, setCoIncome] = useLocalStorage("af_coinc", "0");
      const [monthlyDebts, setMonthlyDebts] = useLocalStorage("af_debts", "500");
      const [rate, setRate] = useLocalStorage("af_rate", "6.75");
      const [term, setTerm] = useLocalStorage("af_term", "30");
      const [downPct, setDownPct] = useLocalStorage("af_dp", "20");
      const [taxRate, setTaxRate] = useLocalStorage("af_tax", "1.25");
      const [insRate, setInsRate] = useLocalStorage("af_ins", "0.35");
      const [frontDTI, setFrontDTI] = useLocalStorage("af_fdti", "28");
      const [backDTI, setBackDTI] = useLocalStorage("af_bdti", "43");
      const [hoaDues, setHoaDues] = useLocalStorage("af_hoa", "0");

      const calc = useMemo(() => {
        const grossMo = ((parseFloat(annualIncome) || 0) + (parseFloat(coIncome) || 0)) / 12;
        const debts = parseFloat(monthlyDebts) || 0;
        const r = (parseFloat(rate) || 6.75) / 100 / 12;
        const n = (parseInt(term) || 30) * 12;
        const dp = (parseFloat(downPct) || 20) / 100;
        const taxPct = (parseFloat(taxRate) || 1.25) / 100 / 12;
        const insPct = (parseFloat(insRate) || 0.35) / 100 / 12;
        const fd = (parseFloat(frontDTI) || 28) / 100;
        const bd = (parseFloat(backDTI) || 43) / 100;
        const hoa = parseFloat(hoaDues) || 0;

        // Front-end: housing payment <= fd * grossMo
        const maxHousingFront = fd * grossMo;
        // Back-end: housing + debts <= bd * grossMo
        const maxHousingBack = bd * grossMo - debts;
        const maxHousing = Math.min(maxHousingFront, maxHousingBack);
        const limitedBy = maxHousingFront <= maxHousingBack ? "front" : "back";

        // maxHousing = PI + tax + ins + hoa + pmi
        // PI = maxHousing - (homePrice * taxPct) - (homePrice * insPct) - hoa
        // We also need PMI if dp < 20%
        // PI = pmt(r, n, loanAmount), loanAmount = homePrice * (1 - dp)
        // Let H = homePrice. PI = maxHousing - H*taxPct - H*insPct - hoa - pmiMo
        // pmt(r, n, H*(1-dp)) = maxHousing - H*(taxPct + insPct) - hoa - pmiMo
        // pmiMo = dp < 0.2 ? H*(1-dp)*0.005/12 : 0
        // H*(1-dp) * r*(1+r)^n / ((1+r)^n - 1) = maxHousing - H*(taxPct + insPct) - hoa - (dp<0.2 ? H*(1-dp)*0.005/12 : 0)
        // Let k = r*(1+r)^n / ((1+r)^n - 1), pmiR = dp<0.2 ? (1-dp)*0.005/12 : 0
        // H*(1-dp)*k = maxHousing - H*(taxPct+insPct) - hoa - H*pmiR
        // H*((1-dp)*k + taxPct + insPct + pmiR) = maxHousing - hoa
        // H = (maxHousing - hoa) / ((1-dp)*k + taxPct + insPct + pmiR)

        const pow = Math.pow(1 + r, n);
        const k = r > 0 ? (r * pow) / (pow - 1) : 1 / n;
        const pmiR = dp < 0.2 ? (1 - dp) * 0.005 / 12 : 0;
        const denom = (1 - dp) * k + taxPct + insPct + pmiR;
        const maxHome = denom > 0 ? Math.max(0, (maxHousing - hoa) / denom) : 0;
        const maxLoan = maxHome * (1 - dp);
        const downPayment = maxHome * dp;
        const piPayment = pmt(r, n, maxLoan);
        const taxMo = maxHome * taxPct;
        const insMo = maxHome * insPct;
        const pmiMo = dp < 0.2 ? maxLoan * 0.005 / 12 : 0;
        const totalPayment = piPayment + taxMo + insMo + pmiMo + hoa;
        const actualFrontDTI = grossMo > 0 ? (totalPayment / grossMo) * 100 : 0;
        const actualBackDTI = grossMo > 0 ? ((totalPayment + debts) / grossMo) * 100 : 0;

        return { grossMo, maxHome, maxLoan, downPayment, piPayment, taxMo, insMo, pmiMo, hoa, totalPayment, maxHousing, limitedBy, actualFrontDTI, actualBackDTI, debts };
      }, [annualIncome, coIncome, monthlyDebts, rate, term, downPct, taxRate, insRate, frontDTI, backDTI, hoaDues]);

      return (
        <div>
          <div className="mtk-metrics" style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 16 }}>
            <MetricCard label="Max Purchase Price" value={fmt(Math.round(calc.maxHome))} large highlight />
            <MetricCard label="Max Loan Amount" value={fmt(Math.round(calc.maxLoan))} />
            <MetricCard label="Down Payment" value={fmt(Math.round(calc.downPayment))} sub={`${downPct}%`} />
            <MetricCard label="Total Payment" value={fmt2(calc.totalPayment)} sub="/mo" />
          </div>
          <div className="mtk-grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            <SectionCard title="INCOME & DEBTS" accent={c.green || COLORS.green}>
              <LabeledInput label="Annual Income" prefix="$" value={annualIncome} onChange={setAnnualIncome} useCommas />
              <LabeledInput label="Co-Borrower Annual Income" prefix="$" value={coIncome} onChange={setCoIncome} useCommas />
              <LabeledInput label="Monthly Debt Payments" prefix="$" value={monthlyDebts} onChange={setMonthlyDebts} useCommas info="Car, student loans, credit card minimums, etc." />
              <LabeledInput label="HOA Dues" prefix="$" value={hoaDues} onChange={setHoaDues} useCommas />
            </SectionCard>
            <SectionCard title="LOAN PARAMETERS" accent={c.blue || COLORS.blue}>
              <LabeledInput label="Interest Rate" value={rate} onChange={setRate} suffix="%" />
              <Select label="Loan Term" value={term} onChange={setTerm} options={[{ value: "30", label: "30-Year" }, { value: "20", label: "20-Year" }, { value: "15", label: "15-Year" }]} />
              <LabeledInput label="Down Payment" value={downPct} onChange={setDownPct} suffix="%" />
              <LabeledInput label="Property Tax Rate" value={taxRate} onChange={setTaxRate} suffix="% / yr" />
              <LabeledInput label="Homeowner's Insurance" value={insRate} onChange={setInsRate} suffix="% / yr" />
            </SectionCard>
            <SectionCard title="DTI LIMITS" accent={c.gold || COLORS.gold}>
              <LabeledInput label="Max Front-End DTI" value={frontDTI} onChange={setFrontDTI} suffix="%" info="Housing payment / gross income" />
              <LabeledInput label="Max Back-End DTI" value={backDTI} onChange={setBackDTI} suffix="%" info="(Housing + debts) / gross income" />
              <div style={{ padding: 10, borderRadius: 8, background: calc.limitedBy === "back" ? (c.redLight || COLORS.redLight) : (c.blueLight || COLORS.blueLight), marginTop: 8 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: calc.limitedBy === "back" ? (c.red || COLORS.red) : (c.blue || COLORS.blue), fontFamily: font }}>
                  {calc.limitedBy === "back" ? "⚠ Limited by back-end DTI (debts)" : "ℹ Limited by front-end DTI (housing)"}
                </div>
              </div>
            </SectionCard>
            <SectionCard title="PAYMENT BREAKDOWN" accent={c.navy || COLORS.navy}>
              {(() => {
                const breakItems = [
                  { label: "Principal & Interest", value: calc.piPayment, color: c.navy || COLORS.navy },
                  { label: "Property Tax", value: calc.taxMo, color: c.blue || COLORS.blue },
                  { label: "Homeowner's Insurance", value: calc.insMo, color: c.green || COLORS.green },
                  calc.pmiMo > 0 && { label: "PMI", value: calc.pmiMo, color: c.gold || COLORS.gold },
                  calc.hoa > 0 && { label: "HOA Dues", value: calc.hoa, color: c.gray || COLORS.gray },
                ].filter(Boolean);
                return (<>
                  <div style={{ margin: "0 auto 12px", maxWidth: 160 }}>
                    <DonutChart
                      data={breakItems.map(d => ({ value: d.value, color: d.color }))}
                      size={140}
                      thickness={20}
                      centerLabel="PITI"

    // MODULE 9: AMORTIZATION SCHEDULE
    // ═══════════════════════════════════════════════════════════════════════
    function AmortizationSchedule() {
      const c = useThemeColors();
      const [loanAmount, setLoanAmount] = useLocalStorage("am_la", "350000");
      const [rate, setRate] = useLocalStorage("am_rate", "6.75");
      const [term, setTerm] = useLocalStorage("am_term", "30");
      const [extraPrincipal, setExtraPrincipal] = useLocalStorage("am_extra", "0");
      const [viewMode, setViewMode] = useState("yearly");

      const schedule = useMemo(() => {
        const la = parseFloat(loanAmount) || 0;
        const r = (parseFloat(rate) || 0) / 100 / 12;
        const n = (parseInt(term) || 30) * 12;
        const extra = parseFloat(extraPrincipal) || 0;
        const payment = pmt(r, n, la);
        let balance = la;
        const months = [];
        let totalInterest = 0;
        let totalPrincipal = 0;

        for (let m = 1; m <= n && balance > 0.01; m++) {
          const intPmt = balance * r;
          let prinPmt = payment - intPmt + extra;
          if (prinPmt > balance) prinPmt = balance;
          balance -= prinPmt;
          if (balance < 0) balance = 0;
          totalInterest += intPmt;
          totalPrincipal += prinPmt;
          months.push({ month: m, payment: intPmt + prinPmt, principal: prinPmt, interest: intPmt, balance, totalInterest, totalPrincipal });
        }

        // Yearly aggregation
        const years = [];
        for (let y = 0; y < Math.ceil(months.length / 12); y++) {
          const slice = months.slice(y * 12, (y + 1) * 12);
          if (slice.length === 0) break;
          years.push({
            year: y + 1,
            principal: slice.reduce((s, m) => s + m.principal, 0),
            interest: slice.reduce((s, m) => s + m.interest, 0),
            totalPayment: slice.reduce((s, m) => s + m.payment, 0),
            endBalance: slice[slice.length - 1].balance,
            totalInterest: slice[slice.length - 1].totalInterest,
          });
        }

        const normalMonths = n;
        const actualMonths = months.length;
        const savedMonths = normalMonths - actualMonths;
        const normalInterest = (payment * n) - la;
        const savedInterest = normalInterest - totalInterest;

        return { months, years, totalInterest, totalPrincipal, payment, savedMonths, savedInterest, actualMonths };
      }, [loanAmount, rate, term, extraPrincipal]);

      const data = viewMode === "yearly" ? schedule.years : schedule.months;
      const headers = viewMode === "yearly"
        ? ["Year", "Principal", "Interest", "Total Paid", "End Balance", "Cumul. Interest"]
        : ["Month", "Payment", "Principal", "Interest", "Balance"];
      const rows = viewMode === "yearly"
        ? schedule.years.map(y => [y.year, fmt2(y.principal), fmt2(y.interest), fmt2(y.totalPayment), fmt(Math.round(y.endBalance)), fmt(Math.round(y.totalInterest))])
        : schedule.months.map(m => [m.month, fmt2(m.payment), fmt2(m.principal), fmt2(m.interest), fmt(Math.round(m.balance))]);

      return (
        <div>
          <div className="mtk-metrics" style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 16 }}>
            <MetricCard label="Monthly P&I" value={fmt2(schedule.payment)} large highlight />
            <MetricCard label="Total Interest" value={fmt(Math.round(schedule.totalInterest))} />
            {parseFloat(extraPrincipal) > 0 && <MetricCard label="Interest Saved" value={fmt(Math.round(schedule.savedInterest))} sub={`${schedule.savedMonths} months early`} />}
            <MetricCard label="Payoff" value={`${Math.ceil(schedule.actualMonths / 12)} yrs`} sub={`${schedule.actualMonths} payments`} />
          </div>
          <div className="mtk-grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
            <SectionCard title="LOAN DETAILS" accent={c.blue || COLORS.blue}>
              <LabeledInput label="Loan Amount" prefix="$" value={loanAmount} onChange={setLoanAmount} useCommas />
              <LabeledInput label="Interest Rate" value={rate} onChange={setRate} suffix="%" />
              <Select label="Loan Term" value={term} onChange={setTerm} options={[{ value: "30", label: "30-Year" }, { value: "20", label: "20-Year" }, { value: "15", label: "15-Year" }, { value: "10", label: "10-Year" }]} />
              <LabeledInput label="Extra Monthly Principal" prefix="$" value={extraPrincipal} onChange={setExtraPrincipal} useCommas info="See how extra payments shorten your loan" />
            </SectionCard>
            <SectionCard title="EXPORT" accent={c.green || COLORS.green}>
              <div style={{ fontSize: 13, color: c.text || c.navy || COLORS.navy, fontFamily: font, marginBottom: 12 }}>
                Download the full {viewMode === "yearly" ? "annual" : "monthly"} amortization schedule as PDF or Excel.
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <Button label="PDF Export" onClick={() => exportToPDF(`Amortization Schedule — ${viewMode === "yearly" ? "Yearly" : "Monthly"}`, headers, rows, `amort-${viewMode}.pdf`)} primary small />
                <Button label="Excel Export" onClick={() => exportToExcel(headers, rows, `amort-${viewMode}.xlsx`)} small color={c.green || COLORS.green} />
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                <Button label={viewMode === "yearly" ? "Switch to Monthly" : "Switch to Yearly"} onClick={() => setViewMode(viewMode === "yearly" ? "monthly" : "yearly")} small />
              </div>
            </SectionCard>
          </div>
          {schedule && schedule.years && schedule.years.length > 0 && (
            <SectionCard title="LOAN VISUALIZATIONS" accent={c.blue || COLORS.blue}>
              <div style={{ marginBottom: 20 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: c.gray || COLORS.gray, fontFamily: font, marginBottom: 8, letterSpacing: "0.05em" }}>BALANCE PAYDOWN</div>
                <BalanceCurveChart years={schedule.years} />
              </div>
              <div style={{ marginBottom: 20 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: c.gray || COLORS.gray, fontFamily: font, marginBottom: 8, letterSpacing: "0.05em" }}>PRINCIPAL vs INTEREST BY YEAR</div>
                <PIStackedBarChart years={schedule.years} />
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 24, flexWrap: "wrap", justifyContent: "center" }}>
                <DonutChart
                  data={[
                    { value: schedule.totalPrincipal, color: c.green || COLORS.green },
                    { value: schedule.totalInterest, color: c.red || COLORS.red }
                  ]}
                  size={140}
                  thickness={22}
                  centerLabel="TOTAL COST"
                  centerValue={fmt(Math.round(schedule.totalPrincipal + schedule.totalInterest))}
                />
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <div style={{ width: 12, height: 12, borderRadius: 3, background: c.green || COLORS.green }} />
                    <div>
                      <div style={{ fontSize: 10, fontWeight: 700, color: c.gray || COLORS.gray, fontFamily: font }}>PRINCIPAL</div>
                      <div style={{ fontSize: 15, fontWeight: 800, color: c.text || c.navy || COLORS.navy, fontFamily: font }}>{fmt(Math.round(schedule.totalPrincipal))}</div>
                    </div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <div style={{ width: 12, height: 12, borderRadius: 3, background: c.red || COLORS.red }} />
                    <div>
                      <div style={{ fontSize: 10, fontWeight: 700, color: c.gray || COLORS.gray, fontFamily: font }}>INTEREST</div>
                      <div style={{ fontSize: 15, fontWeight: 800, color: c.text || c.navy || COLORS.navy, fontFamily: font }}>{fmt(Math.round(schedule.totalInterest))}</div>
                    </div>
                  </div>
                  {schedule.savedInterest > 0 && (
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <div style={{ width: 12, height: 12, borderRadius: 3, background: c.gold || COLORS.gold }} />
                      <div>
                        <div style={{ fontSize: 10, fontWeight: 700, color: c.gray || COLORS.gray, fontFamily: font }}>SAVED W/ EXTRA</div>
                        <div style={{ fontSize: 15, fontWeight: 800, color: c.gold || COLORS.gold, fontFamily: font }}>{fmt(Math.round(schedule.savedInterest))}</div>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </SectionCard>
          )}
          <SectionCard title={`AMORTIZATION — ${viewMode === "yearly" ? "ANNUAL" : "MONTHLY"}`} accent={c.navy || COLORS.navy}>
            <div style={{ overflowX: "auto", maxHeight: 500, overflowY: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, fontFamily: font }}>
                <thead>
                  <tr style={{ position: "sticky", top: 0, zIndex: 1 }}>
                    {headers.map((h) => (
                      <th key={h} style={{ padding: "10px 12px", textAlign: h === headers[0] ? "left" : "right", fontSize: 10, fontWeight: 700, color: c.gray || COLORS.gray, background: c.bgAlt || c.blueLight || COLORS.blueLight, borderBottom: `2px solid ${c.border || COLORS.border}`, whiteSpace: "nowrap" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {data.map((row, i) => {
                    const prinVal = viewMode === "yearly" ? row.principal : row.principal;
                    const intVal = viewMode === "yearly" ? row.interest : row.interest;
                    const total = prinVal + intVal;
                    const prinPct = total > 0 ? (prinVal / total) * 100 : 0;
                    return (
                      <tr key={i} style={{ background: i % 2 === 0 ? "transparent" : (c.bgAlt || c.blueLight || COLORS.bg) }}>
                        <td style={{ padding: "8px 12px", color: c.text || c.navy || COLORS.navy, fontWeight: 600 }}>{viewMode === "yearly" ? row.year : row.month}</td>
                        {viewMode === "monthly" && <td style={{ padding: "8px 12px", textAlign: "right", color: c.text || c.navy || COLORS.navy }}>{fmt2(row.payment)}</td>}
                        <td style={{ padding: "8px 12px", textAlign: "right", color: c.green || COLORS.green, fontWeight: 600 }}>{fmt2(prinVal)}</td>
                        <td style={{ padding: "8px 12px", textAlign: "right", color: c.red || COLORS.red }}>{fmt2(intVal)}</td>
                        {viewMode === "yearly" && <td style={{ padding: "8px 12px", textAlign: "right", color: c.text || c.navy || COLORS.navy }}>{fmt2(row.totalPayment)}</td>}
                        <td style={{ padding: "8px 12px", textAlign: "right", color: c.text || c.navy || COLORS.navy, fontWeight: 600 }}>{fmt(Math.round(viewMode === "yearly" ? row.endBalance : row.balance))}</td>
                        {viewMode === "yearly" && <td style={{ padding: "8px 12px", textAlign: "right", color: c.gray || COLORS.gray }}>{fmt(Math.round(row.totalInterest))}</td>}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </SectionCard>
        </div>
      );
    }

    // MODULE 10: DTI RATIO CALCULATOR
    // ═══════════════════════════════════════════════════════════════════════
    function DTICalculator() {
      const c = useThemeColors();
      const [grossIncome, setGrossIncome] = useLocalStorage("dti_gi", "8333");
      const [coGrossIncome, setCoGrossIncome] = useLocalStorage("dti_cgi", "0");
      const [housingPI, setHousingPI] = useLocalStorage("dti_pi", "1800");
      const [propertyTax, setPropertyTax] = useLocalStorage("dti_tax", "350");
      const [homeInsurance, setHomeInsurance] = useLocalStorage("dti_ins", "100");
      const [pmi, setPmi] = useLocalStorage("dti_pmi", "0");
      const [hoa, setHoa] = useLocalStorage("dti_hoa", "0");
      const [carPayments, setCarPayments] = useLocalStorage("dti_car", "450");
      const [studentLoans, setStudentLoans] = useLocalStorage("dti_sl", "200");
      const [creditCards, setCreditCards] = useLocalStorage("dti_cc", "150");
      const [personalLoans, setPersonalLoans] = useLocalStorage("dti_pl", "0");
      const [childSupport, setChildSupport] = useLocalStorage("dti_cs", "0");
      const [otherDebt, setOtherDebt] = useLocalStorage("dti_od", "0");

      const calc = useMemo(() => {
        const income = (parseFloat(grossIncome) || 0) + (parseFloat(coGrossIncome) || 0);
        const pi = parseFloat(housingPI) || 0;
        const tax = parseFloat(propertyTax) || 0;
        const ins = parseFloat(homeInsurance) || 0;
        const pmiMo = parseFloat(pmi) || 0;
        const hoaMo = parseFloat(hoa) || 0;
        const housing = pi + tax + ins + pmiMo + hoaMo;

        const car = parseFloat(carPayments) || 0;
        const student = parseFloat(studentLoans) || 0;
        const cc = parseFloat(creditCards) || 0;
        const personal = parseFloat(personalLoans) || 0;
        const cs = parseFloat(childSupport) || 0;
        const other = parseFloat(otherDebt) || 0;
        const nonHousingDebts = car + student + cc + personal + cs + other;
        const totalDebts = housing + nonHousingDebts;

        const frontDTI = income > 0 ? (housing / income) * 100 : 0;
        const backDTI = income > 0 ? (totalDebts / income) * 100 : 0;
        const remaining = income - totalDebts;

        const debtItems = [
          { label: "Car Payments", value: car, color: c.blue || COLORS.blue },
          { label: "Student Loans", value: student, color: c.navy || COLORS.navy },
          { label: "Credit Cards (min)", value: cc, color: c.gold || COLORS.gold },
          { label: "Personal Loans", value: personal, color: c.green || COLORS.green },
          { label: "Child Support / Alimony", value: cs, color: c.red || COLORS.red },
          { label: "Other Debts", value: other, color: c.gray || COLORS.gray },
        ].filter(d => d.value > 0);

        // Guideline check
        const convPass = frontDTI <= 28 && backDTI <= 45;
        const fhaPass = frontDTI <= 31 && backDTI <= 43;
        const vaPass = backDTI <= 41;

        return { income, housing, nonHousingDebts, totalDebts, frontDTI, backDTI, remaining, debtItems, convPass, fhaPass, vaPass, pi, tax, ins, pmiMo, hoaMo };
      }, [grossIncome, coGrossIncome, housingPI, propertyTax, homeInsurance, pmi, hoa, carPayments, studentLoans, creditCards, personalLoans, childSupport, otherDebt]);

      const dtiColor = (val, limit) => val <= limit ? (c.green || COLORS.green) : val <= limit + 5 ? (c.gold || COLORS.gold) : (c.red || COLORS.red);

      return (
        <div>
          <div className="mtk-metrics" style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 16 }}>
            <MetricCard label="Front-End DTI" value={`${calc.frontDTI.toFixed(1)}%`} large highlight />
            <MetricCard label="Back-End DTI" value={`${calc.backDTI.toFixed(1)}%`} large />
            <MetricCard label="Total Housing" value={fmt2(calc.housing)} sub="/mo" />
            <MetricCard label="Remaining Income" value={fmt2(calc.remaining)} sub="/mo" />
          </div>
          <div className="mtk-grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            <SectionCard title="MONTHLY INCOME" accent={c.green || COLORS.green}>
              <LabeledInput label="Gross Monthly Income" prefix="$" value={grossIncome} onChange={setGrossIncome} useCommas />
              <LabeledInput label="Co-Borrower Gross Monthly" prefix="$" value={coGrossIncome} onChange={setCoGrossIncome} useCommas />
            </SectionCard>
            <SectionCard title="HOUSING EXPENSES" accent={c.blue || COLORS.blue}>
              <LabeledInput label="Principal & Interest" prefix="$" value={housingPI} onChange={setHousingPI} useCommas />
              <LabeledInput label="Property Tax" prefix="$" value={propertyTax} onChange={setPropertyTax} useCommas />
              <LabeledInput label="Homeowner's Insurance" prefix="$" value={homeInsurance} onChange={setHomeInsurance} useCommas />
              <LabeledInput label="PMI" prefix="$" value={pmi} onChange={setPmi} useCommas />
              <LabeledInput label="HOA Dues" prefix="$" value={hoa} onChange={setHoa} useCommas />
            </SectionCard>
            <SectionCard title="NON-HOUSING DEBTS" accent={c.red || COLORS.red}>
              <LabeledInput label="Car Payments" prefix="$" value={carPayments} onChange={setCarPayments} useCommas />
              <LabeledInput label="Student Loans" prefix="$" value={studentLoans} onChange={setStudentLoans} useCommas />
              <LabeledInput label="Credit Card Minimums" prefix="$" value={creditCards} onChange={setCreditCards} useCommas />
              <LabeledInput label="Personal Loans" prefix="$" value={personalLoans} onChange={setPersonalLoans} useCommas />
              <LabeledInput label="Child Support / Alimony" prefix="$" value={childSupport} onChange={setChildSupport} useCommas />
              <LabeledInput label="Other Monthly Debts" prefix="$" value={otherDebt} onChange={setOtherDebt} useCommas />
            </SectionCard>
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              <SectionCard title="DTI ANALYSIS" accent={c.navy || COLORS.navy}>
                <div style={{ display: "flex", gap: 12, marginBottom: 12, flexWrap: "wrap", justifyContent: "center" }}>
                  <div style={{ flex: 1, minWidth: 130, textAlign: "center", padding: "12px 8px", borderRadius: 10, background: c.bgAlt || c.blueLight || COLORS.blueLight }}>
                    <GaugeChart value={calc.frontDTI} max={60} size={120} label="FRONT-END" thresholds={[28, 36]} />
                    <div style={{ fontSize: 10, color: c.gray || COLORS.gray, fontFamily: font, marginTop: 4 }}>Housing / Income</div>
                  </div>
                  <div style={{ flex: 1, minWidth: 130, textAlign: "center", padding: "12px 8px", borderRadius: 10, background: c.bgAlt || c.blueLight || COLORS.blueLight }}>
                    <GaugeChart value={calc.backDTI} max={60} size={120} label="BACK-END" thresholds={[43, 50]} />
                    <div style={{ fontSize: 10, color: c.gray || COLORS.gray, fontFamily: font, marginTop: 4 }}>All Debts / Income</div>
                  </div>
                </div>
                <div style={{ marginBottom: 12 }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: c.gray || COLORS.gray, fontFamily: font, marginBottom: 4 }}>INCOME ALLOCATION</div>
                  <div style={{ height: 20, borderRadius: 10, overflow: "hidden", display: "flex", background: c.border || COLORS.border }}>
                    {calc.income > 0 && (
                      <>
                        <div style={{ width: `${Math.min((calc.housing / calc.income) * 100, 100)}%`, background: c.blue || COLORS.blue, transition: "width 0.3s" }} />
                        <div style={{ width: `${Math.min((calc.nonHousingDebts / calc.income) * 100, 100 - (calc.housing / calc.income) * 100)}%`, background: c.red || COLORS.red, transition: "width 0.3s" }} />
                      </>
                    )}
                  </div>
                  <div style={{ display: "flex", gap: 16, marginTop: 4, fontSize: 10, fontFamily: font }}>
                    <span style={{ color: c.blue || COLORS.blue }}>■ Housing {calc.income > 0 ? ((calc.housing / calc.income) * 100).toFixed(0) : 0}%</span>
                    <span style={{ color: c.red || COLORS.red }}>■ Debts {calc.income > 0 ? ((calc.nonHousingDebts / calc.income) * 100).toFixed(0) : 0}%</span>
                    <span style={{ color: c.green || COLORS.green }}>■ Remaining {calc.income > 0 ? ((calc.remaining / calc.income) * 100).toFixed(0) : 0}%</span>
                  </div>
                </div>
              </SectionCard>
              <SectionCard title="GUIDELINE CHECK" accent={c.gold || COLORS.gold}>
                {[
                  { label: "Conventional", front: "28%", back: "45%", pass: calc.convPass },
                  { label: "FHA", front: "31%", back: "43%", pass: calc.fhaPass },
                  { label: "VA", front: "—", back: "41%", pass: calc.vaPass },
                ].map((g) => (
                  <div key={g.label} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: `1px solid ${c.border || COLORS.border}` }}>
                    <span style={{ fontSize: 13, fontWeight: 600, color: c.text || c.navy || COLORS.navy, fontFamily: font }}>{g.label}</span>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ fontSize: 11, color: c.gray || COLORS.gray, fontFamily: font }}>Front {g.front} / Back {g.back}</span>
                      <span style={{ fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 4, background: g.pass ? (c.greenLight || COLORS.greenLight) : (c.redLight || COLORS.redLight), color: g.pass ? (c.green || COLORS.green) : (c.red || COLORS.red), fontFamily: font }}>
                        {g.pass ? "✓ PASS" : "✗ FAIL"}
                      </span>
                    </div>
                  </div>
                ))}
              </SectionCard>
            </div>
          </div>
        </div>
      );
    }

    // MODULE 11 — RENT vs BUY CALCULATOR
    // ═══════════════════════════════════════════════════════════════════════
    function RentVsBuyCalculator() {
      const c = useThemeColors();
      const [homePrice, setHomePrice] = useLocalStorage("rvb_price", "350000");
