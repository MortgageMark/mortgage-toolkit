      const [taxBracket, setTaxBracket] = useLocalStorage("rvb_taxbrk", "22");
      const [stayYears, setStayYears] = useLocalStorage("rvb_stay", "7");

      const calc = useMemo(() => {
        const hp = parseFloat(homePrice) || 0;
        const dp = hp * (parseFloat(downPct) || 0) / 100;
        const loan = hp - dp;
        const r = (parseFloat(rate) || 0) / 100 / 12;
        const n = (parseFloat(termYrs) || 30) * 12;
        const pmt = r > 0 ? loan * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1) : loan / n;
        const ptaxMo = hp * (parseFloat(propTaxRate) || 0) / 100 / 12;
        const insMo = (parseFloat(insurance) || 0) / 12;
        const hoaMo = parseFloat(hoa) || 0;
        const maintMo = hp * (parseFloat(maint) || 0) / 100 / 12;
        const pmiMo = (parseFloat(downPct) || 0) < 20 ? loan * 0.007 / 12 : 0;
        const totalBuyMo = pmt + ptaxMo + insMo + hoaMo + maintMo + pmiMo;
        const rent0 = parseFloat(monthlyRent) || 0;
        const rentInc = (parseFloat(rentIncrease) || 0) / 100;
        const appr = (parseFloat(appreciation) || 0) / 100;
        const inv = (parseFloat(investReturn) || 0) / 100 / 12;
        const taxBr = (parseFloat(taxBracket) || 0) / 100;
        const years = parseInt(stayYears) || 7;

        let balance = loan;
        let totalBuyCost = dp;
        let totalRentCost = 0;
        let rentInvestment = dp;
        let yearData = [];

        for (let y = 1; y <= years; y++) {
          let yearInterest = 0;
          let yearPrincipal = 0;
          let yearRent = 0;
          const currentRent = rent0 * Math.pow(1 + rentInc, y - 1);
          for (let m = 0; m < 12; m++) {
            const intPmt = balance * r;
            const prinPmt = pmt - intPmt;
            yearInterest += intPmt;
            yearPrincipal += prinPmt;
            balance = Math.max(0, balance - prinPmt);
            totalBuyCost += totalBuyMo;
            yearRent += currentRent;
            totalRentCost += currentRent;
            const rentSavings = totalBuyMo > currentRent ? totalBuyMo - currentRent : 0;
            rentInvestment = (rentInvestment) * (1 + inv) + rentSavings;
          }
          const homeValue = hp * Math.pow(1 + appr, y);
          const equity = homeValue - balance;
          const taxSaving = yearInterest * taxBr;
          const netBuyCost = totalBuyCost - (equity) - taxSaving * y / y;
          yearData.push({ year: y, equity, homeValue, balance, totalBuyCost, totalRentCost, rentInvestment, rentMo: currentRent, taxSaving: yearInterest * taxBr });
        }

        const finalHomeVal = hp * Math.pow(1 + appr, years);
        const sellingCosts = finalHomeVal * 0.06;
        const netBuyWealth = finalHomeVal - balance - sellingCosts;
        const netRentWealth = rentInvestment;
        const buyWins = netBuyWealth > netRentWealth;
        const breakEvenYr = yearData.findIndex(d => {
          const sv = d.homeValue * 0.06;
          return (d.homeValue - d.balance - sv) > d.rentInvestment;
        });

        return { pmt, totalBuyMo, ptaxMo, insMo, hoaMo, maintMo, pmiMo, dp, loan, yearData, netBuyWealth, netRentWealth, buyWins, breakEvenYr: breakEvenYr >= 0 ? breakEvenYr + 1 : null, finalHomeVal, balance, sellingCosts, rentInvestment, years };
      }, [homePrice, downPct, rate, termYrs, propTaxRate, insurance, hoa, maint, appreciation, monthlyRent, rentIncrease, investReturn, taxBracket, stayYears]);

      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <SectionCard title="BUYING COSTS" accent={c.navy || COLORS.navy}>
            <div className="mtk-grid-3" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
              <LabeledInput label="Home Price" value={homePrice} onChange={setHomePrice} prefix="$" />
              <LabeledInput label="Down Payment %" value={downPct} onChange={setDownPct} suffix="%" />
              <LabeledInput label="Interest Rate" value={rate} onChange={setRate} suffix="%" />
              <LabeledInput label="Loan Term (years)" value={termYrs} onChange={setTermYrs} />
              <LabeledInput label="Property Tax Rate" value={propTaxRate} onChange={setPropTaxRate} suffix="%" />
              <LabeledInput label="Annual Insurance" value={insurance} onChange={setInsurance} prefix="$" />
              <LabeledInput label="Monthly HOA" value={hoa} onChange={setHoa} prefix="$" />
              <LabeledInput label="Maintenance %" value={maint} onChange={setMaint} suffix="%" />
              <LabeledInput label="Appreciation Rate" value={appreciation} onChange={setAppreciation} suffix="%" />
            </div>
          </SectionCard>
          <SectionCard title="RENTING COSTS" accent={c.blue || COLORS.blue}>
            <div className="mtk-grid-3" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
              <LabeledInput label="Monthly Rent" value={monthlyRent} onChange={setMonthlyRent} prefix="$" />
              <LabeledInput label="Annual Rent Increase" value={rentIncrease} onChange={setRentIncrease} suffix="%" />

              <LabeledInput label="Tax Bracket" value={taxBracket} onChange={setTaxBracket} suffix="%" />
              <LabeledInput label="Years to Stay" value={stayYears} onChange={setStayYears} />

              <div style={{ fontSize: 13, color: c.gray || COLORS.gray, fontFamily: font, marginTop: 4 }}>After {calc.years} years with 6% selling costs</div>
              <div style={{ display: "flex", justifyContent: "center", gap: 32, marginTop: 16, flexWrap: "wrap" }}>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: c.gray || COLORS.gray, fontFamily: font, letterSpacing: "0.05em" }}>BUY NET WEALTH</div>

                </div>
              </div>
              {calc.breakEvenYr && <div style={{ fontSize: 12, color: c.gold || COLORS.gold, fontWeight: 700, fontFamily: font, marginTop: 12, padding: "6px 14px", background: c.goldLight || COLORS.goldLight, borderRadius: 6, display: "inline-block" }}>Break-even point: Year {calc.breakEvenYr}</div>}

          <SectionCard title="MONTHLY COST COMPARISON" accent={c.navy || COLORS.navy}>
            <div style={{ display: "flex", gap: 20, flexWrap: "wrap", justifyContent: "center", marginBottom: 12 }}>
              <DonutChart data={[
                { value: calc.pmt, color: c.navy || COLORS.navy },
                { value: calc.ptaxMo, color: c.blue || COLORS.blue },
                { value: calc.insMo, color: c.green || COLORS.green },

              <div style={{ display: "flex", flexDirection: "column", gap: 4, justifyContent: "center", minWidth: 150 }}>
                {[
                  { label: "P&I", val: calc.pmt, clr: c.navy || COLORS.navy },
                  { label: "Tax", val: calc.ptaxMo, clr: c.blue || COLORS.blue },
                  { label: "Insurance", val: calc.insMo, clr: c.green || COLORS.green },
                  { label: "HOA + Maint.", val: calc.hoaMo + calc.maintMo, clr: c.gold || COLORS.gold },
                  { label: "PMI", val: calc.pmiMo, clr: c.red || COLORS.red },
                ].filter(d => d.val > 0).map((d, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, fontFamily: font }}>
                    <div style={{ width: 8, height: 8, borderRadius: 2, background: d.clr, flexShrink: 0 }} />
                    <span style={{ color: c.gray || COLORS.gray }}>{d.label}</span>
                    <span style={{ marginLeft: "auto", fontWeight: 700, color: c.text || COLORS.navy }}>{fmt2(d.val)}</span>
                  </div>
                ))}
              </div>
            </div>
            <div style={{ textAlign: "center", padding: "8px 0", background: c.blueLight || COLORS.blueLight, borderRadius: 6 }}>
              <span style={{ fontSize: 11, color: c.gray || COLORS.gray, fontFamily: font }}>Monthly Rent: </span>
              <span style={{ fontSize: 14, fontWeight: 700, color: c.blue || COLORS.blue, fontFamily: font }}>{fmt2(parseFloat(monthlyRent) || 0)}</span>
              <span style={{ fontSize: 11, color: c.gray || COLORS.gray, fontFamily: font, marginLeft: 8 }}>Difference: </span>
              <span style={{ fontSize: 14, fontWeight: 700, color: calc.totalBuyMo > (parseFloat(monthlyRent) || 0) ? (c.red || COLORS.red) : (c.green || COLORS.green), fontFamily: font }}>{fmt2(Math.abs(calc.totalBuyMo - (parseFloat(monthlyRent) || 0)))}/mo</span>
            </div>
          </SectionCard>
          <SectionCard title="YEAR-BY-YEAR PROJECTION" accent={c.navy || COLORS.navy}>

    // MODULE 13 — BI-WEEKLY PAYMENT COMPARISON
    // ═══════════════════════════════════════════════════════════════════════
    function BiWeeklyCalculator() {
      const c = useThemeColors();
      const [loanAmt, setLoanAmt] = useLocalStorage("biw_loan", "300000");
      const [rate, setRate] = useLocalStorage("biw_rate", "6.75");
      const [termYrs, setTermYrs] = useLocalStorage("biw_term", "30");
      const [extraMo, setExtraMo] = useLocalStorage("biw_extra", "0");

      const calc = useMemo(() => {
        const L = parseFloat(loanAmt) || 0;
        const r = (parseFloat(rate) || 0) / 100 / 12;
        const n = (parseFloat(termYrs) || 30) * 12;
        const monthlyPmt = r > 0 ? L * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1) : L / n;
        const biWeeklyPmt = monthlyPmt / 2;
        const extra = parseFloat(extraMo) || 0;

        // Standard monthly amortization
        let balStd = L, totalIntStd = 0, moStd = 0;
        while (balStd > 0.01 && moStd < n + 12) {
          const intPmt = balStd * r;
          const prinPmt = Math.min(monthlyPmt - intPmt, balStd);
          totalIntStd += intPmt;
          balStd -= prinPmt;
          moStd++;
        }

        // Bi-weekly amortization (26 payments/year)
        const rBi = (parseFloat(rate) || 0) / 100 / 26;
        let balBi = L, totalIntBi = 0, pmtsBi = 0;
        while (balBi > 0.01 && pmtsBi < n * 3) {
          const intPmt = balBi * rBi;
          const prinPmt = Math.min(biWeeklyPmt - intPmt, balBi);
          totalIntBi += intPmt;
          balBi -= prinPmt;
          pmtsBi++;
        }
        const biYears = pmtsBi / 26;

        // Monthly + extra
        let balExtra = L, totalIntExtra = 0, moExtra = 0;
        while (balExtra > 0.01 && moExtra < n + 12) {
          const intPmt = balExtra * r;
          const prinPmt = Math.min(monthlyPmt + extra - intPmt, balExtra);
          totalIntExtra += intPmt;
          balExtra -= prinPmt;
          moExtra++;
        }

        return {
          monthlyPmt, biWeeklyPmt, L,
          stdMonths: moStd, stdYears: moStd / 12, stdInterest: totalIntStd,
          biMonths: pmtsBi, biYears, biInterest: totalIntBi,
          extraMonths: moExtra, extraYears: moExtra / 12, extraInterest: totalIntExtra,
          biSaved: totalIntStd - totalIntBi, biTimeSaved: moStd / 12 - biYears,
          extraSaved: totalIntStd - totalIntExtra, extraTimeSaved: (moStd - moExtra) / 12,
        };
      }, [loanAmt, rate, termYrs, extraMo]);

      const scenarios = [
        { label: "Standard Monthly", pmt: fmt2(calc.monthlyPmt) + "/mo", years: calc.stdYears.toFixed(1), interest: calc.stdInterest, saved: 0, color: c.navy || COLORS.navy, icon: "📅" },
        { label: "Bi-Weekly", pmt: fmt2(calc.biWeeklyPmt) + " every 2 wks", years: calc.biYears.toFixed(1), interest: calc.biInterest, saved: calc.biSaved, color: c.green || COLORS.green, icon: "⚡" },
        { label: "Monthly + Extra", pmt: fmt2(calc.monthlyPmt + (parseFloat(extraMo) || 0)) + "/mo", years: calc.extraYears.toFixed(1), interest: calc.extraInterest, saved: calc.extraSaved, color: c.blue || COLORS.blue, icon: "💪" },
      ];

      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <SectionCard title="LOAN DETAILS" accent={c.navy || COLORS.navy}>
            <div className="mtk-grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <LabeledInput label="Loan Amount" value={loanAmt} onChange={setLoanAmt} prefix="$" />

    // ═══════════════════════════════════════════════════════════════════════
    // Module 14 — Closing Cost Estimator
    // ═══════════════════════════════════════════════════════════════════════
    function ClosingCostEstimator() {
      const { colors: c } = useThemeColors();
      const [purchPrice, setPurchPrice] = useLocalStorage("cce_price", 400000);
      const [loanAmt, setLoanAmt] = useLocalStorage("cce_loan", 360000);
      const [rate, setRate] = useLocalStorage("cce_rate", 6.75);
      const [propTaxRate, setPropTaxRate] = useLocalStorage("cce_taxrate", 2.1);
      const [homeIns, setHomeIns] = useLocalStorage("cce_ins", 1800);
      const [state, setState] = useLocalStorage("cce_state", "TX");
      const [isRefi, setIsRefi] = useLocalStorage("cce_refi", false);

      const calc = useMemo(() => {
        const p = Number(purchPrice), l = Number(loanAmt), r = Number(rate), tr = Number(propTaxRate), hi = Number(homeIns);
        const ltv = p > 0 ? (l / p) * 100 : 0;
        const origination = l * 0.01;
        const discount = 0;
        const appraisal = 550;
        const creditReport = 65;
        const floodCert = 20;
        const taxService = 85;
        const underwriting = 895;
        const processing = 450;
        const lenderFees = origination + discount + appraisal + creditReport + floodCert + taxService + underwriting + processing;

        const titleSearch = 350;
        const titleIns = p * 0.005;
        const settlement = 650;
        const recording = 150;
        const survey = state === "TX" ? 450 : 0;
        const titleFees = titleSearch + titleIns + settlement + recording + survey;

        const monthlyTax = (p * (tr / 100)) / 12;
        const monthlyIns = hi / 12;
        const escrowTax = monthlyTax * 3;
        const escrowIns = monthlyIns * 3;
        const prepaidInt = (l * (r / 100) / 365) * 15;
        const prepaidIns = hi;
        const prepaidTax = 0;
        const prepaidsEscrow = escrowTax + escrowIns + prepaidInt + prepaidIns + prepaidTax;

        const transferTax = state === "TX" ? 0 : p * 0.002;
        const attFee = 0;
        const pestInspect = state === "TX" ? 150 : 0;
        const govtOther = transferTax + attFee + pestInspect;

        const totalClosing = lenderFees + titleFees + prepaidsEscrow + govtOther;
        const pctOfLoan = l > 0 ? (totalClosing / l) * 100 : 0;
        const cashToClose = isRefi ? totalClosing : (p - l) + totalClosing;

        return { lenderFees, titleFees, prepaidsEscrow, govtOther, totalClosing, pctOfLoan, cashToClose, ltv,
          items: {
            lender: [
              { label: "Origination Fee (1%)", amt: origination },
              { label: "Appraisal", amt: appraisal },
              { label: "Credit Report", amt: creditReport },
              { label: "Flood Certification", amt: floodCert },
              { label: "Tax Service Fee", amt: taxService },
              { label: "Underwriting", amt: underwriting },
              { label: "Processing", amt: processing },
            ],
            title: [
              { label: "Title Search", amt: titleSearch },
              { label: "Owner's Title Insurance", amt: titleIns },
              { label: "Settlement/Closing Fee", amt: settlement },
              { label: "Recording Fees", amt: recording },
              ...(survey > 0 ? [{ label: "Survey", amt: survey }] : []),
            ],
            prepaids: [
              { label: "Prepaid Interest (15 days)", amt: prepaidInt },
              { label: "Homeowner's Insurance (12 mo)", amt: prepaidIns },
              { label: "Property Tax Escrow (3 mo)", amt: escrowTax },
              { label: "Insurance Escrow (3 mo)", amt: escrowIns },
            ],
            govt: [
              ...(transferTax > 0 ? [{ label: "Transfer Tax", amt: transferTax }] : []),
              ...(pestInspect > 0 ? [{ label: "Pest Inspection", amt: pestInspect }] : []),
            ],
          }
        };
      }, [purchPrice, loanAmt, rate, propTaxRate, homeIns, state, isRefi]);

      const feeSection = (title, items, total, color) => (
        <div style={{ marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: c.text || COLORS.navy, fontFamily: font }}>{title}</span>
            <span style={{ fontSize: 13, fontWeight: 700, color, fontFamily: font }}>{fmt(Math.round(total))}</span>
          </div>
          {items.map((it, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "3px 0", borderBottom: `1px solid ${c.border || "#EEF2F6"}` }}>
              <span style={{ fontSize: 12, color: c.textSecondary || COLORS.gray, fontFamily: font }}>{it.label}</span>
              <span style={{ fontSize: 12, fontWeight: 600, color: c.text || COLORS.navy, fontFamily: font }}>{fmt(Math.round(it.amt))}</span>
            </div>
          ))}
        </div>
      );

      const donut = [
        { label: "Lender Fees", value: calc.lenderFees, color: COLORS.blue },
        { label: "Title Fees", value: calc.titleFees, color: COLORS.gold },
        { label: "Prepaids/Escrow", value: calc.prepaidsEscrow, color: COLORS.green },
        { label: "Govt/Other", value: calc.govtOther, color: COLORS.accent },
      ].filter(d => d.value > 0);

      return (
        <div>
          <SectionCard title="Closing Cost Estimator" subtitle="TRID-style itemized breakdown">
            <div className="mtk-grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <LabeledInput label="Purchase Price" value={purchPrice} onChange={setPurchPrice} prefix="$" />
              <LabeledInput label="Loan Amount" value={loanAmt} onChange={setLoanAmt} prefix="$" />
              <LabeledInput label="Interest Rate" value={rate} onChange={setRate} suffix="%" step="0.125" />
              <LabeledInput label="Property Tax Rate" value={propTaxRate} onChange={setPropTaxRate} suffix="%" step="0.1" />
              <LabeledInput label="Annual Home Insurance" value={homeIns} onChange={setHomeIns} prefix="$" />
              <div>
                <div style={{ fontSize: 11, fontWeight: 600, color: c.textSecondary || COLORS.gray, marginBottom: 4, fontFamily: font }}>State</div>
                <Select value={state} onChange={setState} options={[
                  { value: "TX", label: "Texas" }, { value: "CA", label: "California" }, { value: "FL", label: "Florida" },
                  { value: "NY", label: "New York" }, { value: "IL", label: "Illinois" }, { value: "OTHER", label: "Other" },
                ]} />
              </div>
            </div>
            <div style={{ marginTop: 10 }}>
              <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, fontFamily: font, color: c.text || COLORS.navy, cursor: "pointer" }}>
                <input type="checkbox" checked={isRefi} onChange={e => setIsRefi(e.target.checked)} />
                This is a refinance (no down payment in cash-to-close)
              </label>
            </div>
          </SectionCard>

          <div className="mtk-metrics" style={{ display: "flex", gap: 12, flexWrap: "wrap", margin: "12px 0" }}>
            <MetricCard label="Total Closing Costs" value={fmt(Math.round(calc.totalClosing))} color={COLORS.blue} />
            <MetricCard label={isRefi ? "Cash to Close" : "Cash to Close (Down + Costs)"} value={fmt(Math.round(calc.cashToClose))} color={COLORS.green} />
            <MetricCard label="% of Loan" value={calc.pctOfLoan.toFixed(2) + "%"} color={COLORS.gold} />
            <MetricCard label="LTV" value={calc.ltv.toFixed(1) + "%"} color={COLORS.accent} />
          </div>

          <div className="mtk-grid-2" style={{ display: "grid", gridTemplateColumns: "1.5fr 1fr", gap: 16 }}>
            <SectionCard title="Itemized Breakdown">
              {feeSection("Lender / Origination Fees", calc.items.lender, calc.lenderFees, COLORS.blue)}
              {feeSection("Title & Settlement Fees", calc.items.title, calc.titleFees, COLORS.gold)}
              {feeSection("Prepaids & Escrow", calc.items.prepaids, calc.prepaidsEscrow, COLORS.green)}
              {calc.items.govt.length > 0 && feeSection("Government & Other", calc.items.govt, calc.govtOther, COLORS.accent)}
              <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", borderTop: `2px solid ${c.border || COLORS.navy}`, marginTop: 8 }}>
                <span style={{ fontSize: 14, fontWeight: 800, color: c.text || COLORS.navy, fontFamily: font }}>Total Estimated Closing Costs</span>
                <span style={{ fontSize: 14, fontWeight: 800, color: COLORS.blue, fontFamily: font }}>{fmt(Math.round(calc.totalClosing))}</span>
              </div>
            </SectionCard>
            <SectionCard title="Cost Distribution">
              <DonutChart data={donut} size={200} label={fmt(Math.round(calc.totalClosing))} subLabel="Total Costs" />
            </SectionCard>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════
    // Module 15 — Home Equity / HELOC Calculator
    // ═══════════════════════════════════════════════════════════════════════
    function HELOCCalculator() {
      const { colors: c } = useThemeColors();
      const [homeValue, setHomeValue] = useLocalStorage("hel_value", 500000);
      const [mortBal, setMortBal] = useLocalStorage("hel_bal", 300000);
      const [mortRate, setMortRate] = useLocalStorage("hel_mrate", 6.5);
      const [mortPayment, setMortPayment] = useLocalStorage("hel_mpay", 1896);
      const [helocAmt, setHelocAmt] = useLocalStorage("hel_amt", 50000);
      const [helocRate, setHelocRate] = useLocalStorage("hel_hrate", 8.5);
      const [helocTerm, setHelocTerm] = useLocalStorage("hel_term", 10);
      const [maxLTV, setMaxLTV] = useLocalStorage("hel_maxltv", 80);

      const calc = useMemo(() => {
        const hv = Number(homeValue), mb = Number(mortBal), ha = Number(helocAmt), hr = Number(helocRate), ht = Number(helocTerm), ml = Number(maxLTV);
        const equity = hv - mb;
        const equityPct = hv > 0 ? (equity / hv) * 100 : 0;
        const currentLTV = hv > 0 ? (mb / hv) * 100 : 0;
        const maxBorrow = (hv * ml / 100) - mb;
        const cltv = hv > 0 ? ((mb + ha) / hv) * 100 : 0;
        const monthlyRate = hr / 100 / 12;
        const n = ht * 12;
        const helocPayment = monthlyRate > 0 && n > 0 ? ha * monthlyRate / (1 - Math.pow(1 + monthlyRate, -n)) : 0;
        const interestOnly = ha * (hr / 100 / 12);
        const totalInterest = (helocPayment * n) - ha;
        const totalCombinedPayment = Number(mortPayment) + helocPayment;
        return { equity, equityPct, currentLTV, maxBorrow: Math.max(0, maxBorrow), cltv, helocPayment, interestOnly, totalInterest, totalCombinedPayment };
      }, [homeValue, mortBal, helocAmt, helocRate, helocTerm, mortPayment, maxLTV]);

      const eligible = calc.maxBorrow > 0;
      const requestedOk = Number(helocAmt) <= calc.maxBorrow;

      const donut = [
        { label: "Mortgage Balance", value: Number(mortBal), color: COLORS.blue },
        { label: "HELOC Amount", value: Number(helocAmt), color: COLORS.gold },
        { label: "Remaining Equity", value: Math.max(0, Number(homeValue) - Number(mortBal) - Number(helocAmt)), color: COLORS.green },
      ];

      return (
        <div>
          <SectionCard title="Home Equity Position" subtitle="Your current equity and borrowing power">
            <div className="mtk-grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <LabeledInput label="Home Value" value={homeValue} onChange={setHomeValue} prefix="$" />
              <LabeledInput label="Mortgage Balance" value={mortBal} onChange={setMortBal} prefix="$" />
              <LabeledInput label="Current Mortgage Payment" value={mortPayment} onChange={setMortPayment} prefix="$" />
              <LabeledInput label="Current Mortgage Rate" value={mortRate} onChange={setMortRate} suffix="%" step="0.125" />
            </div>
          </SectionCard>

          <div className="mtk-metrics" style={{ display: "flex", gap: 12, flexWrap: "wrap", margin: "12px 0" }}>
            <MetricCard label="Total Equity" value={fmt(Math.round(calc.equity))} color={COLORS.green} />
            <MetricCard label="Equity %" value={calc.equityPct.toFixed(1) + "%"} color={COLORS.blue} />
            <MetricCard label="Current LTV" value={calc.currentLTV.toFixed(1) + "%"} color={COLORS.gold} />
            <MetricCard label={"Max Borrowable (" + maxLTV + "% CLTV)"} value={fmt(Math.round(calc.maxBorrow))} color={eligible ? COLORS.green : COLORS.red} />
          </div>

          <SectionCard title="HELOC / Home Equity Loan" subtitle="Calculate payments on equity borrowing">
            <div className="mtk-grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <LabeledInput label="HELOC Amount" value={helocAmt} onChange={setHelocAmt} prefix="$" />
              <LabeledInput label="HELOC Rate" value={helocRate} onChange={setHelocRate} suffix="%" step="0.25" />
              <LabeledInput label="Repayment Term (years)" value={helocTerm} onChange={setHelocTerm} suffix="yr" />
              <LabeledInput label="Max CLTV Allowed" value={maxLTV} onChange={setMaxLTV} suffix="%" />
            </div>
            {!requestedOk && (
              <div style={{ marginTop: 10, padding: "8px 12px", background: "#FDECEA", borderRadius: 8, fontSize: 12, color: "#C62828", fontFamily: font }}>
                ⚠️ Requested amount exceeds max borrowable at {maxLTV}% CLTV. Maximum available: {fmt(Math.round(calc.maxBorrow))}
              </div>
            )}
          </SectionCard>

          <div className="mtk-grid-2" style={{ display: "grid", gridTemplateColumns: "1.5fr 1fr", gap: 16, marginTop: 12 }}>
            <SectionCard title="Payment Summary">
              <div style={{ display: "grid", gap: 8 }}>
                {[
                  { label: "HELOC Monthly (P&I)", val: fmt(Math.round(calc.helocPayment)), color: COLORS.gold },
                  { label: "HELOC Interest-Only", val: fmt(Math.round(calc.interestOnly)), color: COLORS.accent },
                  { label: "Total HELOC Interest", val: fmt(Math.round(calc.totalInterest)), color: COLORS.red },
                  { label: "Combined Monthly Payment", val: fmt(Math.round(calc.totalCombinedPayment)), color: COLORS.blue },
                  { label: "Combined LTV (CLTV)", val: calc.cltv.toFixed(1) + "%", color: calc.cltv > Number(maxLTV) ? COLORS.red : COLORS.green },
                ].map((r, i) => (
                  <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "8px 12px", background: c.surface || "#F8FAFC", borderRadius: 8 }}>
                    <span style={{ fontSize: 12, color: c.textSecondary || COLORS.gray, fontFamily: font }}>{r.label}</span>
                    <span style={{ fontSize: 13, fontWeight: 700, color: r.color, fontFamily: font }}>{r.val}</span>
                  </div>
                ))}
              </div>
            </SectionCard>
            <SectionCard title="Equity Breakdown">
              <DonutChart data={donut} size={200} label={calc.equityPct.toFixed(0) + "%"} subLabel="Equity" />
            </SectionCard>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════
    // Module 16 — FHA / VA / USDA Loan Comparison
    // ═══════════════════════════════════════════════════════════════════════
    function LoanProgramComparison() {
      const { colors: c } = useThemeColors();
      const [price, setPrice] = useLocalStorage("lpc_price", 350000);
      const [credit, setCredit] = useLocalStorage("lpc_credit", 720);
      const [convRate, setConvRate] = useLocalStorage("lpc_conv", 6.75);
      const [fhaRate, setFhaRate] = useLocalStorage("lpc_fha", 6.25);
      const [vaRate, setVaRate] = useLocalStorage("lpc_va", 6.0);
      const [usdaRate, setUsdaRate] = useLocalStorage("lpc_usda", 6.25);
      const [isVeteran, setIsVeteran] = useLocalStorage("lpc_vet", false);
      const [isRural, setIsRural] = useLocalStorage("lpc_rural", false);
      const [firstUseVA, setFirstUseVA] = useLocalStorage("lpc_vafirst", true);

      const programs = useMemo(() => {
        const p = Number(price), cs = Number(credit);
        const term = 360;

        const calcProgram = (name, downPct, rate, mipUp, mipMo, fundFee) => {
          const down = p * downPct;
          const base = p - down;
          const upfront = base * mipUp;
          const loan = base + upfront;
          const mr = rate / 100 / 12;
          const pmt = mr > 0 ? loan * mr / (1 - Math.pow(1 + mr, -term)) : 0;
          const mi = base * mipMo / 12;
          const totalPmt = pmt + mi;
          const totalCost = totalPmt * term;
          return { name, downPct: downPct * 100, down, loan, rate, pmt, mi, totalPmt, totalCost, upfront, fundFee: upfront, cashNeeded: down, color: "" };
        };

        const conv5 = calcProgram("Conventional 5%", 0.05, Number(convRate), 0, cs >= 740 ? 0.0035 : cs >= 720 ? 0.0045 : 0.006, 0);
        conv5.color = COLORS.blue;

        const conv20 = calcProgram("Conventional 20%", 0.20, Number(convRate), 0, 0, 0);
        conv20.color = COLORS.navy;

        const fha = calcProgram("FHA 3.5%", 0.035, Number(fhaRate), 0.0175, cs >= 580 ? 0.0055 : 0.008, 0);
        fha.color = COLORS.gold;

        const va = calcProgram("VA 0% Down", 0, Number(vaRate), firstUseVA ? 0.023 : 0.036, 0, 0);
        va.color = COLORS.green;

        const usda = calcProgram("USDA 0% Down", 0, Number(usdaRate), 0.01, 0.0035, 0);
        usda.color = COLORS.accent;

        const list = [conv5, conv20, fha];
        if (isVeteran) list.push(va);
        if (isRural) list.push(usda);
        return list;
      }, [price, credit, convRate, fhaRate, vaRate, usdaRate, isVeteran, isRural, firstUseVA]);

      const lowest = programs.reduce((a, b) => a.totalPmt < b.totalPmt ? a : b);

      return (
        <div>
          <SectionCard title="Loan Program Comparison" subtitle="Compare FHA, VA, USDA & Conventional side-by-side">
            <div className="mtk-grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <LabeledInput label="Purchase Price" value={price} onChange={setPrice} prefix="$" />
              <LabeledInput label="Credit Score" value={credit} onChange={setCredit} />
              <LabeledInput label="Conventional Rate" value={convRate} onChange={setConvRate} suffix="%" step="0.125" />
              <LabeledInput label="FHA Rate" value={fhaRate} onChange={setFhaRate} suffix="%" step="0.125" />
              <LabeledInput label="VA Rate" value={vaRate} onChange={setVaRate} suffix="%" step="0.125" />
              <LabeledInput label="USDA Rate" value={usdaRate} onChange={setUsdaRate} suffix="%" step="0.125" />
            </div>
            <div style={{ display: "flex", gap: 20, marginTop: 10, flexWrap: "wrap" }}>
              <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontFamily: font, color: c.text || COLORS.navy, cursor: "pointer" }}>
                <input type="checkbox" checked={isVeteran} onChange={e => setIsVeteran(e.target.checked)} /> Veteran (show VA)
              </label>
              <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontFamily: font, color: c.text || COLORS.navy, cursor: "pointer" }}>
                <input type="checkbox" checked={isRural} onChange={e => setIsRural(e.target.checked)} /> USDA Eligible Area
              </label>
              {isVeteran && (
                <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontFamily: font, color: c.text || COLORS.navy, cursor: "pointer" }}>
                  <input type="checkbox" checked={firstUseVA} onChange={e => setFirstUseVA(e.target.checked)} /> First-time VA use
                </label>
              )}
            </div>
          </SectionCard>

          <div style={{ overflowX: "auto", marginTop: 12 }}>
            <SectionCard title="Program Comparison">
              <table className="mtk-fee-table" style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, fontFamily: font }}>
                <thead>
                  <tr style={{ background: c.surface || "#F1F5F9" }}>
                    <th style={{ textAlign: "left", padding: "8px 10px", color: c.textSecondary || COLORS.gray, fontWeight: 600, borderBottom: `2px solid ${c.border || "#E2E8F0"}` }}>Program</th>
                    <th style={{ textAlign: "right", padding: "8px 10px", color: c.textSecondary || COLORS.gray, fontWeight: 600, borderBottom: `2px solid ${c.border || "#E2E8F0"}` }}>Down</th>
                    <th style={{ textAlign: "right", padding: "8px 10px", color: c.textSecondary || COLORS.gray, fontWeight: 600, borderBottom: `2px solid ${c.border || "#E2E8F0"}` }}>Rate</th>
                    <th style={{ textAlign: "right", padding: "8px 10px", color: c.textSecondary || COLORS.gray, fontWeight: 600, borderBottom: `2px solid ${c.border || "#E2E8F0"}` }}>Loan Amt</th>
                    <th style={{ textAlign: "right", padding: "8px 10px", color: c.textSecondary || COLORS.gray, fontWeight: 600, borderBottom: `2px solid ${c.border || "#E2E8F0"}` }}>P&I</th>
                    <th style={{ textAlign: "right", padding: "8px 10px", color: c.textSecondary || COLORS.gray, fontWeight: 600, borderBottom: `2px solid ${c.border || "#E2E8F0"}` }}>MI</th>
                    <th style={{ textAlign: "right", padding: "8px 10px", color: c.textSecondary || COLORS.gray, fontWeight: 600, borderBottom: `2px solid ${c.border || "#E2E8F0"}` }}>Total Pmt</th>
                  </tr>
                </thead>
                <tbody>
                  {programs.map((pg, i) => (
                    <tr key={i} style={{ background: pg === lowest ? (c.greenLight || COLORS.greenLight) : "transparent" }}>
                      <td style={{ padding: "8px 10px", fontWeight: 700, color: pg.color, borderBottom: `1px solid ${c.border || "#EEF2F6"}` }}>
                        {pg.name} {pg === lowest && "✓"}
                      </td>
                      <td style={{ textAlign: "right", padding: "8px 10px", color: c.text || COLORS.navy, borderBottom: `1px solid ${c.border || "#EEF2F6"}` }}>{fmt(Math.round(pg.down))} ({pg.downPct}%)</td>
                      <td style={{ textAlign: "right", padding: "8px 10px", color: c.text || COLORS.navy, borderBottom: `1px solid ${c.border || "#EEF2F6"}` }}>{pg.rate}%</td>
                      <td style={{ textAlign: "right", padding: "8px 10px", color: c.text || COLORS.navy, borderBottom: `1px solid ${c.border || "#EEF2F6"}` }}>{fmt(Math.round(pg.loan))}</td>
                      <td style={{ textAlign: "right", padding: "8px 10px", fontWeight: 600, color: c.text || COLORS.navy, borderBottom: `1px solid ${c.border || "#EEF2F6"}` }}>{fmt(Math.round(pg.pmt))}</td>
                      <td style={{ textAlign: "right", padding: "8px 10px", color: pg.mi > 0 ? COLORS.red : COLORS.green, borderBottom: `1px solid ${c.border || "#EEF2F6"}` }}>{pg.mi > 0 ? fmt(Math.round(pg.mi)) : "—"}</td>
                      <td style={{ textAlign: "right", padding: "8px 10px", fontWeight: 700, color: pg.color, borderBottom: `1px solid ${c.border || "#EEF2F6"}` }}>{fmt(Math.round(pg.totalPmt))}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              {programs.length > 1 && (
                <div style={{ marginTop: 12, padding: "8px 12px", background: c.greenLight || COLORS.greenLight, borderRadius: 8, fontSize: 12, color: COLORS.green, fontFamily: font }}>
                  ✓ <strong>{lowest.name}</strong> has the lowest monthly payment at {fmt(Math.round(lowest.totalPmt))}/mo
                </div>
              )}
            </SectionCard>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════
    // Module 17 — Monthly Budget Planner
    // ═══════════════════════════════════════════════════════════════════════
    function BudgetPlanner() {
      const { colors: c } = useThemeColors();
      const [income, setIncome] = useLocalStorage("bud_income", 8500);
      const [mortgagePmt, setMortgagePmt] = useLocalStorage("bud_mort", 2400);
      const [propTax, setPropTax] = useLocalStorage("bud_tax", 700);
      const [homeIns, setHomeIns] = useLocalStorage("bud_ins", 150);
      const [hoa, setHoa] = useLocalStorage("bud_hoa", 0);
      const [utilities, setUtilities] = useLocalStorage("bud_util", 350);
      const [carPayment, setCarPayment] = useLocalStorage("bud_car", 450);
      const [carIns, setCarIns] = useLocalStorage("bud_carins", 150);
      const [groceries, setGroceries] = useLocalStorage("bud_groc", 600);
      const [childcare, setChildcare] = useLocalStorage("bud_child", 0);
      const [studentLoan, setStudentLoan] = useLocalStorage("bud_student", 0);
      const [creditCards, setCreditCards] = useLocalStorage("bud_cc", 200);
      const [subscriptions, setSubscriptions] = useLocalStorage("bud_subs", 120);
      const [entertainment, setEntertainment] = useLocalStorage("bud_ent", 200);
      const [savings, setSavings] = useLocalStorage("bud_save", 500);
      const [other, setOther] = useLocalStorage("bud_other", 100);

      const calc = useMemo(() => {
        const inc = Number(income);
        const housing = Number(mortgagePmt) + Number(propTax) + Number(homeIns) + Number(hoa) + Number(utilities);
        const transport = Number(carPayment) + Number(carIns);
        const living = Number(groceries) + Number(childcare) + Number(entertainment) + Number(subscriptions);
        const debt = Number(studentLoan) + Number(creditCards);
        const save = Number(savings);
        const oth = Number(other);
        const totalExp = housing + transport + living + debt + save + oth;
        const remaining = inc - totalExp;
        const housingPct = inc > 0 ? (housing / inc) * 100 : 0;
        const dtiPct = inc > 0 ? ((Number(mortgagePmt) + Number(propTax) + Number(homeIns) + Number(hoa) + Number(carPayment) + Number(studentLoan) + Number(creditCards)) / inc) * 100 : 0;
        return { housing, transport, living, debt, save, oth, totalExp, remaining, housingPct, dtiPct };
      }, [income, mortgagePmt, propTax, homeIns, hoa, utilities, carPayment, carIns, groceries, childcare, studentLoan, creditCards, subscriptions, entertainment, savings, other]);

      const donut = [
        { label: "Housing", value: calc.housing, color: COLORS.blue },
        { label: "Transportation", value: calc.transport, color: COLORS.gold },
        { label: "Living", value: calc.living, color: COLORS.green },
        { label: "Debt", value: calc.debt, color: COLORS.red },
        { label: "Savings", value: calc.save, color: COLORS.accent },
        { label: "Other", value: calc.oth, color: "#8E99A4" },
      ].filter(d => d.value > 0);

      const inputRow = (label, value, onChange) => (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "4px 0" }}>
          <span style={{ fontSize: 12, color: c.textSecondary || COLORS.gray, fontFamily: font }}>{label}</span>
          <div style={{ width: 120 }}><LabeledInput value={value} onChange={onChange} prefix="$" /></div>
        </div>
      );

      return (
        <div>
          <SectionCard title="Monthly Income">
            <LabeledInput label="Total Monthly Income (after tax)" value={income} onChange={setIncome} prefix="$" />
          </SectionCard>

          <div className="mtk-metrics" style={{ display: "flex", gap: 12, flexWrap: "wrap", margin: "12px 0" }}>
            <MetricCard label="Total Expenses" value={fmt(Math.round(calc.totalExp))} color={COLORS.blue} />
            <MetricCard label="Remaining" value={fmt(Math.round(calc.remaining))} color={calc.remaining >= 0 ? COLORS.green : COLORS.red} />
            <MetricCard label="Housing Ratio" value={calc.housingPct.toFixed(1) + "%"} color={calc.housingPct > 35 ? COLORS.red : COLORS.green} />
            <MetricCard label="DTI Ratio" value={calc.dtiPct.toFixed(1) + "%"} color={calc.dtiPct > 43 ? COLORS.red : calc.dtiPct > 36 ? COLORS.gold : COLORS.green} />
          </div>

          <div className="mtk-grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            <div>
              <SectionCard title="🏠 Housing" subtitle={fmt(Math.round(calc.housing)) + "/mo"}>
                {inputRow("Mortgage P&I", mortgagePmt, setMortgagePmt)}
                {inputRow("Property Tax", propTax, setPropTax)}
                {inputRow("Home Insurance", homeIns, setHomeIns)}
                {inputRow("HOA", hoa, setHoa)}
                {inputRow("Utilities", utilities, setUtilities)}
              </SectionCard>
              <SectionCard title="🚗 Transportation" subtitle={fmt(Math.round(calc.transport)) + "/mo"} style={{ marginTop: 12 }}>
                {inputRow("Car Payment", carPayment, setCarPayment)}
                {inputRow("Auto Insurance", carIns, setCarIns)}
              </SectionCard>
            </div>
            <div>
              <SectionCard title="🛒 Living Expenses" subtitle={fmt(Math.round(calc.living)) + "/mo"}>
                {inputRow("Groceries", groceries, setGroceries)}
                {inputRow("Childcare", childcare, setChildcare)}
                {inputRow("Entertainment", entertainment, setEntertainment)}
                {inputRow("Subscriptions", subscriptions, setSubscriptions)}
              </SectionCard>
              <SectionCard title="💳 Debt & Savings" subtitle={fmt(Math.round(calc.debt + calc.save + calc.oth)) + "/mo"} style={{ marginTop: 12 }}>
                {inputRow("Student Loans", studentLoan, setStudentLoan)}
                {inputRow("Credit Cards", creditCards, setCreditCards)}
                {inputRow("Savings/Invest", savings, setSavings)}
                {inputRow("Other", other, setOther)}
              </SectionCard>
            </div>
          </div>

          <SectionCard title="Budget Breakdown" style={{ marginTop: 12 }}>
            <div style={{ display: "flex", justifyContent: "center" }}>
              <DonutChart data={donut} size={220} label={fmt(Math.round(calc.totalExp))} subLabel="Monthly" />
            </div>
            {calc.remaining < 0 && (
              <div style={{ marginTop: 12, padding: "10px 14px", background: "#FDECEA", borderRadius: 8, fontSize: 12, color: "#C62828", fontFamily: font, textAlign: "center" }}>
                ⚠️ You're <strong>{fmt(Math.abs(Math.round(calc.remaining)))}</strong> over budget. Consider reducing expenses or increasing income.
              </div>
            )}
          </SectionCard>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════
    // Module 18 — Open House Lead Capture
    // ═══════════════════════════════════════════════════════════════════════
    function OpenHouseLeadCapture() {
      const { colors: c } = useThemeColors();
      const [leads, setLeads] = useLocalStorage("ohlc_leads", []);
      const [propertyAddr, setPropertyAddr] = useLocalStorage("ohlc_addr", "");
      const [openDate, setOpenDate] = useLocalStorage("ohlc_date", new Date().toISOString().split("T")[0]);
      const [newLead, setNewLead] = useState({ name: "", email: "", phone: "", agent: "", preapproved: false, timeframe: "3-6 months", notes: "" });

      const addLead = () => {
        if (!newLead.name.trim()) return;
        const lead = { ...newLead, id: Date.now(), timestamp: new Date().toLocaleString(), property: propertyAddr, date: openDate };
        setLeads([lead, ...leads]);
        setNewLead({ name: "", email: "", phone: "", agent: "", preapproved: false, timeframe: "3-6 months", notes: "" });
      };

      const deleteLead = (id) => setLeads(leads.filter(l => l.id !== id));

      const exportCSV = () => {
        if (leads.length === 0) return;
        const headers = ["Name","Email","Phone","Agent","Pre-Approved","Timeframe","Notes","Property","Date","Timestamp"];
        const rows = leads.map(l => [l.name, l.email, l.phone, l.agent, l.preapproved ? "Yes" : "No", l.timeframe, l.notes, l.property, l.date, l.timestamp]);
        const csv = [headers, ...rows].map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(",")).join("\n");
        const blob = new Blob([csv], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = url; a.download = `open-house-leads-${openDate}.csv`; a.click();
        URL.revokeObjectURL(url);
      };

      const inp = (label, field, type = "text") => (
        <div>
          <div style={{ fontSize: 11, fontWeight: 600, color: c.textSecondary || COLORS.gray, marginBottom: 4, fontFamily: font }}>{label}</div>
          <input type={type} value={newLead[field]} onChange={e => setNewLead({ ...newLead, [field]: e.target.value })}
            style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: `1px solid ${c.border || "#D8E2EA"}`, background: c.surface || "#fff", color: c.text || COLORS.navy, fontFamily: font, fontSize: 13, outline: "none" }}
          />
        </div>
      );

      return (
        <div>
          <SectionCard title="Open House Details">
            <div className="mtk-grid-2" style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 12 }}>
              <div>
                <div style={{ fontSize: 11, fontWeight: 600, color: c.textSecondary || COLORS.gray, marginBottom: 4, fontFamily: font }}>Property Address</div>
                <input type="text" value={propertyAddr} onChange={e => setPropertyAddr(e.target.value)} placeholder="123 Main St, Frisco, TX 75034"
                  style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: `1px solid ${c.border || "#D8E2EA"}`, background: c.surface || "#fff", color: c.text || COLORS.navy, fontFamily: font, fontSize: 13, outline: "none" }}
                />
              </div>
              <div>
                <div style={{ fontSize: 11, fontWeight: 600, color: c.textSecondary || COLORS.gray, marginBottom: 4, fontFamily: font }}>Date</div>
                <input type="date" value={openDate} onChange={e => setOpenDate(e.target.value)}
                  style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: `1px solid ${c.border || "#D8E2EA"}`, background: c.surface || "#fff", color: c.text || COLORS.navy, fontFamily: font, fontSize: 13, outline: "none" }}
                />
              </div>
            </div>
          </SectionCard>

          <SectionCard title="Add Lead" subtitle={"Total: " + leads.length + " leads captured"} style={{ marginTop: 12 }}>
            <div className="mtk-grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              {inp("Full Name *", "name")}
              {inp("Email", "email", "email")}
              {inp("Phone", "phone", "tel")}
              {inp("Their Agent", "agent")}
              <div>
                <div style={{ fontSize: 11, fontWeight: 600, color: c.textSecondary || COLORS.gray, marginBottom: 4, fontFamily: font }}>Timeframe</div>
                <Select value={newLead.timeframe} onChange={v => setNewLead({ ...newLead, timeframe: v })} options={[
                  { value: "Immediately", label: "Immediately" },
                  { value: "1-3 months", label: "1-3 months" },
                  { value: "3-6 months", label: "3-6 months" },
                  { value: "6-12 months", label: "6-12 months" },
                  { value: "Just looking", label: "Just looking" },
                ]} />
              </div>
              <div>
                <div style={{ fontSize: 11, fontWeight: 600, color: c.textSecondary || COLORS.gray, marginBottom: 4, fontFamily: font }}>&nbsp;</div>
                <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, fontFamily: font, color: c.text || COLORS.navy, cursor: "pointer", height: 38 }}>
                  <input type="checkbox" checked={newLead.preapproved} onChange={e => setNewLead({ ...newLead, preapproved: e.target.checked })} /> Pre-Approved
                </label>
              </div>
            </div>
            <div style={{ marginTop: 8 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: c.textSecondary || COLORS.gray, marginBottom: 4, fontFamily: font }}>Notes</div>
              <textarea value={newLead.notes} onChange={e => setNewLead({ ...newLead, notes: e.target.value })} rows={2} placeholder="Interested in 4bed/3bath, budget ~$400k..."
                style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: `1px solid ${c.border || "#D8E2EA"}`, background: c.surface || "#fff", color: c.text || COLORS.navy, fontFamily: font, fontSize: 13, outline: "none", resize: "vertical" }}
              />
            </div>
            <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
              <Button onClick={addLead}>✚ Add Lead</Button>
              {leads.length > 0 && <Button onClick={exportCSV} style={{ background: COLORS.green }}>📥 Export CSV</Button>}
              {leads.length > 0 && <Button onClick={() => setLeads([])} style={{ background: COLORS.red }}>🗑 Clear All</Button>}
            </div>
          </SectionCard>

          {leads.length > 0 && (
            <SectionCard title={"Captured Leads (" + leads.length + ")"} style={{ marginTop: 12 }}>
              <div style={{ overflowX: "auto" }}>
                <table className="mtk-fee-table" style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, fontFamily: font }}>
                  <thead>
                    <tr style={{ background: c.surface || "#F1F5F9" }}>
                      {["Name","Email","Phone","Timeframe","Pre-Apprvd","Notes",""].map((h, i) => (
                        <th key={i} style={{ textAlign: "left", padding: "6px 8px", color: c.textSecondary || COLORS.gray, fontWeight: 600, borderBottom: `2px solid ${c.border || "#E2E8F0"}`, whiteSpace: "nowrap" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {leads.map((l, i) => (
                      <tr key={l.id}>
                        <td style={{ padding: "6px 8px", fontWeight: 600, color: c.text || COLORS.navy, borderBottom: `1px solid ${c.border || "#EEF2F6"}` }}>{l.name}</td>
                        <td style={{ padding: "6px 8px", color: COLORS.blue, borderBottom: `1px solid ${c.border || "#EEF2F6"}` }}>{l.email || "—"}</td>
                        <td style={{ padding: "6px 8px", color: c.text || COLORS.navy, borderBottom: `1px solid ${c.border || "#EEF2F6"}` }}>{l.phone || "—"}</td>
                        <td style={{ padding: "6px 8px", color: c.text || COLORS.navy, borderBottom: `1px solid ${c.border || "#EEF2F6"}` }}>{l.timeframe}</td>
                        <td style={{ padding: "6px 8px", color: l.preapproved ? COLORS.green : COLORS.gray, borderBottom: `1px solid ${c.border || "#EEF2F6"}` }}>{l.preapproved ? "✓ Yes" : "No"}</td>
                        <td style={{ padding: "6px 8px", color: c.textSecondary || COLORS.gray, borderBottom: `1px solid ${c.border || "#EEF2F6"}`, maxWidth: 160, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{l.notes || "—"}</td>
                        <td style={{ padding: "6px 8px", borderBottom: `1px solid ${c.border || "#EEF2F6"}` }}>
                          <button onClick={() => deleteLead(l.id)} style={{ background: "none", border: "none", color: COLORS.red, cursor: "pointer", fontSize: 14 }}>✕</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </SectionCard>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════
    // Module 19 — Rate Watch Dashboard
    // ═══════════════════════════════════════════════════════════════════════
    function RateWatchDashboard() {
      const { colors: c } = useThemeColors();
      const [conv30, setConv30] = useLocalStorage("rw_conv30", 6.75);
      const [conv15, setConv15] = useLocalStorage("rw_conv15", 6.0);
      const [fha30, setFha30] = useLocalStorage("rw_fha30", 6.25);
      const [va30, setVa30] = useLocalStorage("rw_va30", 6.0);
      const [jumbo30, setJumbo30] = useLocalStorage("rw_jumbo30", 7.0);
      const [usda30, setUsda30] = useLocalStorage("rw_usda30", 6.25);
      const [asOf, setAsOf] = useLocalStorage("rw_date", new Date().toISOString().split("T")[0]);
      const [history, setHistory] = useLocalStorage("rw_history", []);

      const saveSnapshot = () => {
        const snap = { date: asOf, conv30: Number(conv30), conv15: Number(conv15), fha30: Number(fha30), va30: Number(va30), jumbo30: Number(jumbo30), usda30: Number(usda30) };
        const existing = history.filter(h => h.date !== asOf);
        const updated = [...existing, snap].sort((a, b) => a.date.localeCompare(b.date)).slice(-30);
        setHistory(updated);
      };

      const rates = [
        { label: "Conv 30yr", value: conv30, set: setConv30, color: COLORS.blue },
        { label: "Conv 15yr", value: conv15, set: setConv15, color: COLORS.navy },
        { label: "FHA 30yr", value: fha30, set: setFha30, color: COLORS.gold },
        { label: "VA 30yr", value: va30, set: setVa30, color: COLORS.green },
        { label: "Jumbo 30yr", value: jumbo30, set: setJumbo30, color: COLORS.accent },
        { label: "USDA 30yr", value: usda30, set: setUsda30, color: "#8E99A4" },
      ];

      // Simple sparkline for rate history
      const Sparkline = ({ field, color }) => {
        if (history.length < 2) return null;
        const vals = history.map(h => h[field]).filter(v => v != null);
        if (vals.length < 2) return null;
        const min = Math.min(...vals), max = Math.max(...vals);
        const range = max - min || 0.1;
        const w = 100, h2 = 30;
        const pts = vals.map((v, i) => `${(i / (vals.length - 1)) * w},${h2 - ((v - min) / range) * h2}`).join(" ");
        return (
          <svg width={w} height={h2} style={{ display: "block" }}>
            <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" />
          </svg>
        );
      };

      const lastSnap = history.length > 1 ? history[history.length - 2] : null;

      return (
        <div>
          <SectionCard title="Rate Watch Dashboard" subtitle="Track and snapshot today's mortgage rates">
            <div style={{ display: "flex", gap: 10, alignItems: "flex-end", marginBottom: 16 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: c.textSecondary || COLORS.gray, marginBottom: 4, fontFamily: font }}>As Of Date</div>
                <input type="date" value={asOf} onChange={e => setAsOf(e.target.value)}
                  style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: `1px solid ${c.border || "#D8E2EA"}`, background: c.surface || "#fff", color: c.text || COLORS.navy, fontFamily: font, fontSize: 13, outline: "none" }}
                />
              </div>
              <Button onClick={saveSnapshot}>📌 Save Snapshot</Button>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }} className="mtk-grid-3">
              {rates.map((r, i) => {
                const prev = lastSnap ? lastSnap[Object.keys(lastSnap).find(k => k !== "date" && rates.findIndex(rt => "rw_" + Object.keys({ conv30, conv15, fha30, va30, jumbo30, usda30 }).find(kk => eval(kk) === r.value) === k.replace("rw_","")) >= 0)] : null;
                const field = ["conv30","conv15","fha30","va30","jumbo30","usda30"][i];
                const prevVal = lastSnap ? lastSnap[field] : null;
                const diff = prevVal != null ? Number(r.value) - prevVal : null;
                return (
                  <div key={i} style={{ background: c.surface || "#F8FAFC", borderRadius: 10, padding: 14, border: `1px solid ${c.border || "#EEF2F6"}` }}>
                    <div style={{ fontSize: 11, fontWeight: 600, color: c.textSecondary || COLORS.gray, fontFamily: font, marginBottom: 4 }}>{r.label}</div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <input type="number" step="0.125" value={r.value} onChange={e => r.set(Number(e.target.value))}
                        style={{ width: 80, padding: "6px 8px", borderRadius: 6, border: `1px solid ${c.border || "#D8E2EA"}`, background: c.bg || "#fff", color: r.color, fontFamily: font, fontSize: 16, fontWeight: 800, outline: "none", textAlign: "center" }}
                      />
                      <span style={{ fontSize: 14, color: r.color, fontWeight: 700 }}>%</span>
                      {diff !== null && (
                        <span style={{ fontSize: 11, fontWeight: 600, color: diff > 0 ? COLORS.red : diff < 0 ? COLORS.green : COLORS.gray }}>
                          {diff > 0 ? "▲" : diff < 0 ? "▼" : "—"} {diff !== 0 ? Math.abs(diff).toFixed(3) : ""}
                        </span>
                      )}
                    </div>
                    <div style={{ marginTop: 6 }}>
                      <Sparkline field={field} color={r.color} />
                    </div>
                  </div>
                );
              })}
            </div>
          </SectionCard>

          {history.length > 0 && (
            <SectionCard title={"Rate History (" + history.length + " snapshots)"} style={{ marginTop: 12 }}>
              <div style={{ overflowX: "auto" }}>
                <table className="mtk-fee-table" style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, fontFamily: font }}>
                  <thead>
                    <tr style={{ background: c.surface || "#F1F5F9" }}>
                      {["Date","Conv 30","Conv 15","FHA 30","VA 30","Jumbo 30","USDA 30"].map((h, i) => (
                        <th key={i} style={{ textAlign: i === 0 ? "left" : "center", padding: "6px 8px", color: c.textSecondary || COLORS.gray, fontWeight: 600, borderBottom: `2px solid ${c.border || "#E2E8F0"}` }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {[...history].reverse().map((h, i) => (
                      <tr key={i}>
                        <td style={{ padding: "6px 8px", fontWeight: 600, color: c.text || COLORS.navy, borderBottom: `1px solid ${c.border || "#EEF2F6"}` }}>{h.date}</td>
                        {["conv30","conv15","fha30","va30","jumbo30","usda30"].map((f, j) => (
                          <td key={j} style={{ textAlign: "center", padding: "6px 8px", color: rates[j].color, fontWeight: 600, borderBottom: `1px solid ${c.border || "#EEF2F6"}` }}>{h[f]}%</td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div style={{ marginTop: 8, textAlign: "right" }}>
                <Button onClick={() => setHistory([])} style={{ background: COLORS.red, fontSize: 11, padding: "4px 12px" }}>Clear History</Button>
              </div>
            </SectionCard>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════
    // Module 20 — Flyer / Co-Marketing Generator
    // ═══════════════════════════════════════════════════════════════════════
    function FlyerGenerator() {
      const { colors: c } = useThemeColors();
      const [propAddr, setPropAddr] = useLocalStorage("fly_addr", "123 Main Street, Dallas, TX 75201");
      const [propPrice, setPropPrice] = useLocalStorage("fly_price", 425000);
      const [beds, setBeds] = useLocalStorage("fly_beds", 4);
      const [baths, setBaths] = useLocalStorage("fly_baths", 3);
      const [sqft, setSqft] = useLocalStorage("fly_sqft", 2400);
      const [rate, setRate] = useLocalStorage("fly_rate", 6.5);
      const [downPct, setDownPct] = useLocalStorage("fly_down", 5);
      const [agentName, setAgentName] = useLocalStorage("fly_agent", "");
      const [agentPhone, setAgentPhone] = useLocalStorage("fly_agentph", "");
      const [agentEmail, setAgentEmail] = useLocalStorage("fly_agentem", "");
      const [agentCompany, setAgentCompany] = useLocalStorage("fly_agentco", "");
      const [loName] = useLocalStorage("brand_sub", "MORTGAGE MARK · CMG HOME LOANS · NMLS #729612");
      const [headline, setHeadline] = useLocalStorage("fly_headline", "Your Dream Home Awaits!");
      const [brandColor] = useLocalStorage("brand_color", COLORS.navy);

      const calc = useMemo(() => {
        const p = Number(propPrice), r = Number(rate) / 100 / 12, dp = Number(downPct) / 100;
        const loan = p * (1 - dp);
        const n = 360;
        const pmt = r > 0 ? loan * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1) : loan / n;
        return { loan, downPayment: p * dp, payment: pmt };
      }, [propPrice, rate, downPct]);

      const printFlyer = () => {
        const w = window.open("", "_blank");
        w.document.write(`<!DOCTYPE html><html><head><style>
          @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
          * { margin: 0; padding: 0; box-sizing: border-box; }
          body { font-family: 'DM Sans', sans-serif; }
          .flyer { width: 8.5in; min-height: 11in; padding: 0.5in; }
          .header { background: ${brandColor}; color: white; padding: 28px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
          .header h1 { font-size: 28px; margin-bottom: 4px; }
          .header h2 { font-size: 16px; font-weight: 400; opacity: 0.9; }
          .details { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
          .detail-box { background: #F5F8FA; padding: 16px; border-radius: 10px; text-align: center; }
          .detail-box .value { font-size: 22px; font-weight: 700; color: ${brandColor}; }
          .detail-box .label { font-size: 12px; color: #6B7C93; margin-top: 2px; }
          .payment-box { background: ${brandColor}11; border: 2px solid ${brandColor}33; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
          .payment-box .big { font-size: 36px; font-weight: 700; color: ${brandColor}; }
          .payment-box .sub { font-size: 13px; color: #6B7C93; }
          .footer { display: flex; justify-content: space-between; border-top: 2px solid #E8ECF0; padding-top: 16px; margin-top: 20px; }
          .contact { font-size: 13px; line-height: 1.6; }
          .contact strong { color: ${brandColor}; }
          @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes scaleIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .mtk-fade-in { animation: fadeSlideIn 0.3s ease-out both; }
      .mtk-scale-in { animation: scaleIn 0.25s ease-out both; }
      @media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
        </style></head><body>
        <div class="flyer">
          <div class="header"><h1>${headline}</h1><h2>${propAddr}</h2></div>
          <div class="details">
            <div class="detail-box"><div class="value">${beds}</div><div class="label">Bedrooms</div></div>
            <div class="detail-box"><div class="value">${baths}</div><div class="label">Bathrooms</div></div>
            <div class="detail-box"><div class="value">${Number(sqft).toLocaleString()}</div><div class="label">Sq Ft</div></div>
          </div>
          <div class="payment-box">
            <div class="sub">Listed at</div>
            <div class="big">$${Number(propPrice).toLocaleString()}</div>
          </div>
          <div class="details">
            <div class="detail-box"><div class="value">$${Math.round(calc.payment).toLocaleString()}/mo</div><div class="label">Est. Payment*</div></div>
            <div class="detail-box"><div class="value">${downPct}% Down</div><div class="label">$${Math.round(calc.downPayment).toLocaleString()}</div></div>
            <div class="detail-box"><div class="value">${rate}%</div><div class="label">Today's Rate</div></div>
          </div>
          <div style="font-size:10px;color:#999;text-align:center;margin:12px 0;">*Estimated P&I only. Does not include taxes, insurance, or MI. Rates subject to change.</div>
          <div class="footer">
            <div class="contact"><strong>Your Realtor</strong><br/>${agentName || "Agent Name"}<br/>${agentPhone || "Phone"}<br/>${agentEmail || "Email"}<br/>${agentCompany || "Company"}</div>
            <div class="contact" style="text-align:right;"><strong>Your Lender</strong><br/>${loName}<br/>mymortgagemark@gmail.com</div>
          </div>
        </div></body></html>`);
        w.document.close();
        setTimeout(() => w.print(), 300);
      };

      return (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, maxWidth: 900, margin: "0 auto" }}>
          <SectionCard title="Property Details" c={c}>
            <LabeledInput label="Property Address" value={propAddr} onChange={setPropAddr} c={c} />
            <LabeledInput label="List Price ($)" value={propPrice} onChange={setPropPrice} type="number" c={c} />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
              <LabeledInput label="Beds" value={beds} onChange={setBeds} type="number" c={c} />
              <LabeledInput label="Baths" value={baths} onChange={setBaths} type="number" c={c} />
              <LabeledInput label="Sq Ft" value={sqft} onChange={setSqft} type="number" c={c} />
            </div>
            <LabeledInput label="Headline" value={headline} onChange={setHeadline} c={c} />
          </SectionCard>

          <SectionCard title="Loan Details" c={c}>
            <LabeledInput label="Rate (%)" value={rate} onChange={setRate} type="number" step="0.125" c={c} />
            <LabeledInput label="Down Payment (%)" value={downPct} onChange={setDownPct} type="number" c={c} />
            <div style={{ marginTop: 12, padding: 14, background: c.bg, borderRadius: 10, textAlign: "center", fontFamily: font }}>
              <div style={{ fontSize: 12, color: c.muted }}>Estimated Payment</div>
              <div style={{ fontSize: 28, fontWeight: 700, color: c.navy }}>{fmt(Math.round(calc.payment))}/mo</div>
            </div>
          </SectionCard>

          <SectionCard title="Realtor Info (Co-Marketing)" c={c}>
            <LabeledInput label="Agent Name" value={agentName} onChange={setAgentName} c={c} />
            <LabeledInput label="Agent Phone" value={agentPhone} onChange={setAgentPhone} c={c} />
            <LabeledInput label="Agent Email" value={agentEmail} onChange={setAgentEmail} c={c} />
            <LabeledInput label="Company/Brokerage" value={agentCompany} onChange={setAgentCompany} c={c} />
          </SectionCard>

          <SectionCard title="Preview & Print" c={c}>
            <div style={{ padding: 16, background: c.bg, borderRadius: 10, textAlign: "center", fontFamily: font }}>
              <div style={{ fontSize: 18, fontWeight: 700, color: c.navy, marginBottom: 4 }}>{headline}</div>
              <div style={{ fontSize: 13, color: c.muted, marginBottom: 12 }}>{propAddr}</div>
              <div style={{ display: "flex", justifyContent: "center", gap: 16, marginBottom: 12 }}>
                <span style={{ fontSize: 13, color: c.text }}>{beds} bd</span>
                <span style={{ fontSize: 13, color: c.text }}>{baths} ba</span>
                <span style={{ fontSize: 13, color: c.text }}>{Number(sqft).toLocaleString()} sqft</span>
              </div>
              <div style={{ fontSize: 24, fontWeight: 700, color: c.navy }}>{fmt(Number(propPrice))}</div>
              <div style={{ fontSize: 14, color: c.green, fontWeight: 600, marginTop: 4 }}>{fmt(Math.round(calc.payment))}/mo est.</div>
            </div>
            <Button onClick={printFlyer} c={c}>🖨️ Print Co-Marketing Flyer</Button>
          </SectionCard>
        </div>
      );
    }
    // ═══════════════════════════════════════════════════════════════════════
    // Module 14 — Settings Panel (Branding, Scenarios, Tab Sharing)
    // ═══════════════════════════════════════════════════════════════════════
    function SettingsPanel({ open, onClose, darkMode, allModules }) {
      const { colors: c } = useThemeColors();
      const [brandName, setBrandName] = useLocalStorage("brand_name", "Mortgage Toolkit");
      const [brandSub, setBrandSub] = useLocalStorage("brand_sub", "MORTGAGE MARK · CMG HOME LOANS · NMLS #729612");
      const [brandLogo, setBrandLogo] = useLocalStorage("brand_logo", "");
      const [brandColor, setBrandColor] = useLocalStorage("brand_color", COLORS.navy);
      const [scenarios, setScenarios] = useLocalStorage("app_scenarios", []);
      const [newScenName, setNewScenName] = useState("");
      const [sharedTabs, setSharedTabs] = useLocalStorage("shared_tabs", []);
      const [shareMode, setShareMode] = useLocalStorage("share_mode", "all");
      const [settingsTab, setSettingsTab] = useState("branding");
      const [portalModule, setPortalModule] = useState(allModules[0]?.id || "payment");
      const [portalClient, setPortalClient] = useState("");
      const portalLink = useMemo(() => {
        const base = window.location.href.split("?")[0];
        const params = new URLSearchParams({ tabs: portalModule });
        if (portalClient) params.set("client", portalClient);
        return base + "?" + params.toString();
      }, [portalModule, portalClient]);

      const saveScenario = () => {
        if (!newScenName.trim()) return;
        const data = {};
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k.startsWith("mtk_") && !k.startsWith("mtk_brand_") && !k.startsWith("mtk_app_scenarios") && !k.startsWith("mtk_shared_tabs") && !k.startsWith("mtk_share_mode")) {
            data[k] = localStorage.getItem(k);
          }
        }
        const s = { name: newScenName.trim(), date: new Date().toLocaleDateString(), data };
        setScenarios([...scenarios, s]);
        setNewScenName("");
      };

      const loadScenario = (idx) => {
        const s = scenarios[idx];
        if (!s) return;
        Object.entries(s.data).forEach(([k, v]) => localStorage.setItem(k, v));
        window.location.reload();
      };

      const deleteScenario = (idx) => {
        setScenarios(scenarios.filter((_, i) => i !== idx));
      };

      const generateShareLink = () => {
        const ids = shareMode === "all" ? allModules.map(m => m.id) : sharedTabs;
        const param = encodeURIComponent(ids.join(","));
        const base = window.location.href.split("?")[0].split("#")[0];
        return `${base}?tabs=${param}`;
      };

      const copyShareLink = () => {
        navigator.clipboard.writeText(generateShareLink());
      };

      const toggleSharedTab = (id) => {
        setSharedTabs(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
      };

      if (!open) return null;
      const bg = darkMode ? "#1A2530" : "#fff";
      const fg = darkMode ? "#E0E8EF" : "#333";
      const border = darkMode ? "#2A3A48" : "#E8ECF0";
      const inputBg = darkMode ? "#0E1C28" : "#F5F8FA";

      const tabStyle = (active) => ({
        padding: "8px 16px", borderRadius: 6, border: "none", cursor: "pointer",
        fontSize: 12, fontWeight: 600, fontFamily: font,
        background: active ? (darkMode ? COLORS.blue : COLORS.navy) : "transparent",
        color: active ? "#fff" : (darkMode ? "#8A9BAA" : "#666"),
      });

      const inputStyle = { width: "100%", padding: "8px 12px", borderRadius: 6, border: `1px solid ${border}`, background: inputBg, color: fg, fontSize: 13, fontFamily: font };

      return (
        <>
          <div className="mtk-settings-overlay" onClick={onClose} />
          <div className={`mtk-settings-panel${darkMode ? " dark" : ""}`} style={{ background: bg, color: fg }}>
            <div style={{ padding: "20px 24px", borderBottom: `1px solid ${border}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ fontSize: 18, fontWeight: 700, fontFamily: font }}>⚙️ Settings</div>
                <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: fg, padding: 4 }}>✕</button>
              </div>
              <div style={{ display: "flex", gap: 4, marginTop: 12 }}>
                <button onClick={() => setSettingsTab("branding")} style={tabStyle(settingsTab === "branding")}>Branding</button>
                <button onClick={() => setSettingsTab("scenarios")} style={tabStyle(settingsTab === "scenarios")}>Scenarios</button>
                <button onClick={() => setSettingsTab("sharing")} style={tabStyle(settingsTab === "sharing")}>Share Tabs</button>
                <button onClick={() => setSettingsTab("portal")} style={tabStyle(settingsTab === "portal")}>Client Portal</button>
              </div>
            </div>

            <div style={{ padding: "20px 24px" }}>
              {settingsTab === "branding" && (
                <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, fontFamily: font }}>Customize how the toolkit appears</div>
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 600, display: "block", marginBottom: 4, fontFamily: font }}>TOOLKIT NAME</label>
                    <input value={brandName} onChange={e => setBrandName(e.target.value)} style={inputStyle} placeholder="Mortgage Toolkit" />
                  </div>
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 600, display: "block", marginBottom: 4, fontFamily: font }}>SUBTITLE / COMPANY INFO</label>
                    <input value={brandSub} onChange={e => setBrandSub(e.target.value)} style={inputStyle} placeholder="Company Name · NMLS #" />
                  </div>
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 600, display: "block", marginBottom: 4, fontFamily: font }}>LOGO URL (optional)</label>
                    <input value={brandLogo} onChange={e => setBrandLogo(e.target.value)} style={inputStyle} placeholder="https://example.com/logo.png" />
                    {brandLogo && (
                      <div style={{ marginTop: 8, padding: 12, background: inputBg, borderRadius: 8, textAlign: "center" }}>
                        <img src={brandLogo} alt="Logo preview" style={{ maxHeight: 50, maxWidth: "100%" }} onError={e => e.target.style.display = "none"} />
                      </div>
                    )}
                  </div>
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 600, display: "block", marginBottom: 4, fontFamily: font }}>HEADER COLOR</label>
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <input type="color" value={brandColor} onChange={e => setBrandColor(e.target.value)} style={{ width: 40, height: 32, border: "none", cursor: "pointer", borderRadius: 4 }} />
                      <input value={brandColor} onChange={e => setBrandColor(e.target.value)} style={{ ...inputStyle, width: 120 }} />
                      <button onClick={() => setBrandColor(COLORS.navy)} style={{ padding: "6px 12px", borderRadius: 6, border: `1px solid ${border}`, background: "none", color: fg, fontSize: 11, fontFamily: font, cursor: "pointer" }}>Reset</button>
                    </div>
                  </div>
                  <div style={{ padding: 12, background: inputBg, borderRadius: 8, fontSize: 11, color: darkMode ? "#6B7C8A" : "#888", fontFamily: font }}>
                    💡 Branding changes apply immediately and persist in your browser.
                  </div>
                </div>
              )}

              {settingsTab === "scenarios" && (
                <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, fontFamily: font }}>Save & load all calculator inputs</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <input value={newScenName} onChange={e => setNewScenName(e.target.value)} style={{ ...inputStyle, flex: 1 }} placeholder="Scenario name (e.g. Smith Family)" onKeyDown={e => e.key === "Enter" && saveScenario()} />
                    <button onClick={saveScenario} style={{ padding: "8px 16px", borderRadius: 6, border: "none", background: COLORS.blue, color: "#fff", fontSize: 12, fontWeight: 600, fontFamily: font, cursor: "pointer", whiteSpace: "nowrap" }}>💾 Save</button>
                  </div>
                  {scenarios.length === 0 ? (
                    <div style={{ padding: 20, textAlign: "center", fontSize: 12, color: darkMode ? "#5A6B78" : "#999", fontFamily: font }}>
                      No saved scenarios yet. Enter a name and click Save to capture all current inputs.
                    </div>
                  ) : (
                    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                      {scenarios.map((s, i) => (
                        <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 14px", background: inputBg, borderRadius: 8, border: `1px solid ${border}` }}>
                          <div>
                            <div style={{ fontSize: 13, fontWeight: 600, fontFamily: font }}>{s.name}</div>
                            <div style={{ fontSize: 10, color: darkMode ? "#5A6B78" : "#999", fontFamily: font }}>Saved {s.date} · {Object.keys(s.data).length} values</div>
                          </div>
                          <div style={{ display: "flex", gap: 6 }}>
                            <button onClick={() => loadScenario(i)} style={{ padding: "5px 10px", borderRadius: 5, border: `1px solid ${COLORS.green}`, background: "none", color: COLORS.green, fontSize: 11, fontWeight: 600, fontFamily: font, cursor: "pointer" }}>Load</button>
                            <button onClick={() => deleteScenario(i)} style={{ padding: "5px 10px", borderRadius: 5, border: `1px solid ${COLORS.red || "#E74C3C"}`, background: "none", color: COLORS.red || "#E74C3C", fontSize: 11, fontWeight: 600, fontFamily: font, cursor: "pointer" }}>✕</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
