  <script type="text/babel" data-type="module">
    const { useState, useMemo, useCallback, useRef, useEffect } = React;

    // ─── Supabase client bridge ─────────────────────────────────────────────
    // The Supabase client was initialized in a separate <script> block and
    // stored on window._supabaseClient. We bring it into this scope so all
    // code below can reference it as a simple "supabase" variable.
    const supabase = window._supabaseClient;

    // ─── localStorage hook ──────────────────────────────────────────────────
    function useLocalStorage(key, defaultValue) {
      const fullKey = "mtk_" + key;
      const readFromLS = () => {
        try { const s = localStorage.getItem(fullKey); return s !== null ? JSON.parse(s) : defaultValue; }
        catch { return defaultValue; }
      };
      const [value, setValue] = useState(readFromLS);
      useEffect(() => { try { localStorage.setItem(fullKey, JSON.stringify(value)); } catch {} }, [value]);
      // Re-read from localStorage when shared values are propagated
      useEffect(() => {
        const handler = () => {
          const fresh = readFromLS();
          setValue(prev => JSON.stringify(prev) !== JSON.stringify(fresh) ? fresh : prev);
        };
        window.addEventListener("mtk_propagated", handler);
        return () => window.removeEventListener("mtk_propagated", handler);
      }, []);
      return [value, setValue];
    }

    // ═══════════════════════════════════════════════════════════════════════
    // SCENARIO DATA — Snapshot/Restore calculator localStorage for scenarios
    // ═══════════════════════════════════════════════════════════════════════
    const CALC_KEY_PREFIXES = [
      "pc_","ra_","fs_","mc_","be_","pq_","fc_","af_","am_","dti_",
      "rvb_","sns_","biw_","cce_","hel_","lpc_","bud_","ohlc_","rw_","fly_","brand_"
    ];

    function snapshotCalculatorData() {
      const data = {};
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!k || !k.startsWith("mtk_")) continue;
        const shortKey = k.slice(4); // remove "mtk_" prefix
        if (CALC_KEY_PREFIXES.some(p => shortKey.startsWith(p))) {
          try { data[shortKey] = JSON.parse(localStorage.getItem(k)); } catch {}
        }
      }
      return data;
    }

    function restoreCalculatorData(data) {
      // Clear all calculator keys first
      const toRemove = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!k || !k.startsWith("mtk_")) continue;
        const shortKey = k.slice(4);
        if (CALC_KEY_PREFIXES.some(p => shortKey.startsWith(p))) toRemove.push(k);
      }
      toRemove.forEach(k => localStorage.removeItem(k));
      // Write scenario data in
      if (data && typeof data === "object") {
        Object.entries(data).forEach(([shortKey, val]) => {
          try { localStorage.setItem("mtk_" + shortKey, JSON.stringify(val)); } catch {}
        });
      }
    }

    // ── Diff two calculator snapshots to find what changed ────────────
    const CALC_SECTION_NAMES = {
      "pc_": "Purchase Calculator", "ra_": "Rate/APR", "fs_": "Fee Sheet",
      "mc_": "Monthly Cost", "be_": "Break-Even", "pq_": "Pre-Qualification",
      "fc_": "FHA Calculator", "af_": "Affordability", "am_": "Amortization",
      "dti_": "DTI", "rvb_": "Rent vs Buy", "sns_": "Scenario Comparison",
      "biw_": "Bi-Weekly", "cce_": "Closing Cost Est.", "hel_": "HELOC",
      "lpc_": "Loan Product Compare", "bud_": "Budget", "ohlc_": "Overhead",
      "rw_": "Refinance", "fly_": "Flyer", "brand_": "Branding"
    };

    function diffCalculatorData(before, after) {
      if (!before || !after) return { sections: [], details: {} };
      const allKeys = new Set([...Object.keys(before), ...Object.keys(after)]);
      const changed = {};
      allKeys.forEach(function(key) {
        const a = JSON.stringify(before[key] ?? null);
        const b = JSON.stringify(after[key] ?? null);
        if (a !== b) {
          const prefix = CALC_KEY_PREFIXES.find(function(p) { return key.startsWith(p); }) || "";
          const section = CALC_SECTION_NAMES[prefix] || prefix || "Other";
          if (!changed[section]) changed[section] = [];
          changed[section].push(key);
        }
      });
      const sections = Object.keys(changed);
      return { sections: sections, details: changed };
    }

    function saveScenarioData(scenarioId) {
      // Save current calculator state into the scenario's calculatorData
      if (!scenarioId) return;
      try {
        const scenarios = JSON.parse(localStorage.getItem("mtk_scenarios") || "[]");
        const idx = scenarios.findIndex(s => s.id === scenarioId);
        if (idx >= 0) {
          scenarios[idx].calculatorData = snapshotCalculatorData();
          scenarios[idx].updatedAt = new Date().toISOString();
          localStorage.setItem("mtk_scenarios", JSON.stringify(scenarios));
        }
      } catch {}
    }

    // ═══════════════════════════════════════════════════════════════════════
    // SUPABASE HELPERS — Cloud persistence for scenarios
    // ═══════════════════════════════════════════════════════════════════════

    /**
     * Save the current calculator state as a scenario in Supabase.
     * If scenarioId is provided, updates the existing row; otherwise inserts a new one.
     * Returns { data, error }.
     */
    async function saveScenarioToSupabase({ scenarioId, name, notes, status, calculationData } = {}) {
      const { data: { user }, error: authErr } = await supabase.auth.getUser();
      if (authErr || !user) return { data: null, error: authErr || new Error("Not logged in") };

      const payload = {
        user_id: user.id,
        name: name || "Untitled Scenario",
        notes: notes || "",
        status: status || "active",
        calculation_data: calculationData !== undefined ? calculationData : snapshotCalculatorData(),
      };

      if (scenarioId) {
        // Update existing scenario
        const { data, error } = await supabase
          .from("scenarios")
          .update(payload)
          .eq("id", scenarioId)
          .select()
          .single();
        return { data, error };
      } else {
        // Insert new scenario
        const { data, error } = await supabase
          .from("scenarios")
          .insert(payload)
          .select()
          .single();
        return { data, error };
      }
    }

    /**
     * Fetch all scenarios belonging to the logged-in user, newest first.
     * Returns { data: [...], error }.
     */
    async function fetchScenariosFromSupabase() {
      const { data: { user }, error: authErr } = await supabase.auth.getUser();
      if (authErr || !user) return { data: [], error: authErr || new Error("Not logged in") };

      // Check if current user is admin (can see all scenarios)
      const { data: profile } = await supabase
        .from("profiles")
        .select("role")
        .eq("id", user.id)
        .single();
      const isAdmin = profile && profile.role === "admin";

      let query = supabase
        .from("scenarios")
        .select("*")
        .order("updated_at", { ascending: false });

      // Admins see all; everyone else sees only their own
      if (!isAdmin) {
        query = query.eq("user_id", user.id);
      }

      const { data, error } = await query;
      if (error || !data) return { data: data || [], error };

      // Fetch owner names for all unique user_ids
      const userIds = [...new Set(data.map(r => r.user_id))];
      const { data: profiles } = await supabase
        .from("profiles")
        .select("id, display_name")
        .in("id", userIds);
      const nameMap = {};
      if (profiles) profiles.forEach(p => { nameMap[p.id] = p.display_name; });

      // Attach owner name to each scenario row
      const enriched = data.map(row => ({
        ...row,
        _owner_name: nameMap[row.user_id] || ""
      }));

      return { data: enriched, error: null };
    }

    /**
     * Delete a scenario by ID (only succeeds if RLS confirms ownership).
     * Returns { error }.
     */
    async function deleteScenarioFromSupabase(scenarioId) {
      const { error } = await supabase
        .from("scenarios")
        .delete()
        .eq("id", scenarioId);
      return { error };
    }

    /**
     * Write an entry to the scenario audit log.
     * action: 'created' | 'updated' | 'deleted' | 'locked_fees' | 'locked_full' | 'unlocked' | 'duplicated' | 'status_changed'
     * changes: optional { field: { old, new } } diff object
     * note: optional free-text note
     */
    async function writeAuditLog(scenarioId, action, changes, note) {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) return;
      await supabase.from("scenario_audit_log").insert({
        scenario_id: scenarioId,
        user_id: user.id,
        action: action,
        changes: changes || {},
        note: note || ""
      });
    }

    /**
     * Fetch audit log entries for a scenario (newest first).
     */
    async function fetchAuditLog(scenarioId) {
      const { data, error } = await supabase
        .from("scenario_audit_log")
        .select("*")
        .eq("scenario_id", scenarioId)
        .order("created_at", { ascending: false })
        .limit(50);
      return { data: data || [], error };
    }

async function hashPassword(pw) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
}

  const addrParts = [member.address, member.city, member.state, member.zip].filter(Boolean);
  const keys = {
    "mtk_pq_lo": member.name,
    "mtk_pq_lonmls": member.nmls || "",

    "mtk_pq_loem": member.email || "",
    "mtk_pq_loaddr": addrParts.join(", "),
    "mtk_pq_brnmls": member.branchNmls || ""
  };
  Object.entries(keys).forEach(function(pair) {
    localStorage.setItem(pair[0], JSON.stringify(pair[1]));
  });
  window.dispatchEvent(new Event("storage"));
}

    // ─── PMI Lookup Function ──────────────────────────────────────────────
    function lookupPMI({ ltv, fico, termYears, occupancy, isFixed, isCashOut, isMultiBorrower, highDTI }) {
      if (ltv <= 80) return { rate: 0, coverage: 0, tier: "No PMI required" };
      if (fico < 620) return { rate: null, coverage: 0, tier: "FICO below 620 — manual quote needed" };
      const fi = ficoIndex(fico);
      const table = termYears > 20 ? PMI_RATES.over20 : PMI_RATES.under20;
      // Find the matching LTV tier (use first/highest coverage for the tier)
      let match = null;
      for (const row of table) {
        if (ltv > row.ltvMin && ltv <= row.ltvMax) { match = row; break; }
      }
      if (!match && ltv > 80 && ltv <= 85) match = table.find(r => r.ltvMax === 85);
      if (!match) return { rate: null, coverage: 0, tier: "LTV out of range" };
      let baseRate = match.rates[fi];
      if (!isFixed) baseRate *= PMI_RATES.nonFixedMultiplier;
      // Apply adjustments
      const adj = PMI_RATES.adjustments;
      let totalAdj = 0;
      if (occupancy === "vacation") totalAdj += (adj.secondHome[fi] || 0);
      if (occupancy === "investment") { const v = adj.investment[fi]; if (v === null) return { rate: null, coverage: 0, tier: "Investment — FICO ≥720 required for PMI" }; totalAdj += v; }
      if (isCashOut) totalAdj += (adj.cashOut[fi] || 0);
      if (highDTI) totalAdj += (adj.highDTI[fi] || 0);
      if (isMultiBorrower) totalAdj += (adj.multiBorrow[fi] || 0);
      let finalRate = Math.max(baseRate + totalAdj, PMI_RATES.minRate);
      return { rate: finalRate, coverage: match.cov, tier: `${match.ltvMin < 85.01 ? "80.01-85" : match.ltvMin + "-" + match.ltvMax}%`, baseRate, totalAdj };
    }

    function lookupPMICompany(company, { ltv, fico, termYears }) {
      const data = company === "enact" ? PMI_ENACT : PMI_ESSENT;
      if (ltv <= 80 || fico < 620) return null;
      const fi = ficoIndex(fico);
      const table = termYears > 20 ? data.over20 : data.under20;
      for (const row of table) {
        const parts = row.ltv.replace("%","").split("-");
        let lo, hi;
        if (parts.length === 2 && !row.ltv.includes("below")) { lo = parseFloat(parts[1]); hi = parseFloat(parts[0]); }
        else { lo = 80.01; hi = 85; }
        if (ltv > lo && ltv <= hi) return row.rates[fi];
      }
      return null;
    }

    function pmt(rate, nper, pv) {
      if (rate === 0) return pv / nper;
      const x = Math.pow(1 + rate, nper);
      return (pv * rate * x) / (x - 1);
    }

    function buildAmortization(balance, monthlyRate, totalPayments, monthlyPmt) {
      const schedule = [];
      let remaining = balance;
      for (let i = 1; i <= totalPayments; i++) {
        const interest = remaining * monthlyRate;
        const principal = monthlyPmt - interest;
        remaining = Math.max(0, remaining - principal);
        schedule.push({
          month: i, payment: monthlyPmt, principal, interest, balance: remaining,
          totalInterest: schedule.length > 0 ? schedule[schedule.length - 1].totalInterest + interest : interest,
        });
        if (remaining <= 0.01) break;
      }
      return schedule;
    }

    // ── Federal Holidays ────────────────────────────────
    function getFederalHolidays(year) {
      const holidays = [];
      // New Year's Day — Jan 1
      holidays.push({ date: new Date(year, 0, 1), name: "New Year's Day" });
      // MLK Day — 3rd Monday of Jan
      holidays.push({ date: nthWeekday(year, 0, 1, 3), name: "Martin Luther King Jr. Day" });
      // Presidents Day — 3rd Monday of Feb
      holidays.push({ date: nthWeekday(year, 1, 1, 3), name: "Presidents' Day" });
      // Memorial Day — Last Monday of May
      holidays.push({ date: lastWeekday(year, 4, 1), name: "Memorial Day" });
      // Juneteenth — Jun 19
      holidays.push({ date: new Date(year, 5, 19), name: "Juneteenth" });
      // Independence Day — Jul 4
      holidays.push({ date: new Date(year, 6, 4), name: "Independence Day" });
      // Labor Day — 1st Monday of Sep
      holidays.push({ date: nthWeekday(year, 8, 1, 1), name: "Labor Day" });
      // Columbus Day — 2nd Monday of Oct
      holidays.push({ date: nthWeekday(year, 9, 1, 2), name: "Columbus Day" });
      // Veterans Day — Nov 11
      holidays.push({ date: new Date(year, 10, 11), name: "Veterans Day" });
      // Thanksgiving — 4th Thursday of Nov
      holidays.push({ date: nthWeekday(year, 10, 4, 4), name: "Thanksgiving Day" });
      // Christmas — Dec 25
      holidays.push({ date: new Date(year, 11, 25), name: "Christmas Day" });
      // Observed: if holiday falls on Saturday → Friday; Sunday → Monday
      return holidays.map(h => {
        const d = h.date;
        const day = d.getDay();
        const observed = day === 0 ? new Date(d.getFullYear(), d.getMonth(), d.getDate() + 1)
                       : day === 6 ? new Date(d.getFullYear(), d.getMonth(), d.getDate() - 1)
                       : d;
        return { ...h, observed, dateStr: toDateStr(observed) };
      });
    }
    function nthWeekday(year, month, dow, n) {
      const first = new Date(year, month, 1);
      let d = 1 + ((dow - first.getDay() + 7) % 7);
      d += (n - 1) * 7;
      return new Date(year, month, d);
    }
    function lastWeekday(year, month, dow) {
      const last = new Date(year, month + 1, 0);
      let d = last.getDate() - ((last.getDay() - dow + 7) % 7);
      return new Date(year, month, d);
    }
    function toDateStr(d) {
      return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
    }
    function isWeekend(dateStr) {
      const d = new Date(dateStr + "T12:00:00");
      return d.getDay() === 0 || d.getDay() === 6;
    }
    function isHoliday(dateStr, year) {
      return getFederalHolidays(year).some(h => h.dateStr === dateStr);
    }
    function getHolidayName(dateStr, year) {
      const h = getFederalHolidays(year).find(h => h.dateStr === dateStr);
      return h ? h.name : null;
    }

    function stripCommas(str) { return String(str).replace(/,/g, ""); }

    function calcTrueBreakEven(curSchedule, newSchedule, curPMI, newPMI, closingCosts, maxMonths) {
      let curCumulative = 0, newCumulative = closingCosts, breakEvenMonth = null;
      const timeline = [];
      for (let m = 0; m < maxMonths; m++) {
        const curInterest = curSchedule[m] ? curSchedule[m].interest : 0;
        const newInterest = newSchedule[m] ? newSchedule[m].interest : 0;
        curCumulative += curInterest + curPMI;
        newCumulative += newInterest + newPMI;
        const netSavings = curCumulative - newCumulative;
        timeline.push({ month: m + 1, curMonthInterest: curInterest, newMonthInterest: newInterest, curCumulative, newCumulative, netSavings });
        if (breakEvenMonth === null && netSavings >= 0) breakEvenMonth = m + 1;
      }
      return { breakEvenMonth, timeline };
    }

    // Tiered rate calculator: takes array of { upTo, perThousand } tiers
    function tieredRate(amount, tiers) {
      if (amount <= 0) return 0;
      let premium = 0, prev = 0;
      for (const t of tiers) {
        const cap = t.upTo === Infinity ? amount : t.upTo;
        if (amount <= cap) { premium += (amount - prev) * t.perThousand / 1000; break; }
        premium += (cap - prev) * t.perThousand / 1000;
        prev = cap;
      }
      return Math.round(premium);
    }
    // Flat-rate calculator: simple percentage of amount
    function flatRate(amount, ratePerThousand) {
      return amount <= 0 ? 0 : Math.round(amount * ratePerThousand / 1000);

    function DonutChart({ data, size = 160, thickness = 24, centerLabel, centerValue }) {
      const c = useThemeColors();
      const r = (size - thickness) / 2;
      const circ = 2 * Math.PI * r;
      const total = data.reduce((s, d) => s + d.value, 0);
      let cum = 0;
      return (
        <svg width={size} height={size} style={{ display: "block", margin: "0 auto" }}>
          {/* Background ring */}
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={c.border || COLORS.border} strokeWidth={thickness} opacity="0.3" />
          {total > 0 && data.map((d, i) => {
            const pct = d.value / total;
            const dash = pct * circ;
            const off = -cum;
            cum += dash;
            return <circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={d.color} strokeWidth={thickness} strokeDasharray={`${dash} ${circ - dash}`} strokeDashoffset={off} transform={`rotate(-90 ${size/2} ${size/2})`} style={{transition:"stroke-dasharray 0.6s, stroke-dashoffset 0.6s"}} />;
          })}
          {centerLabel && <>
            <text x={size/2} y={size/2 - 10} textAnchor="middle" fontSize="9" fontWeight="700" fill={c.gray || COLORS.gray} fontFamily={font} letterSpacing="0.05em">{centerLabel}</text>
            <text x={size/2} y={size/2 + 12} textAnchor="middle" fontSize="18" fontWeight="800" fill={c.text || c.navy || COLORS.navy} fontFamily={font}>{centerValue}</text>
          </>}
        </svg>
      );
    }

    function BalanceCurveChart({ years }) {
      const c = useThemeColors();
      if (!years || years.length < 2) return null;
      const W = 480, H = 180;
      const pad = { t: 16, r: 16, b: 28, l: 56 };
      const w = W - pad.l - pad.r, h = H - pad.t - pad.b;
      const maxBal = years[0].endBalance + years[0].principal;
      const pts = [{ x: pad.l, y: pad.t }].concat(years.map((d, i) => ({
        x: pad.l + ((i + 1) / years.length) * w,
        y: pad.t + (d.endBalance / maxBal) * h
      })));
      // Invert Y (0 at top = maxBal)
      const pts2 = [{ x: pad.l, y: pad.t + 0 }].concat(years.map((d, i) => ({
        x: pad.l + ((i + 1) / years.length) * w,
        y: pad.t + (1 - d.endBalance / maxBal) * h
      })));
      const line = pts2.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
      const area = line + ` L${(pad.l + w).toFixed(1)},${(pad.t + h).toFixed(1)} L${pad.l},${(pad.t + h).toFixed(1)} Z`;
      const gridY = [0, 0.25, 0.5, 0.75, 1];

            </g>;
          })}
          <path d={area} fill={`url(#${uid})`} />
          <path d={line} fill="none" stroke={c.blue || COLORS.blue} strokeWidth="2.5" strokeLinejoin="round" />
          {/* Endpoint dot */}
          {pts2.length > 1 && <circle cx={pts2[pts2.length - 1].x} cy={pts2[pts2.length - 1].y} r="4" fill={c.blue || COLORS.blue} />}

    function GaugeChart({ value, max = 60, size = 130, label, thresholds }) {
      const c = useThemeColors();
      const r = (size - 24) / 2;
      const cx = size / 2;
      const cy = size / 2 + 8;
      const pct = Math.min(Math.max(value / max, 0), 1);
      const arcPath = (s, e) => {
        const x1 = cx + r * Math.cos(Math.PI - s * Math.PI);
        const y1 = cy - r * Math.sin(Math.PI - s * Math.PI);
        const x2 = cx + r * Math.cos(Math.PI - e * Math.PI);
        const y2 = cy - r * Math.sin(Math.PI - e * Math.PI);
        const large = Math.abs(e - s) > 0.5 ? 1 : 0;
        return `M${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${large} 1 ${x2.toFixed(1)},${y2.toFixed(1)}`;
      };
      const color = thresholds ? (
        value <= thresholds[0] ? (c.green || COLORS.green) :
        value <= thresholds[1] ? (c.gold || COLORS.gold) :
        (c.red || COLORS.red)
      ) : (c.blue || COLORS.blue);
      return (
        <svg width={size} height={size * 0.58} viewBox={`0 0 ${size} ${size * 0.58}`} style={{ display: "block", margin: "0 auto" }}>
          <path d={arcPath(0, 1)} fill="none" stroke={c.border || COLORS.border} strokeWidth="10" strokeLinecap="round" opacity="0.3" />
          {value > 0 && <path d={arcPath(0, pct)} fill="none" stroke={color} strokeWidth="10" strokeLinecap="round" style={{transition:"all 0.6s"}} />}
          <text x={cx} y={cy - 6} textAnchor="middle" fontSize="20" fontWeight="800" fill={color} fontFamily={font}>{value.toFixed(1)}%</text>
          {label && <text x={cx} y={cy + 10} textAnchor="middle" fontSize="8" fontWeight="600" fill={c.gray || COLORS.gray} fontFamily={font}>{label}</text>}
          {/* Min/Max labels */}
          <text x={cx - r - 2} y={cy + 10} textAnchor="middle" fontSize="7" fill={c.gray || COLORS.gray} fontFamily={font}>0%</text>
          <text x={cx + r + 2} y={cy + 10} textAnchor="middle" fontSize="7" fill={c.gray || COLORS.gray} fontFamily={font}>{max}%</text>
        </svg>
      );
    }

    function PaymentCalculator() {
      const c = useThemeColors();

      const [loanProgram, setLoanProgram] = useLocalStorage("pc_prog", "conventional");

      const [occupancy, setOccupancy] = useLocalStorage("pc_occ", "primary");
      // ARM fields
      const [armFixedYears, setArmFixedYears] = useLocalStorage("pc_armfy", "5");
      const [armCap, setArmCap] = useLocalStorage("pc_armcap", "2");
      const [armLifeCap, setArmLifeCap] = useLocalStorage("pc_armlc", "5");
      const [armMargin, setArmMargin] = useLocalStorage("pc_armmg", "2.75");
      // Interest-Only fields
      const [ioPeriod, setIoPeriod] = useLocalStorage("pc_iop", "10");
      // HELOC fields
      const [helocDrawYears, setHelocDrawYears] = useLocalStorage("pc_hedy", "10");
      const [helocRepayYears, setHelocRepayYears] = useLocalStorage("pc_hery", "20");
      // Location fields
      const [pcState, setPcState] = useLocalStorage("pc_state", "TX");
      const [pcCity, setPcCity] = useLocalStorage("pc_city", "Dallas");
      const [pcCounty, setPcCounty] = useLocalStorage("pc_county", "Dallas");

      const syncDown = (hp, dp) => {
        const h = parseFloat(hp) || 0;
        const d = parseFloat(dp) || 0;
        setLoanAmount(String(Math.round(h * (1 - d / 100))));
      };

      // Auto-lookup PMI rate when inputs change (conventional loans only)
      useEffect(() => {
        if (!pmiAuto || loanProgram !== "conventional" || loanType === "heloc") { setPmiInfo(null); return; }
        const hp = parseFloat(homePrice) || 0;
        const la = parseFloat(loanAmount) || 0;
        const ltv = hp > 0 ? (la / hp) * 100 : 0;
        if (ltv <= 80) { setPmiInfo(null); return; }
        const fico = parseInt(ficoScore) || 740;
        const termYrs = parseInt(term) || 30;
        const isFixed = loanType === "fixed";
        const isCashOut = purpose === "cashOutRefi";
        const result = lookupPMI({ ltv, fico, termYears: termYrs, occupancy, isFixed, isCashOut, isMultiBorrower: false, highDTI: false });
        if (result.rate !== null) {
          setPmiRate(String((result.rate * 100).toFixed(2)));
          setPmiInfo(result);
        } else { setPmiInfo(null); }
      }, [pmiAuto, homePrice, loanAmount, ficoScore, term, loanType, loanProgram, purpose, occupancy]);

      // Dispatch shared-value-changed event whenever key values update
      useEffect(() => {
        window.dispatchEvent(new Event("mtk_values_changed"));
      }, [homePrice, loanAmount, rate, propertyTaxRate, homeInsuranceRate, taxMode, insMode, propertyTax, homeInsurance, downPaymentPct, pmiRate, ficoScore, homesteadExemption, pcState, pcCity, pcCounty]);

      const calc = useMemo(() => {
        const la = parseFloat(loanAmount) || 0;
        const hp = parseFloat(homePrice) || 0;
        const r = (parseFloat(rate) || 0) / 100 / 12;
        const annualRate = (parseFloat(rate) || 0);
        const n = loanType === "heloc" ? ((parseFloat(helocDrawYears) || 10) + (parseFloat(helocRepayYears) || 20)) * 12 : (parseFloat(term) || 30) * 12;
        const dp = parseFloat(downPaymentPct) || 0;
        const taxBasis = homesteadExemption ? hp * 0.80 : hp;
        const monthlyTaxInput = parseFloat(propertyTax) || 0;
        const annualTax = taxMode === "rate" ? taxBasis * ((parseFloat(propertyTaxRate) || 0) / 100) : monthlyTaxInput * 12;
        const monthlyTax = taxMode === "rate" ? annualTax / 12 : monthlyTaxInput;
        const monthlyInsInput = parseFloat(homeInsurance) || 0;
        const annualIns = insMode === "rate" ? hp * ((parseFloat(homeInsuranceRate) || 0) / 100) : monthlyInsInput * 12;
        const monthlyIns = insMode === "rate" ? annualIns / 12 : monthlyInsInput;
        const monthlyPMI = dp < 20 ? (la * (parseFloat(pmiRate) || 0) / 100) / 12 : 0;
        const monthlyHOA = parseFloat(hoaDues) || 0;
        const ltv = hp > 0 ? (la / hp * 100) : 0;

        let monthlyPI, totalInterest, extraInfo = {};

        if (loanType === "arm") {
          const fixedMo = (parseFloat(armFixedYears) || 5) * 12;
          const adjCap = parseFloat(armCap) || 2;
          const lifeCap = parseFloat(armLifeCap) || 5;
          const margin = parseFloat(armMargin) || 2.75;
          monthlyPI = pmt(r, n, la);
          // Worst-case scenario after fixed period
          const worstRate = Math.min(annualRate + lifeCap, annualRate + adjCap);
          const worstR = worstRate / 100 / 12;
          const remainBal = la * ((Math.pow(1 + r, n) - Math.pow(1 + r, fixedMo)) / (Math.pow(1 + r, n) - 1));
          const worstPI = pmt(worstR, n - fixedMo, remainBal);
          totalInterest = (monthlyPI * fixedMo) + (worstPI * (n - fixedMo)) - la;
          extraInfo = { worstPI, worstRate, fixedMo, remainBal, adjCap, lifeCap, margin };
        } else if (loanType === "io") {
          const ioPeriodMo = (parseFloat(ioPeriod) || 10) * 12;
          const ioPayment = la * r;
          const amortPI = pmt(r, n - ioPeriodMo, la);
          monthlyPI = ioPayment;
          totalInterest = (ioPayment * ioPeriodMo) + (amortPI * (n - ioPeriodMo)) - la;
          extraInfo = { ioPayment, amortPI, ioPeriodMo };
        } else if (loanType === "heloc") {
          const drawMo = (parseFloat(helocDrawYears) || 10) * 12;
          const repayMo = (parseFloat(helocRepayYears) || 20) * 12;
          const drawPayment = la * r; // IO during draw
          const repayPI = pmt(r, repayMo, la);
          monthlyPI = drawPayment;
          totalInterest = (drawPayment * drawMo) + (repayPI * repayMo) - la;
          extraInfo = { drawPayment, repayPI, drawMo, repayMo };
        } else {
          monthlyPI = pmt(r, n, la);
          totalInterest = (monthlyPI * n) - la;
        }

        const totalMonthly = monthlyPI + monthlyTax + monthlyIns + monthlyPMI + monthlyHOA;
        return { monthlyPI, monthlyTax, monthlyIns, monthlyPMI, monthlyHOA, totalMonthly, totalInterest, ltv, la, n, loanType, ...extraInfo };
      }, [loanAmount, homePrice, rate, term, propertyTax, homeInsurance, propertyTaxRate, homeInsuranceRate, taxMode, insMode, downPaymentPct, pmiRate, hoaDues, loanType, armFixedYears, armCap, armLifeCap, armMargin, ioPeriod, helocDrawYears, helocRepayYears]);

      const purposeLabel = purpose === "refinance" ? "Refi" : "Purchase";

      return (

              </div>

                { value: "conventional", label: "Conventional" }, { value: "fha", label: "FHA" },

                  <Select label="County" value={pcCounty} onChange={setPcCounty} options={(pcState === "TX" ? getCountiesForCity(pcCity) : ["Other"]).map(c => ({ value: c, label: c }))} />
                </div>
              </div>
              {/* Loan Limit Warnings */}
              {(() => {
                const la = parseFloat(loanAmount) || 0;
                const conformingLimit = CONFORMING_LIMITS.getLimit(pcState, pcCounty);
                const fhaLimit = FHA_LIMITS.getLimit(pcState, pcCounty);
                const warnings = [];
                if (loanProgram === "conventional" && la > conformingLimit) {
                  warnings.push({ color: "#d97706", bg: "#fffbeb", border: "#fcd34d", icon: "⚠️", text: `Loan amount exceeds the ${pcState} conforming limit of ${fmt(conformingLimit)}. This is a Jumbo loan — different rates and guidelines apply.` });
                }
                if (loanProgram === "fha" && la > fhaLimit) {
                  warnings.push({ color: "#dc2626", bg: "#fef2f2", border: "#fca5a5", icon: "🚫", text: `Loan amount exceeds the FHA limit of ${fmt(fhaLimit)} for ${pcCounty} County, ${pcState}. Reduce the loan amount or select a different program.` });
                }
                if (loanProgram === "conventional" && la > conformingLimit * 0.95 && la <= conformingLimit) {
                  warnings.push({ color: "#2563eb", bg: "#eff6ff", border: "#93c5fd", icon: "ℹ️", text: `Loan amount is within 5% of the conforming limit (${fmt(conformingLimit)}). Consider staying below to avoid jumbo pricing.` });
                }
                if (loanProgram === "fha" && la > fhaLimit * 0.95 && la <= fhaLimit) {
                  warnings.push({ color: "#2563eb", bg: "#eff6ff", border: "#93c5fd", icon: "ℹ️", text: `Loan amount is within 5% of the FHA limit (${fmt(fhaLimit)}) for ${pcCounty} County.` });
                }
                return warnings.length > 0 ? (
                  <div style={{ display: "flex", flexDirection: "column", gap: 6, marginTop: 2, marginBottom: 4 }}>
                    {warnings.map((w, i) => (

                <div style={{ fontSize: 12, opacity: 0.6, marginTop: 8 }}>
                  {loanType === "io" ? `IO for ${ioPeriod}yr, then ${fmt2(calc.amortPI)}/mo P&I` :
                   loanType === "heloc" ? `IO draw ${helocDrawYears}yr, then ${fmt2(calc.repayPI)}/mo repay` :
                   loanType === "arm" ? `Fixed ${armFixedYears}yr, worst-case ${fmt2(calc.worstPI)}/mo after` :
                   `Principal, Interest, Taxes, Insurance${calc.monthlyPMI > 0 ? ", PMI" : ""}${calc.monthlyHOA > 0 ? ", HOA" : ""}`}
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 20, flexWrap: "wrap", justifyContent: "center", marginBottom: 16 }}>
                <DonutChart
                  data={pieData.map(d => ({ value: d.value, color: d.color }))}
                  size={150}
                  thickness={22}
                  centerLabel="MONTHLY"
                  centerValue={fmt2(total)}
                />
                <div style={{ display: "flex", flexDirection: "column", gap: 6, flex: 1, minWidth: 160 }}>
                  {pieData.map((d) => (
                    <div key={d.label} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", background: c.bg, borderRadius: 8, border: `1px solid ${c.border}` }}>
                      <div style={{ width: 10, height: 10, borderRadius: 5, background: d.color, flexShrink: 0 }} />
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 10, color: c.gray, fontWeight: 600, fontFamily: font }}>{d.label}</div>
                        <div style={{ fontSize: 13, fontWeight: 700, color: c.text || c.navy, fontFamily: font }}>{fmt2(d.value)}</div>
                      </div>
                      <div style={{ fontSize: 11, color: c.grayLight, fontFamily: font }}>{total > 0 ? Math.round(d.value / total * 100) : 0}%</div>
                    </div>
                  ))}
                </div>
              </div>
              <SectionCard title="TAXES & INSURANCE" accent={c.blue}>
                {/* Property Tax: toggle between rate and dollar */}
                <div style={{ marginBottom: 6 }}>

                    <span style={{ fontSize: 11, fontWeight: 600, color: c.textSecondary || c.gray, fontFamily: font }}>Property Tax</span>
                    <div style={{ display: "flex", gap: 0, borderRadius: 6, overflow: "hidden", border: `1px solid ${c.border}` }}>
                      {[{ v: "rate", l: "%" }, { v: "dollar", l: "$" }].map(o => (
                        <button key={o.v} onClick={() => setTaxMode(o.v)} style={{ padding: "2px 10px", fontSize: 11, fontWeight: 700, fontFamily: font, border: "none", cursor: "pointer", background: taxMode === o.v ? c.blue : "transparent", color: taxMode === o.v ? "#fff" : c.gray, transition: "all 0.15s" }}>{o.l}</button>
                      ))}
                    </div>
                  </div>
                  {taxMode === "rate" ? (
                    <LabeledInput label="" value={propertyTaxRate} onChange={setPropertyTaxRate} suffix="% of home value" small hint={`${fmt2((parseFloat(homePrice) || 0) * (parseFloat(propertyTaxRate) || 0) / 100 / 12)}/mo · ${fmt2((parseFloat(homePrice) || 0) * (parseFloat(propertyTaxRate) || 0) / 100)}/yr`} />
                  ) : (
                    <LabeledInput label="" prefix="$" value={propertyTax} onChange={setPropertyTax} useCommas suffix="/mo" small hint={`${fmt2((parseFloat(propertyTax) || 0) * 12)}/yr`} />
                  )}
                  {/* Homestead Exemption toggle — only shows when state is TX */}
                  {(() => {
                    return pcState === "TX" ? (
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}>
                        <Toggle label="TX Homestead (80% basis)" checked={homesteadExemption} onChange={setHomesteadExemption} />
                        {homesteadExemption && <span style={{ fontSize: 10, color: COLORS.green, fontFamily: font }}>Tax basis: {fmt(Math.round((parseFloat(homePrice) || 0) * 0.80))}</span>}
                      </div>

                  })()}
                </div>
                {/* Home Insurance: toggle between rate and dollar */}
                <div style={{ marginBottom: 6 }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
                    <span style={{ fontSize: 11, fontWeight: 600, color: c.textSecondary || c.gray, fontFamily: font }}>Home Insurance</span>
                    <div style={{ display: "flex", gap: 0, borderRadius: 6, overflow: "hidden", border: `1px solid ${c.border}` }}>
                      {[{ v: "rate", l: "%" }, { v: "dollar", l: "$" }].map(o => (
                        <button key={o.v} onClick={() => setInsMode(o.v)} style={{ padding: "2px 10px", fontSize: 11, fontWeight: 700, fontFamily: font, border: "none", cursor: "pointer", background: insMode === o.v ? c.blue : "transparent", color: insMode === o.v ? "#fff" : c.gray, transition: "all 0.15s" }}>{o.l}</button>
                      ))}
                    </div>
                  </div>
                  {insMode === "rate" ? (
                    <LabeledInput label="" value={homeInsuranceRate} onChange={setHomeInsuranceRate} suffix="% of home value" small hint={`${fmt2((parseFloat(homePrice) || 0) * (parseFloat(homeInsuranceRate) || 0) / 100 / 12)}/mo · ${fmt2((parseFloat(homePrice) || 0) * (parseFloat(homeInsuranceRate) || 0) / 100)}/yr`} />
                  ) : (

                </div>
                {parseFloat(downPaymentPct) < 20 && loanType !== "heloc" && (() => {
                  const isConv = loanProgram === "conventional";
                  const userObj = (() => { try { const u = localStorage.getItem("mtk_app_user"); return u ? JSON.parse(u) : null; } catch { return null; } })();
                  const isInt = userObj?.isInternal === true;
                  return (
                    <div style={{ background: c.bgAlt || "#faf9f7", border: `1px solid ${c.border}`, borderRadius: 10, padding: 12, marginBottom: 2 }}>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                        <span style={{ fontSize: 12, fontWeight: 700, color: c.text || c.navy, fontFamily: font }}>Private Mortgage Insurance</span>
                        {isConv && (
                          <div style={{ display: "flex", gap: 0, borderRadius: 6, overflow: "hidden", border: `1px solid ${c.border}` }}>
                            {[{ v: true, l: "Auto" }, { v: false, l: "Manual" }].map(o => (
                              <button key={String(o.v)} onClick={() => setPmiAuto(o.v)} style={{ padding: "2px 10px", fontSize: 10, fontWeight: 700, fontFamily: font, border: "none", cursor: "pointer", background: pmiAuto === o.v ? c.blue : "transparent", color: pmiAuto === o.v ? "#fff" : c.gray, transition: "all 0.15s" }}>{o.l}</button>
                            ))}
                          </div>
                        )}
                      </div>
                      {isConv && pmiAuto && (
                        <LabeledInput label="FICO Score" value={ficoScore} onChange={setFicoScore} small hint={pmiInfo ? `Bucket: ${parseInt(ficoScore) >= 760 ? "760+" : parseInt(ficoScore) >= 740 ? "740-759" : parseInt(ficoScore) >= 720 ? "720-739" : parseInt(ficoScore) >= 700 ? "700-719" : parseInt(ficoScore) >= 680 ? "680-699" : parseInt(ficoScore) >= 660 ? "660-679" : parseInt(ficoScore) >= 640 ? "640-659" : "620-639"} · Coverage: ${pmiInfo.coverage}%` : "Enter borrower FICO"} />
                      )}
                      {(!isConv || !pmiAuto) ? (
                        <LabeledInput label="PMI Rate" value={pmiRate} onChange={setPmiRate} suffix="% annual" small hint={`${fmt2(calc.monthlyPMI)}/mo · Removed at 80% LTV`} />
                      ) : (
                        <div style={{ fontSize: 12, fontFamily: font, color: c.textSecondary || c.gray, marginTop: 4 }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                            <span>Rate: <strong style={{ color: c.text || c.navy, fontSize: 14 }}>{pmiRate}%</strong> annual</span>
                            <span style={{ fontSize: 11 }}>{fmt2(calc.monthlyPMI)}/mo</span>
                          </div>
                          {pmiInfo && <div style={{ fontSize: 10, marginTop: 4, opacity: 0.7 }}>LTV {calc.ltv.toFixed(1)}% · {pmiInfo.tier} · Base {(pmiInfo.baseRate * 100).toFixed(2)}%{pmiInfo.totalAdj !== 0 ? ` · Adj ${pmiInfo.totalAdj > 0 ? "+" : ""}${(pmiInfo.totalAdj * 100).toFixed(2)}%` : ""}</div>}

                      {isInt && isConv && pmiAuto && pmiInfo && (() => {
                        const hp = parseFloat(homePrice) || 0;

                        const ltv = hp > 0 ? (la / hp) * 100 : 0;
                        const fico = parseInt(ficoScore) || 740;
                        const termYrs = parseInt(term) || 30;
                        const enactR = lookupPMICompany("enact", { ltv, fico, termYears: termYrs });

          {loanType === "arm" && (
            <div style={{ background: c.bgAlt || c.goldLight, border: `1px solid ${c.border}`, borderRadius: 10, padding: 16, marginBottom: 16 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: c.text || c.navy, fontFamily: font, marginBottom: 8 }}>⚠️ ARM Payment Scenario</div>
              <div style={{ display: "flex", gap: 16, flexWrap: "wrap", fontSize: 12, fontFamily: font, color: c.textSecondary || c.gray }}>
                <span>Initial: <strong style={{ color: c.green }}>{fmt2(calc.monthlyPI)}/mo</strong> for {armFixedYears} years</span>
                <span>Worst-case: <strong style={{ color: c.red }}>{fmt2(calc.worstPI)}/mo</strong> (rate up to {calc.worstRate?.toFixed(2)}%)</span>
                <span>Increase: <strong style={{ color: c.gold }}>{fmt2(calc.worstPI - calc.monthlyPI)}/mo</strong></span>
              </div>
            </div>
          )}
          <div className="mtk-metrics" style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 16 }}>
            <MetricCard label="Total Interest" value={fmt(calc.totalInterest)} sublabel={loanType === "heloc" ? `Over ${(parseFloat(helocDrawYears)||10)+(parseFloat(helocRepayYears)||20)} years` : `Over ${term} years`} />
            <MetricCard label="Total Cost" value={fmt(calc.totalInterest + calc.la)} sublabel="Principal + Interest" />
            {loanType !== "heloc" && <MetricCard label="LTV" value={`${calc.ltv.toFixed(1)}%`} sublabel={calc.ltv > 80 ? "PMI Required" : "No PMI"} positive={calc.ltv <= 80} />}
            <MetricCard label="P&I per $1K" value={fmt2(calc.monthlyPI / (calc.la / 1000))} sublabel={loanType === "io" ? "IO payment factor" : "Payment factor"} />
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════
    // MODULE 2: REFINANCE ANALYZER
    // ═══════════════════════════════════════════════════════════════════════
    function RefinanceAnalyzer() {
      const [curBalance, setCurBalance] = useLocalStorage("ra_cb", "320000");
      const [curRate, setCurRate] = useLocalStorage("ra_cr", "7.25");
      const [curTermOriginal, setCurTermOriginal] = useLocalStorage("ra_cto", "30");
      const [origLoanAmount, setOrigLoanAmount] = useLocalStorage("ra_ola", "340000");
      // Note date replaces "months paid" — skip first month after closing (close Jun → first pmt Aug)
      const [noteDate, setNoteDate] = useLocalStorage("ra_notedate", "2023-03-01");
      const todayRA = new Date();
      const defaultLastPmt = todayRA.getFullYear() + "-" + String(todayRA.getMonth() + 1).padStart(2, "0") + "-01";
      const [lastPaymentDate, setLastPaymentDate] = useLocalStorage("ra_lastpmt", defaultLastPmt);
      const [curPMI, setCurPMI] = useLocalStorage("ra_cpmi", "185");
      const [curHomeValue, setCurHomeValue] = useLocalStorage("ra_chv", "420000");
      // Property info
      const [raAddr, setRaAddr] = useLocalStorage("ra_addr", "");
      const [raCity, setRaCity] = useLocalStorage("ra_city", "");
      const [raState, setRaState] = useLocalStorage("ra_state", "TX");
      const [raZip, setRaZip] = useLocalStorage("ra_zip", "");
      // Loan metadata
      const [raOcc, setRaOcc] = useLocalStorage("ra_occ", "primary");
      const [raProg, setRaProg] = useLocalStorage("ra_prog", "conventional");
      const [raCurPI, setRaCurPI] = useLocalStorage("ra_curpi", "");
      // Split escrow (replaces single curEscrow)
      const [raInsRenew, setRaInsRenew] = useLocalStorage("ra_insrenew", "");
      // New loan metadata
      const [raNewProg, setRaNewProg] = useLocalStorage("ra_newprog", "conventional");
      const [raNewOcc, setRaNewOcc] = useLocalStorage("ra_newocc", "primary");
      // Second mortgage
      const [hasSecondMtg, setHasSecondMtg] = useLocalStorage("ra_has2nd", false);
      const [secondRate, setSecondRate] = useLocalStorage("ra_2rate", "9.0");
      const [secondTerm, setSecondTerm] = useLocalStorage("ra_2term", "20");
      const [secondOrigBal, setSecondOrigBal] = useLocalStorage("ra_2orig", "50000");
      const [secondBalance, setSecondBalance] = useLocalStorage("ra_2bal", "45000");
      const [secondPI, setSecondPI] = useLocalStorage("ra_2pi", "450");
      const [secondNoteDate, setSecondNoteDate] = useLocalStorage("ra_2nd", "");
      const [newRate, setNewRate] = useLocalStorage("ra_nr", "6.25");
      const [newTerm, setNewTerm] = useLocalStorage("ra_nt", "30");
      const [closingCosts, setClosingCosts] = useLocalStorage("ra_cc", "6500");
      const [rollInCosts, setRollInCosts] = useLocalStorage("ra_ric", "all");  // "none" | "all" | "partial"
      const [rollInAmount, setRollInAmount] = useLocalStorage("ra_ria", "");
      const [waiveEscrows, setWaiveEscrows] = useLocalStorage("ra_we", false);
      const [escrowBalance, setEscrowBalance] = useLocalStorage("ra_escbal", "");
      const [netEscrows, setNetEscrows] = useLocalStorage("ra_netesc", false);
      const default30 = new Date(Date.now() + 30 * 86400000).toISOString().slice(0, 10);
      const [newClosingDate, setNewClosingDate] = useLocalStorage("ra_ncd", default30);
      const [cashOutEnabled, setCashOutEnabled] = useLocalStorage("ra_coe", false);
      const [cashOutAmount, setCashOutAmount] = useLocalStorage("ra_coa", "0");
      // Shared FICO — same localStorage key as Payment Calculator so both tabs stay in sync
      const [ficoScore, setFicoScore] = useLocalStorage("pc_fico", "740");
      // Shared tax/insurance — same localStorage keys as Payment Calculator so both tabs stay in sync
      const [taxMode, setTaxMode] = useLocalStorage("pc_taxm", "rate");
      const [propertyTax, setPropertyTax] = useLocalStorage("pc_tax", "");
      const [propertyTaxRate, setPropertyTaxRate] = useLocalStorage("pc_taxr", "2.3");
      const [homesteadExemption, setHomesteadExemption] = useLocalStorage("pc_hse", false);
      const [insMode, setInsMode] = useLocalStorage("pc_insm", "rate");
      const [homeInsurance, setHomeInsurance] = useLocalStorage("pc_ins", "");
      const [homeInsuranceRate, setHomeInsuranceRate] = useLocalStorage("pc_insr", "0.7");
      const [activeTab, setActiveTab] = useState("summary");

      // ── Calculate months paid from note date (skip 1st month after closing) ──
      const monthsPaidCalc = useMemo(() => {
        if (!noteDate) return 0;
        const nd = new Date(noteDate + "T00:00:00");
        const now = new Date();
        // First payment is 2 months after note date (close Jun → first pmt Aug)
        const firstPmtYear = nd.getMonth() + 2 > 11 ? nd.getFullYear() + 1 : nd.getFullYear();
        const firstPmtMonth = (nd.getMonth() + 2) % 12;
        const pmtsMade = (now.getFullYear() - firstPmtYear) * 12 + (now.getMonth() - firstPmtMonth);
        return Math.max(0, pmtsMade);
      }, [noteDate]);

      // ── Calculate per-diem interest days for payoff ──
      const payoffDaysCalc = useMemo(() => {
        if (!lastPaymentDate) return 0;
        const lp = new Date(lastPaymentDate + "T00:00:00");
        // Payoff is typically ~30 days from payoff request; estimate next biz day + buffer
        const payoffDate = new Date();
        payoffDate.setDate(payoffDate.getDate() + 15); // ~15 day estimate
        const diffMs = payoffDate.getTime() - lp.getTime();
        return Math.max(0, Math.ceil(diffMs / (1000 * 60 * 60 * 24)));
      }, [lastPaymentDate]);

      const analysis = useMemo(() => {
        const cb = parseFloat(curBalance) || 0;
        const cr = (parseFloat(curRate) || 0) / 100 / 12;
        const crAnnual = (parseFloat(curRate) || 0) / 100;
        const cTermOrig = (parseFloat(curTermOriginal) || 30) * 12;
        const cPaid = monthsPaidCalc;
        const cRemaining = Math.max(cTermOrig - cPaid, 1);
        const cPmiMonthly = parseFloat(curPMI) || 0;
        const hv = parseFloat(curHomeValue) || 0;
        // Shared tax/ins from Payment Calculator state (dual-mode: rate or dollar)
        const taxBasis = homesteadExemption ? hv * 0.80 : hv;
        const monthlyTax = taxMode === "rate"
          ? (taxBasis * ((parseFloat(propertyTaxRate) || 0) / 100)) / 12
          : (parseFloat(propertyTax) || 0);
        const monthlyIns = insMode === "rate"
          ? (hv * ((parseFloat(homeInsuranceRate) || 0) / 100)) / 12
          : (parseFloat(homeInsurance) || 0);
        const escrow = monthlyTax + monthlyIns;
        const nr = (parseFloat(newRate) || 0) / 100 / 12;
        const nTermMonths = (parseFloat(newTerm) || 30) * 12;
        const cc = parseFloat(closingCosts) || 0;
        const co = cashOutEnabled ? (parseFloat(cashOutAmount) || 0) : 0;
        // nPmiMonthly computed below after newLTV is known

        // ── Estimated payoff from original loan data ──
        const ola = parseFloat(origLoanAmount) || 0;
        let estimatedBalance = 0;
        let origPI = 0;
        if (ola > 0 && cr > 0 && cTermOrig > 0) {
          origPI = pmt(cr, cTermOrig, ola);
          // Amortize the original loan forward by cPaid months
          let bal = ola;
          for (let m = 0; m < cPaid; m++) {
            const interest = bal * cr;
            const princ = origPI - interest;
            bal = Math.max(0, bal - princ);
          }
          estimatedBalance = bal;
        }
        // Per-diem interest for payoff quote
        const dailyInterest = cb * crAnnual / 365;
        const perDiemDays = payoffDaysCalc;
        const payoffFee = 150;
        const escBal = parseFloat(escrowBalance) || 0;
        const escrowCredit = netEscrows ? escBal : 0;
        const estimatedPayoff = cb + (dailyInterest * perDiemDays) + payoffFee - escrowCredit;

        // Observation: has the borrower been making extra payments?
        const balanceDiff = estimatedBalance - cb;
        const extraPaymentObservation = (ola > 0 && estimatedBalance > 0 && balanceDiff > 500)
          ? { detected: true, amount: balanceDiff, message: "It appears approximately " + fmt(balanceDiff) + " in extra principal payments have been made. Great job! The stated balance is lower than expected based on the original amortization schedule." }
          : { detected: false, amount: 0, message: "" };

        // ── Second mortgage ──
        const s2bal = hasSecondMtg ? (parseFloat(secondBalance) || 0) : 0;
        const s2pi = hasSecondMtg ? (parseFloat(secondPI) || 0) : 0;

        const curPI = pmt(cr, cRemaining, cb);
        const curTotalPayment = curPI + cPmiMonthly + escrow + s2pi;
        const rolledIn = rollInCosts === "all" ? cc : rollInCosts === "partial" ? (parseFloat(rollInAmount) || 0) : 0;
        const costsDueAtClosing = cc - rolledIn;
        const newLoanAmt = cb + s2bal + rolledIn + co;
        const newLTV = hv > 0 ? (newLoanAmt / hv) * 100 : 0;
        const fico = parseInt(ficoScore) || 740;
        const pmiResult = lookupPMI({
          ltv: newLTV, fico, termYears: nTermMonths / 12, occupancy: raNewOcc,
          isFixed: true, isCashOut: cashOutEnabled, isMultiBorrower: false, highDTI: false
        });
        const nPmiRate = pmiResult.rate ? pmiResult.rate * 100 : 0;
        const nPmiMonthly = newLTV <= 80 ? 0 : (newLoanAmt * nPmiRate / 100) / 12;
        const newPI = pmt(nr, nTermMonths, newLoanAmt);
        const newTotalPayment = newPI + nPmiMonthly + (waiveEscrows ? 0 : escrow);
        const monthlySavings = (curPI + cPmiMonthly + s2pi) - (newPI + nPmiMonthly);

        // First payment date: close month + 2 (skip first month convention)
        let firstPaymentDate = null;
        if (newClosingDate) {
          const cd = new Date(newClosingDate + "T00:00:00");
          if (!isNaN(cd.getTime())) {
            const fpd = new Date(cd.getFullYear(), cd.getMonth() + 2, 1);
            firstPaymentDate = fpd;
          }
        }
        const curSchedule = buildAmortization(cb, cr, cRemaining, curPI);
        const newSchedule = buildAmortization(newLoanAmt, nr, nTermMonths, newPI);
        const curTotalInterest = curSchedule.reduce((s, r) => s + r.interest, 0);
        const newTotalInterest = newSchedule.reduce((s, r) => s + r.interest, 0);
        const interestSaved = curTotalInterest - newTotalInterest;
        const maxAnalysisMonths = Math.max(cRemaining, nTermMonths);
        const trueBreakEven = calcTrueBreakEven(curSchedule, newSchedule, cPmiMonthly, nPmiMonthly, cc, maxAnalysisMonths);
        const fiveYr = 60;
        const cur5YrInterest = curSchedule.slice(0, fiveYr).reduce((s, r) => s + r.interest, 0);
        const new5YrInterest = newSchedule.slice(0, fiveYr).reduce((s, r) => s + r.interest, 0);
        const cur5YrPMI = cPmiMonthly * Math.min(fiveYr, cRemaining);
        const new5YrPMI = nPmiMonthly * Math.min(fiveYr, nTermMonths);
        const fiveYearSavings = (cur5YrInterest + cur5YrPMI) - (new5YrInterest + new5YrPMI) - cc;
        const lazyBreakEven = monthlySavings > 0 ? Math.ceil(cc / monthlySavings) : null;
        const curLTV = hv > 0 ? (cb / hv) * 100 : 0;
        let npv = -cc;
        for (let m = 1; m <= Math.min(cRemaining, nTermMonths); m++) {
          const sav = (curSchedule[m - 1]?.interest || 0) + cPmiMonthly - (newSchedule[m - 1]?.interest || 0) - nPmiMonthly;
          npv += sav / Math.pow(1 + cr, m);
        }
        return {
          curPI, curTotalPayment, newPI, newTotalPayment, newLoanAmt, monthlySavings,
          curSchedule, newSchedule, curTotalInterest, newTotalInterest, interestSaved,
          fiveYearSavings, trueBreakEven, lazyBreakEven, curLTV, newLTV, npv, cRemaining,
          closingCosts: cc, costsDueAtClosing, rolledIn, cPmiMonthly, nPmiMonthly, nTermMonths,
          cashOut: co, escrow, monthlyTax, monthlyIns, escrowCredit, escBal,
          monthsPaid: cPaid, estimatedBalance, estimatedPayoff, dailyInterest, perDiemDays, payoffFee,
          extraPaymentObservation, origPI, secondBalance: s2bal, secondPI: s2pi,
          statedPIDiff: raCurPI ? ((parseFloat(raCurPI) || 0) - curPI) : null,
          firstPaymentDate, pmiResult, nPmiRate
        };
      }, [curBalance, curRate, curTermOriginal, monthsPaidCalc, origLoanAmount, curPMI, curHomeValue, taxMode, propertyTaxRate, propertyTax, homesteadExemption, insMode, homeInsuranceRate, homeInsurance, escrowBalance, netEscrows, raCurPI, newRate, newTerm, closingCosts, rollInCosts, rollInAmount, waiveEscrows, newClosingDate, ficoScore, raNewOcc, cashOutEnabled, cashOutAmount, payoffDaysCalc, hasSecondMtg, secondBalance, secondPI]);

      const getRecommendation = () => {
        const { trueBreakEven, fiveYearSavings, monthlySavings } = analysis;
        const be = trueBreakEven.breakEvenMonth;
        if (monthlySavings <= 0 && fiveYearSavings <= 0) return { verdict: "NOT RECOMMENDED", color: COLORS.red, reason: "The new loan costs more. This refinance does not make financial sense." };
        if (!be) return { verdict: "NOT RECOMMENDED", color: COLORS.red, reason: "The new loan never costs less than keeping the current loan within the analysis window." };
        if (be <= 18 && fiveYearSavings > 5000) return { verdict: "STRONG REFINANCE CANDIDATE", color: COLORS.green, reason: `True break-even in ${be} months. ${fmt(fiveYearSavings)} in real 5-year savings.` };
        if (be <= 36) return { verdict: "GOOD CANDIDATE", color: COLORS.blue, reason: `True break-even in ${be} months. Worth pursuing if staying 3+ years.` };
        if (be <= 60) return { verdict: "WORTH CONSIDERING", color: COLORS.gold, reason: `True break-even takes ${be} months. Makes sense if keeping loan 5+ years.` };
        return { verdict: "MARGINAL", color: COLORS.red, reason: `True break-even of ${be} months is lengthy.` };
      };
      const rec = getRecommendation();

      return (
        <div>
          <div style={{ padding: "22px 24px", borderRadius: 12, color: "#fff", marginBottom: 18, background: rec.color === COLORS.green ? `linear-gradient(135deg, ${COLORS.green}, #22A06B)` : rec.color === COLORS.blue ? `linear-gradient(135deg, #2E86AB, ${COLORS.blue})` : rec.color === COLORS.gold ? `linear-gradient(135deg, ${COLORS.gold}, #E5A825)` : `linear-gradient(135deg, ${COLORS.red}, #E74C3C)`, boxShadow: "0 4px 14px rgba(0,0,0,0.18)" }}>
            <div style={{ fontSize: 16, fontWeight: 800, letterSpacing: "0.1em", marginBottom: 10, fontFamily: font }}>{rec.verdict}</div>
            <ul style={{ margin: 0, paddingLeft: 20, fontSize: 15, opacity: 0.95, lineHeight: 1.8, fontFamily: font, marginBottom: (rec.color === COLORS.green || rec.color === COLORS.blue) ? 14 : 0 }}>
              <li>{rec.reason}</li>
              {analysis.fiveYearSavings > 0 && <li>{fmt(analysis.fiveYearSavings)} in 5-year savings (avg. {fmt(analysis.fiveYearSavings / 5)}/year)</li>}
              {analysis.curTotalPayment > 0 && analysis.newTotalPayment > 0 && <li>Monthly cash flow improvement: {fmt2(analysis.curTotalPayment - analysis.newTotalPayment)}/mo ({fmt2(analysis.curTotalPayment)} → {fmt2(analysis.newTotalPayment)})</li>}
            </ul>
            {(rec.color === COLORS.green || rec.color === COLORS.blue) && <a href="https://www.MortgageMark.com/Apply" target="_blank" rel="noopener noreferrer" style={{ display: "inline-block", padding: "10px 28px", background: "rgba(255,255,255,0.22)", color: "#fff", fontWeight: 700, fontSize: 15, borderRadius: 8, textDecoration: "none", fontFamily: font, border: "2px solid rgba(255,255,255,0.5)", cursor: "pointer", letterSpacing: "0.03em", transition: "background 0.2s" }} onMouseEnter={e => e.target.style.background = "rgba(255,255,255,0.35)"} onMouseLeave={e => e.target.style.background = "rgba(255,255,255,0.22)"}>Start Saving: Apply Now →</a>}
          </div>
          <SectionCard title="PROPERTY" accent={COLORS.gray} style={{ marginBottom: 16 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <div style={{ gridColumn: "1 / -1" }}>
                <LabeledInput label="Street Address" value={raAddr} onChange={setRaAddr} type="text" small />
              </div>
              <LabeledInput label="City" value={raCity} onChange={setRaCity} type="text" small />
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <Select label="State" value={raState} onChange={setRaState} small options={[
                  {value:"AL",label:"AL"},{value:"AK",label:"AK"},{value:"AZ",label:"AZ"},{value:"AR",label:"AR"},{value:"CA",label:"CA"},
                  {value:"CO",label:"CO"},{value:"CT",label:"CT"},{value:"DE",label:"DE"},{value:"FL",label:"FL"},{value:"GA",label:"GA"},
                  {value:"HI",label:"HI"},{value:"ID",label:"ID"},{value:"IL",label:"IL"},{value:"IN",label:"IN"},{value:"IA",label:"IA"},
                  {value:"KS",label:"KS"},{value:"KY",label:"KY"},{value:"LA",label:"LA"},{value:"ME",label:"ME"},{value:"MD",label:"MD"},
                  {value:"MA",label:"MA"},{value:"MI",label:"MI"},{value:"MN",label:"MN"},{value:"MS",label:"MS"},{value:"MO",label:"MO"},
                  {value:"MT",label:"MT"},{value:"NE",label:"NE"},{value:"NV",label:"NV"},{value:"NH",label:"NH"},{value:"NJ",label:"NJ"},
                  {value:"NM",label:"NM"},{value:"NY",label:"NY"},{value:"NC",label:"NC"},{value:"ND",label:"ND"},{value:"OH",label:"OH"},
                  {value:"OK",label:"OK"},{value:"OR",label:"OR"},{value:"PA",label:"PA"},{value:"RI",label:"RI"},{value:"SC",label:"SC"},
                  {value:"SD",label:"SD"},{value:"TN",label:"TN"},{value:"TX",label:"TX"},{value:"UT",label:"UT"},{value:"VT",label:"VT"},
                  {value:"VA",label:"VA"},{value:"WA",label:"WA"},{value:"WV",label:"WV"},{value:"WI",label:"WI"},{value:"WY",label:"WY"},{value:"DC",label:"DC"}
                ]} />
                <LabeledInput label="Zip" value={raZip} onChange={setRaZip} type="text" small />
              </div>
            </div>
          </SectionCard>
          <div className="mtk-grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <SectionCard title="CURRENT LOAN" accent={COLORS.navy}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 4 }}>
                <Select label="Loan Program" value={raProg} onChange={setRaProg} small options={[
                  {value:"conventional",label:"Conventional"},{value:"fha",label:"FHA"},{value:"va",label:"VA"},{value:"usda",label:"USDA"},{value:"unknown",label:"Unknown"}
                ]} />
                <Select label="Occupancy" value={raOcc} onChange={setRaOcc} small options={[
                  {value:"primary",label:"Owner Occupied"},{value:"vacation",label:"Vacation Home"},{value:"investment",label:"Investment Property"}
                ]} />
              </div>
              <LabeledInput label="Original Note Date" type="date" value={noteDate} onChange={setNoteDate} hint={monthsPaidCalc > 0 ? `${Math.floor(monthsPaidCalc / 12)}yr ${monthsPaidCalc % 12}mo into loan (${monthsPaidCalc} payments made)` : "Enter note date to calculate"} />
              <LabeledInput label="Original Term" value={curTermOriginal} onChange={setCurTermOriginal} suffix="years" />
              <LabeledInput label="Interest Rate" value={curRate} onChange={setCurRate} suffix="%" step="0.125" />
              <LabeledInput label="Original Loan Amount" prefix="$" value={origLoanAmount} onChange={setOrigLoanAmount} useCommas />
              <LabeledInput label="Current P&I Payment" prefix="$" value={raCurPI} onChange={setRaCurPI} suffix="/mo" useCommas hint={raCurPI && analysis.statedPIDiff !== null ? (Math.abs(analysis.statedPIDiff) < 1 ? `✓ Matches calculated P&I of ${fmt2(analysis.curPI)}/mo` : analysis.statedPIDiff > 0 ? `Stated is ${fmt2(Math.abs(analysis.statedPIDiff))} higher than the calculated amount of ${fmt2(analysis.curPI)}/mo — possible extra payments` : `Stated is ${fmt2(Math.abs(analysis.statedPIDiff))} lower than the calculated amount of ${fmt2(analysis.curPI)}/mo — check inputs`) : "Optional — enter to compare with calculated P&I"} />
              <LabeledInput label="Current Loan Balance" prefix="$" value={curBalance} onChange={setCurBalance} useCommas
                hint={analysis.estimatedPayoff > 0 ? "Est. payoff: " + fmt(analysis.estimatedPayoff) + " (bal + " + analysis.perDiemDays + " days per-diem + $" + analysis.payoffFee + " fee" + (analysis.escrowCredit > 0 ? " − " + fmt(analysis.escrowCredit) + " escrow credit" : "") + ")" : undefined} />
              <LabeledInput label="Most Recent Payment Date" type="date" value={lastPaymentDate} onChange={setLastPaymentDate} hint="Used for payoff per-diem calculation" />
              <LabeledInput label="Current Monthly MI" prefix="$" value={curPMI} onChange={setCurPMI} suffix="/mo" useCommas hint="PMI or MIP currently being paid" />
              {analysis.extraPaymentObservation.detected && (
                <div style={{ fontSize: 12, color: COLORS.green, padding: "8px 10px", background: COLORS.greenLight, borderRadius: 6, marginBottom: 12, lineHeight: 1.5, fontFamily: font }}>
                  <strong>🎉 Extra Payments Detected:</strong> {analysis.extraPaymentObservation.message}
                </div>
              )}
            </SectionCard>

            <SectionCard title="ESCROW" accent={COLORS.navy}>
              {/* Property Tax: toggle between rate and dollar */}
              <div style={{ marginBottom: 6 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
                  <span style={{ fontSize: 11, fontWeight: 600, color: COLORS.gray, fontFamily: font }}>Property Tax</span>
                  <div style={{ display: "flex", gap: 0, borderRadius: 6, overflow: "hidden", border: `1px solid ${COLORS.border}` }}>
                    {[{ v: "rate", l: "%" }, { v: "dollar", l: "$" }].map(o => (
                      <button key={o.v} onClick={() => setTaxMode(o.v)} style={{ padding: "2px 10px", fontSize: 11, fontWeight: 700, fontFamily: font, border: "none", cursor: "pointer", background: taxMode === o.v ? COLORS.blue : "transparent", color: taxMode === o.v ? "#fff" : COLORS.gray, transition: "all 0.15s" }}>{o.l}</button>
                    ))}
                  </div>
                </div>
                {taxMode === "rate" ? (
                  <LabeledInput label="" value={propertyTaxRate} onChange={setPropertyTaxRate} suffix="% of home value" small hint={`${fmt2((parseFloat(curHomeValue) || 0) * (homesteadExemption ? 0.80 : 1) * (parseFloat(propertyTaxRate) || 0) / 100 / 12)}/mo · ${fmt2((parseFloat(curHomeValue) || 0) * (homesteadExemption ? 0.80 : 1) * (parseFloat(propertyTaxRate) || 0) / 100)}/yr`} />
                ) : (
                  <LabeledInput label="" prefix="$" value={propertyTax} onChange={setPropertyTax} useCommas suffix="/mo" small hint={`${fmt2((parseFloat(propertyTax) || 0) * 12)}/yr`} />
                )}
