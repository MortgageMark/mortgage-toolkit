                value={search} onChange={e=>setSearch(e.target.value)} />
              {(filterLO || filterLOA || filterProcessor || filterStatus || filterType || filterActions || filterBranch || search || metricFilter) && (
                <button className="btn btn-ghost btn-sm" onClick={()=>{ setFilterLO(''); setFilterLOA(''); setFilterProcessor(''); setFilterStatus(''); setFilterType(''); setFilterActions(''); setFilterBranch(''); setSearch(''); setMetricFilter(''); }}>
                  ✕ Clear Filters
                </button>
              )}
              {/* ⋯ More actions dropdown */}
              <div style={{position:'relative'}}>
                <button className="btn btn-ghost" onClick={e=>{ e.stopPropagation(); setShowColPicker(p=>!p); }} style={{color:'#6B7280'}}>⋯</button>
                {showColPicker && (
                  <div style={{position:'absolute',top:'100%',right:0,zIndex:999,background:'white',border:'1px solid #E5E7EB',borderRadius:10,boxShadow:'0 4px 20px rgba(0,0,0,0.15)',minWidth:160,padding:'4px 0',marginTop:4}}
                    onClick={e=>e.stopPropagation()}>
                    <div style={{padding:'6px 14px',fontSize:11,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',letterSpacing:'0.4px'}}>Actions</div>
                    <button style={{display:'flex',alignItems:'center',gap:8,padding:'8px 14px',background:'none',border:'none',cursor:'pointer',fontSize:13,width:'100%',textAlign:'left',color:'#374151'}}
                      onMouseEnter={e=>e.currentTarget.style.background='#F3F4F6'} onMouseLeave={e=>e.currentTarget.style.background='none'}
                      onClick={()=>{ setShowImport(true); setShowColPicker(false); }}>Import</button>
                    <button style={{display:'flex',alignItems:'center',gap:8,padding:'8px 14px',background:'none',border:'none',cursor:'pointer',fontSize:13,width:'100%',textAlign:'left',color:'#374151'}}
                      onMouseEnter={e=>e.currentTarget.style.background='#F3F4F6'} onMouseLeave={e=>e.currentTarget.style.background='none'}
                      onClick={()=>{
                        setShowColPicker(false);
                        const cols = ['Borrower','Address','Status','Close Date','Funding Date','Lock Exp','LO','LOA','Processor','Amount','Program','Rate','Type','Loan #','Note'];
                        const rows = filteredDeals.map(d => {
                          const lo=profiles.find(p=>p.id===d.assigned_lo_id), loa=profiles.find(p=>p.id===d.assigned_loa_id), proc=profiles.find(p=>p.id===d.assigned_processor_id);
                          return [d.primary_borrower_name||'',[d.property_address,d.city,d.state].filter(Boolean).join(', '),d.status||'',d.closing_date||'',d.funding_date||'',d.lock_expiration_date||'',lo?.display_name||lo?.email||'',loa?.display_name||loa?.email||'',proc?.display_name||proc?.email||'',d.loan_amount||'',d.loan_program||'',d.rate||'',d.trans_type||'',d.file_number||'',d.quick_note||'']
                          .map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',');
                        });
                        const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent([cols.join(','),...rows].join('\n')); a.download=`pipeline-${new Date().toISOString().slice(0,10)}.csv`; a.click();
                      }}>Export</button>
                    <button style={{display:'flex',alignItems:'center',gap:8,padding:'8px 14px',background:'none',border:'none',cursor:'pointer',fontSize:13,width:'100%',textAlign:'left',color:'#374151'}}
                      onMouseEnter={e=>e.currentTarget.style.background='#F3F4F6'} onMouseLeave={e=>e.currentTarget.style.background='none'}
                      onClick={()=>{ setShowColPicker(false); window.print(); }}>Print</button>
                  </div>
                )}
              </div>
              <button className="btn btn-navy" onClick={createNewDeal}>
                + New Deal
              </button>
            </div>

            {/* ⚙ Columns button — above table, right-aligned */}
            <div style={{display:'flex',justifyContent:'flex-end',marginBottom:6,position:'relative'}}>
              <div style={{position:'relative'}}>
                <button ref={colBtnRef}
                  onClick={e=>{ e.stopPropagation(); if(colPickerOpen){setColPickerOpen(false);return;} const r=colBtnRef.current?.getBoundingClientRect()||{}; setColPickerPos({top:(r.bottom||0)+4,right:window.innerWidth-(r.right||0)}); setColPickerOpen(true); }}
                  style={{background:'white',border:'1px solid #E5E7EB',borderRadius:6,cursor:'pointer',fontSize:13,padding:'5px 12px',fontWeight:500,color:'#374151',display:'flex',alignItems:'center',gap:6}}
                  title="Show, hide and reorder columns">
                  ⚙ Columns
                </button>
              </div>
            </div>

            {loading ? (
              <div style={{textAlign:'center',padding:60}}>
                <div className="spinner" style={{width:28,height:28,margin:'0 auto'}}></div>
                <div style={{marginTop:12,color:'#9CA3AF',fontSize:13}}>Loading pipeline…</div>
              </div>
            ) : (
              <PipelineTable
                deals={filteredDeals}
                profiles={profiles || []}
                statuses={customStatuses}
                msAlerts={msAlerts}
                msProgress={msProgress}
                coborrowerMap={coborrowerMap}
                currentUserId={user.id}
                onOpenDeal={openDeal}
                onEditDeal={(deal)=>openDeal(deal,'info_edit')}
                onStatusChange={changeStatus}
                onBulkStatus={bulkStatus}
                onUnarchive={unarchiveDeal}
                onCloneDeal={duplicateDeal}
                onArchiveDeal={archiveDeal}
                onDeleteDeal={async (deal)=>{ const {data,error} = await sb.from('lmt_deals').delete().eq('id',deal.id).select('id'); if (error) { alert('Delete failed: ' + (error.message||'Permission denied')); } else if (data?.length > 0) { setDeals(prev=>prev.filter(d=>d.id!==deal.id)); } else { alert('Delete was blocked by a database policy. Ask your admin to delete from Supabase directly, or check the lmt_deals RLS policies.'); } }}
                onScenarioLink={(deal)=>setScenarioLinkDeal(deal)}
                onOpenDealDates={(deal)=>openDeal(deal,'dates')}
                icdDataMap={icdDataMap}
                onPrintDeal={(deal)=>{
                  const lo=profiles.find(p=>p.id===deal.assigned_lo_id);
                  const win=window.open('','_blank','width=800,height=600');
                  win.document.write(`<!DOCTYPE html><html><head><title>${deal.primary_borrower_name} — Deal Summary</title><style>body{font-family:system-ui,sans-serif;margin:32px;color:#111}h1{font-size:20px}@media print{button{display:none}}</style></head><body><h1>${deal.primary_borrower_name}</h1><p>${deal.property_address||'Address TBD'}</p><p>Status: ${deal.status}</p><p>LO: ${lo?.display_name||''}</p><p>Close: ${deal.closing_date||'TBD'}</p><script>window.onload=()=>{window.print();window.close()}<\/script></body></html>`);
                  win.document.close();
                }}
                visibleCols={visibleCols}
                onColsChange={(cols)=>{ setVisibleCols(cols); if(cols) localStorage.setItem('lmt_cols',JSON.stringify(cols)); else localStorage.removeItem('lmt_cols'); }}
                filters={{ status:filterStatus, lo:filterLO, loa:filterLOA, processor:filterProcessor, type:filterType, actions:filterActions, branch:filterBranch }}
                onFilter={(key,val)=>{ key==='status'?setFilterStatus(val):key==='lo'?setFilterLO(val):key==='loa'?setFilterLOA(val):key==='processor'?setFilterProcessor(val):key==='actions'?setFilterActions(val):key==='branch'?setFilterBranch(val):setFilterType(val); }}
                branches={branches}
                colPickerOpen={colPickerOpen}
                setColPickerOpen={setColPickerOpen}
                colPickerPos={colPickerPos}
                onNoteChange={async (deal, note) => {
                  const { data } = await sb.from('lmt_deals').update({ quick_note: note }).eq('id', deal.id).select().single();
                  if (data) setDeals(prev => prev.map(d => d.id === data.id ? data : d));
                }}
                onFieldChange={async (dealId, patch) => {
                  const { data } = await sb.from('lmt_deals').update(patch).eq('id', dealId).select().single();
                  if (data) setDeals(prev => prev.map(d => d.id === data.id ? {...d,...data} : d));
                }}
                sortCol={sortCol}
                sortDir={sortDir}
                onSort={(col) => {
                  if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
                  else { setSortCol(col); setSortDir('asc'); }
                }}
              />
            )}
          </>
        )}
      </div>

      {/* CSV Import Modal */}
      {scenarioLinkDeal && (
        <ScenarioLinkModal
          deal={scenarioLinkDeal}
          onClose={()=>setScenarioLinkDeal(null)}
          onLink={async (scenario)=>{
            const { data } = await sb.from('lmt_deals').update({ hlt_scenario_name: scenario.name, hlt_scenario_id: scenario.id }).eq('id', scenarioLinkDeal.id).select().single();
            if (data) setDeals(prev => prev.map(d => d.id === data.id ? data : d));
            setScenarioLinkDeal(null);
          }}
        />
      )}

      {showImport && (
        <CsvImportModal
          profiles={profiles}
          statuses={customStatuses}
          onClose={()=>setShowImport(false)}
          onImport={async (rows) => {
            for (const row of rows) {
              const { data } = await sb.from('lmt_deals').insert(row).select().single();
              if (data) setDeals(prev => [data, ...prev]);
            }
            setShowImport(false);
            alert(`✅ ${rows.length} deal${rows.length>1?'s':''} imported successfully!`);
          }}
        />
      )}

      {/* New / Edit Deal Modal */}
      {dealModal !== null && (
        <DealModal
          deal={dealModal === 'new' ? null : dealModal}
          profiles={profiles}
          statuses={customStatuses}
          branches={branches}
          existingDeals={deals}
          onSave={saveDeal}
          onClose={()=>setDealModal(null)}
          currentProfile={profile}
        />
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('lmt-root')).render(<App />);
</script>
</body>
</html>
