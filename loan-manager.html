function MilestoneTableView({ milestones, onSave }) {
  const sorted = [...milestones].sort((a,b) => (a.sort_order||0) - (b.sort_order||0));

  return (
    <div style={{overflowX:'auto'}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
        <thead>
          <tr style={{background:'#1B2A4A',color:'white'}}>
            {['Milestone','Ordered','Follow Up','Due','Received','Done','N/A'].map(h=>(
              <th key={h} style={{padding:'8px 12px',textAlign:'left',fontWeight:600,fontSize:11,whiteSpace:'nowrap'}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {sorted.map((ms, i) => {
            const cfg = getFieldConfig(ms);
            const diff = daysDiff(ms.due_date);
            const fuDiffTbl = daysDiff(ms.followup_date);
            const rowOverdue = !ms.is_done && ((ms.due_date && diff < 0) || (ms.followup_date && fuDiffTbl < 0));
            const rowDueToday = !ms.is_done && !rowOverdue && ((ms.due_date && diff === 0) || (ms.followup_date && fuDiffTbl === 0));
            const rowBg = ms.is_done ? '#F0FDF4' : rowOverdue ? '#FFF5F5' : rowDueToday ? '#FFFBEB' : i%2===0?'white':'#FAFAFA';
            const DCell = ({ val, onChange, field, onToday }) => {
              if (!cfg[field]) return <td style={{padding:'6px 12px',color:'#E5E7EB'}}>—</td>;
              // Determine if this specific date cell is overdue or due today
              const cellDiff = val ? daysDiff(val) : null;
              const isSkippedField = field === 'received'; // received is a completion field, not a deadline
              const cellOverdue  = !isSkippedField && !ms.is_done && cellDiff !== null && cellDiff < 0;
              const cellDueToday = !isSkippedField && !ms.is_done && cellDiff === 0;
              const cellBorder = cellOverdue
                ? '2.5px solid #DC2626'
                : cellDueToday
                ? '2.5px solid #D97706'
                : '1px solid transparent';
              const cellBg = cellOverdue ? '#FFF5F5' : cellDueToday ? '#FFFBEB' : 'transparent';
              return (
                <td style={{padding:'3px 5px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:3,background:cellBg,border:cellBorder,borderRadius:5,padding:'2px 4px'}}>
                    <SmartDate value={val||''} onChange={onChange} disabled={ms.is_na} />
                    {!val && !ms.is_na && onToday && (
                      <button onClick={onToday} title="Set to today"
                        style={{flexShrink:0,padding:'1px 5px',borderRadius:99,border:'1px solid',fontSize:9,fontWeight:700,cursor:'pointer',lineHeight:1.4,
                          borderColor: field==='received'?'#BBF7D0':'#BFDBFE',
                          background:  field==='received'?'#DCFCE7':'#EFF6FF',
                          color:       field==='received'?'#16A34A':'#2563EB'}}>
                        T
                      </button>
                    )}
                  </div>
                </td>
              );
            };
            return (
              <tr key={ms.id} style={{background:rowBg,borderBottom:'1px solid #F3F4F6'}}>
                <td style={{padding:'6px 12px',fontWeight:600,color: ms.is_done?'#16A34A':'#1B2A4A',whiteSpace:'nowrap'}}>
                  {getMilestoneLabel(ms)}
                  {(ms.due_date && diff < 0 && !ms.is_done) && <span style={{marginLeft:6,fontSize:9,background:'#FEE2E2',color:'#DC2626',borderRadius:3,padding:'1px 4px',fontWeight:700}}>OVERDUE</span>}
                  {(ms.due_date && diff === 0 && !ms.is_done) && <span style={{marginLeft:6,fontSize:9,background:'#FEF3C7',color:'#D97706',borderRadius:3,padding:'1px 4px',fontWeight:700}}>TODAY</span>}
                </td>
                <DCell field="ordered"  val={ms.ordered_date}  onChange={e=>onSave({...ms,ordered_date:e.target.value})}  onToday={()=>onSave({...ms,ordered_date:today()})} />
                <DCell field="followup" val={ms.followup_date} onChange={e=>onSave({...ms,followup_date:e.target.value})} />
                <DCell field="due"      val={ms.due_date}      onChange={e=>onSave({...ms,due_date:e.target.value})} />
                <DCell field="received" val={ms.received_date} onChange={e=>{ if(validateReceived(e.target.value)) onSave({...ms,received_date:e.target.value,is_done:!!e.target.value}); }} onToday={()=>onSave({...ms,received_date:today(),is_done:true})} />
                <td style={{padding:'6px 12px',textAlign:'center'}}>
                  <input type="checkbox" checked={!!ms.is_done} onChange={e=>onSave({...ms,is_done:e.target.checked})} style={{accentColor:'#16A34A'}} />
                </td>
                <td style={{padding:'6px 12px',textAlign:'center'}}>
                  <input type="checkbox" checked={!!ms.is_na} onChange={e=>onSave({...ms,is_na:e.target.checked})} />
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function MilestoneCard({ ms, presets, dealTurntimes, onChange, vendorInfo }) {
  const preset = presets.find(p => p.milestone_type === ms.milestone_type);
  // Use per-loan turntime override if available, else global preset
  const dealTT = dealTurntimes?.find(t => t.milestone_type === ms.milestone_type);
  const turntimeDays = dealTT?.turntime_days ?? preset?.turntime_days ?? 3;
  const cfg = getFieldConfig(ms);
  const label = getMilestoneLabel(ms);

  const followupDays    = dealTT?.followup_days     ?? preset?.followup_days     ?? 1;
  const alertBeforeDays = dealTT?.alert_days_before ?? preset?.alert_days_before ?? 1;

  const calcDueDate = (orderedDate) => {
    if (!orderedDate || !turntimeDays) return '';
    return addBusinessDays(orderedDate, turntimeDays);
  };

  const calcFollowUpDate = (orderedDate) => {
    if (!orderedDate) return '';
    if (followupDays === 0) return calcDueDate(orderedDate); // FU = Due date when 0
    return addBusinessDays(orderedDate, followupDays);
  };

  // Due date is mandatory until received
  const dueMissing = cfg.due && ms.ordered_date && !ms.due_date && !ms.received_date && !ms.is_done && !ms.is_na;

  // Ordered change: recalculate due + follow up, clear lock
  const handleOrdered = (val) => {
    const due = calcDueDate(val);
    const fu  = calcFollowUpDate(val);
    onChange({
      ...ms,
      ordered_date:  val,
      due_date:      due || ms.due_date,
      due_date_locked: false,
      followup_date: fu  || ms.followup_date,
    });
  };

  // Due date manual change: set lock
  const handleDue = (val) => {
    onChange({ ...ms, due_date: val, due_date_locked: true });
  };

  // Unlock due date and recalculate from current ordered date
  const unlockDue = () => {
    const due = calcDueDate(ms.ordered_date);
    onChange({ ...ms, due_date: due || ms.due_date, due_date_locked: false });
  };

  const [vendorPopup, setVendorPopup] = React.useState(false);
  const hasVendor = vendorInfo && (vendorInfo.company || vendorInfo.contact || vendorInfo.email || vendorInfo.phone);

  const diff = daysDiff(ms.due_date);
  const isIcd = ms.milestone_type === 'icd';
  const icdDone = isIcd && !!ms.icd_signed_date;
  const effectiveDone = isIcd ? icdDone : !!ms.is_done;
  const fuDiff = daysDiff(ms.followup_date);
  const cardClass = `milestone-card${
    ms.is_na ? ' na' :
    effectiveDone ? ' done' :
    (ms.due_date && diff < 0) ? ' overdue' :
    (ms.followup_date && fuDiff !== null && fuDiff < 0) ? ' overdue' :
    (ms.due_date && diff !== null && diff >= 0 && diff <= alertBeforeDays) ? ' due-today' :
    (ms.followup_date && fuDiff !== null && fuDiff >= 0 && fuDiff <= alertBeforeDays) ? ' due-today' :
    ''
  }`;

  const Row = ({ label: lbl, children, show=true, alert }) => {
    const rowBg    = alert==='overdue' ? 'rgba(254,202,202,0.4)' : alert==='soon' ? 'rgba(253,230,138,0.4)' : 'transparent';
    const border   = alert==='overdue' ? '2px solid #EF4444'     : alert==='soon' ? '2px solid #F59E0B'     : 'none';
    const lblColor = alert==='overdue' ? '#DC2626'               : alert==='soon' ? '#B45309'               : undefined;
    return (
      <div className="ms-row" style={{opacity:show?1:0,pointerEvents:show?'auto':'none',
        background:rowBg,border:border,borderRadius:6,
        marginLeft:-4,marginRight:-4,paddingLeft:4,paddingRight:4,
        transition:'all 0.15s'}}>
        <span className="ms-label" style={{fontWeight:alert?700:undefined,color:lblColor}}>{lbl}</span>
        {children}
      </div>
    );
  };

  return (
    <div className={cardClass}>
      <div className="milestone-title">
        <div style={{flex:1,position:'relative'}}>
          {hasVendor ? (
            <span onClick={()=>setVendorPopup(v=>!v)}
              style={{fontSize:11,fontWeight:700,cursor:'pointer',color:'#2563EB',textDecoration:'underline',textDecorationStyle:'dotted',textUnderlineOffset:2}}>
              {label} ↗
            </span>
          ) : (
            <span style={{fontSize:11,fontWeight:700}}>{label}</span>
          )}
          {ms.borrower_ref && <span style={{fontSize:9,background:'#EDE9FE',color:'#6D28D9',borderRadius:3,padding:'1px 5px',marginLeft:5,fontWeight:600}}>{ms.borrower_ref==='primary'?'P':ms.borrower_ref.replace('co','C')}</span>}
          {vendorPopup && hasVendor && (
            <div style={{position:'absolute',top:'100%',left:0,zIndex:1300,background:'white',border:'1px solid #E5E7EB',borderRadius:10,boxShadow:'0 8px 24px rgba(0,0,0,0.15)',padding:'12px 16px',minWidth:220,marginTop:4}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <span style={{fontSize:11,fontWeight:700,color:'#1B2A4A',textTransform:'uppercase',letterSpacing:'0.04em'}}>{label} Contact</span>
                <button onClick={()=>setVendorPopup(false)} style={{background:'none',border:'none',cursor:'pointer',color:'#9CA3AF',fontSize:16,padding:0,lineHeight:1}}>×</button>
              </div>
              {vendorInfo.company && <div style={{fontSize:13,fontWeight:600,color:'#1B2A4A',marginBottom:3}}>{vendorInfo.company}</div>}
              {vendorInfo.contact && <div style={{fontSize:12,color:'#4B5563',marginBottom:3}}>👤 {vendorInfo.contact}</div>}
              {vendorInfo.email   && <div style={{fontSize:12,marginBottom:3}}><a href={`mailto:${vendorInfo.email}`} style={{color:'#2563EB'}}>{vendorInfo.email}</a></div>}
              {vendorInfo.phone   && <div style={{fontSize:12,color:'#4B5563'}}>📞 {vendorInfo.phone}</div>}
            </div>
          )}
        </div>
        {effectiveDone && <span style={{color:'#16A34A',fontSize:14}}>✓</span>}
        {!effectiveDone && ms.due_date && diff < 0 && <span className="tag tag-red" style={{fontSize:9}}>OVERDUE</span>}
        {!effectiveDone && ms.due_date && diff === 0 && !(diff < 0) && <span className="tag tag-yellow" style={{fontSize:9}}>TODAY</span>}
      </div>
      <div className="milestone-dates">
        {/* ICD — same order as other cards: Ordered, FU, Due, Signed */}
        {isIcd ? <>
          <Row label="Ordered">
            <div style={{display:'flex',alignItems:'center',gap:4,flex:1}}>
              <SmartDate value={ms.ordered_date||''} onChange={e=>onChange({...ms,ordered_date:e.target.value})} disabled={ms.is_na} />
              {!ms.ordered_date && !ms.is_na && (
                <button onClick={()=>onChange({...ms,ordered_date:today()})}
                  style={{flexShrink:0,padding:'2px 7px',borderRadius:99,border:'1px solid #BFDBFE',background:'#EFF6FF',color:'#2563EB',fontSize:10,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',lineHeight:1.4}}>
                  Today
                </button>
              )}
            </div>
          </Row>
          <Row label="Follow Up" alert={!effectiveDone&&fuDiff!==null&&fuDiff<0?'overdue':!effectiveDone&&fuDiff!==null&&fuDiff>=0&&fuDiff<=alertBeforeDays?'soon':undefined}><SmartDate value={ms.followup_date||''} onChange={e=>onChange({...ms,followup_date:e.target.value})} disabled={ms.is_na} /></Row>
          <Row label="Due" alert={!effectiveDone&&diff!==null&&diff<0?'overdue':!effectiveDone&&diff!==null&&diff>=0&&diff<=alertBeforeDays?'soon':undefined}><SmartDate value={ms.due_date||''} onChange={e=>handleDue(e.target.value)} disabled={ms.is_na} /></Row>
          <Row label="Signed ✓">
            <div style={{display:'flex',alignItems:'center',gap:4,flex:1}}>
              <SmartDate value={ms.icd_signed_date||''} onChange={e=>{ if(validateReceived(e.target.value)) onChange({...ms,icd_signed_date:e.target.value,is_done:!!e.target.value}); }} disabled={ms.is_na} />
              {!ms.icd_signed_date && !ms.is_na && (
                <button onClick={()=>onChange({...ms,icd_signed_date:today(),is_done:true})}
                  style={{flexShrink:0,padding:'2px 7px',borderRadius:99,border:'1px solid #BBF7D0',background:'#DCFCE7',color:'#16A34A',fontSize:10,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',lineHeight:1.4}}>
                  Today
                </button>
              )}
            </div>
          </Row>
        </> : <>
          <Row label="Ordered" show={cfg.ordered}>
            <div style={{display:'flex',alignItems:'center',gap:4,flex:1}}>
              <SmartDate value={ms.ordered_date||''} onChange={e=>handleOrdered(e.target.value)} disabled={ms.is_na} />
              {!ms.ordered_date && !ms.is_na && (
                <button
                  onClick={()=>handleOrdered(today())}
                  title="Set to today"
                  style={{flexShrink:0,padding:'2px 7px',borderRadius:99,border:'1px solid #BFDBFE',background:'#EFF6FF',color:'#2563EB',fontSize:10,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',lineHeight:1.4}}>
                  Today
                </button>
              )}
            </div>
          </Row>
          <Row label="Follow Up" show={cfg.followup}
            alert={!effectiveDone&&ms.followup_date&&fuDiff!==null&&fuDiff<0?'overdue':!effectiveDone&&ms.followup_date&&fuDiff!==null&&fuDiff>=0&&fuDiff<=alertBeforeDays?'soon':undefined}>
            <SmartDate value={ms.followup_date||''} onChange={e=>onChange({...ms,followup_date:e.target.value})} disabled={ms.is_na} />
          </Row>
          <Row label="Due" show={cfg.due}
            alert={!effectiveDone&&ms.due_date&&diff!==null&&diff<0?'overdue':!effectiveDone&&ms.due_date&&diff!==null&&diff>=0&&diff<=alertBeforeDays?'soon':dueMissing?'soon':undefined}>
            <div style={{flex:1}}>
              <SmartDate value={ms.due_date||''} onChange={e=>handleDue(e.target.value)} disabled={ms.is_na} />
              {dueMissing && !ms.due_date && <span style={{fontSize:9,color:'#D97706',display:'block',fontWeight:600,lineHeight:1.2}}>Required</span>}
            </div>
          </Row>
          <Row label="Received" show={cfg.received}>
            <div style={{display:'flex',alignItems:'center',gap:4,flex:1}}>
              <SmartDate value={ms.received_date||''} onChange={e=>{ if(validateReceived(e.target.value)) onChange({...ms,received_date:e.target.value,is_done:!!e.target.value}); }} disabled={ms.is_na} />
              {!ms.received_date && !ms.is_na && (
                <button onClick={()=>onChange({...ms,received_date:today(),is_done:true})}
                  title="Set received to today"
                  style={{flexShrink:0,padding:'2px 7px',borderRadius:99,border:'1px solid #BBF7D0',background:'#DCFCE7',color:'#16A34A',fontSize:10,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',lineHeight:1.4}}>
                  Today
                </button>
              )}
            </div>
          </Row>
        </>}
      </div>
      <div className="ms-check">
        <input type="checkbox" checked={!!effectiveDone} onChange={e=>onChange({...ms,is_done:e.target.checked})} />
        <span>{isIcd?'Signed':'Done'}</span>
        <span style={{marginLeft:'auto'}}>
          <input type="checkbox" checked={!!ms.is_na} onChange={e=>onChange({...ms,is_na:e.target.checked})} />{' '}N/A
        </span>
      </div>
      <textarea value={ms.notes||''} onChange={e=>onChange({...ms,notes:e.target.value})} placeholder="Notes…"
        disabled={ms.is_na} rows={1}
        style={{width:'100%',marginTop:8,padding:'4px 6px',border:'1px solid #E5E7EB',borderRadius:4,fontSize:11,fontFamily:'inherit',resize:'vertical',color:'#6B7280',background:ms.is_na?'#F9FAFB':'white'}} />
    </div>
  );
}

// EMAIL COMPOSER MODAL
// ─────────────────────────────────────────────
function EmailComposer({ emailModal, onClose, loProfile }) {
  const { ms, deal, templates } = emailModal;
  const info = MILESTONE_TYPES.find(m => m.key === ms.milestone_type);
  const matchingTemplate = templates.find(t => t.milestone_type === ms.milestone_type);

  const fillPlaceholders = (text) => {
    return (text || '')
      .replace(/\{\{borrower_name\}\}/gi, deal.primary_borrower_name || '')
      .replace(/\{\{property_address\}\}/gi, [deal.property_address, deal.city, deal.state].filter(Boolean).join(', ') || 'TBD')
      .replace(/\{\{closing_date\}\}/gi, deal.closing_date ? fmtDate(deal.closing_date) : 'TBD')
      .replace(/\{\{loan_amount\}\}/gi, deal.loan_amount ? fmtCurrency(deal.loan_amount) : '')
      .replace(/\{\{loan_program\}\}/gi, deal.loan_program || '')
      .replace(/\{\{rate\}\}/gi, deal.rate ? deal.rate + '%' : '')
      .replace(/\{\{file_number\}\}/gi, deal.file_number || '')
      .replace(/\{\{lo_name\}\}/gi,    loProfile?.display_name || '')
      .replace(/\{\{lo_phone\}\}/gi,   loProfile?.phone || loProfile?.cell_phone || '')
      .replace(/\{\{lo_nmls\}\}/gi,    loProfile?.nmls || '')
      .replace(/\{\{lo_company\}\}/gi, loProfile?.company || '')
      .replace(/\{\{lo_email\}\}/gi,   loProfile?.email || '');
  };

  // Auto-fill To: based on milestone type
  const vendorEmailMap = {
    title:    deal.title_company_email,
    appraisal:deal.appraiser_email,
    hoi:      deal.hoi_company_email,
    flood:    deal.flood_company_email,
    icd:      '',
    le:       '',
    voe:      '',
  };
  const defaultTo = vendorEmailMap[ms.milestone_type] || '';
  const vendorNameMap = {
    title:    deal.title_company,
    appraisal:deal.appraiser,
    hoi:      deal.hoi_company,
    flood:    deal.flood_company,
  };
  const vendorName = vendorNameMap[ms.milestone_type] || '';

  const defaultSubject = `${info?.label || ms.milestone_type} — ${deal.primary_borrower_name}${deal.property_address ? ' | ' + deal.property_address : ''}`;
  const [to, setTo] = useState(defaultTo);
  const [subject, setSubject] = useState(defaultSubject);
  const [body, setBody] = useState(
    matchingTemplate
      ? `[Template: ${matchingTemplate.name}]\n\nOpen your Google Doc to copy the email body:\n${matchingTemplate.google_doc_url}\n\nPlaceholders to use:\n• {{borrower_name}} = ${deal.primary_borrower_name}\n• {{property_address}} = ${[deal.property_address,deal.city,deal.state].filter(Boolean).join(', ')||'TBD'}\n• {{closing_date}} = ${deal.closing_date?fmtDate(deal.closing_date):'TBD'}\n• {{loan_amount}} = ${deal.loan_amount?fmtCurrency(deal.loan_amount):''}\n• {{loan_program}} = ${deal.loan_program||''}`
      : `Hi,\n\nI am reaching out regarding the ${info?.label || ms.milestone_type} for:\n\nBorrower: ${deal.primary_borrower_name}\nProperty: ${[deal.property_address,deal.city,deal.state].filter(Boolean).join(', ')||'TBD'}\nClosing Date: ${deal.closing_date?fmtDate(deal.closing_date):'TBD'}\nLoan Amount: ${deal.loan_amount?fmtCurrency(deal.loan_amount):''}\nLoan Program: ${deal.loan_program||''}\n\nPlease let me know if you need anything further.\n\nThank you,`
  );

  const sendViaEmail = () => {
    const mailto = `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    window.open(mailto);
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:560}}>
        <div className="modal-header">
          <h2>✉️ {info?.label || ms.milestone_type} Email</h2>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          {matchingTemplate && (
            <div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:6,padding:'8px 12px',fontSize:12,marginBottom:14,color:'#1D4ED8'}}>
              📋 Template: <strong>{matchingTemplate.name}</strong> —
              <a href={matchingTemplate.google_doc_url} target="_blank" rel="noreferrer" style={{color:'#2563EB',marginLeft:4}}>Open Google Doc ↗</a>
            </div>
          )}
          <div className="form-group" style={{marginBottom:12}}>
            <label>To {vendorName && <span style={{color:'#2563EB',fontWeight:400}}>({vendorName})</span>}</label>
            <input value={to} onChange={e=>setTo(e.target.value)} placeholder="vendor@example.com" type="email" />
            {!to && ms.milestone_type in vendorEmailMap && (
              <div style={{fontSize:11,color:'#D97706',marginTop:4}}>
                ⚠ No email on file — add in the Contacts tab.
              </div>
            )}
          </div>
          <div className="form-group" style={{marginBottom:12}}>
            <label>Subject</label>
            <input value={subject} onChange={e=>setSubject(e.target.value)} />
          </div>
          <div className="form-group">
            <label>Body</label>
            <textarea value={body} onChange={e=>setBody(e.target.value)}
              rows={10} style={{resize:'vertical',fontFamily:'inherit',fontSize:13,padding:10,border:'1px solid #E5E7EB',borderRadius:6,width:'100%'}} />
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={()=>navigator.clipboard.writeText(body).then(()=>alert('Body copied!'))}>
            📋 Copy Body
          </button>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-navy" onClick={sendViaEmail}>
            ✉️ Open in Email Client
          </button>
        </div>
      </div>
    </div>
  );
}

// DEAL DETAIL MODAL
// ─────────────────────────────────────────────
function DealDetailModal({ deal, profiles, presets, templates, onClose, onEdit, onArchive, onDuplicate, currentUser, pageMode, initialTab, customStatuses, loProfile, lmtContacts, setLmtContacts, onDealChange }) {
  const [tab, setTab] = useState(initialTab || 'milestones');
  const [msView, setMsView] = useState('card');

  // ── Inline Info form state ──────────────────────────────────
  const [infoForm, setInfoForm] = useState(null);
  const [infoSaving, setInfoSaving] = useState(false);
  const [infoCobs, setInfoCobs] = useState([]);
  const infoAutoSaveTimer = React.useRef(null);
  const infoFormMounted = React.useRef(false);
  const ctAutoSaveTimer = React.useRef(null);
  const ctFormMounted = React.useRef(false);

  const initInfoForm = (d) => {
    let fn = d.primary_first_name || '';
    let ln = d.primary_last_name  || '';
    if (!fn && !ln && d.primary_borrower_name) {
      const full = d.primary_borrower_name.trim();
      if (full.includes(',')) { const p=full.split(',').map(s=>s.trim()); ln=p[0]; fn=p[1]||''; }
      else { const p=full.split(' '); fn=p[0]; ln=p.slice(1).join(' '); }
    }
    setInfoForm({...d, primary_first_name:fn, primary_last_name:ln, loan_amount:d.loan_amount||'', rate:d.rate||''});
  };

  useEffect(() => { if (!infoForm && deal) initInfoForm(deal); }, [deal]);

  useEffect(() => {
    if (deal?.id) {
      sb.from('lmt_coborrowers').select('*').eq('deal_id',deal.id).order('sort_order').then(({data})=>{ if(data) setInfoCobs(data); });
    }
  }, [deal?.id]);

  const iset = (k,v) => setInfoForm(p=>({...p,[k]:v}));

  const saveInfo = async () => {
    if (!infoForm) return;
    setInfoSaving(true);
    const payload = {
      ...infoForm,
      primary_borrower_name: [infoForm.primary_first_name||'',infoForm.primary_last_name||''].filter(Boolean).join(' ') || infoForm.primary_borrower_name,
      loan_amount: infoForm.loan_amount ? parseFloat(String(infoForm.loan_amount).replace(/,/g,'')) : null,
      rate: infoForm.rate ? parseFloat(infoForm.rate) : null,
      closing_date: infoForm.closing_date||null, funding_date: infoForm.funding_date||null,
      lock_expiration_date: infoForm.lock_expiration_date||null,
    };
    const {data} = await sb.from('lmt_deals').update(payload).eq('id',deal.id).select().single();
    await sb.from('lmt_coborrowers').delete().eq('deal_id',deal.id);
    const cobsToInsert = infoCobs.filter(cb=>(cb.name||cb.first_name||'').trim()).map((cb,i)=>({
      deal_id:deal.id, name:cb.name||[cb.first_name||'',cb.last_name||''].filter(Boolean).join(' '),
      first_name:cb.first_name||'', last_name:cb.last_name||'', nickname:cb.nickname||'',
      email:cb.email||'', phone:cb.phone||'', sort_order:i+1
    }));
    if (cobsToInsert.length>0) await sb.from('lmt_coborrowers').insert(cobsToInsert);
    // Sync ICD due date from closing date
    const icdMs = milestones.find(m=>m.milestone_type==='icd');
    if (icdMs && infoForm.closing_date) {
      const icdDue = calcIcdDueDate(infoForm.closing_date);
      if (icdMs.due_date !== icdDue) {
        await sb.from('lmt_milestones').update({due_date:icdDue||null}).eq('id',icdMs.id);
        setMilestones(prev=>prev.map(m=>m.id===icdMs.id?{...m,due_date:icdDue}:m));
      }
    }
    setInfoSaving(false);
    if (data) {
      setDeals(prev=>prev.map(d=>d.id===deal.id?{...d,...data}:d));
      setInfoJustSaved(true);
      setTimeout(() => setInfoJustSaved(false), 3000);
    }
  };

  // ── Inline Contacts form state ─────────────────────────────
  const [infoJustSaved, setInfoJustSaved] = useState(false);
  const [ctForm, setCtForm] = useState(null);
  const [ctSaving, setCtSaving] = useState(false);
  const [ctJustSaved, setCtJustSaved] = useState(false);
  const [dragVI, setDragVI] = useState(null);
  const [dragVO, setDragVO] = useState(null);

  useEffect(() => { if (!ctForm && deal) setCtForm({...deal}); }, [deal]);

  const ctset = (k,v) => setCtForm(p=>({...p,[k]:v}));

  const saveCt = async () => {
    if (!ctForm) return;
    setCtSaving(true);
    await sb.from('lmt_deals').update(ctForm).eq('id',deal.id);
    setCtSaving(false);
    setCtJustSaved(true);
    setTimeout(() => setCtJustSaved(false), 3000);
    if (onDealChange) onDealChange({ ...deal, ...ctForm });
  };

  // Auto-save info form after 1.5s of inactivity
  React.useEffect(() => {
    if (!infoFormMounted.current) { infoFormMounted.current = true; return; }
    if (infoAutoSaveTimer.current) clearTimeout(infoAutoSaveTimer.current);
    infoAutoSaveTimer.current = setTimeout(saveInfo, 1500);
  }, [infoForm, infoCobs]);

  // Auto-save contacts form after 1.5s of inactivity
  React.useEffect(() => {
    if (!ctFormMounted.current) { ctFormMounted.current = true; return; }
    if (ctAutoSaveTimer.current) clearTimeout(ctAutoSaveTimer.current);
    ctAutoSaveTimer.current = setTimeout(saveCt, 1500);
  }, [ctForm]);

  const [milestones, setMilestones] = useState([]);
  const [notes, setNotes] = useState([]);
  const [hltNotes, setHltNotes] = useState([]);
  const [hltScenarios, setHltScenarios] = useState([]);
  const [coborrowers, setCoborrowers] = useState([]);
  const [newNote, setNewNote] = useState('');
  const [savingMs, setSavingMs] = useState(false);
  const [savingNote, setSavingNote] = useState(false);
  const [emailModal, setEmailModal] = useState(null);
  const [timeline, setTimeline] = useState([]);
  const [dealTurntimes, setDealTurntimes] = useState([]);
  const [conditions, setConditions] = useState([]);
  const [newCondition, setNewCondition] = useState('');
  const [conditionType, setConditionType] = useState('prior_to_docs');
  const [savingCond, setSavingCond] = useState(false);

  const getProfile = (id) => profiles.find(p => p.id === id);
  const dealLoProfile  = getProfile(deal.assigned_lo_id);
  const loaProfile = getProfile(deal.assigned_loa_id);
  const procProfile= getProfile(deal.assigned_processor_id);

  useEffect(() => {
    // Load milestones — v2: read directly from DB, then ensure permanent cards exist
    sb.from('lmt_milestones').select('*').eq('deal_id', deal.id).order('sort_order').then(function({ data }) {
      const existing = data || [];
      const permanent = getPermanentCards(deal);
      const toInsert = permanent.filter(function(pc) {
        return !existing.some(function(m) {
          if (m.milestone_type !== pc.type) return false;
          if (pc.type === 'other') return (m.label||'').toLowerCase() === pc.label.toLowerCase();
          return true;
        });
      });
      if (toInsert.length === 0) { setMilestones(existing); return; }
      const maxOrder = Math.max.apply(null, [-1].concat(existing.map(function(m){ return m.sort_order||0; })));
      const inserts = toInsert.map(function(pc, i) {
        return { deal_id:deal.id, milestone_type:pc.type, label:pc.label,
          sort_order: maxOrder + i + 1, is_core:true,
          fields_config: DEFAULT_FIELD_CONFIGS[pc.type] || DEFAULT_FIELD_CONFIGS.other };
      });

                              {c.cleared_profile?.display_name ? ' by '+c.cleared_profile.display_name : ''}
                            </div>
                          )}
                          {!c.cleared && (
                            <div style={{fontSize:11,color:'#9CA3AF',marginTop:2}}>
                              Added {fmtTimestamp(c.created_at)}
                            </div>
                          )}
                        </div>
                        <button onClick={()=>deleteCondition(c)} style={{background:'none',border:'none',cursor:'pointer',color:'#D1D5DB',fontSize:14,padding:'0 2px',lineHeight:1}}
                          title="Remove condition">×</button>
                      </div>
                    ))}
                  </div>
                );
              })}

              {conditions.length === 0 && (
                <div style={{color:'#9CA3AF',fontSize:13,textAlign:'center',padding:30}}>
                  No conditions yet. Add underwriting conditions to track what needs to be cleared before closing.
                </div>
              )}
            </div>
          )}

          {/* NOTES — LMT (top) + HLT (bottom) */}
          {tab === 'hlt' && (
            <div>
              {/* Quick Note */}
              <div style={{marginBottom:16}}>
                <div style={{fontSize:11,fontWeight:700,color:'#6B7280',textTransform:'uppercase',letterSpacing:'0.4px',marginBottom:6}}>Quick Note</div>
                <div style={{display:'flex',gap:8,alignItems:'flex-start'}}>
                  <textarea value={infoForm?.quick_note||''} onChange={e=>iset('quick_note',e.target.value)}
                    rows={2} placeholder="A short note visible in the pipeline…"
                    style={{flex:1,padding:'8px 10px',border:'1px solid #E5E7EB',borderRadius:6,fontSize:13,resize:'vertical'}} />
                  <button className="btn btn-navy btn-sm" style={{flexShrink:0,marginTop:2}} onClick={async ()=>{
                    await sb.from('lmt_deals').update({quick_note:infoForm?.quick_note||''}).eq('id',deal.id);
                    setDeals(prev=>prev.map(d=>d.id===deal.id?{...d,quick_note:infoForm?.quick_note||''}:d));
                  }}>Save</button>
                </div>
              </div>
              <hr style={{border:'none',borderTop:'1px solid #E5E7EB',marginBottom:16}} />

              {/* LMT Notes — editable */}
              <div className="note-input-row">
                <textarea value={newNote} onChange={e=>setNewNote(e.target.value)}
                  placeholder="Add a note… (Ctrl+Enter to save)"
                  onKeyDown={e=>e.key==='Enter'&&e.ctrlKey&&addNote()} />
                <button className="btn btn-navy" onClick={addNote} disabled={savingNote}>
                  {savingNote ? '…' : 'Add'}
                </button>
              </div>
              <div className="notes-list" style={{marginBottom:8}}>
                {notes.filter(n=>!n.body?.startsWith('[STATUS]')).length === 0 && (
                  <div style={{color:'#9CA3AF',fontSize:13,textAlign:'center',padding:16}}>No notes yet.</div>
                )}
                {notes.filter(n=>!n.body?.startsWith('[STATUS]')).map(n => (
                  <div key={n.id} className="note-item">
                    <div className="note-meta">
                      <strong>{n.profiles?.display_name || n.profiles?.email || 'Unknown'}</strong>
                      {' · '}{fmtTimestamp(n.created_at)}
                    </div>
                    <div className="note-body">{n.body}</div>
                  </div>
                ))}
              </div>

              {/* Divider */}
              {hltNotes.length > 0 && (
                <div style={{display:'flex',alignItems:'center',gap:12,margin:'20px 0 16px'}}>
                  <div style={{flex:1,height:2,background:'linear-gradient(to right,#E5E7EB,#1B2A4A,#E5E7EB)'}} />
                  <div style={{fontSize:11,fontWeight:700,color:'#1B2A4A',textTransform:'uppercase',letterSpacing:'0.8px',whiteSpace:'nowrap',background:'white',padding:'0 8px'}}>
                    HLT Notes
                  </div>
                  <div style={{flex:1,height:2,background:'linear-gradient(to left,#E5E7EB,#1B2A4A,#E5E7EB)'}} />
                </div>
              )}

              {/* HLT Notes — read-only */}
              {hltNotes.length > 0 && (
                <div className="notes-list">
                  {hltNotes.map(n => (
                    <div key={n.id} className="note-item" style={{borderLeft:'3px solid #93C5FD',background:'#F8FAFF'}}>
                      <div className="note-meta">
                        <strong>{n.profiles?.display_name || n.profiles?.email || 'HLT'}</strong>
                        {' · '}{fmtTimestamp(n.created_at)}
                        <span style={{marginLeft:6,fontSize:10,background:'#DBEAFE',color:'#1D4ED8',padding:'1px 5px',borderRadius:3,fontWeight:700}}>HLT</span>
                      </div>
                      <div className="note-body">{n.body}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* HLT SCENARIOS */}
          {tab === 'scenarios' && (
            <div>
              <div style={{fontSize:12,color:'#6B7280',marginBottom:12,padding:'8px 12px',background:'#EFF6FF',borderRadius:6,border:'1px solid #BFDBFE'}}>
                📊 Scenarios from the <strong>Home Loan Toolkit</strong> for this borrower. Read-only — open HLT to make changes.
              </div>
              {hltScenarios.length === 0 && (
                <div style={{color:'#9CA3AF',fontSize:13,textAlign:'center',padding:20}}>No HLT scenarios linked to this contact.</div>
              )}
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {hltScenarios.map(s => {
                  const cd = s.calculation_data || {};
                  const la = cd.pc_la ? '$' + Number(cd.pc_la).toLocaleString() : null;
                  const rate = cd.pc_rate ? cd.pc_rate + '%' : null;
                  const prog = cd.pc_prog ? cd.pc_prog.toUpperCase() : null;
                  const term = cd.pc_term ? cd.pc_term + ' yr' : null;
                  return (
                    <div key={s.id} style={{background:'#F8FAFC',border:'1px solid #E5E7EB',borderRadius:8,padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
                      <div>
                        <div style={{fontWeight:600,fontSize:13}}>{s.name || 'Untitled Scenario'}</div>
                        <div style={{fontSize:11,color:'#6B7280',marginTop:3,display:'flex',gap:10,flexWrap:'wrap'}}>
                          {la && <span>💰 {la}</span>}
                          {rate && <span>📈 {rate}</span>}
                          {prog && <span>🏠 {prog}</span>}
                          {term && <span>⏱ {term}</span>}
                          {s.property_address && <span>📍 {s.property_address}</span>}
                        </div>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        {s.lead_status && s.lead_status !== '?' && (
                          <span style={{fontSize:11,background:'#DBEAFE',color:'#1D4ED8',padding:'2px 8px',borderRadius:4,fontWeight:600}}>{s.lead_status}</span>
                        )}
                        <span style={{fontSize:11,color:'#9CA3AF'}}>{fmtTimestamp(s.created_at)}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* LOG — timeline + all notes merged chronologically */}

          {/* ALL CONTACTS */}
          {tab === 'contacts' && (() => {
            const alreadyInPeople = (name, email) => (lmtContacts||[]).some(c =>
              (email && c.email && c.email.toLowerCase()===email.toLowerCase()) ||
              ([c.first_name,c.last_name].filter(Boolean).join(' ')===name) ||
              (c.company && c.company===name)
            );
            const addToPeople = async (name, email, phone, category) => {
              const nameParts = (name||'').trim().split(/\s+/);
              const isCompany = isPeopleCompany(category);
              const rec = {
                category,
                first_name: isCompany ? '' : (nameParts[0]||''),
                last_name:  isCompany ? '' : (nameParts.slice(1).join(' ')||''),
                company:    isCompany ? name : '',
                email: email||'', phone: phone||'',
                cell_phone:'', license_nmls:'', notes:'',
              };
              const {data} = await sb.from('lmt_contacts').insert(rec).select().single();
              if (data && setLmtContacts) setLmtContacts(prev=>[data,...prev]);
            };
            const ContactCard = ({ role, name, email, phone, note, peopleCategory }) => {
              if (!name) return null;
              const saved = peopleCategory && alreadyInPeople(name, email);
              return (
                <div style={{background:'#F8FAFC',border:'1px solid #E5E7EB',borderRadius:8,padding:'12px 16px',marginBottom:10}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
                    <div>
                      <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',color:'#6B7280',letterSpacing:'0.4px',marginBottom:3}}>{role}</div>
                      <div style={{fontWeight:600,fontSize:14,color:'#1B2A4A'}}>{name}</div>
                      {note && <div style={{fontSize:11,color:'#9CA3AF',marginTop:2}}>{note}</div>}
                    </div>
                    <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                      {phone && (
                        <a href={`tel:${phone}`} style={{display:'flex',alignItems:'center',gap:4,fontSize:12,color:'#2563EB',textDecoration:'none',background:'#EFF6FF',borderRadius:5,padding:'4px 10px',border:'1px solid #BFDBFE'}}>
                          📞 {phone}
                        </a>
                      )}
                      {email && (
                        <a href={`mailto:${email}`} style={{display:'flex',alignItems:'center',gap:4,fontSize:12,color:'#16A34A',textDecoration:'none',background:'#DCFCE7',borderRadius:5,padding:'4px 10px',border:'1px solid #86EFAC'}}>
                          ✉️ {email}
                        </a>
                      )}
                      {peopleCategory && (
                        saved
                          ? <span style={{fontSize:11,color:'#9CA3AF',padding:'4px 8px',borderRadius:5,background:'#F3F4F6'}}>✓ In People</span>
                          : <button onClick={()=>addToPeople(name,email,phone,peopleCategory)}
                              style={{fontSize:11,color:'#6D28D9',background:'#EDE9FE',border:'1px solid #C4B5FD',borderRadius:5,padding:'4px 9px',cursor:'pointer',fontWeight:600}}>
                              📋 Add to People
                            </button>
                      )}
                    </div>
                  </div>
                </div>
              );
            };
            const lo  = profiles.find(p=>p.id===deal.assigned_lo_id);
            const loa = profiles.find(p=>p.id===deal.assigned_loa_id);
            const proc= profiles.find(p=>p.id===deal.assigned_processor_id);
            return (
              <div>
                <div style={{fontSize:12,color:'#6B7280',marginBottom:12,padding:'8px 12px',background:'#F3F4F6',borderRadius:6}}>
                  Everyone connected to this deal. Click 📞 to call, ✉️ to email. Click 📋 to save to your People list.
                </div>
                {/* Borrowers */}
                <ContactCard role="Primary Borrower" name={deal.primary_borrower_name} email={deal.primary_borrower_email} phone={deal.primary_borrower_phone} />
                {coborrowers.map((cb,i) => <ContactCard key={i} role={`Co-Borrower ${coborrowers.length>1?i+1:''}`} name={cb.name} email={cb.email} phone={cb.phone} />)}
                {/* Team */}
                {lo   && <ContactCard role="Loan Officer" name={lo.display_name||lo.email} email={lo.email} />}
                {loa  && <ContactCard role="LOA / Loan Partner" name={loa.display_name||loa.email} email={loa.email} />}
                {proc && <ContactCard role="Processor" name={proc.display_name||proc.email} email={proc.email} />}
                {/* Agents */}
                <ContactCard role="Buyer's Agent" name={deal.buyers_agent} email={deal.buyers_agent_email} phone={deal.buyers_agent_phone} peopleCategory="Realtor" />
                <ContactCard role="Seller's Agent" name={deal.sellers_agent} email={deal.sellers_agent_email} phone={deal.sellers_agent_phone} peopleCategory="Realtor" />
                {/* Vendors */}
                <ContactCard role="Title Company" name={deal.title_company} email={deal.title_company_email} phone={deal.title_company_phone} peopleCategory="Title" />
                <ContactCard role="Appraiser" name={deal.appraiser} email={deal.appraiser_email} phone={deal.appraiser_phone} peopleCategory="Appraisal" />
                <ContactCard role="HOI Company" name={deal.hoi_company} email={deal.hoi_company_email} phone={deal.hoi_company_phone} peopleCategory="HOI" />
                <ContactCard role="Flood Company" name={deal.flood_company} email={deal.flood_company_email} />
                <ContactCard role="Escrow Company" name={deal.escrow_company} email={deal.escrow_company_email} />
              </div>
            );
          })()}

          {/* BORROWERS */}
          {tab === 'borrowers' && (
            <div>
              {/* Primary */}
              <div style={{marginBottom:16}}>
                <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',color:'#6B7280',letterSpacing:'0.5px',marginBottom:8}}>Primary Borrower</div>
                <div style={{background:'#F3F4F6',borderRadius:8,padding:'12px 16px'}}>
                  <div style={{fontWeight:600,fontSize:14}}>{deal.primary_borrower_name || '—'}</div>
                  {deal.primary_borrower_email && <div style={{fontSize:12,color:'#6B7280',marginTop:4}}>✉️ {deal.primary_borrower_email}</div>}
                  {deal.primary_borrower_phone && <div style={{fontSize:12,color:'#6B7280',marginTop:2}}>📞 {deal.primary_borrower_phone}</div>}
                </div>
              </div>
              {/* Co-borrowers */}
              {coborrowers.length > 0 && (
                <div style={{marginBottom:16}}>
                  <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',color:'#6B7280',letterSpacing:'0.5px',marginBottom:8}}>Co-Borrowers</div>
                  {coborrowers.map((cb,i) => (
                    <div key={cb.id||i} style={{background:'#F3F4F6',borderRadius:8,padding:'12px 16px',marginBottom:8}}>
                      <div style={{fontWeight:600,fontSize:14}}>{cb.name || '—'}</div>
                      {cb.email && <div style={{fontSize:12,color:'#6B7280',marginTop:4}}>✉️ {cb.email}</div>}
                      {cb.phone && <div style={{fontSize:12,color:'#6B7280',marginTop:2}}>📞 {cb.phone}</div>}
                    </div>
                  ))}
                </div>
              )}
              {coborrowers.length === 0 && (
                <div style={{color:'#9CA3AF',fontSize:13,textAlign:'center',padding:20}}>
                  No co-borrowers. Edit the deal to add them.
                </div>
              )}
            </div>
          )}

        </div>

        {/* ── AUTO-SAVE INDICATOR ── */}
        {(infoSaving || ctSaving) && (
          <div style={{position:'fixed',bottom:28,right:32,zIndex:2000,
            padding:'9px 20px',borderRadius:50,background:'#1B2A4A',color:'white',
            fontSize:13,fontWeight:600,boxShadow:'0 4px 16px rgba(0,0,0,0.18)',opacity:0.92}}>
            Saving…
          </div>
        )}
        {!infoSaving && !ctSaving && (ctJustSaved || infoJustSaved) && (
          <div style={{position:'fixed',bottom:28,right:32,zIndex:2000,
            padding:'9px 20px',borderRadius:50,background:'#16A34A',color:'white',
            fontSize:13,fontWeight:600,boxShadow:'0 4px 16px rgba(0,0,0,0.18)',opacity:0.95,
            display:'flex',alignItems:'center',gap:6}}>
            ✓ Saved
          </div>
        )}
    </div>
  );

  const composer = emailModal
    ? <EmailComposer emailModal={emailModal} onClose={()=>setEmailModal(null)} loProfile={profiles.find(p=>p.id===deal.assigned_lo_id)} />
    : null;

  if (pageMode) return <React.Fragment>{inner}{composer}</React.Fragment>;

  return (
    <React.Fragment>
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-lg">
        {inner}
      </div>
    </div>
    {composer}
    </React.Fragment>
  );
}

// CONTACT PICKER BUTTON (used in deal Contacts tab)
// ─────────────────────────────────────────────
function ContactPickerButton({ lmtContacts, categories, onPick }) {
  const [open, setOpen] = React.useState(false);
  const [search, setSearch] = React.useState('');
  const matches = (lmtContacts||[]).filter(c => {
    if (categories && !categories.includes(c.category)) return false;
    if (!search) return true;
    const s = search.toLowerCase();
    return [c.first_name,c.last_name,c.company,c.email].some(v=>v?.toLowerCase().includes(s));
  }).slice(0,8);
  if (!open) return (
    <button onClick={()=>setOpen(true)} style={{padding:'3px 8px',borderRadius:4,border:'1px solid #2563EB',background:'#EFF6FF',fontSize:11,cursor:'pointer',color:'#2563EB',whiteSpace:'nowrap',flexShrink:0,fontWeight:600}}>
      + Contact
    </button>
  );
  return (
    <div style={{position:'relative',flex:1}}>
      <input autoFocus value={search} onChange={e=>setSearch(e.target.value)}
        placeholder="Search contacts…"
        onBlur={()=>setTimeout(()=>{setOpen(false);setSearch('');},200)}
        style={{padding:'5px 8px',border:'1px solid #2563EB',borderRadius:5,fontSize:12,width:'100%'}} />
      <div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:1200,background:'white',border:'1px solid #E5E7EB',borderRadius:6,boxShadow:'0 4px 16px rgba(0,0,0,0.12)',maxHeight:180,overflowY:'auto',marginTop:2}}>
        {matches.length===0
          ? <div style={{padding:'8px 12px',fontSize:12,color:'#9CA3AF'}}>No contacts found</div>
          : matches.map(c=>(
              <div key={c.id} onMouseDown={()=>{onPick(c);setOpen(false);setSearch('');}}
                style={{padding:'7px 12px',cursor:'pointer',fontSize:12,borderBottom:'1px solid #F3F4F6'}}
                onMouseEnter={e=>e.currentTarget.style.background='#F8FAFC'}
                onMouseLeave={e=>e.currentTarget.style.background='white'}>
                <div style={{fontWeight:600,color:'#1B2A4A'}}>
                  {isPeopleCompany(c.category)&&c.company ? c.company : [c.first_name,c.last_name].filter(Boolean).join(' ')||c.company||'—'}
                </div>
                <div style={{fontSize:10,color:'#9CA3AF'}}>{c.category}{c.email?' · '+c.email:''}</div>
              </div>
            ))
        }
      </div>
    </div>
  );
}

            <option value="Realtor">Realtor</option>
            <option value="Builder">Builder</option>
          </optgroup>
          <optgroup label="── Lender ──">
            <option value="LO">LO</option>
            <option value="LOA">LOA</option>
            <option value="Setup">Setup</option>
            <option value="Processor">Processor</option>
            <option value="Underwriter">Underwriter</option>
            <option value="Closer">Closer</option>
          </optgroup>
          <optgroup label="── Vendors ──">
            <option value="Appraisal">Appraiser</option>
            <option value="HOI">HOI</option>
            <option value="Survey">Survey</option>
            <option value="Title">Title</option>
          </optgroup>
        </select>
      </div>
      {isCompany
        ? <div className="form-group"><label>Company Name</label><input value={form.company||''} onChange={e=>fset('company',e.target.value)} /></div>
        : <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div className="form-group"><label>First Name</label><input value={form.first_name||''} onChange={e=>fset('first_name',e.target.value)} /></div>
            <div className="form-group"><label>Last Name</label><input value={form.last_name||''} onChange={e=>fset('last_name',e.target.value)} /></div>
          </div>
      }
      {isCompany && (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div className="form-group"><label>Contact First</label><input value={form.first_name||''} onChange={e=>fset('first_name',e.target.value)} /></div>
          <div className="form-group"><label>Contact Last</label><input value={form.last_name||''} onChange={e=>fset('last_name',e.target.value)} /></div>
        </div>
      )}
      {!isCompany && <div className="form-group"><label>Company</label><input value={form.company||''} onChange={e=>fset('company',e.target.value)} /></div>}
      <div className="form-group"><label>Email</label><input type="email" value={form.email||''} onChange={e=>fset('email',e.target.value)} /></div>
      <div className="form-group"><label>Phone</label><input value={form.phone||''} onChange={e=>fset('phone',e.target.value)} /></div>
      <div className="form-group"><label>Cell</label><input value={form.cell_phone||''} onChange={e=>fset('cell_phone',e.target.value)} /></div>
      {['LO','Appraisal'].includes(form.category) && (
        <div className="form-group"><label>License / NMLS #</label><input value={form.license_nmls||''} onChange={e=>fset('license_nmls',e.target.value)} /></div>
      )}
      <div className="form-group"><label>Notes</label><textarea value={form.notes||''} onChange={e=>fset('notes',e.target.value)} rows={3} style={{resize:'vertical'}} /></div>
      <div style={{display:'flex',gap:10,marginTop:16,paddingTop:16,borderTop:'1px solid #E5E7EB'}}>
        <button className="btn btn-navy" style={{flex:1}} onClick={()=>onSave(form)} disabled={saving}>{saving?'Saving…':'Save'}</button>
        {!isNew && <button className="btn btn-ghost" style={{color:'#DC2626'}} onClick={()=>onDelete(contact.id)}>Delete</button>}
      </div>
    </div>
  );
}

// HLT SYNC MODAL
// ─────────────────────────────────────────────
function HltSyncModal({ lmtContacts, setLmtContacts, onClose }) {
  const [hltContacts, setHltContacts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState('pull');
  const [selected, setSelected] = useState(new Set());
  const [syncing, setSyncing] = useState(false);

  React.useEffect(() => {
    (async () => {
      setLoading(true);
      const { data } = await sb.from('contacts').select('id,first_name,last_name,email,phone,contact_category,contact_type').order('last_name');
      setHltContacts(data || []);
      setLoading(false);
    })();
  }, []);

  const existingHltIds = new Set(lmtContacts.map(c => c.hlt_contact_id).filter(Boolean));

  const pullCandidates = hltContacts.filter(h =>
    !existingHltIds.has(h.id) && HLT_TO_LMT_CAT[h.contact_category]
  );

  const pushCandidates = lmtContacts.filter(c => !c.hlt_contact_id);

  const candidates = tab === 'pull' ? pullCandidates : pushCandidates;

  const toggleSelect = (id) => {
    setSelected(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  const selectAll = () => {
    if (selected.size === candidates.length) {
      setSelected(new Set());
    } else {
      setSelected(new Set(candidates.map(c => c.id)));
    }
  };

  const doPull = async () => {
    setSyncing(true);
    const toInsert = pullCandidates.filter(h => selected.has(h.id)).map(h => ({
      category: HLT_TO_LMT_CAT[h.contact_category] || 'Client',
      first_name: h.first_name || '',
      last_name: h.last_name || '',
      email: h.email || '',
      phone: h.phone || '',
      company: '',
      cell_phone: '',
      license_nmls: '',
      notes: '',
      hlt_contact_id: h.id,
    }));
    const { data } = await sb.from('lmt_contacts').insert(toInsert).select();
    if (data) setLmtContacts(prev => [...data, ...prev]);
    setSyncing(false);
    onClose();
  };

  const doPush = async () => {
    setSyncing(true);
    const toPush = pushCandidates.filter(c => selected.has(c.id));
    for (const c of toPush) {
      const { data } = await sb.from('contacts').insert({
        first_name: c.first_name,
        last_name: c.last_name,
        email: c.email,
        phone: c.phone || c.cell_phone,
        contact_category: LMT_TO_HLT_CAT[c.category] || 'Other',
        contact_type: ['Client','Realtor','Builder'].includes(c.category) ? 'client' : 'business',
      }).select().single();
      if (data) {
        await sb.from('lmt_contacts').update({ hlt_contact_id: data.id }).eq('id', c.id);
        setLmtContacts(prev => prev.map(x => x.id === c.id ? { ...x, hlt_contact_id: data.id } : x));
      }
    }
    setSyncing(false);
    onClose();
  };

  const handleAction = () => tab === 'pull' ? doPull() : doPush();

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'white',borderRadius:12,width:580,maxHeight:'80vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* Header */}
        <div style={{background:'#1B2A4A',padding:'14px 20px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{color:'white',fontWeight:700,fontSize:15}}>↕ Sync with HLT</span>
          <button onClick={onClose} style={{background:'none',border:'none',color:'white',fontSize:20,cursor:'pointer',lineHeight:1}}>×</button>
        </div>
        {/* Tabs */}
        <div style={{display:'flex',borderBottom:'1px solid #E5E7EB'}}>
          {[['pull',`⬇ Pull from HLT (${pullCandidates.length})`],['push',`⬆ Push to HLT (${pushCandidates.length})`]].map(([t,label])=>(
            <button key={t} onClick={()=>{setTab(t);setSelected(new Set());}}
              style={{flex:1,padding:'10px 0',fontSize:13,fontWeight:600,border:'none',cursor:'pointer',
                background:'white',color:tab===t?'#1B2A4A':'#9CA3AF',
                borderBottom:tab===t?'2px solid #1B2A4A':'2px solid transparent'}}>
              {label}
            </button>
          ))}
        </div>
        {/* Body */}
        <div style={{flex:1,overflowY:'auto',padding:16}}>
          {loading
            ? <div style={{textAlign:'center',padding:40,color:'#6B7280',fontSize:13}}>Loading…</div>
            : candidates.length === 0
              ? <div style={{textAlign:'center',padding:40,color:'#9CA3AF',fontSize:13}}>No contacts to sync</div>
              : candidates.map(c => {
                  const isPull = tab === 'pull';
                  const id = c.id;
                  const name = [c.first_name, c.last_name].filter(Boolean).join(' ') || c.company || '—';
                  const email = isPull ? c.email : c.email;
                  const cat = isPull ? (HLT_TO_LMT_CAT[c.contact_category] || c.contact_category) : c.category;
                  const cs = CAT_STYLE[cat] || {color:'#374151',bg:'#F3F4F6'};
                  return (
                    <div key={id} onClick={()=>toggleSelect(id)}
                      style={{display:'flex',alignItems:'center',gap:12,padding:'10px 12px',borderRadius:8,
                        border:`1px solid ${selected.has(id)?'#1B2A4A':'#E5E7EB'}`,
                        background:selected.has(id)?'#EFF6FF':'white',cursor:'pointer',marginBottom:6}}>
                      <input type="checkbox" checked={selected.has(id)} onChange={()=>toggleSelect(id)}
                        onClick={e=>e.stopPropagation()} style={{flexShrink:0}} />
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,fontSize:13,color:'#1B2A4A'}}>{name}</div>
                        {email && <div style={{fontSize:11,color:'#9CA3AF'}}>{email}</div>}
                      </div>
                      <span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:4,background:cs.bg,color:cs.color,flexShrink:0}}>
                        {cat}
                      </span>
                      {isPull && c.contact_category && (
                        <span style={{fontSize:11,color:'#9CA3AF',fontStyle:'italic',flexShrink:0}}>{c.contact_category}</span>
                      )}
                    </div>
                  );
                })
          }
        </div>
        {/* Footer */}
        <div style={{padding:'12px 16px',borderTop:'1px solid #E5E7EB',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <button onClick={selectAll} style={{background:'none',border:'none',color:'#1B2A4A',fontSize:13,cursor:'pointer',fontWeight:600,padding:0}}>
            {selected.size === candidates.length && candidates.length > 0 ? 'Deselect All' : 'Select All'}
          </button>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-ghost" onClick={onClose} disabled={syncing}>Cancel</button>
            <button className="btn btn-navy" onClick={handleAction}
              disabled={selected.size === 0 || syncing}>
              {syncing ? 'Syncing…' : tab === 'pull' ? `Pull Selected (${selected.size})` : `Push Selected (${selected.size})`}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function PeopleScreen({ user, lmtContacts, setLmtContacts }) {
  const [search, setSearch] = useState('');
  const [catFilter, setCatFilter] = useState('all');
  const [editing, setEditing] = useState(null);
  const [saving, setSaving] = useState(false);
  const [showSync, setShowSync] = useState(false);

  // Self-sufficient fetch — runs on mount so People always loads even if Promise.all index shifts
  useEffect(() => {
    if (!user) return;
    sb.from('lmt_contacts').select('*').order('last_name').then(({data, error}) => {
      if (error) { console.error('lmt_contacts load error:', error); return; }
      if (data) setLmtContacts(data);
    });
  }, [user]);

  const newBlank = () => ({ category:'Client', first_name:'', last_name:'', company:'', email:'', phone:'', cell_phone:'', license_nmls:'', notes:'' });

  const displayName = (c) => isPeopleCompany(c.category)&&c.company ? c.company : [c.first_name,c.last_name].filter(Boolean).join(' ')||c.company||'—';

  const filtered = lmtContacts.filter(c => {
    if (catFilter !== 'all' && c.category !== catFilter) return false;
    if (!search) return true;
    const s = search.toLowerCase();
    return [c.first_name,c.last_name,c.company,c.email,c.phone].some(v=>v?.toLowerCase().includes(s));
  });

  const saveContact = async (form) => {
    setSaving(true);
    if (form.id) {
      const {data} = await sb.from('lmt_contacts').update(form).eq('id',form.id).select().single();
      if (data) setLmtContacts(prev=>prev.map(c=>c.id===data.id?data:c));
    } else {
      const {data} = await sb.from('lmt_contacts').insert({...form}).select().single();
      if (data) setLmtContacts(prev=>[data,...prev]);
    }
    setSaving(false);
    setEditing(null);
  };

  const deleteContact = async (id) => {
    if (!confirm('Delete this contact? This cannot be undone.')) return;
    await sb.from('lmt_contacts').delete().eq('id',id);
    setLmtContacts(prev=>prev.filter(c=>c.id!==id));
    setEditing(null);
  };

  return (
    <div style={{display:'flex',height:'calc(100vh - 56px)',overflow:'hidden'}}>
      {/* Left: list */}
      <div style={{flex:1,overflowY:'auto',padding:'20px 24px'}}>
        {/* Header */}
        <div style={{display:'flex',gap:10,marginBottom:14,alignItems:'center'}}>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Search people…"
            style={{flex:1,padding:'8px 12px',border:'1px solid #E5E7EB',borderRadius:8,fontSize:13}} />
          <button className="btn btn-ghost" style={{border:'1px solid #E5E7EB',fontSize:13}} onClick={()=>setShowSync(true)}>↕ HLT</button>
          <button className="btn btn-navy" onClick={()=>setEditing(newBlank())}>+ Add</button>
        </div>
        {/* Category filter pills */}
        <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:16}}>
          {['all',...[...PEOPLE_CATS].sort()].map(cat=>{
            const cs = CAT_STYLE[cat]||{color:'#374151',bg:'#F3F4F6'};
            const active = catFilter===cat;
            const count = cat==='all'?lmtContacts.length:lmtContacts.filter(c=>c.category===cat).length;
            return (
              <button key={cat} onClick={()=>setCatFilter(cat)}
                style={{padding:'3px 10px',borderRadius:99,border:'1px solid',fontSize:11,fontWeight:600,cursor:'pointer',
                  background:active?(cat==='all'?'#1B2A4A':cs.bg):'white',
                  color:active?(cat==='all'?'white':cs.color):'#9CA3AF',
                  borderColor:active?(cat==='all'?'#1B2A4A':cs.color):'#E5E7EB'}}>
                {cat==='all'?`All (${count})`:count>0?`${cat} (${count})`:cat}
              </button>
            );
          })}
        </div>
        {/* List */}
        {filtered.length===0
          ? <div style={{textAlign:'center',padding:48,color:'#9CA3AF',fontSize:13}}>
              {lmtContacts.length===0 ? 'No contacts yet. Click "+ Add" to get started.' : 'No contacts match your search.'}
            </div>
          : filtered.map(c=>{
              const cs = CAT_STYLE[c.category]||{color:'#374151',bg:'#F3F4F6'};
              const name = displayName(c);
              const sub = isPeopleCompany(c.category) ? [c.first_name,c.last_name].filter(Boolean).join(' ') : c.company;
              const active = editing?.id===c.id;
              return (
                <div key={c.id} onClick={()=>setEditing({...c})}
                  style={{padding:'11px 14px',borderRadius:8,border:`1px solid ${active?'#1B2A4A':'#E5E7EB'}`,
                    background:active?'#EFF6FF':'white',cursor:'pointer',marginBottom:6,
                    display:'flex',alignItems:'center',gap:12}}>
                  <div style={{width:36,height:36,borderRadius:'50%',background:cs.bg,color:cs.color,
                    display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:15,flexShrink:0}}>
                    {name.charAt(0).toUpperCase()}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:13,color:'#1B2A4A',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{name}</div>
                    {sub&&<div style={{fontSize:11,color:'#6B7280',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sub}</div>}
                    {c.email&&<div style={{fontSize:11,color:'#9CA3AF'}}>{c.email}</div>}
                  </div>
                  <span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:4,background:cs.bg,color:cs.color,flexShrink:0,whiteSpace:'nowrap'}}>{c.category}</span>
                </div>
              );
            })
        }
      </div>
      {/* Right: edit panel */}
      {editing && (
        <ContactEditPanel key={editing.id||'new'} contact={editing} onSave={saveContact} onDelete={deleteContact} onClose={()=>setEditing(null)} saving={saving} />
      )}
      {showSync && <HltSyncModal lmtContacts={lmtContacts} setLmtContacts={setLmtContacts} onClose={()=>setShowSync(false)} />}
    </div>
  );
}

function TeamMemberSearch({ candidates, selected, onAdd, placeholder }) {
  const [query, setQuery] = React.useState('');
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  const available = candidates.filter(p => !selected.includes(p.id) &&
    (!query || (p.display_name||p.email||'').toLowerCase().includes(query.toLowerCase())));
  return (
    <div ref={ref} style={{position:'relative',maxWidth:300}}>
      <input value={query} onChange={e=>{setQuery(e.target.value);setOpen(true);}}
        onFocus={()=>setOpen(true)}
        onBlur={()=>setTimeout(()=>setOpen(false),150)}
        placeholder={placeholder||'Search to add…'}
        style={{width:'100%',padding:'6px 10px',border:'1px solid #E5E7EB',borderRadius:6,fontSize:13}} />
      {open && (
        <div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:1200,background:'white',border:'1px solid #E5E7EB',borderRadius:8,boxShadow:'0 4px 16px rgba(0,0,0,0.12)',marginTop:2,maxHeight:180,overflowY:'auto'}}>
          {available.length === 0
            ? <div style={{padding:'8px 12px',fontSize:12,color:'#9CA3AF'}}>No matches</div>
            : available.map(p => (
              <div key={p.id} onMouseDown={e=>{e.preventDefault();onAdd(p.id);setQuery('');setOpen(false);}}
                style={{padding:'8px 12px',fontSize:13,cursor:'pointer',borderBottom:'1px solid #F3F4F6'}}
                onMouseEnter={e=>e.currentTarget.style.background='#F8FAFC'}
                onMouseLeave={e=>e.currentTarget.style.background='white'}>
                {p.display_name||p.email}
                {p.lmt_role && <span style={{fontSize:10,color:'#9CA3AF',marginLeft:6}}>{p.lmt_role}</span>}
              </div>
            ))
          }
        </div>
      )}
    </div>
  );
}

function ProfilePanel({ profile, profiles, onProfileSave }) {
  const [form, setForm] = useState({
    display_name: profile?.display_name || '',
    branch:       profile?.branch       || '',
    cell_phone:   profile?.cell_phone   || profile?.phone || '',
    email:        profile?.email        || '',
  });

  // Normalize stored team data — support both old [{name,email}] objects and new [id] strings
  const normalizeIds = (raw, allProfiles) => {
    if (!raw || !Array.isArray(raw)) return [];
    return raw.map(item => {
      if (typeof item === 'string') return item; // already an ID
      // legacy object — try to match by email
      if (item && item.email) {
        const match = allProfiles.find(p => p.email && p.email.toLowerCase() === item.email.toLowerCase());
        if (match) return match.id;
      }
      return null;
    }).filter(Boolean);
  };

  const allInternal = (profiles || []).filter(p => ['admin','internal','branch_admin'].includes(p.role));
  const [loas, setLoas]         = useState(() => normalizeIds(profile?.team_loas, allInternal));
  const [processors, setProcs]  = useState(() => normalizeIds(profile?.team_processors, allInternal));
  const [saving, setSaving]     = useState(false);
  const [justSaved, setJustSaved] = useState(false);
  const autoSaveTimer = React.useRef(null);
  const mounted = React.useRef(false);

  const fset = (k, v) => setForm(p => ({...p, [k]: v}));

  const loaCandidates  = allInternal.filter(p => p.lmt_role === 'loa');
  const procCandidates = allInternal.filter(p => p.lmt_role === 'processor' || p.lmt_role === 'setup');

  const save = async (payload) => {
    setSaving(true);
    const { error } = await sb.from('profiles').update(payload).eq('id', (await sb.auth.getUser()).data.user?.id);
    setSaving(false);
    if (!error) {
      onProfileSave(payload);
      setJustSaved(true);
      setTimeout(() => setJustSaved(false), 3000);
    }
  };

  // Auto-save after 1.5s of inactivity
  React.useEffect(() => {
    if (!mounted.current) { mounted.current = true; return; }
    if (autoSaveTimer.current) clearTimeout(autoSaveTimer.current);
    const payload = { ...form, team_loas: loas, team_processors: processors };
    autoSaveTimer.current = setTimeout(() => save(payload), 1500);
  }, [form, loas, processors]);

  const memberTag = (id, onRemove) => {
    const p = allInternal.find(x => x.id === id);
    return (
      <div key={id} style={{display:'flex',alignItems:'center',gap:6,background:'#F1F5F9',borderRadius:6,padding:'5px 10px',fontSize:13}}>
        <span style={{fontWeight:600}}>{p ? (p.display_name||p.email) : id}</span>
        <button onMouseDown={e=>{e.preventDefault();onRemove(id);}}
          style={{background:'none',border:'none',cursor:'pointer',color:'#9CA3AF',fontSize:15,padding:0,lineHeight:1}}>×</button>
      </div>
    );
  };

  return (
    <div className="settings-wrap">
      <h2 style={{fontSize:18,fontWeight:700,color:'#1B2A4A',marginBottom:20}}>My Profile</h2>

      {/* LO INFO */}
      <div className="settings-section">
        <div className="settings-section-header">Loan Officer Info</div>
        <div className="settings-section-body">
          <div className="form-grid">
            {[
              { key:'display_name', label:'Name' },
              { key:'branch',       label:'Branch' },
              { key:'cell_phone',   label:'Phone' },
              { key:'email',        label:'Email' },
            ].map(f => (
              <div key={f.key} className="form-group">
                <label>{f.label}</label>
                <input value={form[f.key]||''} onChange={e=>fset(f.key,e.target.value)} />
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* MY LOAs */}
      <div className="settings-section overflow-visible">
        <div className="settings-section-header">My LOAs</div>
        <div className="settings-section-body">
          <p style={{fontSize:13,color:'#6B7280',marginBottom:12}}>
            These will appear as options when assigning an LOA to a deal.
          </p>
          {loas.length > 0 && (
            <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:12}}>
              {loas.map(id => memberTag(id, id => setLoas(p => p.filter(x => x !== id))))}
            </div>
          )}
          {loas.length === 0 && <div style={{color:'#9CA3AF',fontSize:13,marginBottom:12}}>No LOAs added yet.</div>}
          <TeamMemberSearch candidates={loaCandidates} selected={loas} onAdd={id=>setLoas(p=>[...p,id])} placeholder="Search LOA to add…" />
        </div>
      </div>

      {/* MY PROCESSORS */}
      <div className="settings-section overflow-visible">
        <div className="settings-section-header">My Processors</div>
        <div className="settings-section-body">
          <p style={{fontSize:13,color:'#6B7280',marginBottom:12}}>
            These will appear as options when assigning a Processor to a deal.
          </p>
          {processors.length > 0 && (
            <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:12}}>
              {processors.map(id => memberTag(id, id => setProcs(p => p.filter(x => x !== id))))}
            </div>
          )}
          {processors.length === 0 && <div style={{color:'#9CA3AF',fontSize:13,marginBottom:12}}>No processors added yet.</div>}
          <TeamMemberSearch candidates={procCandidates} selected={processors} onAdd={id=>setProcs(p=>[...p,id])} placeholder="Search processor to add…" />
        </div>
      </div>

      <div style={{padding:'0 0 32px',display:'flex',alignItems:'center',gap:12}}>
        <button className="btn btn-navy" onClick={()=>save({...form,team_loas:loas,team_processors:processors})} disabled={saving}>
          {saving ? 'Saving…' : 'Save Profile'}
        </button>
        {justSaved && !saving && (
          <span style={{fontSize:13,color:'#16A34A',fontWeight:600,display:'flex',alignItems:'center',gap:4}}>✓ Saved</span>
        )}
      </div>
    </div>
  );
}

function TurntimesOrdersPanel({ presets, onPresetsChange }) {
  const [localPresets, setLocalPresets] = useState(presets);
  const [saving, setSaving] = useState(false);

  const savePresets = async () => {
    setSaving(true);
    for (const p of localPresets) {
      if (p.id) {
        await sb.from('lmt_milestone_presets').update({
          turntime_days: p.turntime_days,
          followup_days: p.followup_days,
          alert_days_before: p.alert_days_before
        }).eq('id', p.id);
      } else {
        const { data } = await sb.from('lmt_milestone_presets').insert(p).select().single();
        if (data) setLocalPresets(prev => prev.map(lp => lp.milestone_type === p.milestone_type ? data : lp));
      }
    }
    onPresetsChange(localPresets);
    setSaving(false);
    alert('Turntimes saved!');
  };

  return (
    <div className="settings-wrap">
      <div className="settings-section">
        <div className="settings-section-header">Order Turntimes</div>
        <div className="settings-section-body">
          <p style={{fontSize:13,color:'#6B7280',marginBottom:16}}>
            Default turntimes for each order card. These apply to all deals unless overridden on the individual deal's Turntimes tab.
          </p>
          <div style={{display:'grid',gridTemplateColumns:'140px 1fr 1fr 1fr',gap:8,marginBottom:8}}>
            <div style={{fontSize:11,fontWeight:700,color:'#6B7280',textTransform:'uppercase'}}>Milestone</div>
            <div style={{fontSize:11,fontWeight:700,color:'#6B7280',textTransform:'uppercase'}}>Turntime (days)</div>
            <div style={{fontSize:11,fontWeight:700,color:'#6B7280',textTransform:'uppercase'}}>Follow Up (days)</div>
            <div style={{fontSize:11,fontWeight:700,color:'#6B7280',textTransform:'uppercase'}}>Alert Before (days)</div>
          </div>
          {MILESTONE_TYPES.filter(mt => mt.key !== 'other').map(mt => {
            const p = localPresets.find(lp => lp.milestone_type === mt.key) || { milestone_type: mt.key, turntime_days: 3, followup_days: 1, alert_days_before: 1 };
            const update = (field, val) => setLocalPresets(prev => {
              const exists = prev.find(lp => lp.milestone_type === mt.key);
              if (exists) return prev.map(lp => lp.milestone_type === mt.key ? { ...lp, [field]: parseInt(val)||0 } : lp);

            });
            return (
              <div key={mt.key} className="preset-row">
                <div className="preset-label">{mt.label}</div>

              </div>
            );
          })}
          {/* Other / Custom — spacer + note */}
          {(() => {
            const mt = MILESTONE_TYPES.find(m => m.key === 'other');
            const p = localPresets.find(lp => lp.milestone_type === 'other') || { milestone_type: 'other', turntime_days: 3, followup_days: 1, alert_days_before: 1 };
            const update = (field, val) => setLocalPresets(prev => {
              const exists = prev.find(lp => lp.milestone_type === 'other');
              if (exists) return prev.map(lp => lp.milestone_type === 'other' ? { ...lp, [field]: parseInt(val)||0 } : lp);
              return [...prev, { ...p, [field]: parseInt(val)||0 }];
            });
            return (
              <React.Fragment>
                <div style={{height:1,background:'#E5E7EB',margin:'12px 0 10px'}} />
                <div className="preset-row">
                  <div className="preset-label" style={{fontStyle:'italic',color:'#6B7280'}}>{mt.label}</div>
                  <input type="number" min={0} max={30} className="ms-input" value={p.turntime_days} onChange={e=>update('turntime_days',e.target.value)} />
                  <input type="number" min={0} max={30} className="ms-input" value={p.followup_days} onChange={e=>update('followup_days',e.target.value)} />
                  <input type="number" min={0} max={10} className="ms-input" value={p.alert_days_before} onChange={e=>update('alert_days_before',e.target.value)} />
                </div>
                <div style={{fontSize:11,color:'#9CA3AF',marginTop:4,gridColumn:'1/-1'}}>
                  Default for all custom cards — Condo Questionnaire, HOA Docs, Survey, VOD, VOM, Well/Septic, and any new cards you create.
                </div>
              </React.Fragment>
            );
          })()}
          <div style={{marginTop:16}}>
            <button className="btn btn-navy" onClick={savePresets} disabled={saving}>{saving?'Saving…':'Save Turntimes'}</button>
          </div>
        </div>
      </div>
    </div>
  );
}
