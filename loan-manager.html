<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loan Manager Toolkit</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%231B2A4A'/><text y='67' x='50' text-anchor='middle' font-size='34' font-weight='bold' font-family='system-ui,sans-serif' fill='%2360A5FA'>LMT</text></svg>" />

  <!-- CDN Libraries -->
  <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #1B2A4A;
      --navy2:  #243354;
      --blue:   #2563EB;
      --blue-l: #EFF6FF;
      --green:  #16A34A;
      --green-l:#DCFCE7;
      --red:    #DC2626;
      --red-l:  #FEE2E2;
      --yellow: #D97706;
      --yel-l:  #FEF3C7;
      --orange: #EA580C;
      --org-l:  #FFEDD5;
      --purple: #7C3AED;
      --pur-l:  #EDE9FE;
      --gray:   #6B7280;
      --gray-l: #F3F4F6;
      --border: #E5E7EB;
      --white:  #FFFFFF;
      --text:   #111827;
      --text2:  #6B7280;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F8FAFC;
      color: var(--text);
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── LAYOUT ── */
    .lmt-header {
      background: var(--navy);
      color: white;
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 300;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .lmt-logo { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    .lmt-logo span { color: #60A5FA; }
    .lmt-header-right { display: flex; align-items: center; gap: 12px; }
    .lmt-user-badge {
      background: rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 13px;
    }

    .lmt-main { padding: 16px 20px 30px; max-width: 1600px; margin: 0 auto; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 6px; font-size: 13px;
      font-weight: 500; cursor: pointer; border: none; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary   { background: var(--blue);  color: white; }
    .btn-navy      { background: var(--navy);  color: white; }
    .btn-ghost     { background: transparent; color: var(--gray); border: 1px solid var(--border); }
    .btn-danger    { background: var(--red);   color: white; }
    .btn-sm        { padding: 4px 10px; font-size: 12px; }

    /* ── TOOLBAR ── */
    .lmt-toolbar {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px; flex-wrap: wrap;
    }
    .lmt-search {
      flex: 1; min-width: 200px; max-width: 320px;
      padding: 7px 12px; border: 1px solid var(--border);
      border-radius: 6px; font-size: 13px; background: white;
    }
    .lmt-search:focus { outline: 2px solid var(--blue); outline-offset: -1px; }

    .view-tabs { display: flex; gap: 4px; }
    /* Pipeline active/archived filter tabs (white bg, navy active) */
    .view-tab {
      padding: 6px 14px; border-radius: 6px; font-size: 13px;
      font-weight: 500; cursor: pointer; border: 1px solid var(--border);
      background: white; color: var(--text2); transition: all 0.15s;
    }
    .view-tab.active { background: var(--navy); color: white; border-color: var(--navy); }

    /* Header nav tabs — on dark navy background */
    .nav-header-tab {
      padding: 6px 16px; border-radius: 6px; font-size: 13px;
      font-weight: 500; cursor: pointer; border: 1px solid rgba(255,255,255,0.25);
      background: transparent; color: rgba(255,255,255,0.7);
      transition: all 0.15s; position: relative;
    }
    .nav-header-tab:hover { background: rgba(255,255,255,0.1); color: white; }
    .nav-header-tab.active { background: white; color: var(--navy); border-color: white; font-weight: 700; }

    /* Profile dropdown */
    .profile-dropdown {
      position: absolute; top: calc(100% + 8px); right: 0; z-index: 9999;
      background: white; border: 1px solid var(--border); border-radius: 10px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2); min-width: 200px; overflow: hidden;
    }
    .profile-dropdown-header {
      padding: 14px 16px; background: var(--gray-l); border-bottom: 1px solid var(--border);
    }
    .profile-dropdown-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; cursor: pointer; font-size: 13px; color: var(--text);
      border: none; background: transparent; width: 100%; text-align: left;
      transition: background 0.1s;
    }
    .profile-dropdown-item:hover { background: var(--gray-l); }
    .profile-dropdown-item.danger { color: var(--red); }
    .profile-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; color: white; cursor: pointer;
      flex-shrink: 0; transition: all 0.15s;
    }
    .profile-avatar:hover { background: rgba(255,255,255,0.3); border-color: white; }

    /* ── ALERT BANNER ── */
    .alert-banner {
      background: var(--red-l); border: 1px solid #FCA5A5;
      border-radius: 8px; padding: 10px 16px;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px; font-size: 13px; color: var(--red);
      flex-wrap: wrap;
    }
    .alert-banner.warn { background: var(--yel-l); border-color: #FCD34D; color: var(--yellow); }
    .alert-chip {
      background: white; border-radius: 4px; padding: 2px 8px;
      font-weight: 600; cursor: pointer;
    }

    /* ── PIPELINE TABLE ── */
    .pipeline-wrap {
      background: white; border-radius: 10px;
      border: 1px solid var(--border);
      overflow-x: auto; overflow-y: visible;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      min-height: calc(95vh - 220px);
      scrollbar-width: none; /* Firefox */
      -ms-overflow-style: none; /* IE */
    }
    .pipeline-wrap::-webkit-scrollbar { display: none; } /* Chrome/Safari */
    .pipeline-table tbody::after {
      content: ''; display: block; height: 120px;
    }
    .pipeline-table {
      width: 100%; border-collapse: collapse; font-size: 13px;
    }
    .pipeline-table th {
      background: var(--navy); color: white;
      padding: 10px 12px; text-align: left;
      font-weight: 600; font-size: 12px;
      white-space: nowrap;
    }
    .pipeline-table td {
      padding: 9px 12px; border-bottom: 1px solid var(--border);
      vertical-align: middle; overflow: hidden;
    }
    /* Status cell never clips */
    .pipeline-table td:nth-child(2) { overflow: visible; }
    .pipeline-table tr:last-child td { border-bottom: none; }
    .pipeline-table tr:hover td { background: #F8FAFC; }
    .pipeline-table tr.overdue td { background: #FFF5F5; }
    .pipeline-table tr.due-today td { background: #FFFBEB; }

    /* ── STATUS BADGE ── */
    .status-badge {
      display: inline-block; padding: 3px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 700; white-space: normal;
      letter-spacing: 0.2px; line-height: 1.3;
    }

    /* ── BORROWER CELL ── */
    .borrower-name {
      font-weight: 600; color: var(--navy);
      cursor: pointer; text-decoration: none;
    }
    .borrower-name:hover { text-decoration: underline; color: var(--blue); }
    .coborrower-tag {
      font-size: 11px; color: var(--text2); display: block; margin-top: 2px;
    }

    /* ── DATE CELL ── */
    .date-cell { white-space: nowrap; }
    .date-cell.overdue { color: var(--red); font-weight: 600; }
    .date-cell.due-soon { color: var(--yellow); font-weight: 600; }
    .date-cell.ok { color: var(--green); }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text2);
    }
    .empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 13px; margin-bottom: 20px; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
    }
    .modal {
      background: white; border-radius: 12px; width: 100%;
      max-width: 680px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .modal-lg { max-width: 900px; }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: white; z-index: 1;
    }
    .modal-header h2 { font-size: 16px; font-weight: 700; color: var(--navy); }
    .modal-body { padding: 24px; }
    .modal-footer {
      padding: 16px 24px; border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 10px;
      position: sticky; bottom: 0; background: white;
    }
    .close-btn {
      background: none; border: none; font-size: 20px; cursor: pointer;
      color: var(--gray); line-height: 1; padding: 4px;
    }
    .close-btn:hover { color: var(--text); }

    /* ── FORM ── */
    .form-grid { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap: 16px; }
    .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .form-full { grid-column: 1 / -1; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.4px; }
    .form-group input, .form-group select, .form-group textarea {
      padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
      font-size: 13px; font-family: inherit; background: white;
      transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(37,99,235,0.1);
    }
    .form-section-title {
      font-size: 11px; font-weight: 800; color: var(--navy);
      text-transform: uppercase; letter-spacing: 0.06em;
      border-bottom: 2px solid var(--navy); padding-bottom: 7px;
      margin: 24px 0 14px;
    }
    .form-section-title:first-child { margin-top: 0; }

    /* ── DEAL DETAIL ── */
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .detail-card {
      background: var(--gray-l); border-radius: 8px; padding: 16px;
    }
    .detail-card h4 {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text2); margin-bottom: 12px;
    }
    .detail-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: var(--text2); }
    .detail-val { font-weight: 500; text-align: right; }

    /* ── MILESTONES ── */
    .milestone-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px; margin-top: 16px;
    }
    .milestone-card {
      border: 1px solid var(--border); border-radius: 8px;
      padding: 14px; background: white;
    }
    .milestone-card.done { background: var(--green-l); border-color: #86EFAC; }
    .milestone-card.done .ms-input,
    .milestone-card.done input[type="date"],
    .milestone-card.done input[type="text"],
    .milestone-card.done textarea {
      background: #DCFCE7 !important;
      border-color: #86EFAC !important;
    }
    .milestone-card.done .ms-label { color: #166534; }
    .milestone-card.done .ms-check { color: #166534; }
    .milestone-card.overdue { background: var(--red-l); border-color: #FCA5A5; }
    .milestone-card.due-today { background: var(--yel-l); border-color: #FCD34D; }
    .milestone-card.na { opacity: 0.45; }
    .milestone-title {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.4px; color: var(--navy); margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .milestone-dates { display: flex; flex-direction: column; gap: 6px; }
    .ms-row {
      display: flex; align-items: center; gap: 8px; font-size: 12px;
    }
    .ms-label { color: var(--text2); width: 64px; flex-shrink: 0; }
    .ms-input {
      flex: 1; padding: 4px 6px; border: 1px solid var(--border);
      border-radius: 4px; font-size: 12px;
      width: 100%; min-width: 0; box-sizing: border-box;
    }
    .ms-input:focus { outline: none; border-color: var(--blue); }
    .date-empty::-webkit-datetime-edit-text,
    .date-empty::-webkit-datetime-edit-month-field,
    .date-empty::-webkit-datetime-edit-day-field,
    .date-empty::-webkit-datetime-edit-year-field { color: #D1D5DB; }
    .ms-input::placeholder { color: #E5E7EB; }
    .ms-check {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text2); margin-top: 8px;
    }
    .ms-check input[type=checkbox] { cursor: pointer; }

    /* ── NOTES ── */
    .notes-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
    .note-item {
      background: var(--gray-l); border-radius: 6px; padding: 10px 12px;
    }
    .note-meta { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
    .note-body { font-size: 13px; line-height: 1.5; }
    .note-input-row { display: flex; gap: 8px; margin-top: 10px; }
    .note-input-row textarea {
      flex: 1; padding: 8px; border: 1px solid var(--border);
      border-radius: 6px; font-size: 13px; font-family: inherit;
      resize: vertical; min-height: 60px;
    }
    .note-input-row textarea:focus { outline: none; border-color: var(--blue); }

    /* ── LOGIN ── */
    .login-wrap {
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; background: var(--navy);
    }
    .login-card {
      background: white; border-radius: 14px; padding: 40px;
      width: 100%; max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-logo {
      text-align: center; margin-bottom: 28px;
    }
    .login-logo h1 { font-size: 22px; font-weight: 800; color: var(--navy); }
    .login-logo h1 span { color: var(--blue); }
    .login-logo p { font-size: 13px; color: var(--text2); margin-top: 4px; }
    .login-tabs { display: flex; margin-bottom: 24px; border-bottom: 2px solid var(--border); }
    .login-tab {
      flex: 1; text-align: center; padding: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer; color: var(--text2);
      border-bottom: 3px solid transparent; margin-bottom: -2px;
      transition: all 0.15s;
    }
    .login-tab.active { color: var(--navy); border-bottom-color: var(--navy); }
    .login-field { margin-bottom: 14px; }
    .login-field label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
    .login-field input, .login-field select {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 14px; font-family: inherit;
    }
    .login-field input:focus, .login-field select:focus {
      outline: none; border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    .login-btn {
      width: 100%; padding: 12px; border-radius: 8px; font-size: 15px;
      font-weight: 700; cursor: pointer; border: none;
      background: var(--navy); color: white; margin-top: 6px;
      transition: opacity 0.15s;
    }
    .login-btn:hover { opacity: 0.9; }
    .login-divider {
      text-align: center; color: var(--text2); font-size: 12px;
      margin: 14px 0; position: relative;
    }
    .login-divider::before, .login-divider::after {
      content: ''; position: absolute; top: 50%;
      width: 42%; height: 1px; background: var(--border);
    }
    .login-divider::before { left: 0; }
    .login-divider::after { right: 0; }
    .google-btn {
      width: 100%; padding: 11px; border-radius: 8px; font-size: 14px;
      font-weight: 600; cursor: pointer; border: 1px solid var(--border);
      background: white; color: var(--text); display: flex;
      align-items: center; justify-content: center; gap: 10px;
      transition: background 0.15s;
    }
    .google-btn:hover { background: var(--gray-l); }
    .error-msg { color: var(--red); font-size: 13px; margin-top: 10px; text-align: center; }

    /* ── LO COLOR DOT ── */
    .lo-dot {
      display: inline-flex; align-items: center; justify-content: center;
      width: 26px; height: 26px; border-radius: 50%; font-size: 11px;
      font-weight: 700; color: white; flex-shrink: 0;
    }

    /* ── SPINNER ── */
    .spinner {
      width: 18px; height: 18px; border: 2px solid var(--border);
      border-top-color: var(--blue); border-radius: 50%;
      animation: spin 0.6s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SETTINGS ── */
    .settings-wrap { max-width: 720px; margin: 0 auto; }
    .settings-section {
      background: white; border: 1px solid var(--border);
      border-radius: 10px; margin-bottom: 20px; overflow: hidden;
    }
    .settings-section.overflow-visible { overflow: visible; }
    .settings-section-header {
      background: var(--navy); color: white;
      padding: 12px 20px; font-size: 14px; font-weight: 700;
      border-radius: 10px 10px 0 0;
    }
    .settings-section-body { padding: 20px; }
    .preset-row {
      display: grid; grid-template-columns: 140px 1fr 1fr 1fr;
      gap: 10px; align-items: center; margin-bottom: 10px;
    }
    .preset-label { font-size: 13px; font-weight: 600; color: var(--navy); }
    .template-row {
      display: flex; gap: 10px; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .template-row:last-child { border-bottom: none; }

    /* ── NAV TABS ── */
    .nav-tabs { display: flex; gap: 2px; margin-bottom: 16px; }
    .nav-tab {
      padding: 8px 18px; border-radius: 6px 6px 0 0;
      font-size: 13px; font-weight: 600; cursor: pointer;
      color: var(--text2); border: 1px solid transparent;
      border-bottom: none; transition: all 0.15s;
    }
    .nav-tab.active {
      background: white; color: var(--navy);
      border-color: var(--border); margin-bottom: -1px;
    }
    .nav-tab-panel {
      background: white; border: 1px solid var(--border);
      border-radius: 0 10px 10px 10px; padding: 20px;
    }

    /* ── TAG ── */
    .tag {
      display: inline-block; padding: 2px 7px; border-radius: 4px;
      font-size: 11px; font-weight: 600;
    }
    .tag-blue   { background: var(--blue-l); color: var(--blue); }
    .tag-green  { background: var(--green-l); color: var(--green); }
    .tag-red    { background: var(--red-l); color: var(--red); }
    .tag-yellow { background: var(--yel-l); color: var(--yellow); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* Column resize */
    .pipeline-table th { position: relative; }
    .col-resize-handle {
      position: absolute; right: 0; top: 0; bottom: 0; width: 5px;
      cursor: col-resize; user-select: none;
      background: transparent;
    }
    .col-resize-handle:hover, .col-resize-handle.dragging {
      background: rgba(255,255,255,0.3);
    }

    @media print {
      .lmt-header, .lmt-toolbar, .alert-banner, .modal-overlay { display: none !important; }
      .pipeline-wrap { box-shadow: none; border: none; }
      .pipeline-table th { background: #1B2A4A !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      body { background: white; }
      .btn { display: none !important; }
      .lmt-print-deal { display: block !important; }
    }
    .lmt-print-deal { display: none; }

    /* responsive */
    @media (max-width: 768px) {
      .form-grid, .form-grid-3, .detail-grid { grid-template-columns: 1fr; }
      .pipeline-table { font-size: 12px; }
      .pipeline-table th, .pipeline-table td { padding: 7px 8px; }
      .lmt-main { padding: 12px; }
    }
  </style>
</head>

<!-- Plain script — Supabase init MUST be outside Babel -->

const fmtTimestamp = (isoStr) => {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  const weekday = d.toLocaleDateString('en-US', { weekday: 'short' }); // Mon, Tue…
  const date    = d.toLocaleDateString('en-US', { month: 'numeric', day: 'numeric', year: '2-digit' });
  const time    = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  return `${weekday} ${date} · ${time}`;
};

const fmtDate = (d) => {

};

// ── Business day helpers ──────────────────────────────────────────
const getNthWeekday = (year, month, dow, n) => {
  // dow: 0=Sun,1=Mon...6=Sat; n: 1-based nth occurrence
  const d = new Date(year, month-1, 1);
  let count = 0;
  while (true) {
    if (d.getDay() === dow) { count++; if (count === n) return new Date(d); }
    d.setDate(d.getDate() + 1);
  }
};
const getLastWeekday = (year, month, dow) => {
  const d = new Date(year, month, 0); // last day of month
  while (d.getDay() !== dow) d.setDate(d.getDate() - 1);
  return new Date(d);
};
const observedDate = (year, month, day) => {
  const d = new Date(year, month-1, day);
  if (d.getDay() === 6) return new Date(year, month-1, day-1); // Sat→Fri
  if (d.getDay() === 0) return new Date(year, month-1, day+1); // Sun→Mon
  return d;
};
const getFederalHolidays = (year) => {
  const h = [
    observedDate(year, 1, 1),   // New Year's
    getNthWeekday(year, 1, 1, 3), // MLK (3rd Mon Jan)
    getNthWeekday(year, 2, 1, 3), // Presidents' (3rd Mon Feb)
    getLastWeekday(year, 5, 1),   // Memorial (last Mon May)
    observedDate(year, 6, 19),  // Juneteenth
    observedDate(year, 7, 4),   // Independence Day
    getNthWeekday(year, 9, 1, 1), // Labor (1st Mon Sep)
    getNthWeekday(year, 10, 1, 2),// Columbus (2nd Mon Oct)
    observedDate(year, 11, 11), // Veterans Day
    getNthWeekday(year, 11, 4, 4),// Thanksgiving (4th Thu Nov)
    observedDate(year, 12, 25), // Christmas
  ];
  return new Set(h.map(d => d.toISOString().split('T')[0]));
};
const HOLIDAY_CACHE = {};
const isHolidayDate = (dateStr) => {
  if (!dateStr) return false;
  const year = parseInt(dateStr.slice(0,4));
  if (!HOLIDAY_CACHE[year]) HOLIDAY_CACHE[year] = getFederalHolidays(year);
  return HOLIDAY_CACHE[year].has(dateStr);
};
const isWeekendDate = (dateStr) => {

  const d = new Date(dateStr + 'T12:00:00');
  return d.getDay() === 0 || d.getDay() === 6;
};

const getHolidaysInRange = (startDateStr, endDateStr) => {
  if (!startDateStr || !endDateStr) return [];
  const start = new Date(startDateStr + 'T12:00:00');
  const end   = new Date(endDateStr   + 'T12:00:00');
  const years = new Set();
  for (let y = start.getFullYear(); y <= end.getFullYear(); y++) years.add(y);

  const holidays = [];
  years.forEach(year => {
    const h = getFederalHolidays(year);
    h.forEach(dateStr => {
      const d = new Date(dateStr + 'T12:00:00');
      if (d >= start && d <= end) {
        // Try to get a name
        const mmdd = dateStr.slice(5);
        const dow  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
        holidays.push({ date: dateStr, dow });
      }
    });
  });
  return holidays.sort((a,b) => a.date.localeCompare(b.date));
};

const countCalendarDays = (startDateStr, endDateStr) => {
  if (!startDateStr || !endDateStr) return 0;
  const diff = new Date(endDateStr+'T12:00:00') - new Date(startDateStr+'T12:00:00');
  return Math.round(diff / 86400000);
};

const countBusinessDaysInRange = (startDateStr, endDateStr) => {
  if (!startDateStr || !endDateStr) return 0;
  const start = new Date(startDateStr + 'T12:00:00');
  const end   = new Date(endDateStr   + 'T12:00:00');
  let count = 0;
  const cur = new Date(start);
  while (cur <= end) {
    const str = cur.toISOString().split('T')[0];
    if (!isWeekendDate(str) && !isHolidayDate(str)) count++;
    cur.setDate(cur.getDate() + 1);
  }
  return count;
};

const subtractBusinessDays = (startDateStr, days) => {
  if (!startDateStr || !days) return startDateStr;
  const d = new Date(startDateStr + 'T12:00:00');
  let subtracted = 0;
  while (subtracted < days) {
    d.setDate(d.getDate() - 1);
    const str = d.toISOString().split('T')[0];
    if (!isWeekendDate(str) && !isHolidayDate(str)) subtracted++;
  }
  return d.toISOString().split('T')[0];
};

const fmtDayOfWeek = (dateStr) => {
  if (!dateStr) return '';
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return days[new Date(dateStr + 'T12:00:00').getDay()];
};

const calcDealDates = (closingDate, fundingDate, turntimes) => {
  if (!closingDate) return {};
  const dates = {};
  dates['14'] = closingDate;
  dates['15'] = fundingDate || closingDate;
  // Work backwards from closing (13 → 01)
  let anchor = closingDate;
  for (let i = 13; i >= 1; i--) {
    const key = String(i).padStart(2,'0');
    const item = DATE_CALC_STATUSES.find(s => s.key === key);
    const days = turntimes?.[key] ?? item?.default ?? 1;
    if (days === 0) {
      dates[key] = anchor;
    } else {
      dates[key] = subtractBusinessDays(anchor, days);
      anchor = dates[key];
    }
  }
  return dates;
};

const addRescissionDays = (startDateStr, rescDays) => {
  if (!startDateStr) return '';
  const d = new Date(startDateStr + 'T12:00:00');
  let counted = 0;
  while (counted < rescDays) {
    d.setDate(d.getDate() + 1);
    const str = d.toISOString().split('T')[0];
    if (d.getDay() !== 0 && !isHolidayDate(str)) counted++;
  }
  // Funding is the next non-Sunday, non-holiday day
  do {
    d.setDate(d.getDate() + 1);
  } while (d.getDay() === 0 || isHolidayDate(d.toISOString().split('T')[0]));
  return d.toISOString().split('T')[0];
};

const calcFundingDate = (closingDate, transType, occupancy) => {
  if (!closingDate) return '';
  if (transType === 'refinance' && occupancy === 'primary') {
    return addRescissionDays(closingDate, 3);
  }
  return closingDate; // purchase, secondary/investment refi, heloc
};

// ICD due = 3 days before closing, skipping Sunday only (Sat counts).
// If result lands on Saturday, back up to Friday (office closed Sat).
const calcIcdDueDate = (closingDate) => {
  if (!closingDate) return '';
  const d = new Date(closingDate + 'T12:00:00');
  let count = 0;
  while (count < 3) {
    d.setDate(d.getDate() - 1);
    if (d.getDay() !== 0) count++; // 0 = Sunday, skip
  }
  if (d.getDay() === 6) d.setDate(d.getDate() - 1); // Sat → Fri
  return d.toISOString().slice(0, 10);
};

const addBusinessDays = (startDateStr, days) => {
  if (!startDateStr || !days) return startDateStr;
  const d = new Date(startDateStr + 'T12:00:00');
  let added = 0;
  while (added < days) {
    d.setDate(d.getDate() + 1);
    const str = d.toISOString().split('T')[0];
    if (!isWeekendDate(str) && !isHolidayDate(str)) added++;
  }
  // If result lands on weekend/holiday, advance to next business day
  let result = d.toISOString().split('T')[0];
  while (isWeekendDate(result) || isHolidayDate(result)) {
    const next = new Date(result + 'T12:00:00');
    next.setDate(next.getDate() + 1);
    result = next.toISOString().split('T')[0];
  }
  return result;
};

const validateReceived = (dateStr) => {
  if (!dateStr) return true;
  if (dateStr > today()) {
    alert(`Received date cannot be in the future.\n\nEntered: ${fmtDate(dateStr)}\nToday: ${fmtDate(today())}`);
    return false;
  }
  return true;
};

const daysDiff = (dateStr) => {
  if (!dateStr) return null;
  const d = new Date(dateStr + 'T12:00:00');
  const now = new Date();
  now.setHours(12,0,0,0);
  return Math.round((d - now) / 86400000);
};

function ProfilePicker({ valueId, profiles, onChange, placeholder }) {
  const [query, setQuery] = React.useState('');
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  const selected = profiles.find(p => p.id === valueId);
  const filtered = (profiles || []).filter(p =>
    !query || (p.display_name || p.email || '').toLowerCase().includes(query.toLowerCase())
  );
  return (
    <div ref={ref} style={{position:'relative'}}>
      <div style={{display:'flex',gap:4,alignItems:'center'}}>
        <input value={open ? query : (selected ? selected.display_name || selected.email : '')}
          onChange={e=>setQuery(e.target.value)}
          onFocus={()=>{ setQuery(''); setOpen(true); }}
          onBlur={()=>setTimeout(()=>setOpen(false),150)}
          placeholder={placeholder||'Search…'}
          style={{flex:1,padding:'6px 8px',border:'1px solid #E5E7EB',borderRadius:6,fontSize:13}} />
        {valueId && <button onMouseDown={e=>{e.preventDefault();onChange(null);setQuery('');}}
          style={{background:'none',border:'none',cursor:'pointer',color:'#9CA3AF',fontSize:15,padding:'0 2px',lineHeight:1}}>×</button>}
      </div>
      {open && (
        <div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:1100,background:'white',border:'1px solid #E5E7EB',borderRadius:8,boxShadow:'0 4px 20px rgba(0,0,0,0.15)',marginTop:2,maxHeight:200,overflowY:'auto'}}>
          <div onMouseDown={e=>{e.preventDefault();onChange(null);setOpen(false);setQuery('');}}
            style={{padding:'8px 12px',fontSize:12,color:'#9CA3AF',cursor:'pointer',borderBottom:'1px solid #F3F4F6'}}
            onMouseEnter={e=>e.currentTarget.style.background='#F8FAFC'}
            onMouseLeave={e=>e.currentTarget.style.background='white'}>— None —</div>
          {filtered.map(p => (
            <div key={p.id} onMouseDown={e=>{e.preventDefault();onChange(p.id);setOpen(false);setQuery('');}}
              style={{padding:'8px 12px',fontSize:13,cursor:'pointer',fontWeight:600,color:'#1B2A4A',borderBottom:'1px solid #F3F4F6'}}
              onMouseEnter={e=>e.currentTarget.style.background='#F8FAFC'}
              onMouseLeave={e=>e.currentTarget.style.background='white'}>
              {p.display_name||p.email}
              {p.lmt_role && <span style={{fontSize:10,color:'#9CA3AF',marginLeft:6,fontWeight:400}}>
                {({lo:'LO',loa:'LOA',processor:'Processor',setup:'Setup',admin:'Admin'})[p.lmt_role]||p.lmt_role}
              </span>}
            </div>
          ))}
          {filtered.length === 0 && <div style={{padding:'8px 12px',fontSize:12,color:'#9CA3AF'}}>No matches</div>}
        </div>
      )}
    </div>
  );
}

function AgentPicker({ label, value, onChange, saveCategory }) {
  const [query, setQuery] = useState(value || '');
  const [results, setResults] = useState([]);
  const [open, setOpen] = useState(false);
  const [searching, setSearching] = useState(false);
  const [saving, setSaving] = useState(false);
  const [savedToHlt, setSavedToHlt] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const search = async (q) => {
    setQuery(q);
    onChange({ name: q, email: '', phone: '', contact_id: null });
    setSavedToHlt(false);
    if (!q.trim() || q.length < 2) { setResults([]); setOpen(false); return; }
    setSearching(true);
    const { data } = await sb.from('lmt_contacts')
      .select('id,category,first_name,last_name,company,email,phone')
      .or(`first_name.ilike.%${q}%,last_name.ilike.%${q}%,email.ilike.%${q}%,company.ilike.%${q}%`)
      .limit(8);
    setResults(data || []);
    setOpen(true);
    setSearching(false);
  };

  const select = (contact) => {
    const name = [contact.first_name,contact.last_name].filter(Boolean).join(' ') || contact.company || '';
    setQuery(name); setOpen(false); setSavedToHlt(true);
    onChange({ name, email: contact.email||'', phone: contact.phone||'', contact_id: contact.id });
  };

  const addToContacts = async () => {
    if (!query.trim() || saving) return;
    setSaving(true);
    const parts = query.trim().split(' ');
    const { data, error } = await sb.from('lmt_contacts').insert({
      first_name: parts[0]||'', last_name: parts.slice(1).join(' ')||'',
      category: saveCategory||'Realtor',
      email:'', phone:'', cell_phone:'', license_nmls:'', notes:'',
    }).select().single();
    setSaving(false);
    if (!error && data) {
      setSavedToHlt(true); setOpen(false);
      onChange({ name: query, email: '', phone: '', contact_id: data.id });
    }
  };

  const clear = () => {
    setQuery(''); setResults([]); setSavedToHlt(false);
    onChange({ name:'', email:'', phone:'', contact_id: null });
  };

  return (
    <div ref={ref} style={{position:'relative'}}>
      <div style={{display:'flex',gap:6}}>
        <input value={query} onChange={e=>search(e.target.value)}
          onFocus={()=>query.length>=2&&setOpen(true)}
          placeholder={`Search ${label} by name…`}
          style={{flex:1,padding:'8px 10px',border:'1px solid #E5E7EB',borderRadius:6,fontSize:13}} />
        {savedToHlt && <span style={{fontSize:11,color:'#16A34A',alignSelf:'center',whiteSpace:'nowrap'}}>✓ Saved</span>}
        {query && <button onClick={clear} style={{background:'none',border:'none',cursor:'pointer',color:'#9CA3AF',fontSize:16,padding:'0 4px'}}>×</button>}
      </div>
      {searching && <div style={{fontSize:12,color:'#9CA3AF',marginTop:4}}>Searching…</div>}
      {open && (
        <div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:999,background:'white',border:'1px solid #E5E7EB',borderRadius:8,boxShadow:'0 4px 20px rgba(0,0,0,0.15)',marginTop:4,maxHeight:220,overflowY:'auto'}}>
          {results.map(c => (
            <div key={c.id} onClick={()=>select(c)}
              style={{padding:'9px 14px',cursor:'pointer',borderBottom:'1px solid #F3F4F6',fontSize:13}}
              onMouseEnter={e=>e.currentTarget.style.background='#F8FAFC'}
              onMouseLeave={e=>e.currentTarget.style.background='white'}>
              <div style={{fontWeight:600}}>{[c.first_name,c.last_name].filter(Boolean).join(' ') || c.company || ''}</div>
              <div style={{fontSize:11,color:'#6B7280'}}>{c.category||'Contact'}{c.company && (c.first_name||c.last_name)?' · '+c.company:''}{c.email?' · '+c.email:''}{c.phone?' · '+c.phone:''}</div>
            </div>
          ))}
          {results.length === 0 && !searching && query.length >= 2 && (
            <div onMouseDown={addToContacts}
              style={{padding:'9px 14px',cursor:'pointer',fontSize:13,color:'#2563EB',fontWeight:600,display:'flex',alignItems:'center',gap:6}}
              onMouseEnter={e=>e.currentTarget.style.background='#EFF6FF'}
              onMouseLeave={e=>e.currentTarget.style.background='white'}>
              {saving ? 'Saving…' : `➕ Add "${query}" as contact`}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function DealModal({ deal, profiles, statuses, branches, existingDeals, onSave, onClose, currentProfile }) {
  const isEdit = !!deal;
  const [form, setForm] = useState({
    primary_borrower_name: '',
    primary_first_name: '',
    primary_last_name: '',
    primary_nickname: '',
    primary_borrower_email: '',
    primary_borrower_phone: '',
    property_address: '',
    city: '', state: '', zip: '',
    file_number: '',
    loan_amount: '',
    loan_program: '',
    loan_term: 30,
    rate: '',
    trans_type: '',
    prop_type: '',
    status: statuses?.[0]?.label || 'Not Submitted',
    closing_date: '',
    lock_expiration_date: '',
    occupancy: '',
    funding_date: '',
    hlt_scenario_name: '',
    branch: '',
    assigned_lo_id: '',
    assigned_loa_id: '',
    assigned_processor_id: '',
    buyers_agent: '',
    buyers_agent_email: '',
    buyers_agent_phone: '',
    sellers_agent: '',
    sellers_agent_email: '',
    sellers_agent_phone: '',
    title_company: '',
    title_contact_name: '',
    title_company_email: '',
    title_company_phone: '',
    appraiser: '',
    appraiser_contact_name: '',
    appraiser_email: '',
    appraiser_phone: '',
    hoi_company: '',
    hoi_contact_name: '',
    hoi_company_email: '',
    hoi_company_phone: '',
    flood_company: '',
    flood_contact_name: '',
    flood_company_email: '',
    escrow_company: '',
    escrow_contact_name: '',
    escrow_company_email: '',
    additional_vendors: [],
    quick_note: '',
    ...(isEdit ? (() => {
      // Auto-split primary_borrower_name into first/last if not already set
      let firstName = deal.primary_first_name || '';
      let lastName  = deal.primary_last_name  || '';
      if (!firstName && !lastName && deal.primary_borrower_name) {
        const full = deal.primary_borrower_name.trim();
        if (full.includes(',')) {
          // "Last, First" format
          const parts = full.split(',').map(s=>s.trim());
          lastName = parts[0]; firstName = parts[1] || '';
        } else {
          // "First Last" format
          const parts = full.split(' ');
          firstName = parts[0]; lastName = parts.slice(1).join(' ');
        }
      }
      return {
        ...deal,
        primary_first_name: firstName,
        primary_last_name:  lastName,
        loan_amount: deal.loan_amount || '',
        rate: deal.rate || '',
        closing_date: deal.closing_date || '',
        lock_expiration_date: deal.lock_expiration_date || '',
      };
    })() : (() => {
      // New deal: auto-assign the logged-in user as LO if they're an LO or branch_admin
      const isLO = currentProfile && (currentProfile.lmt_role === 'lo' || currentProfile.lmt_role == null) &&
                   ['internal','branch_admin'].includes(currentProfile.role);
      return isLO ? {
        assigned_lo_id: currentProfile.id,
        branch: currentProfile.branch || '',
      } : {};
    })())
  });
  const [saving, setSaving] = useState(false);
  const [formTab, setFormTab] = useState('basic');

  // Auto-split existing borrower name into first/last if not already set
  useEffect(() => {
    if (isEdit && deal?.primary_borrower_name && !form.primary_first_name && !form.primary_last_name) {
      const full = deal.primary_borrower_name.trim();
      let fn = '', ln = '';
      if (full.includes(',')) {
        const parts = full.split(',').map(s => s.trim());
        ln = parts[0]; fn = parts[1] || '';
      } else {
        const parts = full.split(' ');
        fn = parts[0]; ln = parts.slice(1).join(' ');
      }
      setForm(p => ({ ...p, primary_first_name: fn, primary_last_name: ln }));
    }
  }, []);
  const [loanNumDupe, setLoanNumDupe] = useState(false);
  const [dragVI, setDragVI] = useState(null);
  const [dragVO, setDragVO] = useState(null);
  const [coborrowers, setCoborrowers] = useState([]);

  // Load existing co-borrowers when editing
  useEffect(() => {
    if (isEdit && deal.id) {
      sb.from('lmt_coborrowers').select('*').eq('deal_id', deal.id).order('sort_order').then(({ data }) => {
        if (data) setCoborrowers(data);
      });
    }
  }, [isEdit, deal?.id]);

  const addCoborrower = () => setCoborrowers(prev => [...prev, { name:'', email:'', phone:'', sort_order: prev.length+1, _new: true }]);
  const removeCoborrower = (i) => setCoborrowers(prev => prev.filter((_,idx)=>idx!==i));
  const setCob = (i, k, v) => setCoborrowers(prev => prev.map((cb,idx)=>idx===i?{...cb,[k]:v}:cb));

  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const handleSave = async () => {
    if (!form.primary_borrower_name.trim()) { alert('Borrower name is required.'); setFormTab('basic'); return; }
    if (!form.file_number?.trim()) { alert('Loan # is required.'); setFormTab('basic'); return; }
    // Duplicate check
    const dupeDeal = (existingDeals||[]).find(d =>
      d.file_number && d.file_number.trim().toLowerCase() === form.file_number.trim().toLowerCase()
      && d.id !== deal?.id
    );
    if (dupeDeal) {
      const proceed = confirm(`⚠️ Loan # "${form.file_number}" already exists on deal "${dupeDeal.primary_borrower_name}".\n\nAre you sure you want to continue?`);
      if (!proceed) { setFormTab('basic'); return; }
    }
    setSaving(true);
    const payload = {
      ...form,
      loan_amount: form.loan_amount ? parseFloat(form.loan_amount) : null,
      rate: form.rate ? parseFloat(form.rate) : null,
      loan_term: parseInt(form.loan_term) || 30,
      closing_date: form.closing_date || null,
      lock_expiration_date: form.lock_expiration_date || null,
      funding_date: form.funding_date || null,

      assigned_lo_id: form.assigned_lo_id || (
        !isEdit && currentProfile && ['internal','branch_admin'].includes(currentProfile.role)
          ? currentProfile.id : null
      ),
      assigned_loa_id: form.assigned_loa_id || null,
      assigned_processor_id: form.assigned_processor_id || null,
      title_contact_name:     form.title_contact_name    || '',

      hoi_contact_name:       form.hoi_contact_name      || '',
      flood_contact_name:     form.flood_contact_name    || '',
      escrow_contact_name:    form.escrow_contact_name   || '',
      additional_vendors:     form.additional_vendors    || [],
      occupancy:              form.occupancy             || 'primary',
    };
    const savedDeal = await onSave(payload);
    // Save co-borrowers if deal was saved successfully
    const dealId = savedDeal?.id || deal?.id;
    if (dealId && coborrowers.length > 0) {
      // Delete existing co-borrowers and re-insert
      await sb.from('lmt_coborrowers').delete().eq('deal_id', dealId);

        deal_id: dealId,
        name:       cb.name || [cb.first_name||'',cb.last_name||''].filter(Boolean).join(' '),
        first_name: cb.first_name || '',
        last_name:  cb.last_name  || '',
        nickname:   cb.nickname   || '',
        email: cb.email || '', phone: cb.phone || '', sort_order: i+1
      }));
      if (cobsToInsert.length > 0) await sb.from('lmt_coborrowers').insert(cobsToInsert);
    }
    setSaving(false);
    onClose();
  };

  const internalProfiles = profiles.filter(p => ['admin','internal','branch_admin'].includes(p.role));

function SmartDate({ value, onChange, disabled }) {
  const CY = new Date().getFullYear();

  const toDisplay = (iso) => {
    if (!iso) return '';
    const [y, m, d] = iso.split('-');
    if (!m || !d) return '';
    const yr = parseInt(y);
    return yr === CY ? `${m}/${d}` : `${m}/${d}/${y}`;
  };

  const parseDate = (input) => {
    const s = (input || '').trim().replace(/-/g, '/');
    if (!s) return '';
    const parts = s.split('/');
    const mo = parseInt(parts[0]);
    const dy = parseInt(parts[1]);
    if (!parts[1] || isNaN(mo) || isNaN(dy) || mo < 1 || mo > 12 || dy < 1 || dy > 31) return '';
    let yr = parts[2] ? parseInt(parts[2]) : CY;
    if (yr >= 0 && yr < 100) yr += 2000;
    if (yr < 1900 || yr > 2100) yr = CY;
    return `${yr}-${String(mo).padStart(2,'0')}-${String(dy).padStart(2,'0')}`;
  };

  const [text, setText] = React.useState(() => toDisplay(value));
  const [focused, setFocused] = React.useState(false);
  const prevValue = React.useRef(value);

  React.useEffect(() => {
    if (!focused && value !== prevValue.current) {
      prevValue.current = value;
      setText(toDisplay(value));
    }
  }, [value, focused]);

  const handleFocus = (e) => {
    setFocused(true);
    if (value) {
      const [y, m, d] = value.split('-');
      setText(`${m}/${d}/${y}`);
    }
    setTimeout(() => e.target.select(), 0);
  };

  const handleBlur = () => {
    setFocused(false);
    const iso = parseDate(text);
    prevValue.current = iso;
    setText(iso ? toDisplay(iso) : '');
    onChange({ target: { value: iso } });
  };

  return (
    <input
      value={text}
      onChange={e => setText(e.target.value)}
      onFocus={handleFocus}
      onBlur={handleBlur}
      disabled={disabled}
      placeholder="MM/DD"
      className={`ms-input${value ? '' : ' date-empty'}`}
      style={{width:'100%'}}
    />
  );
}

function MilestoneSetupScreen({ deal, coborrowers, presets, onCreated }) {
  const primaryName = (deal.primary_borrower_name||'Borrower').split(' ')[0];
  const [primaryEmployers, setPrimaryEmployers] = useState(1);
  const [primaryPrevEmployers, setPrimaryPrevEmployers] = useState(0);
  const [primaryRenting, setPrimaryRenting] = useState(false);
  const [coEmployers, setCoEmployers] = useState(coborrowers.length > 0 ? 1 : 0);
  const [coPrevEmployers, setCoPrevEmployers] = useState(0);
  const [coRenting, setCoRenting] = useState(false);
  const [payoffs, setPayoffs] = useState(0);
  const [flood, setFlood] = useState(false);
  const [creating, setCreating] = useState(false);

  const hasCoBorrower = coborrowers.length > 0;
  const coName = hasCoBorrower ? (coborrowers[0]?.name||'Co-Borrower').split(' ')[0] : '';

  // Preview what will be created
  const preview = useMemo(() => {
    const cards = [];
    let order = 0;
    // Core
    CORE_TYPES.forEach(t => cards.push({ type:t, label:TYPE_LABELS[t], is_core:true, order:order++ }));
    // Primary VOEs
    for (let i = 0; i < primaryEmployers; i++)
      cards.push({ type:'voe', label:`VOE — ${primaryName} / Employer ${primaryEmployers>1?i+1:''}`.trim(), is_core:false, order:order++ });
    for (let i = 0; i < primaryPrevEmployers; i++)
      cards.push({ type:'voe', label:`VOE — ${primaryName} / Prev Employer ${primaryPrevEmployers>1?i+1:''}`.trim(), is_core:false, order:order++ });
    if (primaryRenting)
      cards.push({ type:'vor', label:`VOR — ${primaryName}`, is_core:false, order:order++ });
    // Co-borrower VOEs
    if (hasCoBorrower) {
      for (let i = 0; i < coEmployers; i++)
        cards.push({ type:'voe', label:`VOE — ${coName} / Employer ${coEmployers>1?i+1:''}`.trim(), is_core:false, order:order++ });
      for (let i = 0; i < coPrevEmployers; i++)
        cards.push({ type:'voe', label:`VOE — ${coName} / Prev Employer ${coPrevEmployers>1?i+1:''}`.trim(), is_core:false, order:order++ });
      if (coRenting)
        cards.push({ type:'vor', label:`VOR — ${coName}`, is_core:false, order:order++ });
    }
    // Payoffs
    for (let i = 0; i < payoffs; i++)
      cards.push({ type:'payoff', label:`Payoff — ${payoffs>1?(i===0?'1st':'2nd')+' Mortgage':'Mortgage'}`, is_core:false, order:order++ });
    if (flood)
      cards.push({ type:'flood', label:'Flood Cert', is_core:false, order:order++ });
    return cards;
  }, [primaryEmployers, primaryPrevEmployers, primaryRenting, coEmployers, coPrevEmployers, coRenting, payoffs, flood, hasCoBorrower]);

  const createMilestones = async () => {
    setCreating(true);
    const rows = preview.map(c => ({
      deal_id: deal.id,
      milestone_type: c.type,
      label: c.label,
      sort_order: c.order,
      is_core: false, // never set is_core — locks are gone
      fields_config: DEFAULT_FIELD_CONFIGS[c.type] || DEFAULT_FIELD_CONFIGS.other,
    }));
    const { data } = await sb.from('lmt_milestones').insert(rows).select();
    setCreating(false);
    if (data) onCreated(data);
  };

  const NumSelect = ({ label, value, onChange, max=5 }) => (
    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
      <span style={{fontSize:13,color:'#374151',flex:1}}>{label}</span>
      <select value={value} onChange={e=>onChange(Number(e.target.value))}
        style={{padding:'4px 8px',border:'1px solid #E5E7EB',borderRadius:6,fontSize:13,background:'white'}}>
        {Array.from({length:max+1},(_,i)=><option key={i}>{i}</option>)}
      </select>
    </div>
  );

  const Section = ({ title, children }) => (
    <div style={{background:'#F8FAFC',border:'1px solid #E5E7EB',borderRadius:8,padding:'14px 16px',marginBottom:12}}>
      <div style={{fontSize:12,fontWeight:700,color:'#6B7280',textTransform:'uppercase',letterSpacing:'0.4px',marginBottom:10}}>{title}</div>
      {children}
    </div>
  );

  return (
    <div style={{maxWidth:600,margin:'0 auto',padding:'20px 0'}}>
      <div style={{marginBottom:20}}>
        <h3 style={{fontSize:16,fontWeight:700,color:'#1B2A4A',margin:0}}>Set Up Milestones</h3>
        <p style={{fontSize:13,color:'#6B7280',marginTop:4}}>Configure the milestone cards for this loan. You can add or remove cards anytime from the Setup tab.</p>
      </div>

      {/* Core cards — always included */}
      <Section title="Core Milestones (always included)">
        <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
          {CORE_TYPES.map(t => (
            <span key={t} style={{background:'#DBEAFE',color:'#1D4ED8',borderRadius:4,padding:'3px 8px',fontSize:12,fontWeight:600}}>
              ✓ {TYPE_LABELS[t]}
            </span>
          ))}
        </div>
      </Section>

      {/* Primary borrower */}
      <Section title={`Primary Borrower — ${primaryName}`}>
        <NumSelect label="Current employers" value={primaryEmployers} onChange={setPrimaryEmployers} />
        <NumSelect label="Previous employers (last 2 yrs)" value={primaryPrevEmployers} onChange={setPrimaryPrevEmployers} />
        <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'#374151',cursor:'pointer'}}>
          <input type="checkbox" checked={primaryRenting} onChange={e=>setPrimaryRenting(e.target.checked)} />
          Currently renting (adds VOR)
        </label>
      </Section>

      {/* Co-borrower */}
      {hasCoBorrower && (
        <Section title={`Co-Borrower — ${coName}`}>
          <NumSelect label="Current employers" value={coEmployers} onChange={setCoEmployers} />
          <NumSelect label="Previous employers (last 2 yrs)" value={coPrevEmployers} onChange={setCoPrevEmployers} />
          <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'#374151',cursor:'pointer'}}>
            <input type="checkbox" checked={coRenting} onChange={e=>setCoRenting(e.target.checked)} />
            Currently renting (adds VOR)
          </label>
        </Section>
      )}

      {/* Property */}
      <Section title="Property">
        <NumSelect label="Existing mortgages to pay off" value={payoffs} onChange={setPayoffs} max={4} />
        <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'#374151',cursor:'pointer',marginTop:8}}>
          <input type="checkbox" checked={flood} onChange={e=>setFlood(e.target.checked)} />
          Flood zone (adds Flood Cert)
        </label>
      </Section>

      {/* Preview */}
      <div style={{background:'#1B2A4A',borderRadius:8,padding:'12px 16px',marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:700,color:'rgba(255,255,255,0.7)',textTransform:'uppercase',marginBottom:8}}>
          Will create {preview.length} milestone cards:
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
          {preview.map((c,i) => (
            <span key={i} style={{background:'rgba(255,255,255,0.15)',color:'white',borderRadius:4,padding:'2px 8px',fontSize:11}}>
              {c.label}
            </span>
          ))}
        </div>
      </div>

      <button className="btn btn-navy" onClick={createMilestones} disabled={creating} style={{width:'100%',padding:12,fontSize:14}}>
        {creating ? 'Creating…' : `Create ${preview.length} Milestones →`}
      </button>
    </div>
  );
}

// ─────────────────────────────────────────────
// MILESTONE SETUP TAB (ongoing management)
// ─────────────────────────────────────────────
function MilestoneSetupTab({ deal, milestones, onMilestonesChange, coborrowers }) {
  const [newType, setNewType] = useState('payoff');
  const [newLabel, setNewLabel] = useState('');
  const [adding, setAdding] = useState(false);
  const [dragIdx, setDragIdx] = useState(null);
  const [dragOver, setDragOver] = useState(null);

  // Borrower options for dropdown
  const borrowerOptions = [
    { value:'', label:'—' },
    { value:'primary', label:(deal.primary_borrower_name||'Primary').split(' ')[0] },
    ...coborrowers.map((cb,i) => ({ value:`co${i+1}`, label:(cb.name||`Co-Borrower ${i+1}`).split(' ')[0] })),
  ];

  const insertCard = async (type, label, borrower_ref='') => {
    const maxOrder = Math.max(-1, ...milestones.map(m => m.sort_order||0));
    const { data } = await sb.from('lmt_milestones').insert({
      deal_id: deal.id, milestone_type: type, label: label.trim(),
      sort_order: maxOrder + 1, is_core: false,
      fields_config: DEFAULT_FIELD_CONFIGS[type] || DEFAULT_FIELD_CONFIGS.other,
      borrower_ref,
    }).select().single();
    if (data) onMilestonesChange([...milestones, data]);
    return data;
  };

  const addCard = async () => {
    if (!newLabel.trim()) { alert('Please enter a label.'); return; }
    setAdding(true);
    await insertCard(newType, newLabel);
    setNewLabel('');
    setAdding(false);
  };

  const duplicateCard = async (ms) => {
    // Find how many of this type/similar label exist for auto-numbering
    const base = getMilestoneLabel(ms).replace(/ \d+$/, '');
    const count = milestones.filter(m => getMilestoneLabel(m).startsWith(base)).length;
    await insertCard(ms.milestone_type, `${base} ${count + 1}`, ms.borrower_ref||'');
  };

  const removeCard = async (ms) => {
    if (ms.is_core) return; // permanent cards cannot be deleted
    await sb.from('lmt_milestones').delete().eq('id', ms.id);
    onMilestonesChange(milestones.filter(m => m.id !== ms.id));
  };

  const updateCard = async (ms, patch) => {
    await sb.from('lmt_milestones').update(patch).eq('id', ms.id);
    onMilestonesChange(milestones.map(m => m.id === ms.id ? { ...m, ...patch } : m));
  };

  const toggleField = (ms, field) => {
    const cfg = { ...getFieldConfig(ms), [field]: !getFieldConfig(ms)[field] };
    updateCard(ms, { fields_config: cfg });
  };

  const handleDrop = async (targetIdx) => {
    if (dragIdx === null || dragIdx === targetIdx) { setDragIdx(null); setDragOver(null); return; }
    const arr = [...milestones].sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
    const [moved] = arr.splice(dragIdx, 1);
    arr.splice(targetIdx, 0, moved);
    const updated = arr.map((m, i) => ({ ...m, sort_order: i }));
    onMilestonesChange(updated);
    for (const m of updated) await sb.from('lmt_milestones').update({ sort_order: m.sort_order }).eq('id', m.id);
    setDragIdx(null); setDragOver(null);
  };

  const sorted = [...milestones].sort((a,b) => (a.sort_order||0) - (b.sort_order||0));

  // Which optional templates are already added
  const addedLabels = new Set(milestones.map(m => getMilestoneLabel(m).toLowerCase()));

  const FieldBtn = ({ ms, field, label }) => {
    const cfg = getFieldConfig(ms);
    return (
      <button onClick={()=>toggleField(ms,field)}
        style={{padding:'2px 6px',borderRadius:4,border:'1px solid',fontSize:10,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',
          background:cfg[field]?'#DBEAFE':'#F3F4F6',
          borderColor:cfg[field]?'#93C5FD':'#E5E7EB',
          color:cfg[field]?'#1D4ED8':'#C4C4C4'}}>
        {label}
      </button>
    );
  };

  return (
    <div>
      <div style={{fontSize:12,color:'#6B7280',marginBottom:12}}>
        Drag ⠿ to reorder · Click field buttons to toggle · Click label to rename
      </div>

      {/* Column headers — same template as rows */}
      <div style={{display:'grid',gridTemplateColumns:'24px 16px 1fr 170px 120px 24px 24px',gap:6,alignItems:'center',padding:'0 4px 6px',borderBottom:'1px solid #E5E7EB',marginBottom:6}}>
        <div/><div/>
        <div style={{fontSize:10,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',letterSpacing:'0.4px'}}>Milestone</div>
        <div style={{fontSize:10,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',letterSpacing:'0.4px'}}>Fields</div>
        <div style={{fontSize:10,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',letterSpacing:'0.4px'}}>Borrower</div>
        <div/><div/>
      </div>

      {sorted.map((ms, idx) => {
        const cfg = getFieldConfig(ms);
        const isVerification = ['voe','vom','vor'].includes(ms.milestone_type);
        const currentBorr = ms.borrower_ref || 'primary';

        return (
          <div key={ms.id} draggable onDragStart={()=>setDragIdx(idx)}
            onDragOver={e=>{e.preventDefault();setDragOver(idx);}} onDragLeave={()=>setDragOver(null)}
            onDrop={()=>handleDrop(idx)}
            style={{display:'grid',gridTemplateColumns:'24px 16px 1fr 170px 120px 24px 24px',gap:6,alignItems:'center',
              padding:'7px 4px',background:dragOver===idx?'#EFF6FF':'white',
              border:'1px solid #E5E7EB',borderRadius:8,marginBottom:4,transition:'background 0.1s'}}>
            <span style={{cursor:'grab',color:'#C4C4C4',fontSize:13,textAlign:'center'}}>⠿</span>
            <span/>
            <input defaultValue={getMilestoneLabel(ms)} key={ms.id+'_label'}
              onBlur={e=>updateCard(ms,{label:e.target.value})}
              style={{border:'none',fontSize:13,fontWeight:600,color:'#1B2A4A',background:'transparent',outline:'none',width:'100%'}} />
            {/* Field toggles — order: Ord, Due, FU, Rec */}
            <div style={{display:'flex',gap:2}}>
              <FieldBtn ms={ms} field="ordered"  label="Ord" />
              <FieldBtn ms={ms} field="due"      label="Due" />
              <FieldBtn ms={ms} field="followup" label="FU"  />
              <FieldBtn ms={ms} field="received" label="Rec" />
            </div>
            {/* Borrower — toggle pills for VOE/VOM/VOR, blank otherwise */}
            {isVerification ? (
              <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
                {borrowerOptions.filter(o=>o.value!=='').map(o => (
                  <button key={o.value} onClick={()=>updateCard(ms,{borrower_ref:o.value})}
                    style={{padding:'2px 8px',borderRadius:99,border:'2px solid',fontSize:11,fontWeight:700,cursor:'pointer',
                      background:currentBorr===o.value?'#1B2A4A':'white',
                      borderColor:currentBorr===o.value?'#1B2A4A':'#E5E7EB',
                      color:currentBorr===o.value?'white':'#6B7280'}}>
                    {o.value==='primary'?'BORR':o.label.toUpperCase().slice(0,4)}
                  </button>
                ))}
              </div>
            ) : <div/>}
            <button onClick={()=>duplicateCard(ms)} title="Duplicate"
              style={{background:'none',border:'none',cursor:'pointer',color:'#9CA3AF',fontSize:14,padding:0}}>⧉</button>
            {ms.is_core
              ? <span title="Required card — cannot be removed" style={{fontSize:13,color:'#D1D5DB',textAlign:'center',display:'block'}}>🔒</span>
              : <button onClick={()=>removeCard(ms)} title="Remove"
                  style={{background:'none',border:'none',cursor:'pointer',color:'#FCA5A5',fontSize:16,padding:0}}>×</button>
            }
          </div>
        );
      })}


      {/* All available cards — check to add, uncheck to remove */}
      <div style={{marginTop:12,padding:'14px 16px',background:'#F8FAFC',border:'1px solid #E5E7EB',borderRadius:8}}>
        <div style={{fontSize:12,fontWeight:700,color:'#6B7280',textTransform:'uppercase',marginBottom:10}}>
          Available Cards
        </div>
        <div style={{columns:'3 200px',columnGap:8}}>
          {[
            // Selectable core types (exclude le and file — always present, no need to toggle)
            ...CORE_TYPES.filter(t=>!['le','file'].includes(t)).map(t => ({ type:t, label:TYPE_LABELS[t] })),
            ...VARIABLE_TYPES.filter(t=>t!=='other').map(t => ({ type:t, label:TYPE_LABELS[t] })),
            ...OPTIONAL_CARD_TEMPLATES,
          ]
          .filter((card, idx, arr) => arr.findIndex(c => c.label.toLowerCase()===card.label.toLowerCase()) === idx)
          .sort((a,b) => a.label.localeCompare(b.label))
          .map(t => {
            const isActive = addedLabels.has(t.label.toLowerCase());
            // Find the active milestone matching this label (for removal)
            const activeMilestone = milestones.find(m => getMilestoneLabel(m).toLowerCase() === t.label.toLowerCase());
            return (
              <label key={t.label} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',
                background:isActive?'#F0FDF4':'white',
                border:`1px solid ${isActive?'#86EFAC':'#E5E7EB'}`,
                borderRadius:6,cursor:activeMilestone?.is_core?'default':'pointer',fontSize:12,
                color:isActive?'#16A34A':'#374151',
                breakInside:'avoid',marginBottom:5}}>
                <input type="checkbox" checked={isActive}
                  disabled={!!activeMilestone?.is_core}
                  style={{accentColor:'#16A34A',cursor:activeMilestone?.is_core?'not-allowed':'pointer'}}
                  onChange={async e=>{
                    if (activeMilestone?.is_core) return;
                    if (e.target.checked) {
                      await insertCard(t.type, t.label);
                    } else if (activeMilestone) {
                      await sb.from('lmt_milestones').delete().eq('id', activeMilestone.id);
                      onMilestonesChange(milestones.filter(m => m.id !== activeMilestone.id));
                    }
                  }} />
                {t.label}
                {activeMilestone?.is_core && <span style={{fontSize:10,color:'#9CA3AF',marginLeft:2}}>🔒</span>}
              </label>
            );
          })}
        </div>
      </div>

      {/* Add custom card */}
      <div style={{marginTop:12,padding:'12px 16px',background:'#F8FAFC',border:'1px dashed #E5E7EB',borderRadius:8}}>
        <div style={{fontSize:12,fontWeight:700,color:'#6B7280',textTransform:'uppercase',marginBottom:8}}>Add Custom Card</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <select value={newType} onChange={e=>{
              const opt = CUSTOM_CARD_OPTIONS.find(o=>o.value===e.target.value);
              setNewType(opt?.type||e.target.value);
              setNewLabel(opt?.fillLabel||'');
            }}
            style={{padding:'6px 8px',border:'1px solid #E5E7EB',borderRadius:6,fontSize:13,background:'white'}}>
            {CUSTOM_CARD_OPTIONS.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
          </select>
          <input value={newLabel} onChange={e=>setNewLabel(e.target.value)} placeholder="Label…"
            style={{flex:1,minWidth:160,padding:'6px 10px',border:'1px solid #E5E7EB',borderRadius:6,fontSize:13}}
            onKeyDown={e=>e.key==='Enter'&&addCard()} />
          <button className="btn btn-navy btn-sm" onClick={addCard} disabled={adding}>
            {adding ? '…' : '+ Add'}
          </button>
        </div>
      </div>
    </div>
  );
}

// DEAL DATES TAB
// ─────────────────────────────────────────────
function DealDatesTab({ deal, profile, onDealChange, milestones, saveMilestone, customStatuses }) {
  // Resolve turntimes: loan override → user template → system defaults
  const systemDefaults = DATE_CALC_STATUSES.reduce((acc, s) => { acc[s.key] = s.default; return acc; }, {});
  const userTemplate   = profile?.date_turntimes_template || {};
  const loanOverrides  = deal?.date_turntimes || {};

  const [localTT, setLocalTT] = React.useState(() => {
    // Start from system defaults, overlay user template, then loan overrides
    const merged = { ...systemDefaults, ...userTemplate, ...loanOverrides };
    return merged;
  });
  const [saving, setSaving] = React.useState(false);
  const [savingTemplate, setSavingTemplate] = React.useState(false);
  const [editingDates, setEditingDates] = React.useState(false);

  const closing = deal?.closing_date;
  const funding = deal?.funding_date;
  const dates   = calcDealDates(closing, funding, localTT);

  const getVal = (key) => localTT[key] ?? systemDefaults[key];

  const setVal = (key, val) => {
    const v = val === '' ? null : parseInt(val);
    setLocalTT(prev => ({ ...prev, [key]: v }));
  };

  const saveLoan = async () => {
    setSaving(true);
    await sb.from('lmt_deals').update({ date_turntimes: localTT }).eq('id', deal.id);
    if (onDealChange) onDealChange({ ...deal, date_turntimes: localTT });
    setSaving(false);
    setEditingDates(false);
  };

  const discardDates = () => {
    setLocalTT({ ...systemDefaults, ...userTemplate, ...loanOverrides });
    setEditingDates(false);
  };

  const saveTemplate = async () => {
    setSavingTemplate(true);
    await sb.from('profiles').update({ date_turntimes_template: localTT }).eq('id', (await sb.auth.getUser()).data.user?.id);
    setSavingTemplate(false);
    alert('✅ Saved as your default template.');
  };

  const resetToSystem = () => setLocalTT({ ...systemDefaults });
  const resetToTemplate = () => setLocalTT({ ...systemDefaults, ...userTemplate });

  const totalDays = DATE_CALC_STATUSES.filter(s=>s.key!=='14'&&s.key!=='15').reduce((sum,s)=>sum+(getVal(s.key)||0),0);
  const [actuals, setActuals] = React.useState(deal?.status_actual_dates || {});
  const [savingActuals, setSavingActuals] = React.useState(false);

  // Contract milestone — drives row '01' actual
  const contractMs = (milestones || []).find(m => m.milestone_type === 'contract');

  // On mount: if stored status doesn't match what the dates imply, correct it
  React.useEffect(() => {
    if (!deal?.id || actuals['override']) return;
    // computeAutoStatus isn't defined yet here, so inline the logic
    const eff = {
      ...actuals,
      '01': contractMs?.received_date || actuals['01'] || '',
      '14': deal?.closing_date || '',
    };
    const todayStr = today();
    let computedStatus = null;
    if (eff['sus']) {
      computedStatus = '16. Suspended';
    } else {
      const numericKeys = Object.keys(eff)
        .filter(k => /^\d+$/.test(k) && eff[k])
        .filter(k => {
          if (k === '14') return eff['13'] && deal?.closing_date === todayStr;
          if (k === '15') return !!actuals['15'];
          return true;
        });
      if (numericKeys.length) {
        const highestKey = numericKeys.sort((a,b) => parseInt(a)-parseInt(b)).pop();
        computedStatus = DATE_CALC_STATUSES.find(s => s.key === highestKey)?.label || null;
      }
    }
    if (computedStatus && computedStatus !== deal.status) {
      sb.from('lmt_deals').update({ status: computedStatus }).eq('id', deal.id);
      if (onDealChange) onDealChange({ ...deal, status: computedStatus });
    }
  }, [deal?.id]);
  // Effective actuals: '01' from contract milestone, '14' from closing_date
  const effectiveActuals = {
    ...actuals,
    '01': contractMs?.received_date || actuals['01'] || '',
    '14': deal?.closing_date || '',
  };

  // Compute which status the dates imply (ignoring override)
  const computeAutoStatus = (updActuals) => {
    if (updActuals['sus']) return '16. Suspended';
    const numericKeys = Object.keys(updActuals)
      .filter(k => /^\d+$/.test(k) && updActuals[k])
      .filter(k => {
        // '14' (Closed) only counts if '13' also has a date AND today IS the closing date
        if (k === '14') return updActuals['13'] && deal?.closing_date === today();
        // '15' (Funded) only counts if explicitly stored in actuals (not auto-derived)
        if (k === '15') return !!actuals['15'];
        return true;
      });
    if (!numericKeys.length) return null;
    const highestKey = numericKeys.sort((a,b) => parseInt(a)-parseInt(b)).pop();
    return DATE_CALC_STATUSES.find(s => s.key === highestKey)?.label || null;
  };

  const setActual = async (key, val) => {
    if (key === '14') return; // read-only — set in Loan Details
    if (key === '01' && contractMs && saveMilestone) {
      await saveMilestone({ ...contractMs, received_date: val || null, is_done: !!val });
    }
    const updated = { ...actuals, [key]: val || undefined };
    if (!val) delete updated[key];
    setActuals(updated);
    setSavingActuals(true);

    // Build deal patch — update status unless manual override is set
    const dealPatch = { status_actual_dates: updated };
    if (!updated['override']) {
      const newStatus = computeAutoStatus({
        ...updated,
        '01': contractMs?.received_date || updated['01'] || '',
        '14': deal?.closing_date || '',
      });
      if (newStatus) dealPatch.status = newStatus;
    }

    await sb.from('lmt_deals').update(dealPatch).eq('id', deal.id);
    setSavingActuals(false);
    if (onDealChange && dealPatch.status) onDealChange({ ...deal, ...dealPatch });
  };

  const setOverride = async (val) => {
    const updated = { ...actuals, override: val || undefined };
    if (!val) delete updated['override'];
    setActuals(updated);
    const dealPatch = { status_actual_dates: updated };
    if (val) {
      dealPatch.status = val;
    } else {
      const newStatus = computeAutoStatus({
        ...updated,
        '01': contractMs?.received_date || updated['01'] || '',
        '14': deal?.closing_date || '',
      });
      if (newStatus) dealPatch.status = newStatus;
    }
    await sb.from('lmt_deals').update(dealPatch).eq('id', deal.id);
    if (onDealChange) onDealChange({ ...deal, ...dealPatch });
  };

  // Calculate overall ahead/behind from all rows with both target + actual
  const deltas = DATE_CALC_STATUSES.map(s => {
    const target = dates[s.key];
    const actual = effectiveActuals[s.key];
    if (!target || !actual) return null;
    // Positive delta = actual AFTER target = behind; negative = ahead
    const tDate = new Date(target + 'T12:00:00');
    const aDate = new Date(actual + 'T12:00:00');
    return Math.round((aDate - tDate) / 86400000);
  }).filter(d => d !== null);

  const latestDelta = deltas.length ? deltas[deltas.length - 1] : null;
  const overallAhead  = latestDelta !== null && latestDelta < 0;
  const overallBehind = latestDelta !== null && latestDelta > 0;
  const overallOnTrack= latestDelta === 0;

  return (
    <div>
      {!closing && (
        <div style={{background:'#FEF3C7',border:'1px solid #FDE047',borderRadius:8,padding:'10px 16px',marginBottom:16,fontSize:13,color:'#92400E'}}>
          ⚠ Set a <strong>Closing Date</strong> on this deal to see calculated milestone dates.
        </div>
      )}

      {/* Overall status banner */}
      {closing && latestDelta !== null && (
        <div style={{background:overallAhead?'#DCFCE7':overallBehind?'#FEE2E2':'#F0F9FF',
          border:`1px solid ${overallAhead?'#86EFAC':overallBehind?'#FCA5A5':'#BAE6FD'}`,
          borderRadius:8,padding:'10px 16px',marginBottom:12,fontSize:13,fontWeight:600,
          color:overallAhead?'#16A34A':overallBehind?'#DC2626':'#0369A1',display:'flex',alignItems:'center',gap:8}}>
          {overallAhead ? `🟢 ${Math.abs(latestDelta)} day${Math.abs(latestDelta)>1?'s':''} ahead of schedule`
           : overallBehind ? `🔴 ${latestDelta} day${latestDelta>1?'s':''} behind schedule`
           : '✓ On track'}
          <span style={{marginLeft:'auto',fontWeight:400,fontSize:12,color:'inherit',opacity:0.8}}>
            Based on most recent recorded status
          </span>
        </div>
      )}

      <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
        <div style={{flex:1,fontSize:12,color:'#6B7280'}}>
          Closing: <strong style={{color:'#1B2A4A'}}>{closing ? `${fmtDate(closing)} (${fmtDayOfWeek(closing)})` : '—'}</strong>
          {funding && funding !== closing && <span style={{marginLeft:10}}>Funding: <strong style={{color:'#16A34A'}}>{fmtDate(funding)} ({fmtDayOfWeek(funding)})</strong></span>}
          {closing && <span style={{marginLeft:10,fontSize:11,color:'#9CA3AF'}}>Lead time: {totalDays} days</span>}
        </div>
        {editingDates && <button className="btn btn-ghost btn-sm" onClick={resetToTemplate}>↺ Template</button>}

function DealTurntimes({ deal, globalPresets, milestones, onMilestonesChange }) {
  const [dealTurntimes, setDealTurntimes] = useState([]);
  const [saving, setSaving] = useState(false);

  // Unique milestone types in this deal
  const types = [...new Set(milestones.map(m => m.milestone_type))];

  useEffect(() => {
    sb.from('lmt_deal_turntimes').select('*').eq('deal_id', deal.id).then(({ data }) => {
      if (data) setDealTurntimes(data);
    });
  }, [deal.id]);

  const getVal = (type, field) => {
    const override = dealTurntimes.find(t => t.milestone_type === type);
    if (override) return override[field];
    const global = globalPresets.find(p => p.milestone_type === type);
    return global ? global[field] : (field === 'turntime_days' ? 3 : 1);
  };

  const setVal = (type, field, val) => {
    setDealTurntimes(prev => {
      const exists = prev.find(t => t.milestone_type === type);
      if (exists) return prev.map(t => t.milestone_type === type ? { ...t, [field]: parseInt(val)||0 } : t);
      return [...prev, { deal_id: deal.id, milestone_type: type, turntime_days:3, followup_days:1, alert_days_before:1, [field]: parseInt(val)||0 }];
    });
  };

  const save = async () => {
    setSaving(true);
    // Upsert each deal turntime
    for (const dt of dealTurntimes) {
      if (dt.id) {
        await sb.from('lmt_deal_turntimes').update({ turntime_days:dt.turntime_days, followup_days:dt.followup_days, alert_days_before:dt.alert_days_before }).eq('id', dt.id);
      } else {
        const { data } = await sb.from('lmt_deal_turntimes').insert({ deal_id:deal.id, milestone_type:dt.milestone_type, turntime_days:dt.turntime_days, followup_days:dt.followup_days, alert_days_before:dt.alert_days_before }).select().single();
        if (data) setDealTurntimes(prev => prev.map(t => t.milestone_type === dt.milestone_type ? data : t));
      }
    }
    // Recalculate due dates for unlocked milestones
    const updatedMs = [];
    for (const ms of milestones) {
      if (!ms.ordered_date || ms.due_date_locked) continue;
      const tt = getVal(ms.milestone_type, 'turntime_days');
      // Use business days (skip weekends + holidays)
      const newDue = addBusinessDays(ms.ordered_date, parseInt(tt)||3);
      if (newDue !== ms.due_date) {
        await sb.from('lmt_milestones').update({ due_date: newDue }).eq('id', ms.id);
        updatedMs.push({ ...ms, due_date: newDue });
      }
    }
    if (updatedMs.length > 0) {
      onMilestonesChange(milestones.map(m => updatedMs.find(u => u.id === m.id) || m));
    }
    setSaving(false);
    alert(`✅ Turntimes saved. ${updatedMs.length > 0 ? updatedMs.length + ' due date(s) recalculated.' : ''}`);
  };

  return (
    <div>
      <div style={{fontSize:13,color:'#6B7280',marginBottom:16}}>
        Override global turntimes for this specific loan. Saving will auto-recalculate due dates on <strong>unlocked</strong> milestones.
      </div>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead>
          <tr style={{background:'#F8FAFC'}}>
            {['Milestone Type','Turntime (days)','Follow Up (days)','Alert Before (days)'].map(h=>(
              <th key={h} style={{padding:'8px 12px',textAlign:'left',fontWeight:600,color:'#6B7280',fontSize:12,borderBottom:'1px solid #E5E7EB'}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {types.map(type => (
            <tr key={type} style={{borderBottom:'1px solid #F3F4F6'}}>
              <td style={{padding:'10px 12px',fontWeight:600,color:'#1B2A4A'}}>{TYPE_LABELS[type]||type}</td>
              {['turntime_days','followup_days','alert_days_before'].map(field => {
                const isDealOverride = dealTurntimes.some(t=>t.milestone_type===type);
                return (
                  <td key={field} style={{padding:'8px 12px'}}>
                    <input type="number" min={0} max={30} value={getVal(type,field)}
                      onChange={e=>setVal(type,field,e.target.value)}
                      style={{width:60,padding:'4px 8px',border:'1px solid',borderColor:isDealOverride?'#2563EB':'#E5E7EB',borderRadius:5,fontSize:13,fontWeight:isDealOverride?600:400,color:isDealOverride?'#1D4ED8':'inherit'}} />
                    {isDealOverride && <span style={{fontSize:10,color:'#2563EB',marginLeft:4}}>custom</span>}
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
      <div style={{marginTop:16,display:'flex',gap:10}}>
        <button className="btn btn-navy" onClick={save} disabled={saving}>{saving?'Saving…':'Save & Recalculate Due Dates'}</button>
        <button className="btn btn-ghost" onClick={()=>{ setDealTurntimes([]); }}>Reset to Global Defaults</button>
      </div>
    </div>
  );
}
