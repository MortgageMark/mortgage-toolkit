// Sticky phantom scrollbar — fixed to bottom of viewport, synced with pipeline table
function StickyScrollbar({ tableRef }) {
  const phantomRef = useRef(null);
  const [contentWidth, setContentWidth] = useState(2000);
  const syncing = useRef(false);

  useEffect(() => {
    const table = tableRef.current;
    if (!table) return;

    // Update phantom width to match table scroll width
    const updateWidth = () => setContentWidth(table.scrollWidth);
    updateWidth();
    const obs = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(updateWidth) : null;
    if (obs) obs.observe(table);

    // Table scrolls → move phantom
    const onTableScroll = () => {
      if (syncing.current) return;
      syncing.current = true;
      if (phantomRef.current) phantomRef.current.scrollLeft = table.scrollLeft;
      syncing.current = false;
    };
    table.addEventListener('scroll', onTableScroll);

    return () => {
      table.removeEventListener('scroll', onTableScroll);
      if (obs) obs.disconnect();
    };
  }, []);

  // Phantom scrolls → move table
  const onPhantomScroll = () => {
    if (syncing.current) return;
    syncing.current = true;
    if (tableRef.current) tableRef.current.scrollLeft = phantomRef.current.scrollLeft;
    syncing.current = false;
  };

  return (
    <div
      ref={phantomRef}
      onScroll={onPhantomScroll}
      style={{
        position:'fixed', bottom:0, left:0, right:0,
        height:16, overflowX:'auto', overflowY:'hidden',
        zIndex:500, background:'#F1F5F9',
        borderTop:'2px solid #E2E8F0',
      }}>
      <div style={{width:contentWidth, height:1}} />
    </div>
  );
}

function PipelineTable({ deals, profiles, statuses, msAlerts, msProgress, coborrowerMap, icdDataMap, onOpenDeal, onOpenDealDates, onEditDeal, onStatusChange, onUnarchive, onNoteChange, onFieldChange, onBulkStatus, onCloneDeal, onArchiveDeal, onDeleteDeal, onPrintDeal, onScenarioLink, sortCol, sortDir, onSort, visibleCols, onColsChange, filters, onFilter, branches, colPickerOpen, setColPickerOpen, colPickerPos, currentUserId }) {
  const showCol = (col) => !visibleCols || visibleCols.includes(col);
  const [statusMenuId, setStatusMenuId] = useState(null);
  const [editNoteId, setEditNoteId] = useState(null);
  const [editNoteVal, setEditNoteVal] = useState('');
  const [editCell, setEditCell] = useState(null); // {id, col, val}
  const saveCell = (dealId, patch) => { if (onFieldChange) onFieldChange(dealId, patch); setEditCell(null); };
  const ciStyle = {width:'100%',border:'none',background:'#EFF6FF',borderRadius:3,padding:'2px 5px',fontSize:12,fontFamily:'inherit',outline:'1px solid #2563EB',minWidth:0};
  const cdStyle = {cursor:'text',display:'block',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'};
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [bulkMenuOpen, setBulkMenuOpen] = useState(false);
  const ALL_COLS     = ['status','borrower','actions','scenario','file_num','days_status','address','type','program','amount','icd_due','icd_signed','close_date','funding_date','lock_exp','note','branch','lo','loa','processor'];
  const REQUIRED_COLS = new Set(['status','borrower','file_num']); // can reorder but not hide
  const COL_LABELS   = {status:'Status',borrower:'Borrower',actions:'Tasks',days_status:'Dates',icd_due:'ICD Due',icd_signed:'ICD Signed',address:'Address',close_date:'Closing',funding_date:'Funding',lock_exp:'Lock Exp',lo:'LO',loa:'LOA',processor:'Processor',branch:'Branch',amount:'Amount',program:'Program',type:'P/R',file_num:'Loan #',scenario:'Scenario',note:'Quick Note'};
  const currentCols  = visibleCols || ALL_COLS;

  const [colOrder, setColOrder] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('lmt_col_order')||'null');

// ─────────────────────────────────────────────
function ReportsScreen({ deals, profiles, msAlerts, customStatuses, profile }) {
  const active = filterDealsByProfile(deals, profile).filter(d => d.archived !== true);
  const now = new Date();
  const [milestones, setMilestones] = useState([]);

  useEffect(() => {
    if (deals.length === 0) return;
    sb.from('lmt_milestones')
      .select('deal_id,milestone_type,ordered_date,received_date,is_done,is_na')
      .in('deal_id', deals.map(d=>d.id))
      .then(({ data }) => { if (data) setMilestones(data); });
  }, [deals.length]);

  // Turntime analytics per milestone type
  const turntimes = MILESTONE_TYPES.map(mt => {
    const completed = milestones.filter(m =>
      m.milestone_type === mt.key && m.ordered_date && m.received_date && m.is_done
    );
    if (!completed.length) return { ...mt, avg: null, min: null, max: null, count: 0 };
    const days = completed.map(m => {
      const o = new Date(m.ordered_date + 'T12:00:00');
      const r = new Date(m.received_date + 'T12:00:00');
      return Math.round((r - o) / 86400000);
    }).filter(d => d >= 0);
    if (!days.length) return { ...mt, avg: null, min: null, max: null, count: 0 };
    return {
      ...mt,
      count: days.length,
      avg: Math.round(days.reduce((a,b)=>a+b,0) / days.length),
      min: Math.min(...days),
      max: Math.max(...days),
    };
  }).filter(t => t.count > 0);

  // Deals by status
  const byStatus = customStatuses.map(s => ({
    ...s,
    count: active.filter(d => d.status === s.label).length
  })).filter(s => s.count > 0);

  // Deals by LO
  const byLO = profiles.map(p => ({
    name: p.display_name || p.email || 'Unknown',
    count: active.filter(d => d.assigned_lo_id === p.id).length
  })).filter(l => l.count > 0).sort((a,b) => b.count - a.count);

  // Deals by program
  const programs = {};
  active.forEach(d => { if (d.loan_program) programs[d.loan_program] = (programs[d.loan_program]||0) + 1; });
  const byProgram = Object.entries(programs).sort((a,b)=>b[1]-a[1]);

  // Deals by type
  const purchases = active.filter(d => d.trans_type === 'purchase').length;
  const refis     = active.filter(d => d.trans_type === 'refinance').length;

  // Volume
  const totalVolume = active.reduce((sum, d) => sum + (parseFloat(d.loan_amount)||0), 0);
  const avgLoan     = active.length ? totalVolume / active.length : 0;

  // Closing months
  const closingByMonth = {};
  active.forEach(d => {
    if (!d.closing_date) return;
    const dt = new Date(d.closing_date + 'T12:00:00');
    const key = dt.toLocaleDateString('en-US',{month:'short',year:'2-digit'});
    closingByMonth[key] = (closingByMonth[key]||0) + 1;
  });

  // Overdue deals
  const overdueCount = active.filter(d => msAlerts[d.id]?.overdue > 0).length;
  const atRiskCount  = active.filter(d => {
    const lb = d.closing_date && d.lock_expiration_date && d.lock_expiration_date < d.closing_date;
    return lb || msAlerts[d.id]?.overdue > 0;
  }).length;

  const StatCard = ({label, value, sub, color}) => (
    <div style={{background:'white',border:'1px solid #E5E7EB',borderRadius:10,padding:'16px 20px',flex:1,minWidth:140}}>
      <div style={{fontSize:28,fontWeight:800,color:color||'#1B2A4A'}}>{value}</div>
      <div style={{fontSize:12,fontWeight:600,color:'#6B7280',textTransform:'uppercase',letterSpacing:'0.3px',marginTop:2}}>{label}</div>
      {sub && <div style={{fontSize:11,color:'#9CA3AF',marginTop:4}}>{sub}</div>}
    </div>
  );

  const BarChart = ({data, colorFn}) => {
    const max = Math.max(...data.map(d=>d[1]), 1);
    return (
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {data.map(([label, count]) => (
          <div key={label} style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:100,fontSize:12,color:'#374151',textAlign:'right',flexShrink:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{label}</div>
            <div style={{flex:1,height:20,background:'#F3F4F6',borderRadius:4,overflow:'hidden'}}>
              <div style={{width:`${(count/max)*100}%`,height:'100%',background:colorFn?colorFn(label):'#1B2A4A',borderRadius:4,transition:'width 0.5s',display:'flex',alignItems:'center',paddingLeft:6}}>
                {(count/max) > 0.15 && <span style={{fontSize:11,fontWeight:700,color:'white'}}>{count}</span>}
              </div>
            </div>
            {(count/max) <= 0.15 && <span style={{fontSize:11,fontWeight:700,color:'#6B7280'}}>{count}</span>}
          </div>
        ))}
      </div>
    );
  };

  return (
    <div style={{maxWidth:960,margin:'0 auto'}}>
      <div style={{marginBottom:20}}>
        <h2 style={{fontSize:20,fontWeight:800,color:'#1B2A4A'}}>Pipeline Reports</h2>
        <p style={{fontSize:13,color:'#6B7280',marginTop:2}}>
          {now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})} · {active.length} active deals
        </p>
      </div>

      {/* Summary stats */}
      <div style={{display:'flex',gap:12,marginBottom:24,flexWrap:'wrap'}}>
        <StatCard label="Active Deals"      value={active.length} />
        <StatCard label="Total Volume"      value={'$'+Math.round(totalVolume/1000000*10)/10+'M'} sub={`Avg $${Math.round(avgLoan/1000)}k`} />
        <StatCard label="Purchases"         value={purchases} sub={`${refis} refis`} />
        <StatCard label="At Risk"           value={atRiskCount} color={atRiskCount>0?'#DC2626':'#16A34A'} sub={`${overdueCount} overdue milestones`} />
        <StatCard label="Closing This Month" value={active.filter(d=>{
          if(!d.closing_date)return false;
          const cd=new Date(d.closing_date+'T12:00:00');
          return cd.getFullYear()===now.getFullYear()&&cd.getMonth()===now.getMonth();
        }).length} color="#16A34A" />
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,marginBottom:20}}>
        {/* By Status */}
        <div style={{background:'white',border:'1px solid #E5E7EB',borderRadius:10,overflow:'hidden'}}>
          <div style={{background:'#1B2A4A',color:'white',padding:'10px 16px',fontSize:13,fontWeight:700}}>Deals by Status</div>
          <div style={{padding:16}}>
            {byStatus.length === 0 ? <div style={{color:'#9CA3AF',fontSize:13}}>No data yet.</div> :
              <BarChart data={byStatus.map(s=>[s.label,s.count])} colorFn={label => {
                const s = customStatuses.find(st=>st.label===label);
                return s?.bg || '#1B2A4A';
              }} />
            }
          </div>
        </div>

        {/* By LO */}
        <div style={{background:'white',border:'1px solid #E5E7EB',borderRadius:10,overflow:'hidden'}}>
          <div style={{background:'#1B2A4A',color:'white',padding:'10px 16px',fontSize:13,fontWeight:700}}>Deals by Loan Officer</div>
          <div style={{padding:16}}>
            {byLO.length === 0 ? <div style={{color:'#9CA3AF',fontSize:13}}>No LOs assigned yet.</div> :
              <BarChart data={byLO.map(l=>[l.name,l.count])} />
            }
          </div>
        </div>

        {/* By Program */}
        <div style={{background:'white',border:'1px solid #E5E7EB',borderRadius:10,overflow:'hidden'}}>
          <div style={{background:'#1B2A4A',color:'white',padding:'10px 16px',fontSize:13,fontWeight:700}}>Deals by Loan Program</div>
          <div style={{padding:16}}>
            {byProgram.length === 0 ? <div style={{color:'#9CA3AF',fontSize:13}}>No programs set yet.</div> :
              <BarChart data={byProgram} />
            }
          </div>
        </div>

        {/* Closing by month */}
        <div style={{background:'white',border:'1px solid #E5E7EB',borderRadius:10,overflow:'hidden'}}>
          <div style={{background:'#1B2A4A',color:'white',padding:'10px 16px',fontSize:13,fontWeight:700}}>Closings by Month</div>
          <div style={{padding:16}}>
            {Object.keys(closingByMonth).length === 0 ? <div style={{color:'#9CA3AF',fontSize:13}}>No closing dates set yet.</div> :
              <BarChart data={Object.entries(closingByMonth).sort()} colorFn={()=>'#16A34A'} />
            }
          </div>
        </div>
      </div>

      {/* Volume by LO table */}
      {byLO.length > 0 && (
        <div style={{background:'white',border:'1px solid #E5E7EB',borderRadius:10,overflow:'hidden',marginBottom:20}}>
          <div style={{background:'#1B2A4A',color:'white',padding:'10px 16px',fontSize:13,fontWeight:700}}>Volume by Loan Officer</div>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead>
              <tr style={{background:'#F8FAFC'}}>
                {['Loan Officer','Deals','Volume','Avg Loan','At Risk'].map(h=>(
                  <th key={h} style={{padding:'8px 16px',textAlign:'left',fontWeight:600,color:'#6B7280',fontSize:12,borderBottom:'1px solid #E5E7EB'}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {profiles.filter(p=>active.some(d=>d.assigned_lo_id===p.id)).map(p=>{
                const loDeals = active.filter(d=>d.assigned_lo_id===p.id);
                const vol = loDeals.reduce((s,d)=>s+(parseFloat(d.loan_amount)||0),0);
                const risk = loDeals.filter(d=>msAlerts[d.id]?.overdue>0).length;
                return (
                  <tr key={p.id} style={{borderBottom:'1px solid #F3F4F6'}}>
                    <td style={{padding:'10px 16px',fontWeight:600}}>{p.display_name||p.email}</td>
                    <td style={{padding:'10px 16px'}}>{loDeals.length}</td>
                    <td style={{padding:'10px 16px'}}>{vol>0?'$'+Math.round(vol/1000)+'k':'—'}</td>
                    <td style={{padding:'10px 16px'}}>{loDeals.length>0&&vol>0?'$'+Math.round(vol/loDeals.length/1000)+'k':'—'}</td>
                    <td style={{padding:'10px 16px',color:risk>0?'#DC2626':'#16A34A',fontWeight:risk>0?700:400}}>{risk>0?risk+' deal'+(risk>1?'s':''):'✓ Clean'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* Turntime Analytics */}
      {turntimes.length > 0 && (
        <div style={{background:'white',border:'1px solid #E5E7EB',borderRadius:10,overflow:'hidden',marginBottom:20}}>
          <div style={{background:'#1B2A4A',color:'white',padding:'10px 16px',fontSize:13,fontWeight:700}}>
            Milestone Turntimes
            <span style={{fontWeight:400,opacity:0.7,fontSize:11,marginLeft:8}}>Ordered → Received (calendar days)</span>
          </div>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead>
              <tr style={{background:'#F8FAFC'}}>
                {['Milestone','Completed','Avg Days','Fastest','Slowest','Performance'].map(h=>(
                  <th key={h} style={{padding:'8px 16px',textAlign:'left',fontWeight:600,color:'#6B7280',fontSize:12,borderBottom:'1px solid #E5E7EB'}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {turntimes.map(t => {
                const perfColor = t.avg <= 5 ? '#16A34A' : t.avg <= 10 ? '#D97706' : '#DC2626';
                const perfLabel = t.avg <= 5 ? '✓ Fast' : t.avg <= 10 ? '~ Average' : '⚠ Slow';
                return (
                  <tr key={t.key} style={{borderBottom:'1px solid #F3F4F6'}}>
                    <td style={{padding:'10px 16px',fontWeight:600}}>{t.label}</td>
                    <td style={{padding:'10px 16px',color:'#6B7280'}}>{t.count} deal{t.count>1?'s':''}</td>
                    <td style={{padding:'10px 16px',fontWeight:700,fontSize:15,color:'#1B2A4A'}}>{t.avg}d</td>
                    <td style={{padding:'10px 16px',color:'#16A34A'}}>{t.min}d</td>
                    <td style={{padding:'10px 16px',color:'#DC2626'}}>{t.max}d</td>
                    <td style={{padding:'10px 16px'}}>
                      <span style={{fontSize:11,fontWeight:700,color:perfColor,background:perfColor+'18',borderRadius:4,padding:'2px 8px'}}>{perfLabel}</span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          <div style={{padding:'10px 16px',fontSize:11,color:'#9CA3AF',borderTop:'1px solid #F3F4F6'}}>
            Only includes completed milestones (ordered date + received date both set). Helps identify slow vendors.
          </div>
        </div>
      )}

    </div>
  );
}

function TodayScreen({ deals, profiles, msAlerts, coborrowerMap, statuses, onOpenDeal, onStatusChange, profile }) {
  const now = new Date();
  deals = filterDealsByProfile(deals, profile);

  const getProfile = (id) => profiles.find(p => p.id === id);

  // Closings this week (next 7 days)
  const closingThisWeek = deals.filter(d => {
    if (!d.closing_date) return false;
    const diff = daysDiff(d.closing_date);
    return diff !== null && diff >= 0 && diff <= 7;
  }).sort((a,b) => a.closing_date > b.closing_date ? 1 : -1);

  // Closing today
  const closingToday = closingThisWeek.filter(d => daysDiff(d.closing_date) === 0);

  // Milestones overdue
  const overdueDeals = deals.filter(d => !d.archived && msAlerts[d.id]?.overdue > 0)
    .sort((a,b) => (msAlerts[b.id]?.overdue||0) - (msAlerts[a.id]?.overdue||0));

  // Milestones due today
  const dueTodayDeals = deals.filter(d => !d.archived && msAlerts[d.id]?.dueToday > 0);

  // Locks expiring this week
  const locksExpiring = deals.filter(d => {
    const diff = daysDiff(d.lock_expiration_date);
    return diff !== null && diff >= 0 && diff <= 7;
  }).sort((a,b) => a.lock_expiration_date > b.lock_expiration_date ? 1 : -1);

  // Lock before close warnings
  const lockBeforeClose = deals.filter(d =>
    d.closing_date && d.lock_expiration_date && d.lock_expiration_date < d.closing_date
  );

  const DaySection = ({ title, icon, color, bg, deals: sectionDeals, emptyMsg, renderExtra }) => (
    <div style={{background:'white',border:'1px solid #E5E7EB',borderRadius:10,overflow:'hidden',marginBottom:16,boxShadow:'0 1px 4px rgba(0,0,0,0.05)'}}>
      <div style={{background: bg || '#F3F4F6',padding:'10px 16px',display:'flex',alignItems:'center',gap:8,borderBottom:'1px solid #E5E7EB'}}>
        <span style={{fontSize:16}}>{icon}</span>
        <span style={{fontWeight:700,fontSize:14,color: color || '#1B2A4A'}}>{title}</span>
        <span style={{marginLeft:'auto',background:'white',color: color || '#6B7280',borderRadius:99,padding:'1px 10px',fontSize:12,fontWeight:700,border:`1px solid ${color||'#E5E7EB'}`}}>
          {sectionDeals.length}
        </span>
      </div>
      {sectionDeals.length === 0 ? (
        <div style={{padding:'16px',color:'#9CA3AF',fontSize:13,textAlign:'center'}}>{emptyMsg}</div>
      ) : (
        sectionDeals.map(deal => {
          const lo = getProfile(deal.assigned_lo_id);
          const loa = getProfile(deal.assigned_loa_id);
          return (
            <div key={deal.id}
              style={{padding:'12px 16px',borderBottom:'1px solid #F3F4F6',display:'flex',alignItems:'center',gap:12,cursor:'pointer',flexWrap:'wrap'}}
              onClick={()=>onOpenDeal(deal)}
              onMouseEnter={e=>e.currentTarget.style.background='#F8FAFC'}
              onMouseLeave={e=>e.currentTarget.style.background='white'}>
              <div style={{flex:1,minWidth:160}}>
                <div style={{fontWeight:600,fontSize:13,color:'#1B2A4A'}}>
                  {deal.primary_borrower_name || '—'}
                  {coborrowerMap[deal.id]?.length > 0 && <span style={{color:'#9CA3AF',fontWeight:400}}> & {coborrowerMap[deal.id][0]}</span>}
                </div>
                {deal.property_address && <div style={{fontSize:11,color:'#6B7280',marginTop:2}}>{deal.property_address}{deal.city?', '+deal.city:''}</div>}
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                <StatusBadge status={deal.status} statuses={statuses} />
                {deal.closing_date && <span style={{fontSize:12,color:'#6B7280'}}>Close: <strong>{fmtDate(deal.closing_date)}</strong></span>}
                {deal.lock_expiration_date && <span style={{fontSize:12,color:'#6B7280'}}>Lock: <strong>{fmtDate(deal.lock_expiration_date)}</strong></span>}
                {msAlerts[deal.id]?.overdue > 0 && <span style={{fontSize:11,background:'#FEE2E2',color:'#DC2626',borderRadius:4,padding:'2px 7px',fontWeight:700}}>{msAlerts[deal.id].overdue} overdue</span>}
                {msAlerts[deal.id]?.dueToday > 0 && <span style={{fontSize:11,background:'#FEF3C7',color:'#D97706',borderRadius:4,padding:'2px 7px',fontWeight:700}}>{msAlerts[deal.id].dueToday} due today</span>}
                {lo && <span style={{fontSize:11,color:'#6B7280'}}>{lo.display_name?.split(' ')[0]||''}</span>}
                {renderExtra && renderExtra(deal)}
              </div>
            </div>
          );
        })
      )}
    </div>
  );

  const dateStr = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const [showDigest, setShowDigest] = useState(false);
  const [digestCopied, setDigestCopied] = useState(false);

  const generateDigest = () => {
    const lines = [];
    lines.push(`📊 PIPELINE UPDATE — ${dateStr}`);
    lines.push(`${'─'.repeat(50)}`);

    if (lockBeforeClose.length > 0) {
      lines.push(`\n🚨 RATE LOCK BEFORE CLOSING DATE:`);
      lockBeforeClose.forEach(d => lines.push(`  • ${d.primary_borrower_name} — Lock: ${fmtDate(d.lock_expiration_date)} / Close: ${fmtDate(d.closing_date)}`));
    }
    if (closingToday.length > 0) {
      lines.push(`\n🎉 CLOSING TODAY:`);
      closingToday.forEach(d => lines.push(`  • ${d.primary_borrower_name}${d.property_address?' | '+d.property_address:''}`));
    }
    if (overdueDeals.length > 0) {
      lines.push(`\n🔴 OVERDUE MILESTONES:`);
      overdueDeals.forEach(d => lines.push(`  • ${d.primary_borrower_name} — ${msAlerts[d.id]?.overdue} item(s) overdue`));
    }
    if (dueTodayDeals.length > 0) {
      lines.push(`\n🟡 DUE TODAY:`);
      dueTodayDeals.forEach(d => lines.push(`  • ${d.primary_borrower_name} — ${msAlerts[d.id]?.dueToday} item(s) due`));
    }
    if (closingThisWeek.filter(d=>daysDiff(d.closing_date)>0).length > 0) {
      lines.push(`\n📅 CLOSING THIS WEEK:`);
      closingThisWeek.filter(d=>daysDiff(d.closing_date)>0).forEach(d =>
        lines.push(`  • ${d.primary_borrower_name} — ${fmtDate(d.closing_date)} (${daysDiff(d.closing_date)}d)`));
    }
    if (locksExpiring.length > 0) {
      lines.push(`\n🔒 LOCKS EXPIRING THIS WEEK:`);
      locksExpiring.forEach(d => {
        const diff = daysDiff(d.lock_expiration_date);
        lines.push(`  • ${d.primary_borrower_name} — ${fmtDate(d.lock_expiration_date)} (${diff===0?'TODAY':diff+'d'})`);
      });
    }
    lines.push(`\n${'─'.repeat(50)}`);
    lines.push(`Total Active Pipeline: ${deals.filter(d=>d.archived!==true).length} deals`);
    lines.push(`Generated by Loan Manager Toolkit`);
    return lines.join('\n');
  };

  return (
    <div style={{maxWidth:900,margin:'0 auto'}}>
      <div style={{marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontSize:13,color:'#6B7280'}}>{dateStr}</div>
        <button className="btn btn-ghost btn-sm" onClick={()=>{setShowDigest(p=>!p);setDigestCopied(false);}}>
          📊 {showDigest?'Hide':'Daily Digest'}
        </button>
      </div>

      {showDigest && (
        <div style={{background:'#1B2A4A',borderRadius:10,padding:20,marginBottom:16,color:'white'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <span style={{fontWeight:700,fontSize:14}}>📊 Daily Digest — Copy and paste into your team email</span>
            <button className="btn btn-ghost btn-sm" style={{color:'white',borderColor:'rgba(255,255,255,0.3)'}}
              onClick={()=>{ navigator.clipboard.writeText(generateDigest()); setDigestCopied(true); setTimeout(()=>setDigestCopied(false),2000); }}>
              {digestCopied ? '✓ Copied!' : '📋 Copy'}
            </button>
          </div>
          <pre style={{fontFamily:'monospace',fontSize:12,whiteSpace:'pre-wrap',lineHeight:1.6,color:'rgba(255,255,255,0.9)',background:'rgba(0,0,0,0.2)',borderRadius:8,padding:16,margin:0}}>
            {generateDigest()}
          </pre>
        </div>
      )}

      {/* Closing today */}
      {closingToday.length > 0 && (
        <DaySection title="Closing TODAY" icon="🎉" color="#15803D" bg="#DCFCE7" deals={closingToday} emptyMsg="" />
      )}

      {/* Overdue milestones */}
      <DaySection title="Overdue Milestones" icon="🔴" color="#DC2626" bg="#FEE2E2"
        deals={overdueDeals} emptyMsg="✅ No overdue milestones — great job!" />

      {/* Due today */}
      <DaySection title="Milestones Due Today" icon="🟡" color="#D97706" bg="#FEF3C7"
        deals={dueTodayDeals} emptyMsg="Nothing due today." />

      {/* Closing this week */}
      <DaySection title="Closing This Week" icon="📅" color="#2563EB" bg="#EFF6FF"
        deals={closingThisWeek.filter(d=>daysDiff(d.closing_date)>0)} emptyMsg="No closings scheduled this week." />

      {/* Locks expiring */}
      <DaySection title="Locks Expiring This Week" icon="🔒" color="#D97706" bg="#FEF3C7"
        deals={locksExpiring} emptyMsg="No locks expiring this week."
        renderExtra={deal => {
          const diff = daysDiff(deal.lock_expiration_date);
          return diff !== null ? <span style={{fontSize:11,background:'#FEF3C7',color:'#D97706',borderRadius:4,padding:'2px 7px',fontWeight:700}}>{diff === 0 ? 'TODAY' : diff + 'd left'}</span> : null;
        }} />

      {/* Recent Wins — milestones completed in last 48h */}
      {(() => {
        const cutoff = new Date(Date.now() - 48 * 3600000).toISOString();
        const recentlyDone = deals.filter(d => d.archived!==true && d._recentMilestone);
        // We'll show all deals that closed this month as wins
        const closedDeals = deals.filter(d => {
          if (!d.archived) return false;
          if (!d.archived_at) return false;
          const diff = (Date.now() - new Date(d.archived_at)) / 86400000;
          return diff <= 30;
        });
        if (closedDeals.length === 0 && overdueDeals.length === 0 && dueTodayDeals.length === 0 && locksExpiring.length === 0 && closingThisWeek.length === 0) {
          return (
            <div style={{textAlign:'center',padding:'30px 20px',background:'white',border:'1px solid #E5E7EB',borderRadius:10}}>
              <div style={{fontSize:40,marginBottom:12}}>🎉</div>
              <div style={{fontSize:16,fontWeight:700,color:'#1B2A4A',marginBottom:6}}>All clear!</div>
              <div style={{fontSize:13,color:'#6B7280'}}>No urgent items today. Your pipeline is in great shape.</div>
            </div>
          );
        }
        if (closedDeals.length === 0) return null;
        return (
          <div style={{background:'white',border:'1px solid #E5E7EB',borderRadius:10,overflow:'hidden',marginTop:4}}>
            <div style={{background:'#DCFCE7',padding:'10px 16px',display:'flex',alignItems:'center',gap:8,borderBottom:'1px solid #BBF7D0'}}>
              <span style={{fontSize:16}}>🏆</span>
              <span style={{fontWeight:700,fontSize:14,color:'#15803D'}}>Recently Closed (last 30 days)</span>
              <span style={{marginLeft:'auto',background:'white',color:'#15803D',borderRadius:99,padding:'1px 10px',fontSize:12,fontWeight:700,border:'1px solid #86EFAC'}}>{closedDeals.length}</span>
            </div>
            {closedDeals.map(deal => (
              <div key={deal.id} style={{padding:'10px 16px',borderBottom:'1px solid #F3F4F6',display:'flex',alignItems:'center',gap:12,fontSize:13}}>
                <span style={{fontSize:16}}>✓</span>
                <div>
                  <div style={{fontWeight:600,color:'#15803D'}}>{deal.primary_borrower_name}</div>
                  <div style={{fontSize:11,color:'#9CA3AF'}}>Archived {fmtTimestamp(deal.archived_at)}</div>
                </div>
              </div>
            ))}
          </div>
        );
      })()}
    </div>
  );
}

function CsvImportModal({ profiles, statuses, onClose, onImport }) {
  const [csvText, setCsvText] = useState('');
  const [preview, setPreview] = useState(null);
  const [importing, setImporting] = useState(false);
  const [error, setError] = useState('');

  // Column mappings — tries to match common Google Sheet header names
  const COL_MAP = {
    primary_borrower_name: ['borrower','client','client name','borrower name','name'],
    property_address:      ['address','property','property address'],
    status:                ['status','loan status'],
    closing_date:          ['closing date','close date','req close date','target close'],
    lock_expiration_date:  ['lock exp','lock expiration','lock exp date'],
    loan_amount:           ['loan amount','amount','loan amt'],
    loan_program:          ['loan program','program','product'],
    rate:                  ['rate','interest rate'],
    loan_term:             ['term','loan term'],
    trans_type:            ['trans type','transaction','type','purchase/refi'],
    file_number:           ['file #','file number','loan #','loan number'],
    quick_note:            ['note','notes','quick note','comment'],
    buyers_agent:          ["buyer's agent","buyer agent","buying agent"],
    sellers_agent:         ["seller's agent","seller agent","listing agent"],
  };

  const parseDate = (s) => {
    if (!s || s.trim() === '' || s.trim().toUpperCase() === 'TBD' || s.trim().toUpperCase() === 'N/A') return null;
    // Try MM/DD/YYYY or MM/DD/YY
    const m = s.trim().match(/^(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?$/);
    if (m) {
      const yr = m[3] ? (m[3].length === 2 ? '20'+m[3] : m[3]) : new Date().getFullYear().toString();
      return `${yr}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
    }
    // Try YYYY-MM-DD
    if (/^\d{4}-\d{2}-\d{2}$/.test(s.trim())) return s.trim();
    return null;
  };

  const parseCSV = () => {
    setError('');
    if (!csvText.trim()) { setError('Paste your CSV data above.'); return; }
    const lines = csvText.trim().split('\n').filter(l => l.trim());
    if (lines.length < 2) { setError('Need at least a header row and one data row.'); return; }

    // Parse headers
    const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,'').toLowerCase());

    // Map headers to fields
    const fieldMap = {};
    headers.forEach((h, i) => {
      for (const [field, aliases] of Object.entries(COL_MAP)) {
        if (aliases.some(a => h.includes(a))) { fieldMap[i] = field; break; }
      }
    });

    if (Object.keys(fieldMap).length === 0) {
      setError('Could not match any columns. Make sure your CSV has headers like "Borrower", "Close Date", "Status", etc.');
      return;
    }

    // Parse rows
    const rows = [];
    for (let i = 1; i < lines.length; i++) {
      const cells = lines[i].split(',').map(c => c.trim().replace(/^"|"$/g,''));
      if (cells.every(c => !c)) continue;
      const row = { status: statuses?.[0]?.label || 'Not Submitted' };
      for (const [idx, field] of Object.entries(fieldMap)) {
        const val = cells[parseInt(idx)] || '';
        if (!val) continue;
        if (['closing_date','lock_expiration_date'].includes(field)) row[field] = parseDate(val);
        else if (field === 'loan_amount') row[field] = parseFloat(val.replace(/[$,]/g,'')) || null;
        else if (field === 'rate') row[field] = parseFloat(val.replace('%','')) || null;
        else if (field === 'loan_term') row[field] = parseInt(val) || 30;
        else if (field === 'trans_type') row[field] = val.toLowerCase().includes('refi') ? 'refinance' : 'purchase';
        else row[field] = val;
      }
      if (row.primary_borrower_name) rows.push(row);
    }

    if (rows.length === 0) { setError('No valid rows found. Make sure the "Borrower" column has names.'); return; }
    setPreview({ rows, fieldMap, headers });
  };

  const handleImport = async () => {
    if (!preview) return;
    setImporting(true);
    await onImport(preview.rows);
    setImporting(false);
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-lg">
        <div className="modal-header">
          <h2>⬆ Import Deals from CSV</h2>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          {!preview ? (
            <>
              <div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:8,padding:'12px 16px',marginBottom:16,fontSize:13,color:'#1D4ED8'}}>
                <strong>How to import from Google Sheets:</strong>
                <ol style={{margin:'8px 0 0 16px',lineHeight:1.8}}>
                  <li>Open your pipeline Google Sheet</li>
                  <li>Select all data including the header row</li>
                  <li>File → Download → CSV, OR just Copy (Ctrl+C) all cells</li>
                  <li>Paste below</li>
                </ol>
                <div style={{marginTop:8,fontSize:12,opacity:0.8}}>
                  Recognized columns: Borrower, Address, Status, Close Date, Lock Exp, Loan Amount, Program, Rate, Type, File #, Note, Buyer's Agent, Seller's Agent
                </div>
              </div>
              <div className="form-group">
                <label>Paste CSV Data</label>
                <textarea
                  value={csvText} onChange={e=>setCsvText(e.target.value)}
                  rows={10} placeholder="Borrower,Address,Close Date,Status,LO,Loan Amount&#10;Smith John,123 Main St,6/30/26,Not Submitted,Mark,350000&#10;Jones Mary,456 Oak Ave,7/15/26,CTC,Mark,425000"
                  style={{fontFamily:'monospace',fontSize:12,resize:'vertical',width:'100%',padding:10,border:'1px solid #E5E7EB',borderRadius:6}}
                />
              </div>
              {error && <div style={{color:'#DC2626',fontSize:13,marginTop:8}}>⚠ {error}</div>}
            </>
          ) : (
            <>
              <div style={{background:'#DCFCE7',border:'1px solid #86EFAC',borderRadius:8,padding:'10px 16px',marginBottom:16,fontSize:13,color:'#15803D',fontWeight:600}}>
                ✓ Found {preview.rows.length} deals ready to import
              </div>
              <div style={{maxHeight:320,overflowY:'auto',border:'1px solid #E5E7EB',borderRadius:8}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                  <thead>
                    <tr style={{background:'#1B2A4A',color:'white'}}>
                      {['Borrower','Address','Status','Close Date','Amount','Program'].map(h=>(
                        <th key={h} style={{padding:'8px 12px',textAlign:'left',fontWeight:600}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {preview.rows.map((r,i) => (
                      <tr key={i} style={{borderBottom:'1px solid #F3F4F6',background:i%2===0?'white':'#F8FAFC'}}>
                        <td style={{padding:'7px 12px',fontWeight:600}}>{r.primary_borrower_name||'—'}</td>
                        <td style={{padding:'7px 12px',color:'#6B7280'}}>{r.property_address||'—'}</td>
                        <td style={{padding:'7px 12px'}}>{r.status||'—'}</td>
                        <td style={{padding:'7px 12px'}}>{r.closing_date?fmtDate(r.closing_date):'TBD'}</td>
                        <td style={{padding:'7px 12px'}}>{r.loan_amount?'$'+Number(r.loan_amount).toLocaleString():'—'}</td>
                        <td style={{padding:'7px 12px'}}>{r.loan_program||'—'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div style={{marginTop:12,fontSize:12,color:'#9CA3AF'}}>
                Review the data above. Click Import to create these deals in LMT.
              </div>
            </>
          )}
        </div>
        <div className="modal-footer">
          {preview ? (
            <>
              <button className="btn btn-ghost" onClick={()=>setPreview(null)}>← Back</button>
              <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
              <button className="btn btn-navy" onClick={handleImport} disabled={importing}>
                {importing ? 'Importing…' : `Import ${preview.rows.length} Deals`}
              </button>
            </>
          ) : (
            <>
              <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
              <button className="btn btn-navy" onClick={parseCSV}>Preview Import →</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

function ScenarioLinkModal({ deal, onClose, onLink }) {
  const [search, setSearch] = useState(deal.primary_borrower_name||'');
  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [selected, setSelected] = useState(null);

  const doSearch = async () => {
    if (!search.trim()) return;
    setSearching(true);
    const q = search.trim();
    // Search HLT contacts by name, then get their scenarios
    const { data: contacts } = await sb.from('contacts')
      .select('id,first_name,last_name')
      .or(`first_name.ilike.%${q}%,last_name.ilike.%${q}%`)
      .limit(10);

    if (!contacts?.length) {
      // Try searching scenarios by name directly
      const { data: scens } = await sb.from('scenarios')
        .select('id,name,loan_purpose,property_address,created_at,calculation_data')
        .ilike('name', `%${q}%`)
        .order('created_at', { ascending: false })
        .limit(20);
      setResults(scens || []);
    } else {
      const contactIds = contacts.map(c => c.id);
      const { data: scens } = await sb.from('scenarios')
        .select('id,name,loan_purpose,property_address,created_at,calculation_data')
        .in('contact_id', contactIds)
        .order('created_at', { ascending: false })
        .limit(30);
      setResults(scens || []);
    }
    setSearching(false);
  };

  useEffect(() => { doSearch(); }, []);

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:560}}>
        <div className="modal-header">
          <h2>Link HLT Scenario</h2>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          {deal.hlt_scenario_name && (
            <div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:6,padding:'8px 12px',fontSize:12,marginBottom:12,color:'#1D4ED8',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span>Currently linked: <strong>{deal.hlt_scenario_name}</strong></span>
              <button className="btn btn-ghost btn-sm" style={{color:'#DC2626'}} onClick={()=>onLink({id:null,name:''})}>Unlink</button>
            </div>
          )}
          <div style={{display:'flex',gap:8,marginBottom:12}}>
            <input value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="Search by borrower name or scenario name…"
              style={{flex:1,padding:'8px 10px',border:'1px solid #E5E7EB',borderRadius:6,fontSize:13}}
              onKeyDown={e=>e.key==='Enter'&&doSearch()} />
            <button className="btn btn-navy" onClick={doSearch} disabled={searching}>
              {searching?'…':'Search'}
            </button>
          </div>
          <div style={{maxHeight:320,overflowY:'auto',border:'1px solid #E5E7EB',borderRadius:8}}>
            {results.length === 0 && !searching && (
              <div style={{padding:20,textAlign:'center',color:'#9CA3AF',fontSize:13}}>No scenarios found. Try a different name.</div>
            )}
            {results.map(s => {
              const cd = s.calculation_data || {};
              const la = cd.pc_la ? '$'+Number(cd.pc_la).toLocaleString() : null;
              const rate = cd.pc_rate ? cd.pc_rate+'%' : null;
              const prog = cd.pc_prog ? cd.pc_prog.toUpperCase() : null;
              const isSelected = selected?.id === s.id;
              return (
                <div key={s.id} onClick={()=>setSelected(s)}
                  style={{padding:'10px 14px',borderBottom:'1px solid #F3F4F6',cursor:'pointer',
                    background:isSelected?'#EFF6FF':'white',borderLeft:isSelected?'3px solid #2563EB':'3px solid transparent'}}
                  onMouseEnter={e=>{ if(!isSelected) e.currentTarget.style.background='#F8FAFC'; }}
                  onMouseLeave={e=>{ if(!isSelected) e.currentTarget.style.background='white'; }}>
                  <div style={{fontWeight:600,fontSize:13,color:'#1B2A4A'}}>{s.name||'Untitled Scenario'}</div>
                  <div style={{fontSize:11,color:'#6B7280',marginTop:3,display:'flex',gap:10,flexWrap:'wrap'}}>
                    {la&&<span>{la}</span>}
                    {rate&&<span>{rate}</span>}
                    {prog&&<span>{prog}</span>}
                    {s.property_address&&<span>{s.property_address}</span>}
                    <span>{new Date(s.created_at).toLocaleDateString()}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-navy" disabled={!selected} onClick={()=>selected&&onLink(selected)}>
            Link Selected Scenario
          </button>
        </div>
      </div>
    </div>
  );
}

function filterDealsByProfile(deals, profile) {
  if (!profile) return deals;
  if (profile.role === 'admin') return deals;
  const uid = profile.id;
  const loMatch   = d => d.assigned_lo_id        === uid;
  const loaMatch  = d => d.assigned_loa_id       === uid;
  const procMatch = d => d.assigned_processor_id === uid;
  if (profile.role === 'branch_admin') {
    return deals.filter(d => loMatch(d) || (profile.branch && d.branch === profile.branch));
  }
  const lmtRole = profile.lmt_role || 'lo';
  const result = lmtRole === 'lo' ? deals.filter(loMatch)
    : lmtRole === 'loa' ? deals.filter(loaMatch)
    : (lmtRole === 'processor' || lmtRole === 'setup') ? deals.filter(procMatch)
    : deals.filter(loMatch);
  return result;
}

function App() {
  const [user, setUser]           = useState(null);

  const [deals, setDeals]           = useState([]);
  const [profiles, setProfiles]     = useState([]);
  const [presets, setPresets]       = useState([]);
  const [templates, setTemplates]   = useState([]);

  const [msAlerts, setMsAlerts]       = useState({});
  const [msProgress, setMsProgress]   = useState({});
  const [icdDataMap, setIcdDataMap]   = useState({}); // deal_id → {due_date, icd_signed_date}
  const [lmtContacts, setLmtContacts] = useState([]);
  const [coborrowerMap, setCoborrowerMap] = useState({}); // deal_id → [names]
  const [metricFilter, setMetricFilter] = useState(''); // 'closingMonth' | 'locksExpiring' | 'overdueMs'
  const [customStatuses, setCustomStatuses] = useState(() => {
    try { return JSON.parse(localStorage.getItem('lmt_statuses') || 'null') || DEFAULT_STATUSES; }
    catch { return DEFAULT_STATUSES; }
  });
  const [loading, setLoading]       = useState(true);

  const [screen, setScreen]         = useState(() => localStorage.getItem('lmt_home_screen') || 'pipeline');
  const [viewFilter, setViewFilter]     = useState('active');
  const [search, setSearch]             = useState('');
  const [filterLO, setFilterLO]             = useState('');
  const [filterLOA, setFilterLOA]           = useState('');
  const [filterProcessor, setFilterProcessor] = useState('');
  const [filterStatus, setFilterStatus]     = useState('');
  const [filterType, setFilterType]         = useState('');
  const [filterActions, setFilterActions]   = useState('');
  const [filterBranch, setFilterBranch]     = useState('');
  const [sortCol, setSortCol]           = useState('closing_date');
  const [sortDir, setSortDir]           = useState('asc');
  const [visibleCols, setVisibleCols]   = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('lmt_cols') || 'null');
      if (!saved) return null;
      // All known columns — keep in sync with ALL_COLS in PipelineTable
      const ALL = ['status','borrower','actions','scenario','file_num','days_status','address','type','program','amount','icd_due','icd_signed','close_date','funding_date','lock_exp','note','branch','lo','loa','processor'];
      // Add any new columns (not previously saved) to the visible list
      const missing = ALL.filter(c => !saved.includes(c) && c !== 'status' && c !== 'borrower');
      return missing.length ? [...saved, ...missing] : saved;
    }
    catch { return null; }
  });
  const [showColPicker, setShowColPicker] = useState(false);

  const [dealModal, setDealModal]     = useState(null);
  const [detailDeal, setDetailDeal]   = useState(null);
  const [dealInitialTab, setDealInitialTab] = useState('milestones');
  const openDeal = (deal, tab='milestones') => {
    setDetailDeal(deal); setDealInitialTab(tab); setScreen('deal');
    const hash = tab && tab !== 'milestones' ? `#deal/${deal.id}/${tab}` : `#deal/${deal.id}`;
    history.pushState({}, '', hash);
  };
  const closeDeal = () => {
    setDetailDeal(null); setDealInitialTab('milestones'); setScreen('pipeline'); refreshMsAlerts();
    history.pushState({}, '', '#pipeline');
  };
  const goToScreen = (s) => {
    setScreen(s);
    history.pushState({}, '', `#${s}`);
    if (s === 'today') refreshMsAlerts();
  };
  const createNewDeal = () => {
    const firstStatus = (customStatuses && customStatuses.length > 0) ? customStatuses[0].label : '01. Contract / Go';
    sb.from('lmt_deals').insert({ status: firstStatus, primary_borrower_name: '', trans_type: 'purchase', occupancy: 'primary' }).select().single()
      .then(function(res) {
        if (res.data) {
          setDeals(function(prev) { return [res.data, ...prev]; });
          openDeal(res.data, 'info_edit');
        }
      });
  };
  const [showImport, setShowImport]           = useState(false);
  const [scenarioLinkDeal, setScenarioLinkDeal] = useState(null);
  const [profileMenuOpen, setProfileMenuOpen]   = useState(false);
  const [colPickerOpen, setColPickerOpen]       = useState(false);
  const [colPickerPos, setColPickerPos]         = useState(null);
  const colBtnRef = useRef(null);

  // ── Hash routing: handle browser back/forward ──
  useEffect(() => {
    const handlePop = () => {
      const hash = window.location.hash.slice(1);
      if (hash.startsWith('deal/')) {
        const parts = hash.slice(5).split('/');
        const id = parts[0];
        const tab = parts[1] || 'milestones';
        const found = deals.find(d => d.id === id);
        if (found) { setDetailDeal(found); setDealInitialTab(tab); setScreen('deal'); }
        else { setDetailDeal(null); setScreen('pipeline'); }
      } else {
        setDetailDeal(null);
        const valid = ['pipeline','today','reports','people','settings','profile'];
        setScreen(valid.includes(hash) ? hash : 'pipeline');
      }
    };
    window.addEventListener('popstate', handlePop);
    return () => window.removeEventListener('popstate', handlePop);
  }, [deals]);

  // ── Hash routing: navigate to hash on initial load (after data loads) ──
  useEffect(() => {
    if (loading) return;
    const hash = window.location.hash.slice(1);
    if (!hash || hash === 'pipeline') return;
    if (hash.startsWith('deal/')) {
      const parts = hash.slice(5).split('/');
      const id = parts[0];
      const tab = parts[1] || 'milestones';
      const found = deals.find(d => d.id === id);
      if (found) { setDetailDeal(found); setDealInitialTab(tab); setScreen('deal'); }
    } else {
      const valid = ['today','reports','people','settings','profile'];
      if (valid.includes(hash)) setScreen(hash);
    }
  }, [loading]);

  // ── Auth ──
  useEffect(() => {
    sb.auth.getSession().then(({ data }) => {
      if (data.session?.user) setUser(data.session.user);
      setAuthLoading(false);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_, session) => {
      setUser(session?.user || null);
      if (!session) { setLoading(false); }
    });
    return () => subscription.unsubscribe();
  }, []);

  // Close menus on outside click
  useEffect(() => {
    if (!showColPicker && !colPickerOpen) return;
    const handler = () => { setShowColPicker(false); setColPickerOpen(false); };
    document.addEventListener('click', handler);
    return () => document.removeEventListener('click', handler);
  }, [showColPicker, colPickerOpen]);

  useEffect(() => {
    if (!profileMenuOpen) return;
    const handler = () => setProfileMenuOpen(false);
    document.addEventListener('click', handler);
    return () => document.removeEventListener('click', handler);
  }, [profileMenuOpen]);

  // Keyboard shortcuts
  useEffect(() => {
    const handler = (e) => {
      // Don't fire if typing in an input/textarea
      if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) {
        if (e.key === 'Escape') {
          if (detailDeal) { closeDeal(); }
          else if (dealModal !== null) setDealModal(null);
        }
        return;
      }
      switch(e.key) {
        case 'Escape':
          if (detailDeal) { closeDeal(); }
          else if (dealModal !== null) setDealModal(null);
          break;
        case 'n': case 'N':
          if (!detailDeal && dealModal === null) setDealModal('new');
          break;
        case 't': case 'T':
          if (!detailDeal && dealModal === null) setScreen('today');
          break;
        case 'p': case 'P':
          if (!detailDeal && dealModal === null) setScreen('pipeline');
          break;
        case 'r': case 'R':
          if (!detailDeal && dealModal === null) setScreen('reports');
          break;
        case '/':
          e.preventDefault();
          setScreen('pipeline');
          setTimeout(()=>document.querySelector('.lmt-search')?.focus(), 50);
          break;
        case '?':
          alert('Keyboard shortcuts:\n\nN — New Deal\nT — Today screen\nP — Pipeline\n/ — Search\nEsc — Close modal');
          break;
      }
    };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [detailDeal, dealModal]);

  // ── Load data (profile included so it's ready before table renders) ──
  useEffect(() => {
    if (!user) return;
    setLoading(true);
    // Safety valve: never spin longer than 15s
    const loadTimer = setTimeout(() => { console.warn('LMT load timeout — forcing loading=false'); setLoading(false); }, 15000);
    const safe = (q) => Promise.resolve(q).catch((e) => { console.error('LMT safe() caught:', e); return { data: null }; });

    Promise.all([
      safe(sb.from('lmt_deals').select('*').order('created_at', { ascending: false })),
      safe(sb.from('profiles').select('id,display_name,email,role,lmt_role,branch,team_loas,team_processors').in('role', ['admin','internal','branch_admin'])),
      safe(sb.from('lmt_milestone_presets').select('*').eq('user_id', user.id)),
      safe(sb.from('lmt_email_templates').select('*').eq('user_id', user.id)),
      safe(sb.from('lmt_milestones').select('deal_id,milestone_type,due_date,followup_date,icd_signed_date,is_done,is_na')),
      safe(sb.from('lmt_coborrowers').select('deal_id,name').order('sort_order')),
      safe(sb.from('branches').select('id,name')),
      safe(sb.from('lmt_contacts').select('*').order('last_name')),
      safe(sb.from('profiles').select('*').eq('id', user.id).single()),
    ]).then(function(results) {
      var d=results[0], p=results[1], pr=results[2], t=results[3], ms=results[4], cobs=results[5], br=results[6];
      if (results[7]?.data) setLmtContacts(results[7].data);
      if (results[8]?.data) setProfile(results[8].data);
      setBranches(br.data || []);
      setDeals(d.data || []);
      setProfiles(p.data || []);
      setPresets(pr.data || []);
      setTemplates(t.data || []);

      // Build preset alert map for pipeline highlighting
      var presetAlertMap = {};
      (pr.data || []).forEach(function(p) { presetAlertMap[p.milestone_type] = p.alert_days_before || 1; });

      var alerts = {}, progress = {};
      (ms.data || []).forEach(function(m) {
        if (!progress[m.deal_id]) progress[m.deal_id] = { done: 0, total: 0 };
        if (!m.is_na) { progress[m.deal_id].total++; if (m.is_done) progress[m.deal_id].done++; }
        if (m.is_done || m.is_na) return;
        if (!alerts[m.deal_id]) alerts[m.deal_id] = { overdue: 0, dueToday: 0 };
        var alertBefore = presetAlertMap[m.milestone_type] || 1;
        if (m.due_date) {
          var diff = daysDiff(m.due_date);
          if (diff < 0) alerts[m.deal_id].overdue++;
          else if (diff >= 0 && diff <= alertBefore) alerts[m.deal_id].dueToday++;
        }
        if (m.followup_date) {
          var fuDiff = daysDiff(m.followup_date);
          if (fuDiff < 0) alerts[m.deal_id].overdue++;
          else if (fuDiff >= 0 && fuDiff <= alertBefore) alerts[m.deal_id].dueToday++;
        }
      });
      setMsAlerts(alerts);
      setMsProgress(progress);

      // ICD data map
      var icdMap = {};
      (ms.data || []).forEach(function(m) {
        if (m.milestone_type === 'icd') {
          icdMap[m.deal_id] = { due_date: m.due_date, icd_signed_date: m.icd_signed_date };
        }
      });
      setIcdDataMap(icdMap);

      var cobMap = {};
      (cobs.data || []).forEach(function(cb) {
        if (!cobMap[cb.deal_id]) cobMap[cb.deal_id] = [];
        cobMap[cb.deal_id].push(cb.name);
      });
      setCoborrowerMap(cobMap);
    }).catch(function(err) {
      console.error('Load error:', err);
    }).finally(function() {
      clearTimeout(loadTimer);
      setLoading(false);
    });
  }, [user]);

  // ── Alert counts ──
  const alertCounts = useMemo(() => {
    const active = deals.filter(d => !d.archived);
    const overdue = active.filter(d => {
      const ld = daysDiff(d.lock_expiration_date);
      const cd = daysDiff(d.closing_date);
      return (ld !== null && ld < 0) || (cd !== null && cd < 0);
    });
    const dueSoon = active.filter(d => {
      const ld = daysDiff(d.lock_expiration_date);
      const cd = daysDiff(d.closing_date);
      return (ld !== null && ld >= 0 && ld <= 3) || (cd !== null && cd >= 0 && cd <= 3);
    });
    return { overdue: overdue.length, dueSoon: dueSoon.length };
  }, [deals]);

  // ── Metrics ──
  const metrics = useMemo(() => {
    const active = deals.filter(d => d.archived !== true);
    const now = new Date();
    const closingThisMonth = active.filter(d => {
      if (!d.closing_date) return false;
      const cd = new Date(d.closing_date + 'T12:00:00');
      return cd.getFullYear() === now.getFullYear() && cd.getMonth() === now.getMonth();
    });
    const locksExpiring = active.filter(d => {
      const diff = daysDiff(d.lock_expiration_date);
      return diff !== null && diff >= 0 && diff <= 7;
    });
    const overdueMs = Object.values(msAlerts).filter(a => a.overdue > 0).length;
    return {
      total: active.length,
      closingThisMonth: closingThisMonth.length,
      locksExpiring: locksExpiring.length,
      overdueMs,
    };
  }, [deals, msAlerts]);

  // ── Filtered + Sorted deals ──
  const filteredDeals = useMemo(() => {
    const now = new Date();
    const permDeals = filterDealsByProfile(deals, profile);
    const filtered = permDeals.filter(d => {
      const isArchived = d.archived === true;
      const isFunded = d.status === '15. Funded';
      if (viewFilter === 'active'   && (isArchived || isFunded)) return false;
      if (viewFilter === 'funded'   && (isArchived || !isFunded)) return false;
      if (viewFilter === 'archived' && !isArchived) return false;
      if (filterLO        && d.assigned_lo_id        !== filterLO)        return false;
      if (filterLOA       && d.assigned_loa_id       !== filterLOA)       return false;
      if (filterProcessor && d.assigned_processor_id !== filterProcessor) return false;
      if (filterStatus    && d.status                !== filterStatus)     return false;
      if (filterType      && d.trans_type            !== filterType)       return false;
      if (filterActions === 'overdue'  && !(msAlerts[d.id]?.overdue > 0))  return false;
      if (filterActions === 'duetoday' && !(msAlerts[d.id]?.dueToday > 0)) return false;
      if (filterActions === 'any'      && !msAlerts[d.id]?.overdue && !msAlerts[d.id]?.dueToday) return false;
      if (filterActions === 'clear'    && (msAlerts[d.id]?.overdue > 0 || msAlerts[d.id]?.dueToday > 0)) return false;
      if (filterBranch && d.branch !== filterBranch) return false;
      // Metric chip filters
      if (metricFilter === 'closingMonth') {
        if (!d.closing_date) return false;
        const cd = new Date(d.closing_date + 'T12:00:00');
        if (cd.getFullYear() !== now.getFullYear() || cd.getMonth() !== now.getMonth()) return false;
      }
      if (metricFilter === 'locksExpiring') {
        const diff = daysDiff(d.lock_expiration_date);
        if (diff === null || diff < 0 || diff > 7) return false;
      }
      if (metricFilter === 'overdueMs') {
        if (!msAlerts[d.id]?.overdue) return false;
      }
      if (search) {
        const q = search.toLowerCase();
        const lo = profiles.find(p=>p.id===d.assigned_lo_id);
        const loa = profiles.find(p=>p.id===d.assigned_loa_id);
        return [
          d.primary_borrower_name, d.property_address, d.status,
          d.quick_note, d.file_number, d.loan_program, d.loan_amount?.toString(),
          d.buyers_agent, d.sellers_agent, d.title_company, d.appraiser,
          d.hoi_company, d.escrow_company, d.city, d.state,
          lo?.display_name, lo?.email, loa?.display_name,
        ].some(val => (val||'').toLowerCase().includes(q));
      }
      return true;
    });

    // Resolve name for profile-based sorts
    const resolveName = (id) => { const p = profiles.find(x=>x.id===id); return (p?.display_name||p?.email||'').toLowerCase(); };
    const resolveVal = (d, col) => {
      if (col === 'lo')        return resolveName(d.assigned_lo_id);
      if (col === 'loa')       return resolveName(d.assigned_loa_id);
      if (col === 'processor') return resolveName(d.assigned_processor_id);
      if (col === 'type')      return d.trans_type||'';
      if (col === 'actions')    return (msAlerts[d.id]?.overdue||0) * 10 + (msAlerts[d.id]?.dueToday||0);
      if (col === 'days_status') {
        // Sort by most-behind first (positive = behind, negative = ahead)
        const actuals = d.status_actual_dates || {};
        const key = (d.status?.match(/^(\d{2})\./) || [])[1];
        if (!key || !d.closing_date || !d.date_turntimes && !d.closing_date) return 0;
        const ddates = calcDealDates(d.closing_date, d.funding_date, d.date_turntimes || {});
        const target = ddates[key];
        const actual = actuals[key];
        if (!target || !actual) return 0;
        return Math.round((new Date(actual+'T12:00:00') - new Date(target+'T12:00:00')) / 86400000);
      }
      if (col === 'branch')    return (d.branch||'').toLowerCase();
      const v = d[col]; return typeof v === 'string' ? v.toLowerCase() : (v ?? '');
    };
    filtered.sort((a, b) => {
      const av = resolveVal(a, sortCol), bv = resolveVal(b, sortCol);
      if (!av && !bv) return 0;
      if (!av) return 1;
      if (!bv) return -1;
      if (av < bv) return sortDir === 'asc' ? -1 : 1;
      if (av > bv) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
    return filtered;
  }, [deals, profile, viewFilter, search, filterLO, filterLOA, filterProcessor, filterStatus, filterType, filterActions, filterBranch, sortCol, sortDir, metricFilter, msAlerts, profiles]);

  // ── Save deal ──
  const saveDeal = async (payload) => {
    if (dealModal === 'new') {
      // Safety net: always stamp assigned_lo_id for internal/LO users
      if (!payload.assigned_lo_id && profile && ['admin','internal','branch_admin'].includes(profile.role)) {
        payload = { ...payload, assigned_lo_id: profile.id };
      }
      const { data, error } = await sb.from('lmt_deals').insert(payload).select().single();
      if (data) { setDeals(prev => [data, ...prev]); setDealModal(null); return data; }
    } else {
      const { data } = await sb.from('lmt_deals').update(payload).eq('id', dealModal.id).select().single();
      if (data) {
        setDeals(prev => prev.map(d => d.id === data.id ? data : d));
        if (detailDeal?.id === data.id) setDetailDeal(data);
        setDealModal(null);
        return data;
      }
    }
  };

  const bulkStatus = async (ids, newStatus) => {
    for (const id of ids) {
      const deal = deals.find(d => d.id === id);
      if (deal) await changeStatus(deal, newStatus);
    }
  };

  const changeStatus = async (deal, newStatus) => {
    if (deal.status === newStatus) return;
    // Record actual date for this status key (e.g. "11. CTC" → key "11")
    const statusKey = (newStatus.match(/^(\d{2})\./) || [])[1];
    const currentActuals = deal.status_actual_dates || {};
    const newActuals = statusKey ? { ...currentActuals, [statusKey]: today() } : currentActuals;

    const { data } = await sb.from('lmt_deals').update({ status: newStatus, status_actual_dates: newActuals }).eq('id', deal.id).select().single();
    if (data) {
      setDeals(prev => prev.map(d => d.id === data.id ? data : d));
      await sb.from('lmt_deal_notes').insert({
        deal_id: deal.id,
        body: `[STATUS] Changed from "${deal.status}" → "${newStatus}"`,
      });
    }
  };

  const refreshMsAlerts = async () => {
    const [{ data }, { data: presetsData }] = await Promise.all([
      sb.from('lmt_milestones').select('deal_id,milestone_type,due_date,followup_date,is_done,is_na'),
      sb.from('lmt_milestone_presets').select('milestone_type,alert_days_before').eq('user_id', user?.id),
    ]);
    if (!data) return;
    const alertMap = {};
    (presetsData||[]).forEach(p => { alertMap[p.milestone_type] = p.alert_days_before || 1; });
    const alerts = {}, progress = {};
    data.forEach(m => {
      if (!progress[m.deal_id]) progress[m.deal_id] = { done: 0, total: 0 };
      if (!m.is_na) { progress[m.deal_id].total++; if (m.is_done) progress[m.deal_id].done++; }
      if (m.is_done || m.is_na) return;
      if (!alerts[m.deal_id]) alerts[m.deal_id] = { overdue: 0, dueToday: 0 };
      const alertBefore = alertMap[m.milestone_type] || 1;
      if (m.due_date) {
        const diff = daysDiff(m.due_date);
        if (diff < 0) alerts[m.deal_id].overdue++;
        else if (diff >= 0 && diff <= alertBefore) alerts[m.deal_id].dueToday++;
      }
      if (m.followup_date) {
        const fuDiff = daysDiff(m.followup_date);
        if (fuDiff < 0) alerts[m.deal_id].overdue++;
        else if (fuDiff >= 0 && fuDiff <= alertBefore) alerts[m.deal_id].dueToday++;
      }
    });
    setMsAlerts(alerts);
    setMsProgress(progress);
  };

  const archiveDeal = async (deal) => {
    const { data } = await sb.from('lmt_deals').update({ archived: true, archived_at: new Date().toISOString() }).eq('id', deal.id).select().single();
    if (data) setDeals(prev => prev.map(d => d.id === data.id ? data : d));
    setDetailDeal(null);
  };

  const duplicateDeal = async (deal) => {
    const { id, created_at, updated_at, archived_at, ...rest } = deal;
    const payload = {
      ...rest,
      primary_borrower_name: deal.primary_borrower_name + ' (Copy)',
      archived: false,
      archived_at: null,
      status: customStatuses?.[0]?.label || 'Not Submitted',
    };
    const { data } = await sb.from('lmt_deals').insert(payload).select().single();
    if (data) {
      setDeals(prev => [data, ...prev]);
      setDetailDeal(null);
      alert(`✅ Deal cloned: "${data.primary_borrower_name}"\n\nOpen it to update the borrower name and details.`);
    }
  };

  const unarchiveDeal = async (deal) => {
    const { data } = await sb.from('lmt_deals').update({ archived: false, archived_at: null }).eq('id', deal.id).select().single();
    if (data) setDeals(prev => prev.map(d => d.id === data.id ? data : d));
  };

  const handleLogout = async () => {
    await sb.auth.signOut();
    setUser(null); setProfile(null); setDeals([]); setProfiles([]);
  };

  // ── Render ──
  if (authLoading) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#1B2A4A'}}>
      <div className="spinner" style={{width:32,height:32,borderWidth:3}}></div>
    </div>
  );

  if (!user) return <LoginScreen onLogin={setUser} />;

  return (
    <div>
      {/* Header */}
      <div className="lmt-header">
        <div className="lmt-logo">Loan <span>Manager</span></div>
        <div className="lmt-header-right">
          {/* Nav tabs */}
          <nav style={{display:'flex',gap:6}}>
            {[
              { key:'pipeline', label:'Pipeline' },
              { key:'today',    label:'Tasks' },
              { key:'reports',  label:'Reports' },
              { key:'people',   label:'People' },
            ].map(t => {
              const urgentCount = t.key === 'today'
                ? filterDealsByProfile(deals, profile).filter(d => !d.archived).reduce((sum, d) => sum + (msAlerts[d.id]?.overdue||0) + (msAlerts[d.id]?.dueToday||0), 0)
                : 0;
              return (
                <button key={t.key} className={`nav-header-tab${screen===t.key?' active':''}`} onClick={()=>goToScreen(t.key)}>
                  {t.label}
                  {urgentCount > 0 && (
                    <span style={{position:'absolute',top:-4,right:-4,background:'#DC2626',color:'white',borderRadius:'50%',width:16,height:16,fontSize:10,fontWeight:700,display:'inline-flex',alignItems:'center',justifyContent:'center'}}>
                      {urgentCount}
                    </span>
                  )}
                </button>
              );
            })}
          </nav>

          {/* Profile avatar + dropdown */}
          <div style={{position:'relative'}}>
            <div className="profile-avatar"
              onClick={e=>{ e.stopPropagation(); setProfileMenuOpen(p=>!p); }}
              title={profile?.display_name || user.email}>
              {(profile?.display_name || user.email || 'U').charAt(0).toUpperCase()}
            </div>

            {profileMenuOpen && (
              <div className="profile-dropdown" onClick={e=>e.stopPropagation()}>
                {/* Header */}
                <div className="profile-dropdown-header">
                  <div style={{fontWeight:700,fontSize:13,color:'#1B2A4A'}}>{profile?.display_name || 'My Account'}</div>
                  <div style={{fontSize:11,color:'#6B7280',marginTop:2}}>{user.email}</div>
                  {profile?.nmls && <div style={{fontSize:11,color:'#9CA3AF',marginTop:1}}>NMLS #{profile.nmls}</div>}
                </div>

                {/* Menu items */}
                <button className="profile-dropdown-item" onClick={()=>{ setScreen('profile'); setProfileMenuOpen(false); }}>
                  My Profile
                </button>
                <div style={{height:1,background:'#E5E7EB',margin:'4px 0'}} />
                <button className="profile-dropdown-item" onClick={()=>{ setScreen('turntimes_orders'); setProfileMenuOpen(false); }}>
                  Orders
                </button>
                <button className="profile-dropdown-item" onClick={()=>{ setScreen('turntimes_ops'); setProfileMenuOpen(false); }}>
                  Turntimes
                </button>
                {profile?.role === 'admin' && <>
                  <button className="profile-dropdown-item" onClick={()=>{ setScreen('settings'); setProfileMenuOpen(false); }}>
                    Settings
                  </button>
                  <button className="profile-dropdown-item" onClick={()=>{ setScreen('email_templates'); setProfileMenuOpen(false); }}>
                    Email Templates
                  </button>
                  <div style={{height:1,background:'#E5E7EB',margin:'4px 0'}} />
                  <button className="profile-dropdown-item" onClick={()=>{
                    setProfileMenuOpen(false);
                    alert('Keyboard shortcuts:\n\nN — New Deal\nT — Today\nP — Pipeline\nR — Reports\n/ — Search\n? — Show shortcuts\nEsc — Close modal');
                  }}>
                    Shortcuts
                  </button>
                  <button className="profile-dropdown-item" onClick={()=>{
                    setProfileMenuOpen(false);
                    setScreen('pipeline');
                    setShowImport(true);
                  }}>
                    Import
                  </button>
                </>}
                <div style={{height:1,background:'#E5E7EB',margin:'4px 0'}} />
                <button className="profile-dropdown-item" onClick={()=>{
                  window.open('mailto:Help@HomeLoanToolkit.com?subject=LMT Support Request');
                  setProfileMenuOpen(false);
                }}>
                  Support
                </button>
                <button className="profile-dropdown-item danger" onClick={()=>{ setProfileMenuOpen(false); handleLogout(); }}>
                  Sign Out
                </button>
              </div>
            )}
          </div>
        </div>
      </div>

      <div className="lmt-main">
        {screen === 'people' ? (
          <PeopleScreen
            user={user}
            lmtContacts={lmtContacts}
            setLmtContacts={setLmtContacts}
          />
        ) : screen === 'profile' ? (
          <ProfilePanel
            profile={profile}
            profiles={profiles}
            onProfileSave={(p) => { setProfile(prev => ({...prev, ...p})); setProfiles(prev => prev.map(pr => pr.id === profile?.id ? {...pr, ...p} : pr)); }}
          />
        ) : screen === 'settings' ? (
          <SettingsPanel
            statuses={customStatuses}
            onStatusesChange={setCustomStatuses}
            profiles={profiles}
            profile={profile}
          />
        ) : screen === 'turntimes_orders' ? (
          <TurntimesOrdersPanel
            presets={presets}
            onPresetsChange={setPresets}
          />
        ) : screen === 'turntimes_ops' ? (
          <TurntimesOpsPanel
            profile={profile}
            onProfileSave={(p) => setProfile(prev => ({...prev, ...p}))}
          />
        ) : screen === 'email_templates' ? (
          <EmailTemplatesPanel
            templates={templates}
            onTemplatesChange={setTemplates}
          />
        ) : screen === 'deal' && detailDeal ? (
          <DealDetailPage
            key={detailDeal.id}
            deal={detailDeal}
            profiles={profiles}
            presets={presets}
            templates={templates}
            currentUser={user}
            initialTab={dealInitialTab}
            onBack={closeDeal}
            onEdit={()=>openDeal(detailDeal,'info_edit')}
            onArchive={archiveDeal}
            onDuplicate={()=>duplicateDeal(detailDeal)}
            onStatusChange={changeStatus}
            customStatuses={customStatuses}
            loProfile={profiles.find(p=>p.id===detailDeal?.assigned_lo_id) || profile}
            lmtContacts={lmtContacts}
            setLmtContacts={setLmtContacts}
            onDealChange={(updated) => {
              setDetailDeal(updated);
              setDeals(prev => prev.map(d => d.id === updated.id ? updated : d));
            }}
          />
        ) : screen === 'reports' ? (
          <ReportsScreen deals={deals} profiles={profiles} msAlerts={msAlerts} customStatuses={customStatuses} profile={profile} />
        ) : screen === 'today' ? (
          <TodayScreen
            deals={deals.filter(d=>d.archived!==true)}
            profiles={profiles}
            msAlerts={msAlerts}
            coborrowerMap={coborrowerMap}
            statuses={customStatuses}
            onOpenDeal={openDeal}
            onStatusChange={changeStatus}
            profile={profile}
          />
        ) : (
          <>


            {/* Alert banners */}
            {alertCounts.overdue > 0 && (
              <div className="alert-banner">
                🔴 <strong>{alertCounts.overdue} deal{alertCounts.overdue>1?'s':''}</strong> with overdue dates
              </div>
            )}

            {/* Toolbar */}
            <div className="lmt-toolbar">
              <div className="view-tabs">
                <button className={`view-tab${viewFilter==='active'?' active':''}`} onClick={()=>setViewFilter('active')}>
                  Active ({filterDealsByProfile(deals,profile).filter(d=>d.archived!==true && d.status!=='15. Funded').length})
                </button>
                <button className={`view-tab${viewFilter==='funded'?' active':''}`} onClick={()=>setViewFilter('funded')}
                  style={{borderColor: viewFilter==='funded' ? '#1B2A4A' : '#E5E7EB'}}>
                  🏆 Funded ({deals.filter(d=>d.status==='15. Funded' && d.archived!==true).length})
                </button>
                <button className={`view-tab${viewFilter==='archived'?' active':''}`} onClick={()=>setViewFilter('archived')}>
                  Archived ({deals.filter(d=>d.archived===true).length})
                </button>
              </div>
