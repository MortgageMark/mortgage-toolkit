    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* ─── Prevent ALL horizontal pan/scroll on mobile ───────────────────
       overflow-x:hidden alone is ignored by iOS Safari at the viewport level.
       overscroll-behavior-x:none kills rubber-band horizontal bounce.
       touch-action:pan-y tells the browser only vertical drags are valid;
       the tab bar overrides this with pan-x so its own scroll still works. */
    html {
      overflow-x: hidden;
      overscroll-behavior-x: none;
      max-width: 100vw;
    }
    html, body {
      max-width: 100vw;
      overflow-x: hidden;
      overscroll-behavior-x: none;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #F5F8FA;
      -webkit-font-smoothing: antialiased;
      touch-action: pan-y;
      -webkit-overflow-scrolling: auto;
      /* Respect user's system font size preference (supports iOS Dynamic Type) */
      font-size: 16px;
    }
    /* Prevent iOS Safari from zooming in when tapping inputs (requires font-size ≥ 16px) */
    @media (max-width: 768px) {
      input, select, textarea {
        font-size: 16px !important;
      }
    }
    #root {
      overflow-x: hidden;
      max-width: 100vw;
      position: relative;
    }
    /* ─── Responsive ─────────────────────── */
    @media (max-width: 768px) {
      .mtk-grid-2 { grid-template-columns: 1fr !important; }
      .mtk-grid-3 { grid-template-columns: 1fr 1fr !important; }
      .mtk-grid-12 { grid-template-columns: 1fr !important; }
      .mtk-metrics { flex-direction: column !important; }
      .mtk-scenarios { grid-template-columns: 1fr !important; }
      .mtk-tab-bar { flex-wrap: nowrap !important; overflow-x: auto !important; -webkit-overflow-scrolling: touch; scrollbar-width: none; touch-action: pan-x; }
      .mtk-tab-bar::-webkit-scrollbar { display: none; }
      /* .mtk-header-flex stacking removed — header now handles mobile layout inline */
      .mtk-lock-row { flex-direction: column !important; align-items: flex-start !important; }
      .mtk-lock-btns { margin-top: 8px !important; }
      /* ── Mobile card containment ──────────────────────────────────────────
         All flex/grid children must be able to shrink below their content size.
         Cards and their contents must never exceed the viewport width. */
      * { min-width: 0; }
      [data-sc-body] { padding: 12px !important; }
      [data-sc-body] > * { max-width: 100% !important; box-sizing: border-box !important; }
    }
    @media (max-width: 480px) {
      .mtk-grid-3 { grid-template-columns: 1fr !important; }

      button, select { display: none !important; }

    .mtk-print-only { display: none; }

  <!-- ─── Babel compile cache (localStorage) ────────────────────────────── -->
  <!-- Wraps Babel.transform so compiled output is cached between page loads. -->
  <!-- Each module only compiles once; subsequent visits skip Babel entirely. -->
  <script>
    (function() {
      if (!window.Babel || typeof window.Babel.transform !== 'function') return;
      var VER    = 'v183';
      var PREFIX = 'bxc_' + VER + '_';
      // FNV-32a hash — fast, low collision for source strings
      function fnv32(str) {
        var h = 2166136261;
        for (var i = 0; i < str.length; i++) {
          h ^= str.charCodeAt(i);
          h = (Math.imul(h, 16777619)) >>> 0;
        }
        return h.toString(36);
      }
      // Remove stale entries from previous versions to free space
      try {
        Object.keys(localStorage)
          .filter(function(k) { return k.startsWith('bxc_') && !k.startsWith(PREFIX); })
          .forEach(function(k) { localStorage.removeItem(k); });
      } catch(e) {}
      // Wrap Babel.transform
      var _orig = Babel.transform.bind(Babel);
      Babel.transform = function(code, opts) {
        var key = PREFIX + fnv32(code);
        try {
          var cached = localStorage.getItem(key);
          if (cached) return { code: cached };
        } catch(e) {}
        var result = _orig(code, opts);
        try {
          localStorage.setItem(key, result.code);
        } catch(e) {
          // Quota exceeded — clear all bxc_ entries then retry once
          try {
            Object.keys(localStorage)
              .filter(function(k) { return k.startsWith('bxc_'); })
              .forEach(function(k) { localStorage.removeItem(k); });
            localStorage.setItem(key, result.code);
          } catch(e2) {}
        }
        return result;
      };
    })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        try {
          // Build ASSETS list from every same-origin <script src> in the page,
          // plus the HTML itself and the ES-module files loaded via import().
          var base = location.href.replace(/[^/]*(\?.*)?$/, '');
          var scriptUrls = Array.from(document.querySelectorAll('script[src]'))
            .map(function(s) { return s.src; })
            .filter(function(url) { return url.startsWith(location.origin); });
          var ASSETS_LIST = JSON.stringify(
            [location.href,
             base + 'stateConfig.js',
             base + 'stateOverrides.js',
             base + 'altaEndorsements.js',
             base + 'texasTitleEndorsements.js'
            ].concat(scriptUrls)
          );

          var swCode = `
            const CACHE_NAME = 'mtk-v301';
            const ASSETS = ${ASSETS_LIST};

            self.addEventListener('install', function(e) {
              e.waitUntil(
                caches.open(CACHE_NAME).then(function(cache) {
                  // Cache all assets; ignore individual failures (404 etc.)
                  return Promise.all(
                    ASSETS.map(function(url) { return cache.add(url).catch(function(){}); })
                  );
                }).then(function() { return self.skipWaiting(); })
              );
            });

            self.addEventListener('activate', function(e) {
              e.waitUntil(
                caches.keys().then(function(ks) {
                  return Promise.all(
                    ks.filter(function(k) { return k !== CACHE_NAME; })
                      .map(function(k) { return caches.delete(k); })
                  );
                }).then(function() { return self.clients.claim(); })
              );
            });

            self.addEventListener('fetch', function(e) {
              if (e.request.method !== 'GET') return;
              // Never cache Supabase API or font CSS (always needs fresh data)
              if (e.request.url.indexOf('supabase.co') !== -1) return;
              if (e.request.url.indexOf('fonts.googleapis.com') !== -1) return;
              e.respondWith(
                caches.match(e.request).then(function(r) {
                  return r || fetch(e.request).then(function(resp) {
                    if (resp.status === 200) {
                      var c = resp.clone();
                      caches.open(CACHE_NAME).then(function(cache) { cache.put(e.request, c); });
                    }
                    return resp;
                  }).catch(function() { return caches.match(ASSETS[0]); });
                })
              );
            });
          `;

          var blob = new Blob([swCode], { type: 'application/javascript' });
          var swUrl = URL.createObjectURL(blob);
          navigator.serviceWorker.register(swUrl, { scope: '.' }).catch(function() {});
        } catch(e) {}
      });
    }

  <!-- ─── Visible error catcher — shows crash details instead of blank screen ── -->
  <div id="mtk-error-box" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#1a0000;color:#ff9999;font-family:monospace;font-size:13px;padding:24px;overflow:auto;z-index:99999;white-space:pre-wrap;"></div>
  <script>
    window.addEventListener('error', function(e) {
      var box = document.getElementById('mtk-error-box');
      if (box) {
        box.style.display = 'block';
        box.textContent += '❌ ERROR: ' + (e.message || e) + '\n   File: ' + (e.filename || '') + '\n   Line: ' + (e.lineno || '') + '\n\n';
      }
    });
    window.addEventListener('unhandledrejection', function(e) {
      var box = document.getElementById('mtk-error-box');
      if (box) {
        box.style.display = 'block';
        box.textContent += '❌ PROMISE REJECTION: ' + (e.reason || e) + '\n\n';
      }
    });
  </script>

  <!-- ─── Title Endorsement Engine (ES modules → window globals) ────────── -->
  <!-- Loads stateConfig.js and its dependencies (altaEndorsements, texasTitleEndorsements,  -->
  <!-- stateOverrides) as real ES modules, then exposes the public API on window.             -->
  <script type="module">
    (async () => {
      try {
        const sc = await import('./stateConfig.js');
        const so = await import('./stateOverrides.js');
        window.getEndorsementsForState     = sc.getEndorsementsForState;
        window.getStateConfig              = sc.getStateConfig;
        window.getStateDropdownOptions     = sc.getStateDropdownOptions;
        window.getRateSystemLabel          = sc.getRateSystemLabel;
        window.validateExclusions          = sc.validateExclusions;
        window.validatePairings            = sc.validatePairings;
        window.applyStateOverrides         = so.applyStateOverrides;
        window.hasOverrides                = so.hasOverrides;
        window.getStateOverrideNotes       = so.getStateOverrideNotes;
        window.getEnhancedCoverageBundledCodes = so.getEnhancedCoverageBundledCodes;
        window._titleEngineLoaded = true;
        if (window._titleEngineReadyCallback) window._titleEngineReadyCallback();
      } catch(e) {
        console.error('[TitleEngine] Failed to load:', e);
        window._titleEngineError = e.message || String(e);
        window._titleEngineLoaded = false;
      }
    })();
  </script>
